apiVersion: v2
name: strapi
description: Strapi headless CMS with SQLite, MySQL, or PostgreSQL support, uploads persistence, and S3 backups
type: application
version: 1.3.5
appVersion: "5.40.0"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - strapi
  - cms
  - headless-cms
  - nodejs
  - postgresql
  - mysql
home: https://helmforge.dev/docs/charts/strapi
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/strapi
  - https://github.com/strapi/strapi
icon: https://helmforge.dev/icons/charts/strapi.png
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/strapi
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/strapi
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.7.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
