apiVersion: v2
name: strapi
description: Strapi headless CMS with SQLite, MySQL, or PostgreSQL support, uploads persistence, and S3 backups
type: application
version: 1.0.1
appVersion: "5.40.0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - strapi
  - cms
  - headless-cms
  - nodejs
  - postgresql
  - mysql
home: https://helmforge.dev/docs/charts/strapi
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/strapi
  - https://github.com/strapi/strapi
icon: https://raw.githubusercontent.com/strapi/strapi/main/packages/core/admin/admin/src/assets/images/logo.png
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/strapi
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/strapi
dependencies:
  - name: postgresql
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
