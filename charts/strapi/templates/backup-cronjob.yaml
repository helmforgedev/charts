{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "strapi.fullname" . }}-backup
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  suspend: {{ .Values.backup.suspend }}
  concurrencyPolicy: {{ .Values.backup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backup.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "strapi.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            {{- if and .Values.persistence.enabled (ne (include "strapi.databaseMode" .) "sqlite") }}
            - name: uploads-backup
              image: {{ .Values.backup.images.utility | quote }}
              command: ["/bin/sh", "/scripts/uploads-backup.sh"]
              env:
                - name: BACKUP_ARCHIVE_PREFIX
                  value: {{ .Values.backup.archivePrefix | quote }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
                - name: uploads-data
                  mountPath: /data
                  readOnly: true
            {{- end }}
            {{- if eq (include "strapi.databaseMode" .) "sqlite" }}
            - name: sqlite-backup
              image: {{ .Values.backup.images.utility | quote }}
              command: ["/bin/sh", "/scripts/sqlite-backup.sh"]
              env:
                - name: BACKUP_ARCHIVE_PREFIX
                  value: {{ .Values.backup.archivePrefix | quote }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
                - name: data
                  mountPath: /data
                  readOnly: true
            {{- else if eq (include "strapi.databaseVendor" .) "postgres" }}
            - name: postgres-backup
              image: {{ .Values.backup.images.postgresql | quote }}
              command: ["/bin/sh", "/scripts/postgres-backup.sh"]
              env:
                - name: BACKUP_ARCHIVE_PREFIX
                  value: {{ .Values.backup.archivePrefix | quote }}
                - name: PG_DUMP_EXTRA_ARGS
                  value: {{ .Values.backup.database.postgresDumpArgs | quote }}
                - name: DB_HOST
                  value: {{ include "strapi.backupDatabaseHost" . | quote }}
                - name: DB_PORT
                  value: {{ include "strapi.backupDatabasePort" . | quote }}
                - name: DB_NAME
                  value: {{ include "strapi.backupDatabaseName" . | quote }}
                - name: DB_USERNAME
                  value: {{ include "strapi.backupDatabaseUsername" . | quote }}
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "strapi.backupDatabasePasswordSecretName" . }}
                      key: {{ include "strapi.backupDatabasePasswordSecretKey" . }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
            {{- else if eq (include "strapi.databaseVendor" .) "mysql" }}
            - name: mysql-backup
              image: {{ .Values.backup.images.mysql | quote }}
              command: ["/bin/sh", "/scripts/mysql-backup.sh"]
              env:
                - name: BACKUP_ARCHIVE_PREFIX
                  value: {{ .Values.backup.archivePrefix | quote }}
                - name: MYSQL_DUMP_EXTRA_ARGS
                  value: {{ .Values.backup.database.mysqlDumpArgs | quote }}
                - name: DB_HOST
                  value: {{ include "strapi.backupDatabaseHost" . | quote }}
                - name: DB_PORT
                  value: {{ include "strapi.backupDatabasePort" . | quote }}
                - name: DB_NAME
                  value: {{ include "strapi.backupDatabaseName" . | quote }}
                - name: DB_USERNAME
                  value: {{ include "strapi.backupDatabaseUsername" . | quote }}
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "strapi.backupDatabasePasswordSecretName" . }}
                      key: {{ include "strapi.backupDatabasePasswordSecretKey" . }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
            {{- end }}
          containers:
            - name: upload
              image: {{ .Values.backup.images.uploader | quote }}
              command: ["/bin/sh", "/scripts/upload-backup.sh"]
              env:
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3.bucket | quote }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3.prefix | quote }}
                - name: S3_CREATE_BUCKET_IF_NOT_EXISTS
                  value: {{ ternary "true" "false" .Values.backup.s3.createBucketIfNotExists | quote }}
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "strapi.backupSecretName" . }}
                      key: {{ .Values.backup.s3.existingSecretAccessKeyKey }}
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "strapi.backupSecretName" . }}
                      key: {{ .Values.backup.s3.existingSecretSecretKeyKey }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
          volumes:
            - name: scripts
              configMap:
                name: {{ include "strapi.fullname" . }}-backup-scripts
                defaultMode: 0755
            - name: backup-workdir
              emptyDir: {}
            {{- if eq (include "strapi.databaseMode" .) "sqlite" }}
            - name: data
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "strapi.fullname" .)) }}
            {{- end }}
            {{- if and .Values.persistence.enabled (ne (include "strapi.databaseMode" .) "sqlite") }}
            - name: uploads-data
              persistentVolumeClaim:
                claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "strapi.fullname" .)) }}
            {{- end }}
{{- end }}
