{{- if .Values.gatewayApi.enabled }}
{{- range .Values.gatewayApi.httpRoutes | default list }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-%s" (include "strapi.fullname" $) .name }}
  labels:
    {{- include "strapi.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  {{- with .hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .rules }}
    {{- range .rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- if .backendRefs }}
        {{- toYaml .backendRefs | nindent 8 }}
        {{- else }}
        - name: {{ include "strapi.fullname" $ }}
          port: {{ $.Values.service.port }}
        {{- end }}
    {{- end }}
    {{- else }}
    - backendRefs:
        - name: {{ include "strapi.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
{{- end }}
