{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.items | default list }}
{{- if not .name }}
  {{- fail "Each externalSecrets.items entry must define a 'name' field to avoid ExternalSecret naming collisions" }}
{{- end }}
{{- if not .storeRef }}
  {{- fail (printf "externalSecrets.items entry '%s' must define a 'storeRef' field (name + kind) for secretStoreRef" .name) }}
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ if .name }}{{ printf "%s-%s" (include "strapi.fullname" $) .name | trunc 63 | trimSuffix "-" }}{{ else }}{{ include "strapi.fullname" $ | trunc 63 | trimSuffix "-" }}{{ end }}
  labels:
    {{- include "strapi.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    {{- toYaml .storeRef | nindent 4 }}
  target:
    name: {{ if .targetName }}{{ .targetName }}{{ else if .name }}{{ printf "%s-%s" (include "strapi.fullname" $) .name | trunc 63 | trimSuffix "-" }}{{ else }}{{ include "strapi.fullname" $ | trunc 63 | trimSuffix "-" }}{{ end }}
  data:
    {{- toYaml .data | nindent 4 }}
{{- end }}
{{- end }}
