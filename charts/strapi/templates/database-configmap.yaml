apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "strapi.fullname" . }}-database-config
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
data:
  database.js: |
    "use strict";
    Object.defineProperty(exports, "__esModule", { value: true });
    const path = require("path");

    exports.default = ({ env }) => {
      const client = env("DATABASE_CLIENT", "sqlite");
      const databaseFilename = env("DATABASE_FILENAME", ".tmp/data.db");
      const connections = {
        mysql: {
          connection: {
            host: env("DATABASE_HOST", "localhost"),
            port: env.int("DATABASE_PORT", 3306),
            database: env("DATABASE_NAME", "strapi"),
            user: env("DATABASE_USERNAME", "strapi"),
            password: env("DATABASE_PASSWORD", "strapi"),
            ssl: env.bool("DATABASE_SSL", false),
          },
          pool: {
            min: env.int("DATABASE_POOL_MIN", 2),
            max: env.int("DATABASE_POOL_MAX", 10),
          },
        },
        postgres: {
          connection: {
            connectionString: env("DATABASE_URL"),
            host: env("DATABASE_HOST", "localhost"),
            port: env.int("DATABASE_PORT", 5432),
            database: env("DATABASE_NAME", "strapi"),
            user: env("DATABASE_USERNAME", "strapi"),
            password: env("DATABASE_PASSWORD", "strapi"),
            ssl: env.bool("DATABASE_SSL", false),
            schema: env("DATABASE_SCHEMA", "public"),
          },
          pool: {
            min: env.int("DATABASE_POOL_MIN", 2),
            max: env.int("DATABASE_POOL_MAX", 10),
          },
        },
        sqlite: {
          connection: {
            filename: path.isAbsolute(databaseFilename)
              ? databaseFilename
              : path.join(__dirname, "..", "..", "..", "..", databaseFilename),
          },
          useNullAsDefault: true,
        },
      };

      return {
        connection: {
          client,
          ...connections[client],
          acquireConnectionTimeout: env.int("DATABASE_CONNECTION_TIMEOUT", 60000),
        },
      };
    };
