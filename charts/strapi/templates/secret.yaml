{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strapi.fullname" . }}-app
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $appSecretName := printf "%s-app" (include "strapi.fullname" .) }}
  {{- $existingAppSecret := lookup "v1" "Secret" .Release.Namespace $appSecretName }}
  {{- $generatedAppKeys := printf "%s,%s,%s" (randAlphaNum 32) (randAlphaNum 32) (randAlphaNum 32) }}
  {{- if and $existingAppSecret (not .Values.secrets.appKeys) }}
  app-keys: {{ index $existingAppSecret.data "app-keys" }}
  {{- else if .Values.secrets.appKeys }}
  app-keys: {{ .Values.secrets.appKeys | b64enc | quote }}
  {{- else }}
  app-keys: {{ $generatedAppKeys | b64enc | quote }}
  {{- end }}
  {{- if and $existingAppSecret (not .Values.secrets.apiTokenSalt) }}
  api-token-salt: {{ index $existingAppSecret.data "api-token-salt" }}
  {{- else if .Values.secrets.apiTokenSalt }}
  api-token-salt: {{ .Values.secrets.apiTokenSalt | b64enc | quote }}
  {{- else }}
  api-token-salt: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if and $existingAppSecret (not .Values.secrets.adminJwtSecret) }}
  admin-jwt-secret: {{ index $existingAppSecret.data "admin-jwt-secret" }}
  {{- else if .Values.secrets.adminJwtSecret }}
  admin-jwt-secret: {{ .Values.secrets.adminJwtSecret | b64enc | quote }}
  {{- else }}
  admin-jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if and $existingAppSecret (not .Values.secrets.jwtSecret) }}
  jwt-secret: {{ index $existingAppSecret.data "jwt-secret" }}
  {{- else if .Values.secrets.jwtSecret }}
  jwt-secret: {{ .Values.secrets.jwtSecret | b64enc | quote }}
  {{- else }}
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
  {{- if and $existingAppSecret (not .Values.secrets.transferTokenSalt) }}
  transfer-token-salt: {{ index $existingAppSecret.data "transfer-token-salt" }}
  {{- else if .Values.secrets.transferTokenSalt }}
  transfer-token-salt: {{ .Values.secrets.transferTokenSalt | b64enc | quote }}
  {{- else }}
  transfer-token-salt: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- $mode := include "strapi.databaseMode" . }}
{{- if and (ne $mode "sqlite") (not (and (eq $mode "external") .Values.database.external.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strapi.fullname" . }}-database
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $dbSecretName := printf "%s-database" (include "strapi.fullname" .) }}
  {{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
  {{- $dbPassword := include "strapi.databasePasswordValue" . }}
  {{- if and $existingDbSecret (not $dbPassword) }}
  database-password: {{ index $existingDbSecret.data "database-password" }}
  {{- else if $dbPassword }}
  database-password: {{ $dbPassword | b64enc | quote }}
  {{- else }}
  database-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "strapi.fullname" . }}-backup
  labels:
    {{- include "strapi.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.backup.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | b64enc | quote }}
{{- end }}
