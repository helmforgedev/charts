# SPDX-License-Identifier: Apache-2.0
suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
tests:
  - it: should render pvc by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-strapi-data

  - it: should not render pvc when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0
