# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render app secret by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-strapi-app
      - exists:
          path: data["app-keys"]
      - exists:
          path: data["api-token-salt"]
      - exists:
          path: data["admin-jwt-secret"]
      - exists:
          path: data["jwt-secret"]
      - exists:
          path: data["transfer-token-salt"]

  - it: should set explicit app keys
    set:
      secrets.appKeys: key1,key2,key3
    documentIndex: 0
    asserts:
      - equal:
          path: data["app-keys"]
          value: a2V5MSxrZXkyLGtleTM=

  - it: should not render app secret when existingSecret set
    set:
      secrets.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render database secret in sqlite mode
    asserts:
      - hasDocuments:
          count: 1

  - it: should render database secret for postgresql
    set:
      postgresql.enabled: true
      postgresql.auth.password: dbpass
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-strapi-database
