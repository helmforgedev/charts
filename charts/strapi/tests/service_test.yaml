suite: Service
templates:
  - templates/service.yaml
release:
  name: test
tests:
  - it: should render service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-strapi
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
