suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
tests:
  - it: should not render serviceaccount by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render serviceaccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-strapi
