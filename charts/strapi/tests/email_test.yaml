suite: Email Provider
templates:
  - templates/deployment.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should configure SMTP email provider
    template: templates/deployment.yaml
    set:
      strapi:
        email:
          provider: smtp
          defaultFrom: test@example.com
          smtp:
            host: smtp.test.com
            port: 587
            password: testpass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMAIL_PROVIDER
            value: smtp
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMAIL_DEFAULT_FROM
            value: test@example.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMAIL_SMTP_HOST
            value: smtp.test.com

  - it: should create email secret for SMTP
    template: templates/secret.yaml
    set:
      strapi:
        email:
          provider: smtp
          smtp:
            password: testpass
    asserts:
      - equal:
          path: metadata.name
          value: test-strapi-email
        documentIndex: 1
      - equal:
          path: data.smtp-password
          value: dGVzdHBhc3M=
        documentIndex: 1

  - it: should configure SendGrid provider
    template: templates/deployment.yaml
    set:
      strapi:
        email:
          provider: sendgrid
          defaultFrom: test@example.com
          sendgrid:
            apiKey: sg_test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EMAIL_PROVIDER
            value: sendgrid
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SENDGRID_API_KEY
            valueFrom:
              secretKeyRef:
                name: test-strapi-email
                key: sendgrid-api-key
