#       existingSecret: strapi-sendgrid-secret
#
# backup:
#   enabled: true
#   schedule: "0 3 * * *"
#   s3:
#     endpoint: https://minio.example.com
#     bucket: strapi-backups
#     existingSecret: strapi-backup-minio-secret

# -----------------------------------------------------------------------------
# Example 4: High-security production with external database
# -----------------------------------------------------------------------------
#
# image:
#   repository: ghcr.io/myorg/mystrapi
#   tag: "1.0.0"
#
# replicaCount: 3
#
# database:
#   mode: external
#   external:
#     vendor: postgres
#     host: postgres.production.svc.cluster.local
#     port: 5432
#     name: strapi
#     username: strapi
#     existingSecret: strapi-external-db-secret
#     ssl:
#       enabled: true
#   pool:
#     min: 2
#     max: 6
