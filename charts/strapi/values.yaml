# =============================================================================
# Strapi Helm Chart
# =============================================================================
# Headless CMS for APIs, websites, and custom admin experiences.
# This chart is designed for a prebuilt Strapi project image, not for building
# the project source code inside Kubernetes.
# https://strapi.io/
# =============================================================================

# -- Override the chart name used in resource names
nameOverride: ""

# -- Override the full release name used in resource names
fullnameOverride: ""

# -- Labels added to every resource created by this chart
commonLabels: {}

# -- Number of replicas for the Strapi deployment
# IMPORTANT: Multi-replica (>1) requires S3 or Cloudinary upload provider.
# Local filesystem uploads only work with replicaCount: 1
replicaCount: 1

# =============================================================================
# Image
# =============================================================================
# HelmForge provides a production-ready Strapi base image (helmforge/strapi-base)
# that includes Strapi 5.42.0 with all official plugins, multi-database support,
# security hardening, and health check endpoints. This image is multi-arch
# (amd64/arm64), regularly updated, and optimized for Kubernetes deployments.
#
# You can use this base image directly for testing or extend it with your
# custom Strapi project configuration.
# =============================================================================

image:
  # -- Container image repository for your Strapi project
  repository: docker.io/helmforge/strapi-base
  # -- Container image tag
  tag: "0.1.9"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# =============================================================================
# Strapi Configuration
# =============================================================================

strapi:
  # -- Host interface
  host: 0.0.0.0

  # -- Container port exposed by Strapi
  port: 1337

  # -- Public URL of the Strapi instance (auto-detected from ingress if empty)
  # Example: "https://cms.example.com"
  url: ""

  # -- Node environment
  nodeEnv: production

  # -- Disable telemetry
  telemetryDisabled: true

  # -- Start command override
  command: []

  # -- Start arguments override
  args: []

  # -- Additional environment variables for the Strapi container
  # extraEnv:
  #   - name: STRAPI_TELEMETRY_DISABLED
  #     value: "true"
  extraEnv: []

  # ===========================================================================
  # Upload Provider
  # ===========================================================================
  # By default, Strapi stores uploads on the local filesystem (PVC).
  # For production multi-replica deployments, configure an S3-compatible
  # provider or Cloudinary to store uploads in object storage.
  # ===========================================================================

  upload:
    # -- Upload provider: local | aws-s3 | cloudinary
    provider: local

    s3:
      # -- Enable S3/MinIO upload provider
      enabled: false

      # -- S3 endpoint (leave empty for AWS S3, set for MinIO/R2/Backblaze)
      # Example: "https://minio.example.com"
      endpoint: ""

      # -- S3 region
      region: us-east-1

      # -- S3 bucket for uploads
      bucket: ""

      # -- S3 path prefix (folder)
      prefix: ""

      # -- Use existing secret for S3 credentials
      # Keys: access-key, secret-key
      existingSecret: ""

      # -- Key in existing secret for access key
      existingSecretAccessKeyKey: access-key

      # -- Key in existing secret for secret key
      existingSecretSecretKeyKey: secret-key

      # -- Inline S3 access key (not recommended for production)
      accessKey: ""

      # -- Inline S3 secret key (not recommended for production)
      secretKey: ""

      # -- S3 ACL (private | public-read)
      acl: private

      # -- Base URL for accessing files (CDN). If empty, S3 URL is used.
      baseUrl: ""

      # -- Custom S3 parameters (e.g., CacheControl, ContentDisposition)
      params: {}

    cloudinary:
      # -- Enable Cloudinary upload provider
      enabled: false

      # -- Cloudinary cloud name
      cloudName: ""

      # -- Cloudinary API key
      apiKey: ""

      # -- Cloudinary API secret (use existingSecret in production)
      apiSecret: ""

      # -- Use existing secret for Cloudinary credentials
      # Keys: api-key, api-secret
      existingSecret: ""

      # -- Key in existing secret for API key
      existingSecretApiKeyKey: api-key

      # -- Key in existing secret for API secret
      existingSecretApiSecretKey: api-secret

  # ===========================================================================
  # Performance Tuning
  # ===========================================================================

  performance:
    # -- Node.js options (e.g., "--max-old-space-size=2048")
    nodeOptions: ""

    # -- Log level: fatal | error | warn | info | debug | trace
    logLevel: info

    # -- Pretty print logs (development only)
    prettyPrint: false

    # -- Force JSON structured logs
    forceJsonLogs: true

  # ===========================================================================
  # Admin Panel Configuration
  # ===========================================================================

  admin:
    # -- Custom admin panel path (default: /admin)
    path: /admin

    # -- Enable admin panel auto-open on start (development only)
    autoOpen: false

    # -- Admin JWT expiration time (e.g., 7d, 30d)
    jwtExpiration: 7d

    # -- Rate limit for admin login attempts
    rateLimit:
      enabled: true
      max: 5
      timeWindow: 900000  # 15 minutes in ms

    # -- Forgotten password configuration
    forgotPassword:
      enabled: true

  # ===========================================================================
  # Email Configuration
  # ===========================================================================

  email:
    # -- Email provider: smtp | sendgrid | none
    provider: none

    # -- Default "from" email address
    defaultFrom: noreply@example.com

    # -- Default "reply-to" email address
    defaultReplyTo: ""

    smtp:
      # -- SMTP host
      host: ""

      # -- SMTP port
      port: 587

      # -- SMTP username
      username: ""

      # -- SMTP password (use existingSecret in production)
      password: ""

      # -- Use existing secret for SMTP credentials
      # Keys: smtp-password
      existingSecret: ""

      # -- Key in existing secret for password
      existingSecretPasswordKey: smtp-password

      # -- Use TLS
      secure: false

      # -- Require TLS
      requireTLS: true

      # -- Ignore TLS errors (not recommended)
      ignoreTLS: false

    sendgrid:
      # -- SendGrid API key
      apiKey: ""

      # -- Use existing secret
      # Keys: sendgrid-api-key
      existingSecret: ""

      # -- Key in existing secret
      existingSecretApiKeyKey: sendgrid-api-key

  # ===========================================================================
  # GraphQL Configuration
  # ===========================================================================

  graphql:
    # -- Enable GraphQL playground in development
    playgroundEnabled: false

    # -- GraphQL endpoint path
    endpoint: /graphql

    # -- Enable GraphQL introspection (disable in production)
    introspection: false

    # -- Max query depth
    maxDepth: 10

    # -- Max query complexity
    maxComplexity: 1000

    # -- Enable Apollo sandbox
    apolloSandbox: false

  # ===========================================================================
  # API Configuration
  # ===========================================================================

  api:
    # -- REST API configuration
    rest:
      # -- Default limit for pagination
      defaultLimit: 25

      # -- Max limit for pagination
      maxLimit: 100

  # ===========================================================================
  # Server Configuration
  # ===========================================================================

  server:
    # -- Body parser size limits
    bodyParser:
      jsonLimit: 1mb
      formLimit: 56kb
      textLimit: 1mb

    # -- Enable response compression
    compression:
      enabled: true

    # -- Enable cron jobs
    cron:
      enabled: true

    # -- Logger configuration
    logger:
      # -- Logger level (see performance.logLevel for runtime override)
      level: info

# =============================================================================
# Application Secrets
# =============================================================================
# Strapi requires APP_KEYS, API_TOKEN_SALT, ADMIN_JWT_SECRET, JWT_SECRET,
# and TRANSFER_TOKEN_SALT. The chart auto-generates them if not provided.
# =============================================================================

secrets:
  # -- Use an existing secret containing all Strapi app secrets
  existingSecret: ""

  # -- Existing secret key for APP_KEYS (comma-separated)
  existingSecretAppKeysKey: app-keys

  # -- Existing secret key for API token salt
  existingSecretApiTokenSaltKey: api-token-salt

  # -- Existing secret key for admin JWT secret
  existingSecretAdminJwtSecretKey: admin-jwt-secret

  # -- Existing secret key for application JWT secret
  existingSecretJwtSecretKey: jwt-secret

  # -- Existing secret key for transfer token salt
  existingSecretTransferTokenSaltKey: transfer-token-salt

  # -- Explicit APP_KEYS value (comma-separated). Auto-generated if empty.
  appKeys: ""

  # -- Explicit API token salt. Auto-generated if empty.
  apiTokenSalt: ""

  # -- Explicit admin JWT secret. Auto-generated if empty.
  adminJwtSecret: ""

  # -- Explicit application JWT secret. Auto-generated if empty.
  jwtSecret: ""

  # -- Explicit transfer token salt. Auto-generated if empty.
  transferTokenSalt: ""

# =============================================================================
# Database
# =============================================================================
# Strapi supports SQLite, PostgreSQL, and MySQL.
#
# Mode detection (when mode is auto):
# 1. database.external.host or database.external.existingSecret -> external
# 2. postgresql.enabled -> PostgreSQL subchart
# 3. mysql.enabled -> MySQL subchart
# 4. Fallback -> SQLite
# =============================================================================

database:
  # -- Database mode: auto | sqlite | external | postgresql | mysql
  mode: auto

  sqlite:
    # -- Directory mounted for the SQLite database file
    directory: /opt/app/.tmp

    # -- SQLite database filename
    filename: data.db

  external:
    # -- External database vendor: postgres | mysql
    vendor: postgres

    # -- External database hostname
    host: ""

    # -- External database port (auto-detected from vendor if empty)
    port: ""

    # -- Database name
    name: strapi

    # -- Database username
    username: strapi

    # -- Database password (ignored when existingSecret is set)
    password: ""

    # -- Existing secret for the database password
    existingSecret: ""

    # -- Key in the existing secret for the database password
    existingSecretPasswordKey: database-password

    ssl:
      # -- Set DATABASE_SSL=true
      enabled: false

  # ===========================================================================
  # Database Connection Pooling (PostgreSQL & MySQL only)
  # ===========================================================================
  # Important: Calculate max connections needed:
  #   total_connections = replicaCount * pool.max + buffer
  # Ensure your database max_connections is set accordingly.
  # ===========================================================================

  pool:
    # -- Minimum database connections per replica
    min: 2

    # -- Maximum database connections per replica
    max: 10

    # -- Connection acquisition timeout (ms)
    acquireTimeoutMillis: 30000

    # -- Idle connection timeout (ms)
    idleTimeoutMillis: 30000

# =============================================================================
# PostgreSQL Subchart
# =============================================================================

postgresql:
  # -- Deploy PostgreSQL as a subchart
  enabled: false

  # -- PostgreSQL architecture (standalone or replication)
  architecture: standalone

  auth:
    # -- Database name created on first run
    database: strapi
    # -- Database username created on first run
    username: strapi
    # -- Database password (auto-generated if empty)
    password: ""

  primary:
    persistence:
      # -- Enable persistence for PostgreSQL data
      enabled: true
      # -- PVC size for PostgreSQL
      size: 8Gi

# =============================================================================
# MySQL Subchart
# =============================================================================

mysql:
  # -- Deploy MySQL as a subchart
  enabled: false

  # -- MySQL architecture (standalone or replication)
  architecture: standalone

  auth:
    # -- Database name created on first run
    database: strapi
    # -- Database username created on first run
    username: strapi
    # -- Database password (auto-generated if empty)
    password: ""
    # -- Root password (auto-generated if empty)
    rootPassword: ""

  primary:
    persistence:
      # -- Enable persistence for MySQL data
      enabled: true
      # -- PVC size for MySQL
      size: 8Gi

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistent storage for uploads and SQLite data
  enabled: true

  # -- Storage class (leave empty for cluster default)
  storageClass: ""

  # -- Access mode for the PVC
  accessMode: ReadWriteOnce

  # -- Size of the persistent volume
  size: 5Gi

  # -- Use an existing PVC instead of creating one
  existingClaim: ""

  # -- Annotations for the PVC
  annotations: {}

  uploads:
    # -- Uploads directory inside the Strapi container
    mountPath: /opt/app/public/uploads

    # -- PVC subPath used for uploads data
    subPath: uploads

  sqlite:
    # -- PVC subPath used for SQLite data
    subPath: sqlite

# =============================================================================
# Resources
# =============================================================================

# -- CPU and memory requests/limits for the Strapi container
resources: {}
  # requests:
  #   cpu: 250m
  #   memory: 512Mi
  # limits:
  #   cpu: "1"
  #   memory: 1Gi

# =============================================================================
# Security Context
# =============================================================================

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# =============================================================================
# Probes
# =============================================================================

startupProbe:
  # -- Enable startup probe
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP

  # -- HTTP port exposed by the Service
  port: 80

  # -- Annotations for the service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Strapi
  enabled: false

  # -- Ingress class name
  # ingressClassName: traefik
  ingressClassName: ""

  # -- Ingress annotations
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}

  # -- Ingress hosts
  # hosts:
  #   - host: cms.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  hosts: []

  # -- Ingress TLS configuration
  # tls:
  #   - secretName: strapi-tls
  #     hosts:
  #       - cms.example.com
  tls: []

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false

  # -- Name override (auto-generated if empty)
  name: ""

  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Backup (CronJob + S3)
# =============================================================================
# SQLite mode archives the persistent data directories. PostgreSQL and MySQL
# produce a database dump and optionally an uploads archive when persistence is
# enabled. All artifacts are uploaded to S3-compatible storage.
# =============================================================================

backup:
  # -- Enable scheduled backups to S3-compatible storage
  enabled: false

  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"

  # -- Suspend the CronJob without deleting it
  suspend: false

  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid

  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3

  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3

  # -- Maximum retries per backup job
  backoffLimit: 1

  # -- Prefix for backup archive filenames
  archivePrefix: strapi

  images:
    # -- Image used for local file backup jobs (must have tar)
    utility: docker.io/library/alpine:3.22
    # -- Image used for PostgreSQL backup (must have pg_dump)
    postgresql: docker.io/library/postgres:18.3-alpine
    # -- Image used for MySQL backup (must have mysqldump)
    mysql: docker.io/library/mysql:8.4
    # -- Image used for S3 upload (MinIO client)
    uploader: docker.io/helmforge/mc:1.0.0

  # -- Resources for backup containers
  resources: {}

  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""

    # -- Target bucket name
    bucket: ""

    # -- Key prefix within the bucket
    prefix: strapi

    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true

    # -- Use an existing secret for S3 credentials
    existingSecret: ""

    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key

    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key

    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""

    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""

  # -- Override database credentials for backup (uses app credentials if empty)
  database:
    # -- Override database host for backup
    host: ""
    # -- Override database port for backup
    port: ""
    # -- Override database name for backup
    name: ""
    # -- Override database username for backup
    username: ""
    # -- Existing secret for backup database credentials
    existingSecret: ""
    # -- Key in existing secret for the backup database password
    existingSecretPasswordKey: database-password
    # -- Extra arguments for pg_dump
    postgresDumpArgs: ""
    # -- Extra arguments for mysqldump
    mysqlDumpArgs: "--single-transaction --quick --skip-lock-tables --no-tablespaces"

# =============================================================================
# Scheduling
# =============================================================================

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- Priority class name
priorityClassName: ""

# -- Grace period for shutdown (seconds)
terminationGracePeriodSeconds: 30

# =============================================================================
# Pod-Level Metadata
# =============================================================================

# -- Additional labels for the pod
podLabels: {}

# -- Additional annotations for the pod
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

# -- Additional volume mounts for the Strapi container
extraVolumeMounts: []

# -- Additional volumes for the pod
extraVolumes: []

# -- Extra Kubernetes manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# CONFIGURATION PRESETS & EXAMPLES
# =============================================================================

# -----------------------------------------------------------------------------
# Example 1: Production with S3 uploads and PostgreSQL (Multi-replica ready)
# -----------------------------------------------------------------------------
#
# image:
#   repository: ghcr.io/myorg/mystrapi
#   tag: "1.0.0"
#   pullPolicy: IfNotPresent
#
# replicaCount: 3
#
# postgresql:
#   enabled: true
#   auth:
#     database: strapi
#     username: strapi
#     existingSecret: strapi-postgresql-secret
#   primary:
#     persistence:
#       enabled: true
#       size: 20Gi
#
# database:
#   pool:
#     min: 2
#     max: 8
#
# strapi:
#   url: https://cms.example.com
#
#   upload:
#     provider: aws-s3
#     s3:
#       enabled: true
#       bucket: mycompany-strapi-uploads
#       region: us-east-1
#       existingSecret: strapi-s3-secret
#
#   email:
#     provider: smtp
#     defaultFrom: noreply@example.com
#     defaultReplyTo: support@example.com
#     smtp:
#       host: smtp.sendgrid.net
#       port: 587
#       username: apikey
#       existingSecret: strapi-smtp-secret
#
#   admin:
#     jwtExpiration: 7d
#     rateLimit:
#       enabled: true
#       max: 5
#       timeWindow: 900000
#
#   performance:
#     nodeOptions: "--max-old-space-size=2048"
#     logLevel: warn
#     forceJsonLogs: true
#
#   graphql:
#     playgroundEnabled: false
#     introspection: false
#
# backup:
#   enabled: true
#   schedule: "0 2 * * *"
#   s3:
#     endpoint: https://s3.amazonaws.com
#     bucket: mycompany-strapi-backups
#     existingSecret: strapi-backup-s3-secret
#
# persistence:
#   enabled: true
#   size: 10Gi
#   storageClass: fast-ssd
#
# ingress:
#   enabled: true
#   ingressClassName: nginx
#   annotations:
#     cert-manager.io/cluster-issuer: letsencrypt-prod
#     nginx.ingress.kubernetes.io/rate-limit: "100"
#     nginx.ingress.kubernetes.io/proxy-body-size: "50m"
#   hosts:
#     - host: cms.example.com
#       paths:
#         - path: /
#           pathType: Prefix
#   tls:
#     - secretName: strapi-tls
#       hosts:
#         - cms.example.com
#
# resources:
#   requests:
#     cpu: 500m
#     memory: 1Gi
#   limits:
#     cpu: "2"
#     memory: 2.5Gi  # Must accommodate NODE_OPTIONS
#
# podDisruptionBudget:
#   enabled: true
#   minAvailable: 1

# -----------------------------------------------------------------------------
# Example 2: Development with SQLite and local uploads (Single replica)
# -----------------------------------------------------------------------------
#
# image:
#   repository: mystrapi
#   tag: latest
#   pullPolicy: Never
#
# replicaCount: 1
#
# database:
#   mode: sqlite
#
# strapi:
#   nodeEnv: development
#   url: http://localhost:1337
#
#   upload:
#     provider: local
#
#   admin:
#     autoOpen: true
#     rateLimit:
#       enabled: false
#
#   performance:
#     logLevel: debug
#     prettyPrint: true
#     forceJsonLogs: false
#
#   graphql:
#     playgroundEnabled: true
#     introspection: true
#
# persistence:
#   enabled: true
#   size: 1Gi
#
# resources:
#   requests:
#     cpu: 100m
#     memory: 256Mi
#   limits:
#     cpu: "1"
#     memory: 512Mi

# -----------------------------------------------------------------------------
# Example 3: Multi-region with MinIO object storage
# -----------------------------------------------------------------------------
#
# image:
#   repository: ghcr.io/myorg/mystrapi
#   tag: "1.0.0"
#
# replicaCount: 2
#
# postgresql:
#   enabled: true
#   architecture: replication
#   auth:
#     database: strapi
#     username: strapi
#     existingSecret: strapi-postgresql-secret
#   primary:
#     persistence:
#       size: 20Gi
#   readReplicas:
#     replicaCount: 1
#
# strapi:
#   upload:
#     provider: aws-s3
#     s3:
#       enabled: true
#       endpoint: https://minio.example.com
#       bucket: strapi-uploads
#       region: us-east-1
#       existingSecret: strapi-minio-secret
#
#   email:
#     provider: sendgrid
#     defaultFrom: cms@example.com
