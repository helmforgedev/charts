# -----------------------------------------------------------------------------
# Example 5: Staging with Cloudinary uploads
# -----------------------------------------------------------------------------
#
# image:
#   repository: ghcr.io/myorg/mystrapi
#   tag: "staging"
#
# replicaCount: 2
#
# postgresql:
#   enabled: true
#   auth:
#     database: strapi
#     username: strapi
#     password: change-me-staging
#   primary:
#     persistence:
#       size: 10Gi
#
# strapi:
#   url: https://cms-staging.example.com
#
#   upload:
#     provider: cloudinary
#     cloudinary:
#       enabled: true
#       cloudName: mycompany-staging
#       existingSecret: strapi-cloudinary-secret
#
#   email:
#     provider: smtp
#     defaultFrom: staging-cms@example.com
#     smtp:
#       host: smtp.mailtrap.io
#       port: 2525
