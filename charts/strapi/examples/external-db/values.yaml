# Strapi with external PostgreSQL database
image:
  repository: ghcr.io/example/my-strapi
  tag: "1.0.0"

database:
  mode: external
  external:
    vendor: postgres
    host: db.example.com
    port: 5432
    name: strapi
    username: strapi
    existingSecret: strapi-db-credentials

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: cms.example.com
      paths:
        - path: /
          pathType: Prefix
