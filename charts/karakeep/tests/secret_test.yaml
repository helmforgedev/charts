# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-karakeep-secret
      - equal:
          path: type
          value: Opaque

  - it: should contain nextauth-secret and meili-master-key keys
    asserts:
      - isNotNull:
          path: data["nextauth-secret"]
      - isNotNull:
          path: data["meili-master-key"]

  - it: should render custom secret keys
    set:
      karakeep:
        existingSecretNextAuthKey: nextauth
        existingSecretMeiliMasterKey: meili
    asserts:
      - isNotNull:
          path: data["nextauth"]
      - isNotNull:
          path: data["meili"]
      - isNull:
          path: data["nextauth-secret"]
      - isNull:
          path: data["meili-master-key"]

  - it: should not render Secret when existing secret is configured
    set:
      karakeep.existingSecret: karakeep-app-secret
    asserts:
      - hasDocuments:
          count: 0
