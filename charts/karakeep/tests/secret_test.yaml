suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-karakeep-secret
      - equal:
          path: type
          value: Opaque

  - it: should contain nextauth-secret and meili-master-key keys
    asserts:
      - isNotNull:
          path: data["nextauth-secret"]
      - isNotNull:
          path: data["meili-master-key"]
