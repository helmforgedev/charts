suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-karakeep-data

  - it: should not render when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence.existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set storage size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
