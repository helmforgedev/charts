# CI: ingress enabled with sidecars disabled
karakeep:
  nextAuthUrl: "https://karakeep.example.com"

meilisearch:
  enabled: false

chromium:
  enabled: false

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: karakeep.example.com
      paths:
        - path: /
          pathType: Prefix
