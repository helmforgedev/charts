# AI tagging example using a Secret-backed OpenAI API key.

karakeep:
  nextAuthUrl: "https://karakeep.example.com"
  extraEnv:
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: karakeep-ai-secret
          key: openai-api-key
    - name: OPENAI_BASE_URL
      value: "https://api.openai.com/v1"

meilisearch:
  enabled: true

chromium:
  enabled: true

persistence:
  enabled: true
  size: 20Gi
