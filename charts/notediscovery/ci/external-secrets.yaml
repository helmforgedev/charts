# SPDX-License-Identifier: Apache-2.0
auth:
  existingSecret: notediscovery-config
externalSecrets:
  enabled: true
  items:
    - name: config
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: helmforge-fake-store
        target:
          name: notediscovery-config
          creationPolicy: Owner
          template:
            data:
              config.yaml: |
                app:
                  name: "NoteDiscovery"
                server:
                  host: "0.0.0.0"
                  port: 8000
                  reload: false
                  allowed_origins:
                    - "*"
                  debug: false
                storage:
                  notes_dir: "/app/data"
                  plugins_dir: "./plugins"
                search:
                  enabled: true
                ui:
                  autosave_delay_ms: 1000
                authentication:
                  enabled: true
                  secret_key: "{{ .token }}"
                  password: "{{ .password }}"
                  session_max_age: 604800
                  api_key: "{{ .token }}"
        data:
          - secretKey: password
            remoteRef:
              key: test/password
          - secretKey: token
            remoteRef:
              key: test/token
