# SPDX-License-Identifier: Apache-2.0
auth:
  existingSecret: notediscovery-existing-config
  existingSecretKey: config.yaml
extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: notediscovery-existing-config
    type: Opaque
    stringData:
      config.yaml: |
        app:
          name: "NoteDiscovery"
        server:
          host: "0.0.0.0"
          port: 8000
          reload: false
          allowed_origins:
            - "*"
          debug: false
        storage:
          notes_dir: "/app/data"
          plugins_dir: "./plugins"
        search:
          enabled: true
        ui:
          autosave_delay_ms: 1000
        authentication:
          enabled: false
          secret_key: ""
          password: ""
          session_max_age: 604800
          api_key: ""
