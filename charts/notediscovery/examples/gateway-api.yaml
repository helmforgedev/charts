notediscovery:
  allowedOrigins:
    - https://notes.example.com

gatewayAPI:
  enabled: true
  httpRoutes:
    - hostnames:
        - notes.example.com
      parentRefs:
        - name: public
          namespace: gateway-system
      path: /
      pathType: PathPrefix
