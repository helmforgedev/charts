auth:
  enabled: true
  secretKey: replace-with-a-long-random-secret
  password: replace-with-a-strong-password

persistence:
  enabled: true
  size: 20Gi

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi
