# SPDX-License-Identifier: Apache-2.0
notediscovery:
  allowedOrigins:
    - https://notes.example.com

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: notes.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: notediscovery-tls
      hosts:
        - notes.example.com
