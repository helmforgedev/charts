# SPDX-License-Identifier: Apache-2.0
suite: notediscovery network policy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: limits inbound NoteDiscovery HTTP traffic
    values:
      - networkpolicy-values.yaml
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
