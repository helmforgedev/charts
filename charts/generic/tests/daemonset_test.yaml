suite: DaemonSet
templates:
  - daemonset.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render DaemonSet
    set:
      workload.type: DaemonSet
      hpa.enabled: false
    asserts:
      - isKind:
          of: DaemonSet
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/library/nginx:1.27.5

