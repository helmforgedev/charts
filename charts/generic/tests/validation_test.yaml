suite: Validation
templates:
  - validate.yaml
release:
  name: test
  namespace: default
tests:
  - it: should fail when a container name is not DNS-1123
    set:
      containers:
        - name: App
    asserts:
      - failedTemplate:
          errorMessage: "containers[].name must be a DNS-1123 label: App"

  - it: should fail when HPA targets a DaemonSet
    set:
      workload.type: DaemonSet
      hpa.enabled: true
      hpa.maxReplicas: 3
    asserts:
      - failedTemplate:
          errorMessage: "hpa.enabled cannot be used with workload.type=DaemonSet"

  - it: should fail when HPA omits maxReplicas
    set:
      hpa.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "hpa.maxReplicas is required when hpa.enabled=true"

  - it: should fail when PDB has no availability budget
    set:
      pdb.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "pdb.minAvailable or pdb.maxUnavailable is required when pdb.enabled=true"

  - it: should fail when ingress falls back to disabled primary service
    set:
      service.enabled: false
      ingress:
        enabled: true
        hosts:
          - host: app.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - failedTemplate:
          errorMessage: "ingress paths require an explicit backend when service.enabled=false"

  - it: should fail when HTTPRoute falls back to disabled primary service
    set:
      service.enabled: false
      gatewayApi:
        enabled: true
        httpRoutes:
          - name: app
            parentRefs:
              - name: gateway
            rules:
              - matches:
                  - path:
                      type: PathPrefix
                      value: /
    asserts:
      - failedTemplate:
          errorMessage: "gatewayApi.httpRoutes[].rules[].backendRefs is required when service.enabled=false"

  - it: should fail when KEDA ScaledObject has no workload target
    set:
      workload.enabled: false
      keda:
        enabled: true
        scaledObject:
          enabled: true
          triggers:
            - type: cpu
              metricType: Utilization
              metadata:
                value: "70"
    asserts:
      - failedTemplate:
          errorMessage: "keda.scaledObject.enabled requires workload.enabled=true"
