# SPDX-License-Identifier: Apache-2.0
suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB when enabled
    set:
      pdb.enabled: true
      pdb.minAvailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget

  - it: should render zero maxUnavailable when explicitly set
    set:
      pdb.enabled: true
      pdb.maxUnavailable: 0
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 0
