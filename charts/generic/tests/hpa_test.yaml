suite: HorizontalPodAutoscaler
templates:
  - hpa.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create HPA by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HPA when enabled
    set:
      hpa.enabled: true
      hpa.minReplicas: 1
      hpa.maxReplicas: 5
      hpa.metrics:
        - resource: cpu
          type: Utilization
          target: 75
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler

  - it: should render non-resource HPA metrics
    set:
      hpa:
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        metrics:
          - type: Pods
            pods:
              metric:
                name: requests_per_second
              target:
                type: AverageValue
                averageValue: "10"
    asserts:
      - equal:
          path: spec.metrics[0].type
          value: Pods
      - equal:
          path: spec.metrics[0].pods.metric.name
          value: requests_per_second
