suite: Extra manifests
templates:
  - extra-manifests.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render templated extra manifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: '{{ include "chart.fullname" . }}-extra'
          data:
            release: '{{ .Release.Name }}'
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-extra
      - equal:
          path: data.release
          value: test
