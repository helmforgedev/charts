suite: ConfigMap
templates:
  - configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render ConfigMap with labels and annotations
    set:
      configMaps:
        - name: app
          labels:
            app.example.com/component: config
          annotations:
            app.example.com/reload: "true"
          data:
            app.yaml: |
              enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-app
      - equal:
          path: metadata.labels["app.example.com/component"]
          value: config
      - equal:
          path: metadata.annotations["app.example.com/reload"]
          value: "true"

