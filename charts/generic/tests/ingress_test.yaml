# SPDX-License-Identifier: Apache-2.0
suite: Ingress
templates:
  - ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create Ingress by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create Ingress when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: app.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: traefik

  - it: should render tpl in host, tls hosts and secretName from .Release.Namespace
    release:
      namespace: staging
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: "api-{{ .Release.Namespace }}.example.com"
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - hosts:
            - "api-{{ .Release.Namespace }}.example.com"
          secretName: "api-{{ .Release.Namespace }}-tls"
    asserts:
      - equal:
          path: spec.rules[0].host
          value: api-staging.example.com
      - equal:
          path: spec.tls[0].hosts[0]
          value: api-staging.example.com
      - equal:
          path: spec.tls[0].secretName
          value: api-staging-tls
