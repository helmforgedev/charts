suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Service
    asserts:
      - isKind:
          of: Service

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 80 by default
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            protocol: TCP
            targetPort: 80

  - it: should not render when service is disabled
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a headless primary service
    set:
      service:
        enabled: true
        headless:
          enabled: true
        port: 8080
        targetPort: 8080
    asserts:
      - equal:
          path: spec.clusterIP
          value: None

  - it: should render additional services
    documentIndex: 1
    set:
      services:
        - name: metrics
          ports:
            - name: metrics
              port: 9090
              targetPort: 9090
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-metrics
