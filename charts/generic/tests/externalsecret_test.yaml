suite: ExternalSecret
templates:
  - external-secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret item
    set:
      externalSecrets:
        enabled: true
        items:
          - name: app
            spec:
              refreshInterval: 1h
              target:
                name: app-secret
              secretStoreRef:
                name: vault
                kind: ClusterSecretStore
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test-app
      - equal:
          path: spec.secretStoreRef.name
          value: vault

  - it: should fail when ExternalSecret item has no secretStoreRef name
    set:
      externalSecrets:
        enabled: true
        items:
          - name: app
            spec:
              target:
                name: app-secret
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true"
