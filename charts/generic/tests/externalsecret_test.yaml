# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - external-secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret item
    set:
      externalSecrets:
        enabled: true
        items:
          - name: app
            spec:
              refreshInterval: 1h
              target:
                name: app-secret
              secretStoreRef:
                name: vault
                kind: ClusterSecretStore
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
    asserts:
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: test-app
      - equal:
          path: spec.secretStoreRef.name
          value: vault

  - it: should default target name to the rendered ExternalSecret name
    set:
      externalSecrets:
        enabled: true
        items:
          - name: env
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault
                kind: ClusterSecretStore
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
    asserts:
      - equal:
          path: metadata.name
          value: test-env
      - equal:
          path: spec.target.name
          value: test-env

  - it: should render an ExternalSecret item with a literal fullnameOverride
    set:
      externalSecrets:
        enabled: true
        items:
          - name: env
            fullnameOverride: app-env
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault
                kind: ClusterSecretStore
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
    asserts:
      - equal:
          path: metadata.name
          value: app-env
      - equal:
          path: spec.target.name
          value: app-env

  - it: should preserve long literal fullnameOverride values
    set:
      externalSecrets:
        enabled: true
        items:
          - fullnameOverride: app-env-name-that-is-intentionally-longer-than-sixty-three-characters.example
            spec:
              refreshInterval: 1h
              secretStoreRef:
                name: vault
                kind: ClusterSecretStore
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
    asserts:
      - equal:
          path: metadata.name
          value: app-env-name-that-is-intentionally-longer-than-sixty-three-characters.example
      - equal:
          path: spec.target.name
          value: app-env-name-that-is-intentionally-longer-than-sixty-three-characters.example

  - it: should render ExternalSecret item with per-entry sourceRef storeRef
    set:
      externalSecrets:
        enabled: true
        items:
          - name: app
            spec:
              refreshInterval: 1h
              target:
                name: app-secret
              data:
                - secretKey: password
                  remoteRef:
                    key: app/password
                  sourceRef:
                    storeRef:
                      name: vault
                      kind: ClusterSecretStore
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.data[0].sourceRef.storeRef.name
          value: vault

  - it: should fail when ExternalSecret item has no default or per-entry store reference
    set:
      externalSecrets:
        enabled: true
        items:
          - name: app
            spec:
              target:
                name: app-secret
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.secretStoreRef.name or item sourceRef.storeRef.name/sourceRef.generatorRef.name is required when externalSecrets.enabled=true"
