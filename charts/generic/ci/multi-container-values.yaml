# SPDX-License-Identifier: Apache-2.0
workload:
  enabled: true
  type: Deployment

image:
  repository: docker.io/library/nginx
  tag: "1.31.2"

containers:
  - name: api
    ports:
      - containerPort: 80
    env:
      - name: PORT
        value: "80"
  - name: sidecar
    image:
      repository: docker.io/library/busybox
      tag: "1.37"
    command: ["sh", "-c", "sleep 3600"]
    ports:
      - containerPort: 9901

service:
  port: 80
  targetPort: 80

serviceMonitor:
  enabled: true
  endpoints:
    - port: http
      path: /metrics
      interval: 30s

extraManifests:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: extra-config
    data:
      key: value
