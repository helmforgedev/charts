# SPDX-License-Identifier: Apache-2.0
externalSecrets:
  enabled: true
  items:
    - fullnameOverride: test-secret
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: test-store
          kind: ClusterSecretStore
        data:
          - secretKey: key
            remoteRef:
              key: remote-key
