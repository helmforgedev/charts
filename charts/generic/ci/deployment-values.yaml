# SPDX-License-Identifier: Apache-2.0
workload:
  enabled: true
  type: Deployment

image:
  repository: docker.io/library/nginx
  tag: "1.31.3"
  pullPolicy: IfNotPresent

containers:
  - name: app
    ports:
      - containerPort: 80

service:
  port: 80
  targetPort: 80

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - app.example.com
      secretName: app-tls

livenessProbe:
  httpGet:
    path: /
    port: 80

readinessProbe:
  httpGet:
    path: /
    port: 80

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - resource: cpu
      type: Utilization
      target: 75

pdb:
  enabled: true
  minAvailable: 1
