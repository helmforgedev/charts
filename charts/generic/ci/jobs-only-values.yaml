# SPDX-License-Identifier: Apache-2.0
workload:
  enabled: false

image:
  repository: docker.io/library/busybox
  tag: "1.37"

jobs:
  - name: db-migrate
    command: ["sh", "-c", "echo migrate ok"]
    backoffLimit: 3

cronjobs:
  - name: cleanup
    schedule: "0 2 * * *"
    command: ["sh", "-c", "echo cleanup ok"]
