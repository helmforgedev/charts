{{- range .Values.secrets | default list }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart.namedResource" (dict "root" $ "name" .name) }}
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: {{ .type | default "Opaque" }}
{{- with .data }}
data:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- with .stringData }}
stringData:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
