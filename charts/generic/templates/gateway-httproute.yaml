{{- if .Values.gatewayApi.enabled }}
{{- range .Values.gatewayApi.httpRoutes | default list }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chart.namedResource" (dict "root" $ "name" .name) }}
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .parentRefs }}
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  {{- end }}
  {{- with .hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .rules }}
  rules:
    {{- range .rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      {{- if .backendRefs }}
      backendRefs:
        {{- toYaml .backendRefs | nindent 8 }}
      {{- else }}
      backendRefs:
        - name: {{ include "chart.serviceName" $ }}
          port: {{ $.Values.service.port }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
