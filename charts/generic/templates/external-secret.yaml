{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.items | default list }}
{{- $resourceName := "" }}
{{- if .fullnameOverride }}
{{- $resourceName = tpl .fullnameOverride $ }}
{{- else if .name }}
{{- $resourceName = include "chart.namedResource" (dict "root" $ "name" .name) }}
{{- else }}
{{- $resourceName = include "chart.fullname" $ }}
{{- end }}
{{- $spec := deepCopy (.spec | default dict) }}
{{- $target := deepCopy (get $spec "target" | default dict) }}
{{- if not (get $target "name") }}
{{- $_ := set $target "name" $resourceName }}
{{- $_ := set $spec "target" $target }}
{{- end }}
{{- $hasStoreRef := false }}
{{- if dig "secretStoreRef" "name" "" $spec }}
{{- $hasStoreRef = true }}
{{- end }}
{{- range ($spec.data | default list) }}
{{- if or (dig "sourceRef" "storeRef" "name" "" .) (dig "sourceRef" "generatorRef" "name" "" .) }}
{{- $hasStoreRef = true }}
{{- end }}
{{- end }}
{{- range ($spec.dataFrom | default list) }}
{{- if or (dig "sourceRef" "storeRef" "name" "" .) (dig "sourceRef" "generatorRef" "name" "" .) }}
{{- $hasStoreRef = true }}
{{- end }}
{{- end }}
{{- if not $hasStoreRef }}
{{- fail "externalSecrets.secretStoreRef.name or item sourceRef.storeRef.name/sourceRef.generatorRef.name is required when externalSecrets.enabled=true" }}
{{- end }}
{{- if dig "secretStoreRef" "name" "" $spec }}
{{- $secretStoreName := required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .spec.secretStoreRef.name }}
{{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $resourceName }}
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
spec:
  {{- tpl (toYaml $spec) $ | nindent 2 }}
{{- end }}
{{- end }}
