apiVersion: v2
name: docmost
description: Docmost collaborative wiki and documentation software with PostgreSQL, Redis, local storage, and optional S3
type: application
version: 1.0.4
appVersion: "0.70.3"
kubeVersion: ">=1.26.0-0"
icon: https://docmost.com/img/logo.svg
home: https://helmforge.dev/docs/charts/docmost
keywords:
  - docmost
  - wiki
  - documentation
  - knowledge-base
  - collaboration
  - postgres
  - redis
maintainers:
  - name: helmforgedev
  - name: mberlofa
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/docmost/docmost
  - https://docmost.com/docs
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: skip-prediction
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/docmost
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/docmost
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
