apiVersion: v2
name: docmost
description: Docmost collaborative wiki and documentation software with PostgreSQL, Redis, local storage, and optional S3
type: application
version: 1.1.1
appVersion: "0.70.3"
kubeVersion: ">=1.26.0-0"
icon: https://helmforge.dev/icons/charts/docmost.png
home: https://helmforge.dev
keywords:
  - docmost
  - wiki
  - documentation
  - knowledge-base
  - collaboration
  - postgres
  - redis
maintainers:
  - name: helmforgedev
  - name: mberlofa
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/docmost/docmost
  - https://docmost.com/docs
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: update signing annotation to gpg+cosign and fix provenance upload
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: helmforgedev@users.noreply.github.com
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  artifacthub.io/license: MIT
  artifacthub.io/category: skip-prediction
  artifacthub.io/links: |
    - name: Official Website
      url: https://docmost.com
    - name: Documentation
      url: https://helmforge.dev/docs/charts/docmost
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/docmost
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/images: |
    - name: docmost
      image: docker.io/docmost/docmost:0.70.3
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
    - url: https://artifacthub.io/packages/helm/helmforge/redis
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
