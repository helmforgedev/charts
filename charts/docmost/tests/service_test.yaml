suite: Service
templates:
  - templates/service.yaml
tests:
  - it: should render the HTTP service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].protocol
          value: TCP
