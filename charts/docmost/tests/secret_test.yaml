# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
tests:
  - it: should render the app secret by default
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-docmost-app
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data["app-secret"]

  - it: should render the S3 secret when storage mode is s3
    set:
      storage.mode: s3
      storage.s3.bucket: docmost
      storage.s3.accessKey: minio
      storage.s3.secretKey: secret123
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-docmost-storage
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data["access-key"]
      - exists:
          path: data["secret-key"]
