# SPDX-License-Identifier: Apache-2.0
# CI scenario: ExternalSecrets with drift guard (GR-061)
postgresql:
  enabled: false

database:
  mode: external
  external:
    host: docmost-external-postgresql
    username: docmost
    name: docmost
    existingSecret: docmost-database-credentials

redis:
  enabled: false
  external:
    host: docmost-external-redis

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: database-password
      remoteRef:
        key: test/password

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: docmost-external-postgresql
    spec:
      ports:
        - name: postgres
          port: 5432
          targetPort: postgres
      selector:
        app.kubernetes.io/name: docmost-external-postgresql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: docmost-external-postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: docmost-external-postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: docmost-external-postgresql
        spec:
          containers:
            - name: postgres
              image: docker.io/library/postgres:18.4-trixie
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgres
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: docmost
                - name: POSTGRES_USER
                  value: docmost
                - name: POSTGRES_PASSWORD
                  value: helmforge-test-password
  - apiVersion: v1
    kind: Service
    metadata:
      name: docmost-external-redis
    spec:
      ports:
        - name: redis
          port: 6379
          targetPort: redis
      selector:
        app.kubernetes.io/name: docmost-external-redis
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: docmost-external-redis
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: docmost-external-redis
      template:
        metadata:
          labels:
            app.kubernetes.io/name: docmost-external-redis
        spec:
          containers:
            - name: redis
              image: docker.io/library/redis:8.8.0
              imagePullPolicy: IfNotPresent
              ports:
                - name: redis
                  containerPort: 6379
