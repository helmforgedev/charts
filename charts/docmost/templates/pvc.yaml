{{- if and (eq .Values.storage.mode "local") .Values.storage.local.enabled (not .Values.storage.local.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "docmost.fullname" . }}-storage
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
  {{- with .Values.storage.local.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.storage.local.accessMode }}
  {{- if .Values.storage.local.storageClass }}
  storageClassName: {{ .Values.storage.local.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.local.size }}
{{- end }}
