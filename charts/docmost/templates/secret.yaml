{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if and (eq (include "docmost.databaseMode" .) "external") (not .Values.database.external.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.fullname" . }}-database
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $secretName := printf "%s-database" (include "docmost.fullname" .) }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existing (not .Values.database.external.password) }}
  database-password: {{ index $existing.data "database-password" }}
  {{- else if .Values.database.external.password }}
  database-password: {{ .Values.database.external.password | b64enc | quote }}
  {{- else }}
  database-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.appSecretSecretName" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $secretName := include "docmost.appSecretSecretName" . }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existing (not .Values.docmost.appSecret) }}
  app-secret: {{ index $existing.data "app-secret" }}
  {{- else if .Values.docmost.appSecret }}
  app-secret: {{ .Values.docmost.appSecret | b64enc | quote }}
  {{- else }}
  app-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- if and (eq (include "docmost.redisMode" .) "external") (not .Values.redis.external.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.fullname" . }}-redis
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $secretName := printf "%s-redis" (include "docmost.fullname" .) }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
  {{- if and $existing (not .Values.redis.external.password) }}
  redis-password: {{ index $existing.data "redis-password" }}
  {{- else if .Values.redis.external.password }}
  redis-password: {{ .Values.redis.external.password | b64enc | quote }}
  {{- else }}
  redis-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (eq .Values.storage.mode "s3") (not .Values.storage.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.storageSecretName" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.storage.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.storage.s3.secretKey | b64enc | quote }}
{{- end }}
{{- if and (include "docmost.backupEnabled" .) (not .Values.backup.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "docmost.backupSecretName" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.backup.s3.existingSecretAccessKeyKey }}: {{ .Values.backup.s3.accessKey | quote }}
  {{ .Values.backup.s3.existingSecretSecretKeyKey }}: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
