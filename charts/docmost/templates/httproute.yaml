{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- $gateway := .Values.gateway -}}
{{- $gatewayBlock := "gateway" -}}
{{- if and (not .Values.gateway.enabled) (hasKey .Values "gatewayAPI") (dig "enabled" false .Values.gatewayAPI) }}
{{- $gateway = .Values.gatewayAPI -}}
{{- $gatewayBlock = "gatewayAPI" -}}
{{- end }}
{{- if $gateway.enabled }}
{{- if not $gateway.parentRefs }}
  {{- fail (printf "%s.parentRefs is required when %s.enabled=true" $gatewayBlock $gatewayBlock) }}
{{- end }}
{{- range $gateway.parentRefs }}
  {{- if not .name }}
    {{- fail (printf "Each %s.parentRefs entry must define a 'name' field" $gatewayBlock) }}
  {{- end }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "docmost.fullname" . }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
  {{- with $gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $gateway.parentRefs | nindent 4 }}
  {{- with $gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ default "PathPrefix" $gateway.pathType }}
            value: {{ default "/" $gateway.path | quote }}
      backendRefs:
        - name: {{ include "docmost.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
