suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-drupal

  - it: should not render PVC when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render PVC when existingClaim is set
    set:
      persistence.existingClaim: existing-sites
    asserts:
      - hasDocuments:
          count: 0

  - it: should set storage size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 8Gi
