# SPDX-License-Identifier: Apache-2.0
suite: Validations
templates:
  - templates/validate.yaml
release:
  name: test
  namespace: default
tests:
  - it: should fail multi-replica without RWX storage
    set:
      replicaCount: 2
      database.mode: mysql
      mysql.enabled: true
      persistence.accessMode: ReadWriteOnce
    asserts:
      - failedTemplate:
          errorMessage: "Multi-replica Drupal requires persistence.accessMode=ReadWriteMany so /var/www/html/sites can be shared safely."

  - it: should fail multi-replica without persistence
    set:
      replicaCount: 2
      database.mode: mysql
      mysql.enabled: true
      persistence.enabled: false
      persistence.accessMode: ReadWriteMany
    asserts:
      - failedTemplate:
          errorMessage: "Multi-replica Drupal requires persistence.enabled=true so uploaded files and installer state are shared across replicas."

  - it: should fail sqlite path outside sites when sqlite mode is active
    set:
      database.mode: sqlite
      mysql.enabled: false
      drupal.sqlitePath: private/db.sqlite
    asserts:
      - failedTemplate:
          errorMessage: "database.mode=sqlite requires drupal.sqlitePath to stay under sites/ so persistence and backup cover the database file"

  - it: should fail ingress without rules
    set:
      ingress.enabled: true
      ingress.hosts: []
    asserts:
      - failedTemplate:
          errorMessage: "ingress.hosts must contain at least one rule when ingress.enabled=true"

  - it: should fail reserved pod label overrides
    set:
      podLabels:
        app.kubernetes.io/component: custom
    asserts:
      - failedTemplate:
          errorMessage: "podLabels must not override selector label app.kubernetes.io/component"

  - it: should allow null pod labels
    set:
      podLabels: null
    asserts:
      - notFailedTemplate: {}
