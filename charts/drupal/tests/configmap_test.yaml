suite: ConfigMap
templates:
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render configmap by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render configmap when php.ini is set
    set:
      php.ini: |
        memory_limit = 256M
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-drupal-config
