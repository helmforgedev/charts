database:
  mode: external
  external:
    host: db.example.com
    port: 3306
    name: drupal
    username: drupal

mysql:
  enabled: false

persistence:
  enabled: true
  size: 8Gi

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: drupal.example.com
      paths:
        - path: /
          pathType: Prefix
