# CI scenario: External Secrets Operator (GR-061).
# config.existingSecret is required when externalSecrets.enabled=true.
persistence:
  conf:
    enabled: false
  work:
    enabled: false

config:
  existingSecret: my-adguard-config-secret

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: AdGuardHome.yaml
      remoteRef:
        key: adguard-home/config
        property: AdGuardHome.yaml
