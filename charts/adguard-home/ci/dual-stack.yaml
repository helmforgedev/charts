# CI scenario: dual-stack IPv6 service (GR-058)
persistence:
  conf:
    enabled: false
  work:
    enabled: false

service:
  web:
    ipFamilyPolicy: PreferDualStack
    ipFamilies:
      - IPv4
      - IPv6
  dns:
    type: ClusterIP
    ipFamilyPolicy: PreferDualStack
    ipFamilies:
      - IPv4
      - IPv6
