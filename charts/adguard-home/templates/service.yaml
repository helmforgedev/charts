{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{/* Web UI service */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard-home.fullname" . }}-web
  labels:
    {{- include "adguard-home.labels" . | nindent 4 }}
  {{- with .Values.service.web.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.web.type }}
  {{- with .Values.service.web.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.web.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.web.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "adguard-home.selectorLabels" . | nindent 4 }}
---
{{/* DNS service - separate for LoadBalancer/NodePort */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "adguard-home.fullname" . }}-dns
  labels:
    {{- include "adguard-home.labels" . | nindent 4 }}
  {{- with .Values.service.dns.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.dns.type }}
  {{- with .Values.service.dns.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  {{- with .Values.service.dns.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.dns.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: dns-tcp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: {{ .Values.service.dns.port }}
      targetPort: dns-udp
      protocol: UDP
  selector:
    {{- include "adguard-home.selectorLabels" . | nindent 4 }}
