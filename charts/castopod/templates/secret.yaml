{{- if not .Values.analytics.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-analytics" (include "castopod.fullname" .) }}
  labels:
    {{- include "castopod.labels" . | nindent 4 }}
type: Opaque
stringData:
  analytics-salt: {{ .Values.analytics.salt | default (randAlphaNum 64) | quote }}
{{- end }}
---
{{- if and (not .Values.mariadb.enabled) (not .Values.database.external.existingSecret) .Values.database.external.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db" (include "castopod.fullname" .) }}
  labels:
    {{- include "castopod.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.database.external.password | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backup" (include "castopod.fullname" .) }}
  labels:
    {{- include "castopod.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.backup.s3.accessKey | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
