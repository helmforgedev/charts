suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-castopod-data

  - it: should set default size to 10Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: should set access mode
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteOnce

  - it: should not render when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence.existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom size
    set:
      persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: should set storage class
    set:
      persistence.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd
