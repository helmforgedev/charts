suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render analytics secret by default
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-castopod-analytics
        documentIndex: 0

  - it: should not render analytics secret when existingSecret is set
    set:
      analytics.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render db secret for external db with inline password
    set:
      mariadb.enabled: false
      database.external.host: db.example.com
      database.external.password: "my-password"
    asserts:
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-castopod-db
        documentIndex: 1

  - it: should not render db secret when existingSecret is set
    set:
      mariadb.enabled: false
      database.external.host: db.example.com
      database.external.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 1
