# SPDX-License-Identifier: Apache-2.0
replicaCount: 2

service:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

ingress:
  enabled: true
  hosts:
    - host: openreel.example.com
      paths:
        - path: /
          pathType: Prefix

gatewayAPI:
  enabled: true
  parentRefs:
    - name: public
      namespace: gateway-system
  hostnames:
    - openreel.example.com

networkPolicy:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

pdb:
  enabled: true
  minAvailable: 1
