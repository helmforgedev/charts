# SPDX-License-Identifier: Apache-2.0
nameOverride: ""
fullnameOverride: ""
commonLabels: {}

replicaCount: 1
revisionHistoryLimit: 3

image:
  repository: docker.io/helmforge/openreel-video
  tag: "v0.4.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

service:
  type: ClusterIP
  externalName: ""
  port: 80
  targetPort: 8080
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: openreel.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix

gatewayAPI:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix

networkPolicy:
  enabled: false
  ingress: []
  egress: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

probes:
  liveness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /healthz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podAnnotations: {}
podLabels: {}
priorityClassName: ""
terminationGracePeriodSeconds: 30
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

tmpVolume:
  enabled: true
  sizeLimit: 64Mi

test:
  image:
    repository: docker.io/library/busybox
    tag: "1.37.0"
    pullPolicy: IfNotPresent

extraObjects: []
