# Simple deployment with a single Cloudflare domain.
#
# Prerequisites:
#   1. Create a Cloudflare API token with DNS edit permissions.
#   2. Find your Zone ID in the Cloudflare dashboard (Overview tab).

config:
  settings:
    - provider: cloudflare
      zone_identifier: "your-zone-id"
      domain: "example.com"
      host: "@"
      ttl: 300
      token: "your-cloudflare-api-token"
      proxied: false
      ip_version: "ipv4"
