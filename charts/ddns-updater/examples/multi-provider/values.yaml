# Multiple DNS providers in a single deployment.
#
# The ddns-updater supports 50+ providers. Each entry in the settings
# array is independently managed. You can mix and match providers.

config:
  settings:
    # Cloudflare — update A record for root domain
    - provider: cloudflare
      zone_identifier: "cf-zone-id"
      domain: "example.com"
      host: "@"
      ttl: 300
      token: "cf-api-token"
      proxied: true
      ip_version: "ipv4"

    # Cloudflare — update A record for subdomain
    - provider: cloudflare
      zone_identifier: "cf-zone-id"
      domain: "example.com"
      host: "vpn"
      ttl: 300
      token: "cf-api-token"
      proxied: false
      ip_version: "ipv4"

    # DuckDNS — free dynamic DNS
    - provider: duckdns
      domain: "myhost.duckdns.org"
      token: "duck-token"
      ip_version: "ipv4"

    # Namecheap — update DDNS record
    - provider: namecheap
      domain: "example.org"
      host: "home"
      password: "namecheap-ddns-password"

ddns:
  period: 5m
  logLevel: info
