suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render with empty settings by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-ddns-updater-config
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"settings":\[\]'

  - it: should render with provider settings
    set:
      config.settings:
        - provider: cloudflare
          domain: example.com
          host: "@"
          token: my-token
    asserts:
      - matchRegex:
          path: stringData["config.json"]
          pattern: '"provider":"cloudflare"'

  - it: should not render when existingSecret is used
    set:
      config.existingSecret: my-config-secret
    asserts:
      - hasDocuments:
          count: 0
