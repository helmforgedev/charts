{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ddns-updater.configSecretName" . }}
  labels:
    {{- include "ddns-updater.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "ddns-updater.configSecretKey" . }}: |
    {{ dict "settings" (.Values.config.settings | default list) | toJson }}
{{- end }}
