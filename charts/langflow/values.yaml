# SPDX-License-Identifier: Apache-2.0
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
image:
  repository: docker.io/langflowai/langflow
  tag: "1.10.0"
  pullPolicy: IfNotPresent
imagePullSecrets: []
replicaCount: 1
app:
  port: 7860
  command: []
  args: []
  env:
    - name: LANGFLOW_HOST
      value: "0.0.0.0"
    - name: LANGFLOW_PORT
      value: "7860"
    - name: LANGFLOW_CONFIG_DIR
      value: "/app/langflow"
    - name: LANGFLOW_SAVE_DB_IN_CONFIG_DIR
      value: "true"
    - name: LANGFLOW_OPEN_BROWSER
      value: "false"
  extraEnv: []
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /app/langflow
serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false
service:
  type: ClusterIP
  port: 7860
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}
  hosts: []
  tls: []
gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix
probes:
  startup: { enabled: true, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 60 }
  liveness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 3 }
  readiness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 6 }
resources: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30
podLabels: {}
podAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
