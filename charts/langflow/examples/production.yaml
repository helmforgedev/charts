# SPDX-License-Identifier: Apache-2.0
replicaCount: 3
auth:
  existingSecret: langflow-auth
database:
  mode: external
  existingSecret: langflow-database
pdb:
  enabled: true
persistence:
  size: 20Gi
  accessModes:
    - ReadWriteMany
resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4
    memory: 8Gi
networkPolicy:
  enabled: true
app:
  envFrom:
    - secretRef:
        name: langflow-provider-keys
