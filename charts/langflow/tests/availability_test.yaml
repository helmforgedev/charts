# SPDX-License-Identifier: Apache-2.0
suite: langflow availability
templates:
  - templates/deployment.yaml
  - templates/pdb.yaml
tests:
  - it: renders multiple replicas with external database and PDB
    values:
      - scaled-values.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        template: templates/deployment.yaml
      - isKind:
          of: PodDisruptionBudget
        template: templates/pdb.yaml
      - equal:
          path: spec.minAvailable
          value: 1
        template: templates/pdb.yaml
