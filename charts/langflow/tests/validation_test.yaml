# SPDX-License-Identifier: Apache-2.0
suite: langflow validation
templates:
  - templates/validate.yaml
tests:
  - it: fails when scaling without a shared database
    set:
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 requires database.url or database.existingSecret for shared Langflow state"
