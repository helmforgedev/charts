# SPDX-License-Identifier: Apache-2.0
suite: langflow
templates:
  - templates/deployment.yaml
  - templates/httproute.yaml
  - templates/ingress.yaml
  - templates/pvc.yaml
  - templates/service.yaml
tests:
  - it: renders workload
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/langflowai/langflow:1.10.1
  - it: renders service
    template: templates/service.yaml
    asserts:
      - isKind:
          of: Service
  - it: renders common labels on a separate line
    template: templates/service.yaml
    values:
      - common-labels-values.yaml
    asserts:
      - equal:
          path: metadata.labels.review
          value: enabled
  - it: renders ingress TLS
    template: templates/ingress.yaml
    values:
      - ingress-tls-values.yaml
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: langflow-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: langflow.example.com
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt
  - it: renders HTTPRoute hostnames
    template: templates/httproute.yaml
    set:
      gateway.enabled: true
      gateway.parentRefs[0].name: test-gateway
      gateway.hostnames[0]: langflow.example.com
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: langflow.example.com
  - it: renders app.env valueFrom entries
    template: templates/deployment.yaml
    values:
      - env-valuefrom-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGFLOW_SECRET
            valueFrom:
              secretKeyRef:
                name: langflow-secret
                key: token
  - it: renders persistence storageClass
    template: templates/pvc.yaml
    values:
      - storageclass-values.yaml
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd
  - it: renders extra volumes with matching mounts
    template: templates/deployment.yaml
    values:
      - extra-volumes-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-config
            mountPath: /custom
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-config
            configMap:
              name: langflow-custom
  - it: honors probe disable flags and timing values
    template: templates/deployment.yaml
    set:
      probes.startup.enabled: false
      probes.liveness.timeoutSeconds: 9
      probes.readiness.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe
      - notExists:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 9
