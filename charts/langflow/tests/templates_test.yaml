# SPDX-License-Identifier: Apache-2.0
suite: langflow
templates:
  - templates/deployment.yaml
  - templates/ingress.yaml
  - templates/pvc.yaml
  - templates/service.yaml
tests:
  - it: renders workload
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: docker.io/langflowai/langflow:1.10.0
  - it: renders service
    template: templates/service.yaml
    asserts:
      - isKind:
          of: Service
  - it: renders common labels on a separate line
    template: templates/service.yaml
    values:
      - common-labels-values.yaml
    asserts:
      - equal:
          path: metadata.labels.review
          value: enabled
  - it: renders ingress TLS
    template: templates/ingress.yaml
    values:
      - ingress-tls-values.yaml
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: langflow-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: langflow.example.com
  - it: renders app.env valueFrom entries
    template: templates/deployment.yaml
    values:
      - env-valuefrom-values.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANGFLOW_SECRET
            valueFrom:
              secretKeyRef:
                name: langflow-secret
                key: token
  - it: renders persistence storageClass
    template: templates/pvc.yaml
    values:
      - storageclass-values.yaml
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd
