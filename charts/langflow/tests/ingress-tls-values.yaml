# SPDX-License-Identifier: Apache-2.0
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: langflow.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: langflow-tls
      hosts:
        - langflow.example.com
