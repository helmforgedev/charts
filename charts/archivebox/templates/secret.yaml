{{- if not .Values.archivebox.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-admin" (include "archivebox.fullname" .) }}
  labels:
    {{- include "archivebox.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-username: {{ .Values.archivebox.adminUsername | quote }}
  admin-password: {{ .Values.archivebox.adminPassword | default (randAlphaNum 32) | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backup" (include "archivebox.fullname" .) }}
  labels:
    {{- include "archivebox.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.backup.s3.accessKey | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
