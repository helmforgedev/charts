suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-archivebox-admin

  - it: should not render when existingSecret is set
    set:
      archivebox.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
