suite: Backup Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should create backup secret when enabled with inline credentials
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    documentSelector:
      path: metadata.name
      value: test-archivebox-backup
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.access-key
          value: admin
