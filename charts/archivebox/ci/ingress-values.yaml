# CI: ingress enabled with admin credentials
archivebox:
  adminUsername: admin
  adminPassword: "testpassword123"

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: archive.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - archive.example.com
      secretName: archivebox-tls
