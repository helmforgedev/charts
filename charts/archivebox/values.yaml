# =============================================================================
# ArchiveBox Helm Chart — Default Values
# =============================================================================
# Focus: self-hosted web archiving with Chromium headless and multi-format capture

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- ArchiveBox container image
  repository: archivebox/archivebox
  # -- Image tag (defaults to appVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# ArchiveBox Configuration
# =============================================================================

archivebox:
  # -- Application port
  port: 8000
  # -- Admin username (created on first run)
  adminUsername: admin
  # -- Admin password (required for initial setup)
  adminPassword: ""
  # -- Existing secret containing admin credentials
  existingSecret: ""
  # -- Key in existing secret for admin username
  existingSecretUsernameKey: admin-username
  # -- Key in existing secret for admin password
  existingSecretPasswordKey: admin-password
  # -- Allowed hostnames (comma-separated or *)
  allowedHosts: "*"
  # -- Allow public access to the index page
  publicIndex: "True"
  # -- Allow public access to archived snapshots
  publicSnapshots: "True"
  # -- Allow public access to add URLs
  publicAddLinks: "False"
  # -- Search backend engine (ripgrep, sqlite, sonic)
  searchBackendEngine: ripgrep
  # -- Maximum media file size to download (bytes notation)
  mediaMaxSize: "750m"
  # -- Timeout for archiving a single URL (seconds)
  timeout: "60"
  # -- Timezone
  timezone: UTC
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /data (SQLite DB + archived content)
  enabled: true
  # -- Storage size (plan for large archives, 50-100GB+)
  size: 50Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for ArchiveBox
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: archive.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - archive.example.com
    #   secretName: archivebox-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    path: /health/
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    path: /health/
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /health/
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

# -- Container resource requests/limits (Chromium requires ~2Gi RAM minimum)
resources: {}
  # requests:
  #   cpu: 500m
  #   memory: 2Gi
  # limits:
  #   cpu: 2000m
  #   memory: 4Gi

podSecurityContext:
  fsGroup: 911

securityContext:
  runAsUser: 911
  runAsGroup: 911
  runAsNonRoot: true

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled data backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: archivebox
  images:
    # -- Image used for data volume backup (must have tar)
    tar: alpine:3.22
    # -- Image used for S3 upload (MinIO client)
    uploader: minio/mc:RELEASE.2025-08-13T08-35-41Z
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: archivebox
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
