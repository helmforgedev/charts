# SPDX-License-Identifier: Apache-2.0
# ArchiveBox with scheduled S3-compatible backups.

archivebox:
  existingSecret: archivebox-admin

persistence:
  size: 100Gi

backup:
  enabled: true
  schedule: "0 3 * * *"
  archivePrefix: archivebox
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  s3:
    endpoint: https://s3.example.com
    bucket: archivebox-backups
    prefix: daily
    existingSecret: archivebox-s3

resources:
  requests:
    cpu: "1"
    memory: 2Gi
  limits:
    cpu: "3"
    memory: 6Gi
