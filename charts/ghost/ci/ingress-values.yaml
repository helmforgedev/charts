# CI: ingress enabled
ghost:
  url: "https://blog.example.com"

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: blog.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - blog.example.com
      secretName: ghost-tls
