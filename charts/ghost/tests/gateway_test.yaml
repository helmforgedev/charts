# SPDX-License-Identifier: Apache-2.0
suite: Gateway API
templates:
  - templates/httproute.yaml
tests:
  - it: does not render an HTTPRoute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an HTTPRoute when gateway is enabled
    set:
      gateway:
        enabled: true
        parentRefs:
          - name: platform-gateway
            namespace: gateway-system
        hostnames:
          - blog.example.com
        path: /
        pathType: PathPrefix
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: spec.parentRefs[0].name
          value: platform-gateway
      - equal:
          path: spec.parentRefs[0].namespace
          value: gateway-system
      - equal:
          path: spec.hostnames[0]
          value: blog.example.com
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: PathPrefix
      - equal:
          path: spec.rules[0].matches[0].path.value
          value: /
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: fails when gateway parentRefs is empty
    set:
      gateway:
        enabled: true
        parentRefs: []
    asserts:
      - failedTemplate:
          errorMessage: gateway.enabled requires gateway.parentRefs to be populated to create a valid HTTPRoute.
