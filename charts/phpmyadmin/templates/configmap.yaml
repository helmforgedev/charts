{{- if and .Values.config.customConfig (not .Values.config.existingConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "phpmyadmin.configMapName" . }}
  labels:
    {{- include "phpmyadmin.labels" . | nindent 4 }}
data:
  config.user.inc.php: |
    {{- .Values.config.customConfig | nindent 4 }}
{{- end }}
