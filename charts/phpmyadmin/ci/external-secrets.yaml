# SPDX-License-Identifier: Apache-2.0
phpmyadmin:
  host: mysql.default.svc.cluster.local

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
  auth:
    enabled: true
    usernameRemoteRef:
      key: ci/phpmyadmin
      property: username
    passwordRemoteRef:
      key: ci/phpmyadmin
      property: password
    blowfishSecretRemoteRef:
      key: ci/phpmyadmin
      property: blowfish-secret
