# SPDX-License-Identifier: Apache-2.0
phpmyadmin:
  host: mysql.default.svc.cluster.local

auth:
  existingSecret: phpmyadmin-auth

replicaCount: 2

sessions:
  enabled: true

serviceAccount:
  create: true
  automountServiceAccountToken: false

networkPolicy:
  enabled: true
  egress:
    enabled: true

pdb:
  enabled: true

service:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
