# SPDX-License-Identifier: Apache-2.0
phpmyadmin:
  host: mysql.default.svc.cluster.local

auth:
  existingSecret: phpmyadmin-auth

replicaCount: 2

sessions:
  enabled: true

serviceAccount:
  create: true
  automountServiceAccountToken: false

networkPolicy:
  enabled: true
  egress:
    enabled: true

pdb:
  enabled: true

service:
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4

extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: phpmyadmin-auth
    type: Opaque
    stringData:
      username: helmforge
      password: helmforge-test-password
      blowfish-secret: helmforge-phpmyadmin-ci-secret-1234
