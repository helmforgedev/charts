# SPDX-License-Identifier: Apache-2.0
phpmyadmin:
  host: mysql-primary.production.svc.cluster.local
  authType: cookie

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  auth:
    enabled: true
    usernameRemoteRef:
      key: prod/phpmyadmin
      property: username
    passwordRemoteRef:
      key: prod/phpmyadmin
      property: password
    blowfishSecretRemoteRef:
      key: prod/phpmyadmin
      property: blowfish-secret
