suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should not render when no password is set
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when auth password is set
    set:
      auth.password: secret123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.password
          value: "secret123"

  - it: should not render when using existing secret
    set:
      auth.password: secret123
      auth.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
