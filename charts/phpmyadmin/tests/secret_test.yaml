# SPDX-License-Identifier: Apache-2.0
suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should not render when no password is set
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when auth password is set
    set:
      auth.password: secret123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.password
          value: "secret123"

  - it: should render blowfish secret when configured
    set:
      auth.blowfishSecret: "0123456789abcdef0123456789abcdef"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData["blowfish-secret"]
          value: "0123456789abcdef0123456789abcdef"

  - it: should not render when using existing secret
    set:
      auth.password: secret123
      auth.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
