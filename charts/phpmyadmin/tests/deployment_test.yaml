# SPDX-License-Identifier: Apache-2.0
suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: should render a Deployment
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-phpmyadmin

  - it: should set PMA_HOST when host is configured
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_HOST
            value: "mysql.default.svc"

  - it: should set PMA_HOSTS when hosts is configured
    set:
      phpmyadmin.hosts: "mysql-1.svc,mysql-2.svc"
      phpmyadmin.ports: "3306,3307"
      phpmyadmin.verboses: "Primary,Replica"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_HOSTS
            value: "mysql-1.svc,mysql-2.svc"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_PORTS
            value: "3306,3307"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_PORT
          any: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_VERBOSES
            value: "Primary,Replica"

  - it: should prefer PMA_HOSTS over PMA_HOST when both are set
    set:
      phpmyadmin.host: mysql.default.svc
      phpmyadmin.hosts: "mysql-1.svc,mysql-2.svc"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_HOSTS
            value: "mysql-1.svc,mysql-2.svc"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_HOST
            value: "mysql.default.svc"

  - it: should set PMA_PORT
    set:
      phpmyadmin.host: mysql.default.svc
      phpmyadmin.port: 3307
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_PORT
            value: "3307"

  - it: should set UPLOAD_LIMIT
    set:
      phpmyadmin.host: mysql.default.svc
      phpmyadmin.uploadLimit: "128M"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: UPLOAD_LIMIT
            value: "128M"

  - it: should enable arbitrary server mode
    set:
      phpmyadmin.arbitrary: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_ARBITRARY
            value: "1"

  - it: should set PMA_ABSOLUTE_URI
    set:
      phpmyadmin.host: mysql.default.svc
      phpmyadmin.absoluteUri: "https://pma.example.com/"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_ABSOLUTE_URI
            value: "https://pma.example.com/"

  - it: should omit HIDE_PHP_VERSION when disabled
    set:
      phpmyadmin.hidePhpVersion: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: HIDE_PHP_VERSION
          any: true

  - it: should not render unsupported PMA_AUTH_TYPE env
    set:
      phpmyadmin.authType: http
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_AUTH_TYPE
          any: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-config
            mountPath: /etc/phpmyadmin/config.user.inc.php
            subPath: config.user.inc.php
            readOnly: true
      - exists:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket
      - notExists:
          path: spec.template.spec.containers[0].startupProbe.httpGet

  - it: should set auto-login env vars when auth is configured
    set:
      phpmyadmin.host: mysql.default.svc
      auth.username: admin
      auth.password: secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_USER
            value: "admin"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-phpmyadmin-auth
                key: password

  - it: should use existing secret for auto-login
    set:
      phpmyadmin.host: mysql.default.svc
      auth.existingSecret: my-auth-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_USER
            valueFrom:
              secretKeyRef:
                name: my-auth-secret
                key: username
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-auth-secret
                key: password
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HELMFORGE_BLOWFISH_SECRET
            valueFrom:
              secretKeyRef:
                name: my-auth-secret
                key: blowfish-secret
                optional: true

  - it: should use external secret target for auto-login
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.auth.enabled: true
      externalSecrets.auth.usernameRemoteRef.key: prod/phpmyadmin
      externalSecrets.auth.passwordRemoteRef.key: prod/phpmyadmin
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_USER
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-phpmyadmin-auth
                key: username

  - it: should use multi-host SSL env vars with PMA_HOSTS
    set:
      phpmyadmin.hosts: "mysql-1.svc,mysql-2.svc"
      phpmyadmin.ssl.enabled: true
      phpmyadmin.ssl.verify: false
      phpmyadmin.ssl.caPath: /etc/phpmyadmin/ssl/ca.crt
      phpmyadmin.ssl.certPath: /etc/phpmyadmin/ssl/client.crt
      phpmyadmin.ssl.keyPath: /etc/phpmyadmin/ssl/client.key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_SSLS
            value: "1,1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_SSL_VERIFIES
            value: "0,0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_SSL_CAS
            value: "/etc/phpmyadmin/ssl/ca.crt,/etc/phpmyadmin/ssl/ca.crt"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_SSL
          any: true

  - it: should not set auto-login env vars when auth is empty
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: PMA_USER
          any: true

  - it: should mount custom config when set
    set:
      phpmyadmin.host: mysql.default.svc
      config.customConfig: |
        <?php $cfg['ShowPhpInfo'] = true;
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-config
            mountPath: /etc/phpmyadmin/config.user.inc.php
            subPath: config.user.inc.php
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-config
            configMap:
              name: RELEASE-NAME-phpmyadmin-config

  - it: should mount sessions when enabled
    set:
      sessions.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: sessions
            mountPath: /sessions
      - contains:
          path: spec.template.spec.volumes
          content:
            name: sessions
            emptyDir: {}

  - it: should not mount config volume when not configured
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].volumeMounts

  - it: should use correct image
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/phpmyadmin/phpmyadmin:5.2.3"

  - it: should allow image tag override
    set:
      phpmyadmin.host: mysql.default.svc
      image.tag: "5.2.2"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/phpmyadmin/phpmyadmin:5.2.2"

  - it: should set replica count
    set:
      phpmyadmin.host: mysql.default.svc
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should include startup probe by default
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - exists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should disable startup probe when set
    set:
      phpmyadmin.host: mysql.default.svc
      startupProbe.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].startupProbe

  - it: should expose http port
    set:
      phpmyadmin.host: mysql.default.svc
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP
