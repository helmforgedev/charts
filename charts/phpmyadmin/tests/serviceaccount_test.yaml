suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should not render when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-phpmyadmin
