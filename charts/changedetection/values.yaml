# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# changedetection.io Helm Chart - Default Values
# =============================================================================
# Focus: website change detection and monitoring with optional browser rendering

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- changedetection.io container image
  repository: ghcr.io/dgtlmoon/changedetection.io
  # -- Image tag
  tag: "0.55.7"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# changedetection Configuration
# =============================================================================

changedetection:
  # -- Application port
  port: 5000
  # -- Public base URL of the instance
  baseUrl: ""
  # -- Number of concurrent fetch workers
  fetchWorkers: 10
  # -- Minimum seconds between rechecks
  minimumSecondsRecheckTime: ""
  # -- Timezone
  timezone: ""
  # -- Container locale used for LANG and LC_ALL
  locale: C
  defaultWatches:
    # -- Let changedetection.io create upstream sample watches on a fresh datastore
    enabled: false
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []
  # -- Additional envFrom sources, commonly Secrets produced by External Secrets Operator
  # -- @default -- `[]`
  envFrom: []

# =============================================================================
# Browser (optional Playwright for JavaScript rendering)
# =============================================================================

browser:
  # -- Enable Playwright browser sidecar for JavaScript rendering
  enabled: false
  image:
    # -- Playwright browser image
    repository: ghcr.io/browserless/chromium
    # -- Image tag
    tag: "v2.46.0"
    pullPolicy: IfNotPresent
  # -- Resources for the browser container
  resources: {}

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /datastore (SQLite + snapshots)
  enabled: true
  # -- Storage size
  size: 10Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}
  # -- Optional Service IP family policy: SingleStack, PreferDualStack, or RequireDualStack
  ipFamilyPolicy: ~
  # -- Optional Service IP families, for example [IPv4, IPv6]
  ipFamilies: []

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for changedetection
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: changedetection.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - changedetection.example.com
    #   secretName: changedetection-tls

# =============================================================================
# Gateway API
# =============================================================================

gateway:
  # -- Enable Gateway API HTTPRoute (alternative to Ingress; requires Gateway API CRDs)
  enabled: false
  # -- Annotations for the HTTPRoute
  annotations: {}
  # -- parentRefs pointing to your Gateway resource
  parentRefs: []
  # -- Hostnames the HTTPRoute matches
  hostnames: []
  # -- Path prefix
  path: /
  # -- Path match type
  pathType: PathPrefix

# =============================================================================
# External Secrets Operator
# =============================================================================

externalSecrets:
  # -- Render an ExternalSecret for environment secrets or integrations.
  enabled: false
  # -- ExternalSecret API version.
  apiVersion: external-secrets.io/v1
  # -- ExternalSecret refresh interval.
  refreshInterval: 1h
  secretStoreRef:
    # -- SecretStore or ClusterSecretStore name. Required when externalSecrets.enabled=true.
    name: ""
    # -- SecretStore reference kind.
    kind: SecretStore
  target:
    # -- Target Secret name. Defaults to "<release>-changedetection-env" when empty.
    name: ""
    # -- ExternalSecret target creation policy.
    creationPolicy: Owner
  # -- Data entries mapping remote provider keys into environment variable keys.
  data: []
  # - secretKey: LOGGER_LEVEL
  #   remoteRef:
  #     key: changedetection/app
  #     property: loggerLevel
  # -- Optional dataFrom entries for provider-side extraction.
  dataFrom: []

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
