# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/externalsecret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret items
    set:
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: helmforge-fake-store
          kind: ClusterSecretStore
        target:
          name: changedetection-env
          creationPolicy: Owner
        data:
          - secretKey: HELMFORGE_TEST_SECRET
            remoteRef:
              key: test/password
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: changedetection-env
      - equal:
          path: spec.secretStoreRef.name
          value: helmforge-fake-store
      - equal:
          path: spec.target.name
          value: changedetection-env

  - it: should fail when enabled without a store reference
    set:
      externalSecrets:
        enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true"
