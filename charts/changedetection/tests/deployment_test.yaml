# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-changedetection

  - it: should use Recreate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/dgtlmoon/changedetection.io:0.55.7"

  - it: should expose port 5000
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 5000
            protocol: TCP

  - it: should mount data volume
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /datastore

  - it: should set default resource requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi

  - it: should drop Linux capabilities by default
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should set a locale supported by the container
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LANG
            value: C
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LC_ALL
            value: C

  - it: should provide a writable Python user install path for upstream EXTRA_PACKAGES
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HOME
            value: /datastore
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PYTHONUSERBASE
            value: /datastore/.python-userbase
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PIP_USER
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PATH
            value: /datastore/.python-userbase/bin:/usr/local/bin:/usr/local/sbin:/usr/sbin:/usr/bin:/sbin:/bin

  - it: should use PVC for data when persistence enabled
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-changedetection-data

  - it: should initialize datastore without upstream sample watches by default
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: initialize-datastore
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "ghcr.io/dgtlmoon/changedetection.io:0.55.7"
      - matchRegex:
          path: spec.template.spec.initContainers[0].command[2]
          pattern: "include_default_watches=False"
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true

  - it: should allow upstream sample watches when explicitly enabled
    set:
      changedetection.defaultWatches.enabled: true
    asserts:
      - isNull:
          path: spec.template.spec.initContainers

  - it: should use emptyDir when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should not have browser sidecar by default
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should add browser sidecar when enabled
    set:
      browser.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: browser

  - it: should set PLAYWRIGHT_DRIVER_URL when browser enabled
    set:
      browser.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PLAYWRIGHT_DRIVER_URL
            value: "ws://localhost:3000/?stealth=1&--disable-web-security=true"

  - it: should render envFrom sources for externalized configuration
    set:
      changedetection.envFrom:
        - secretRef:
            name: changedetection-env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: changedetection-env

  - it: should consume the ExternalSecret target when enabled
    set:
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: vault
        target:
          name: changedetection-env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: changedetection-env
