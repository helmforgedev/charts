# CI: External Secrets Operator integration
externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  target:
    name: changedetection-env
    creationPolicy: Owner
  data:
    - secretKey: HELMFORGE_TEST_SECRET
      remoteRef:
        key: test/password
