apiVersion: v2
name: wordpress
type: application
version: 1.2.0
appVersion: "6.9.4"
kubeVersion: ">=1.26.0-0"
description: A Helm chart for deploying WordPress on Kubernetes with MySQL support and S3 backup
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - wordpress
  - cms
  - blog
  - php
  - mysql
home: https://wordpress.org
sources:
  - https://github.com/helmforgedev/charts
  - https://hub.docker.com/_/wordpress
icon: https://s.w.org/style/images/about/WordPress-logotype-simplified.png
annotations:
  helmforge.dev/maturity: alpha
  artifacthub.io/prerelease: "true"
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/wordpress
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/wordpress
dependencies:
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
