# First-install WordPress bootstrap with WP-CLI

wordpress:
  siteUrl: https://blog.example.com
  siteTitle: Example Blog
  adminUser: admin
  adminEmail: admin@example.com

admin:
  existingSecret: wordpress-admin

bootstrap:
  enabled: true
  permalinkStructure: /%postname%/
