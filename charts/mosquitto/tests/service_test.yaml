suite: Service
templates:
  - templates/service.yaml
tests:
  - it: should render the client Service by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.sessionAffinity
          value: None
      - contains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP

  - it: should render the headless Service by default
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: should expose mqtts service port when TLS is enabled
    documentIndex: 0
    set:
      broker.tls.enabled: true
      broker.tls.certSecretName: mosquitto-tls
      broker.tls.port: 8883
      service.mqttsPort: 8883
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: mqtts
            port: 8883
            targetPort: mqtts
            protocol: TCP

  - it: should expose mqtts on headless service when TLS is enabled
    documentIndex: 1
    set:
      broker.tls.enabled: true
      broker.tls.certSecretName: mosquitto-tls
      broker.tls.port: 8883
      service.mqttsPort: 8883
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: mqtts
            port: 8883
            targetPort: mqtts
            protocol: TCP
