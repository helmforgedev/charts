suite: Service
templates:
  - templates/service.yaml
tests:
  - it: should render the client Service by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.sessionAffinity
          value: None
      - contains:
          path: spec.ports
          content:
            name: mqtt
            port: 1883
            targetPort: mqtt
            protocol: TCP

  - it: should render the headless Service by default
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
