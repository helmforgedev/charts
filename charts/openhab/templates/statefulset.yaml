{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- include "openhab.validateReplicaCount" . }}
{{- include "openhab.validateAdmin" . }}
{{- include "openhab.validateConfigMaps" . }}
{{- $hasSitemaps := and .Values.configMaps.sitemaps.enabled (gt (len (.Values.configMaps.sitemaps.files | default dict)) 0) }}
{{- $hasThings := and .Values.configMaps.things.enabled (gt (len (.Values.configMaps.things.files | default dict)) 0) }}
{{- $hasItems := and .Values.configMaps.items.enabled (gt (len (.Values.configMaps.items.files | default dict)) 0) }}
{{- $hasConfigMaps := or $hasSitemaps $hasThings $hasItems }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "openhab.fullname" . }}
  namespace: {{ include "openhab.namespace" . }}
  labels:
    {{- include "openhab.labels" . | nindent 4 }}
spec:
  # openHAB does not support horizontal scaling - always 1 replica
  replicas: 1
  selector:
    matchLabels:
      {{- include "openhab.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "openhab.fullname" . }}
  template:
    metadata:
      annotations:
        {{- if and .Values.metrics.enabled .Values.metrics.podAnnotations.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/path: /rest/metrics/prometheus
        prometheus.io/port: {{ .Values.env.OPENHAB_HTTP_PORT | default "8080" | quote }}
        {{- end }}
        {{- if $hasConfigMaps }}
        checksum/configmaps: {{ .Values.configMaps | toJson | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openhab.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openhab.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if $hasConfigMaps }}
      initContainers:
        - name: sync-configmaps
          image: "{{ .Values.configMaps.syncImage.repository }}:{{ .Values.configMaps.syncImage.tag }}"
          imagePullPolicy: {{ .Values.configMaps.syncImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /openhab/conf/sitemaps /openhab/conf/things /openhab/conf/items
              if [ -d /config-src/sitemaps ]; then cp -f /config-src/sitemaps/* /openhab/conf/sitemaps/ 2>/dev/null || true; fi
              if [ -d /config-src/things ]; then cp -f /config-src/things/* /openhab/conf/things/ 2>/dev/null || true; fi
              if [ -d /config-src/items ]; then cp -f /config-src/items/* /openhab/conf/items/ 2>/dev/null || true; fi
          resources:
            {{- toYaml .Values.configMaps.syncResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: conf
              mountPath: /openhab/conf
            {{- if $hasSitemaps }}
            - name: sitemaps
              mountPath: /config-src/sitemaps
              readOnly: true
            {{- end }}
            {{- if $hasThings }}
            - name: things
              mountPath: /config-src/things
              readOnly: true
            {{- end }}
            {{- if $hasItems }}
            - name: items
              mountPath: /config-src/items
              readOnly: true
            {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.env.OPENHAB_HTTP_PORT | default "8080" | int }}
              protocol: TCP
            {{- if .Values.karaf.enabled }}
            - name: karaf
              containerPort: {{ .Values.karaf.service.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: EXTRA_JAVA_OPTS
              value: {{ .Values.env.EXTRA_JAVA_OPTS | quote }}
            - name: OPENHAB_HTTP_PORT
              value: {{ .Values.env.OPENHAB_HTTP_PORT | quote }}
            - name: OPENHAB_HTTPS_PORT
              value: {{ .Values.env.OPENHAB_HTTPS_PORT | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.userdata.enabled }}
            - name: userdata
              mountPath: /openhab/userdata
            {{- end }}
            {{- if .Values.persistence.conf.enabled }}
            - name: conf
              mountPath: /openhab/conf
            {{- end }}
            {{- if .Values.persistence.addons.enabled }}
            - name: addons
              mountPath: /openhab/addons
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.userdata.enabled }}
        - name: userdata
          persistentVolumeClaim:
            claimName: {{ include "openhab.userdataPvcName" . }}
        {{- end }}
        {{- if .Values.persistence.conf.enabled }}
        - name: conf
          persistentVolumeClaim:
            claimName: {{ include "openhab.confPvcName" . }}
        {{- end }}
        {{- if .Values.persistence.addons.enabled }}
        - name: addons
          persistentVolumeClaim:
            claimName: {{ include "openhab.addonsPvcName" . }}
        {{- end }}
        {{- if $hasSitemaps }}
        - name: sitemaps
          configMap:
            name: {{ include "openhab.fullname" . }}-sitemaps
        {{- end }}
        {{- if $hasThings }}
        - name: things
          configMap:
            name: {{ include "openhab.fullname" . }}-things
        {{- end }}
        {{- if $hasItems }}
        - name: items
          configMap:
            name: {{ include "openhab.fullname" . }}-items
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
