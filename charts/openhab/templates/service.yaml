apiVersion: v1
kind: Service
metadata:
  name: {{ include "openhab.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openhab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "openhab.selectorLabels" . | nindent 4 }}
{{- if .Values.karaf.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openhab.fullname" . }}-karaf
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openhab.labels" . | nindent 4 }}
spec:
  type: {{ .Values.karaf.service.type }}
  ports:
    - port: {{ .Values.karaf.service.port }}
      targetPort: karaf
      protocol: TCP
      name: karaf
  selector:
    {{- include "openhab.selectorLabels" . | nindent 4 }}
{{- end }}
