# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
tests:
  - it: should create a Service
    asserts:
      - isKind:
          of: Service

  - it: should default to ClusterIP type
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 8080
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 8080
            targetPort: http
            protocol: TCP
            name: http

  - it: should accept NodePort type
    set:
      service.type: NodePort
    asserts:
      - equal:
          path: spec.type
          value: NodePort

  - it: should accept LoadBalancer type
    set:
      service.type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should set custom port
    set:
      service.port: 9090
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 9090

  - it: should apply dual-stack settings to HTTP service
    set:
      service:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6

  - it: should not create karaf service when disabled
    set:
      karaf.enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should create karaf service when enabled
    set:
      karaf.enabled: true
    asserts:
      - hasDocuments:
          count: 2

  - it: should apply dual-stack settings to Karaf service when enabled
    set:
      karaf:
        enabled: true
        service:
          ipFamilyPolicy: PreferDualStack
          ipFamilies:
            - IPv4
            - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 1
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
        documentIndex: 1
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6
        documentIndex: 1

  - it: should inherit dual-stack settings for Karaf service from HTTP service
    set:
      service:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
      karaf:
        enabled: true
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 1
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
        documentIndex: 1
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6
        documentIndex: 1
