# Test with all optional features enabled
ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: openhab.example.com
      paths:
        - path: /
          pathType: Prefix

admin:
  secretEnabled: true
  username: admin
  password: changeme123

configMaps:
  sitemaps:
    enabled: true
    files:
      default.sitemap: |
        sitemap default label="openHAB" {
          Frame {
            Text item=gTemperature
          }
        }
  things:
    enabled: true
    files:
      default.things: |
        Thing network:pingdevice:gateway [ hostname="192.168.1.1" ]
  items:
    enabled: true
    files:
      default.items: |
        Number gTemperature "Temperature [%.1f C]"

karaf:
  enabled: true

env:
  TZ: "America/Sao_Paulo"
  EXTRA_JAVA_OPTS: "-Xms256m -Xmx512m"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
