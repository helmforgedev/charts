# SPDX-License-Identifier: Apache-2.0
# CI scenario: render all chart-managed namespaced resources into a dedicated namespace.

namespaceOverride: openhab-system

ingress:
  enabled: true

gateway:
  enabled: true
  parentRefs:
    - name: shared-gateway

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

karaf:
  enabled: true
  service:
    ipFamilyPolicy: PreferDualStack
    ipFamilies:
      - IPv4
      - IPv6
