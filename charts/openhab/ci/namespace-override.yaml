# SPDX-License-Identifier: Apache-2.0
# CI scenario: render all chart-managed namespaced resources into the validation namespace.

namespaceOverride: hf-validate-openhab

ingress:
  enabled: true

gateway:
  enabled: true
  parentRefs:
    - name: shared-gateway

metrics:
  enabled: true
  serviceMonitor:
    enabled: true

karaf:
  enabled: true
  service:
    ipFamilyPolicy: SingleStack
    ipFamilies:
      - IPv4
