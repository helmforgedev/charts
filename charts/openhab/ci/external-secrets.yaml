# CI scenario: ExternalSecrets with drift guard (GR-061)

admin:
  secretEnabled: false
  existingSecret: openhab-credentials

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: password
      remoteRef:
        key: test/password
