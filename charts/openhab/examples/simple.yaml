# Simple openHAB deployment - minimal configuration for local/home use
# Use case: Single-node cluster or home server, basic persistence, port-forward access

image:
  tag: "5.1.4"

persistence:
  userdata:
    enabled: true
    size: 5Gi
  conf:
    enabled: true
    size: 1Gi
  addons:
    enabled: true
    size: 2Gi

env:
  TZ: "UTC"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
