# SPDX-License-Identifier: Apache-2.0
# CI: external PostgreSQL database
postgresql:
  enabled: false

database:
  external:
    host: postgresql
    port: "5432"
    name: chiefonboarding
    username: chiefonboarding
    password: "ci-password"

extraVolumes:
  - name: supervisor-config
    configMap:
      name: chiefonboarding-supervisor-ci

extraVolumeMounts:
  - name: supervisor-config
    mountPath: /etc/supervisor/conf.d/supervisord.conf
    subPath: supervisord.conf

extraManifests:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: chiefonboarding-supervisor-ci
    data:
      supervisord.conf: |
        [supervisord]
        nodaemon=true
        logfile=/var/log/supervisord/supervisord.log
        pidfile=/var/run/supervisord/supervisord.pid
        logfile_maxbytes=50MB
        logfile_backups=10
        loglevel=info
        user=root

        [program:app]
        command=bash -c "cd /app/ && uv run python manage.py collectstatic --no-input && uv run python manage.py createcachetable && uv run python manage.py migrate && uv run gunicorn --worker-tmp-dir /dev/shm --access-logfile '-' back.wsgi -b 0.0.0.0:8000"
        user=root
        stdout_logfile=/dev/stdout
        stdout_logfile_maxbytes=0
        stderr_logfile=/dev/stderr
        stderr_logfile_maxbytes=0
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgresql
    spec:
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: postgresql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgresql
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:17-alpine
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgresql
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: chiefonboarding
                - name: POSTGRES_USER
                  value: chiefonboarding
                - name: POSTGRES_PASSWORD
                  value: ci-password
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql/data
          volumes:
            - name: data
              emptyDir: {}
