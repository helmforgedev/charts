# SPDX-License-Identifier: Apache-2.0
# ChiefOnboarding connected to a managed PostgreSQL service.

postgresql:
  enabled: false

chiefonboarding:
  baseUrl: https://onboarding.example.com
  existingSecret: chiefonboarding-app

database:
  external:
    host: postgres.example.com
    port: "5432"
    name: chiefonboarding
    username: chiefonboarding
    existingSecret: chiefonboarding-db
    existingSecretPasswordKey: password

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
