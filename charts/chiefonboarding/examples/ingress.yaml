# SPDX-License-Identifier: Apache-2.0
# Public ChiefOnboarding endpoint with TLS.

chiefonboarding:
  baseUrl: https://onboarding.example.com
  secretKey: "replace-with-a-stable-django-secret-key"

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: onboarding.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - onboarding.example.com
      secretName: chiefonboarding-tls

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi
