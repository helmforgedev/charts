{{- if not .Values.chiefonboarding.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-app" (include "chiefonboarding.fullname" .) }}
  labels:
    {{- include "chiefonboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret-key: {{ .Values.chiefonboarding.secretKey | default (randAlphaNum 50) | quote }}
{{- end }}
---
{{- if and (not .Values.postgresql.enabled) (not .Values.database.external.existingSecret) .Values.database.external.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db" (include "chiefonboarding.fullname" .) }}
  labels:
    {{- include "chiefonboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.database.external.password | quote }}
{{- end }}
