apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cronicle.fullname" . }}
  labels:
    {{- include "cronicle.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "base_app_url": {{ .Values.cronicle.baseUrl | quote }},
      "email_from": {{ .Values.cronicle.emailFrom | quote }},
      "smtp_hostname": {{ .Values.cronicle.smtpHostname | quote }},
      "secret_key": "CRONICLE_SECRET_KEY",
      "job_memory_max": {{ int64 .Values.cronicle.jobMemoryMax }},
      "max_jobs": {{ int64 .Values.cronicle.maxJobs }},
      "Storage": {
        "engine": "Filesystem",
        "Filesystem": {
          "base_dir": "/opt/cronicle/data"
        }
      },
      "queue_dir": "/opt/cronicle/data/queue",
      "web_socket_use_hostnames": false,
      "server_comm_use_hostnames": false,
      "WebServer": {
        "http_port": {{ int64 .Values.cronicle.port }},
        "http_htdocs_dir": "htdocs",
        "http_max_upload_size": {{ int64 104857600 }},
        "https": false
      }
    }
