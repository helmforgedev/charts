{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cronicle.fullname" . }}
  labels:
    {{- include "cronicle.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  secret_key: {{ randAlphaNum 32 | b64enc | quote }}
{{- end }}
