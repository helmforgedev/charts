# Simple Cronicle deployment for local or lab use.
# Use case: private scheduler reached through kubectl port-forward.

cronicle:
  baseUrl: http://localhost:3012
  maxJobs: 3
  jobMemoryMax: 134217728

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi
