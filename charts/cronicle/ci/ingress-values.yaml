# CI: ingress enabled
cronicle:
  baseUrl: "https://cronicle.example.com"

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: cronicle.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - cronicle.example.com
      secretName: cronicle-tls
