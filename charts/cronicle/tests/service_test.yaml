suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-cronicle

  - it: should use port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should not include discovery port by default
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 1

  - it: should include discovery port when enabled
    set:
      cronicle.discoveryEnabled: true
    asserts:
      - lengthEqual:
          path: spec.ports
          count: 2
      - contains:
          path: spec.ports
          content:
            name: discovery
            port: 3014
            targetPort: discovery
            protocol: UDP
