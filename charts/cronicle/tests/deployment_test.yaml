suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-cronicle

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/soulteary/cronicle:0.9.80"

  - it: should mount data volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /opt/cronicle/data

  - it: should mount config volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /opt/cronicle/conf/config.json
            subPath: config.json
            readOnly: true

  - it: should use PVC for data when persistence enabled
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName
          value: test-cronicle-data

  - it: should use emptyDir when persistence disabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].emptyDir
          value: {}

  - it: should use HTTP probes with the health endpoint
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /api/app/get_master_state/v1
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/app/get_master_state/v1
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/app/get_master_state/v1

  - it: should set secret_key env from secret
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CRONICLE_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: test-cronicle
                key: secret_key

  - it: should include configmap checksum annotation
    template: templates/deployment.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should not render discovery port by default
    template: templates/deployment.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 1

  - it: should render discovery port when enabled
    template: templates/deployment.yaml
    set:
      cronicle.discoveryEnabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers[0].ports
          count: 2
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: discovery
            containerPort: 3014
            protocol: UDP

  - it: should not have init containers
    template: templates/deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
