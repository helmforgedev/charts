# SPDX-License-Identifier: Apache-2.0
suite: Ingress
templates:
  - templates/ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: cronicle.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress

  - it: should support hostless catch-all rules
    set:
      ingress.enabled: true
      ingress.hosts:
        - paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - notExists:
          path: spec.rules[0].host
