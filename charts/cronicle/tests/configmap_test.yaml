suite: ConfigMap
templates:
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-cronicle

  - it: should contain config.json key
    asserts:
      - exists:
          path: data["config.json"]

  - it: should include base_app_url in config
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: "base_app_url"

  - it: should include Filesystem storage engine
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: "Filesystem"

  - it: should include configured port
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: "3012"
