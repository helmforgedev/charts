# External PostgreSQL database
# Use case: managed PostgreSQL (e.g., RDS, Cloud SQL, Supabase)
postgresql:
  enabled: false
database:
  external:
    enabled: true
    host: db.example.com
    port: 5432
    name: hoppscotch
    username: hoppscotch
    existingSecret: hoppscotch-db-credentials
    existingSecretPasswordKey: postgres-password
