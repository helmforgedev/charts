# SPDX-License-Identifier: Apache-2.0
fullnameOverride: hoppscotch-ci
postgresql:
  enabled: false
database:
  external:
    enabled: true
    host: hoppscotch-ci-external-db-postgresql
    port: 5432
    name: hoppscotch
    username: hoppscotch
    existingSecret: hoppscotch-ci
    existingSecretUrlKey: database-url
encryption:
  existingSecret: hoppscotch-ci
signingKey:
  existingSecret: hoppscotch-ci
externalSecrets:
  enabled: true
  secretStoreRef:
    name: hoppscotch-ci-fake-store
    kind: SecretStore
  data:
    - secretKey: database-url
      remoteRef:
        key: database-url
    - secretKey: data-encryption-key
      remoteRef:
        key: data-encryption-key
    - secretKey: webapp-server-signing-key
      remoteRef:
        key: webapp-server-signing-key

extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: SecretStore
    metadata:
      name: hoppscotch-ci-fake-store
      labels:
        app.kubernetes.io/name: hoppscotch-ci-fake-store
        app.kubernetes.io/component: external-secrets
    spec:
      provider:
        fake:
          data:
            - key: database-url
              value: postgresql://hoppscotch:test-password@hoppscotch-ci-external-db-postgresql:5432/hoppscotch
            - key: data-encryption-key
              value: "12345678901234567890123456789012"
            - key: webapp-server-signing-key
              value: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWYwMTIzNDU2Nzg5YWJjZGVmMDEyMzQ1Njc4OWFiY2RlZg==
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: hoppscotch-ci-external-db-init
      labels:
        app.kubernetes.io/name: hoppscotch-external-postgresql
        app.kubernetes.io/instance: hoppscotch-ci-external-secrets
        app.kubernetes.io/component: external-database
    data:
      01-extensions.sql: |
        CREATE EXTENSION IF NOT EXISTS pg_trgm;
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: hoppscotch-ci-external-db-postgresql
      labels:
        app.kubernetes.io/name: hoppscotch-external-postgresql
        app.kubernetes.io/instance: hoppscotch-ci-external-secrets
        app.kubernetes.io/component: external-database
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: hoppscotch-external-postgresql
          app.kubernetes.io/instance: hoppscotch-ci-external-secrets
          app.kubernetes.io/component: external-database
      template:
        metadata:
          labels:
            app.kubernetes.io/name: hoppscotch-external-postgresql
            app.kubernetes.io/instance: hoppscotch-ci-external-secrets
            app.kubernetes.io/component: external-database
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.3-trixie
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgresql
                  containerPort: 5432
                  protocol: TCP
              env:
                - name: POSTGRES_DB
                  value: hoppscotch
                - name: POSTGRES_USER
                  value: hoppscotch
                - name: POSTGRES_PASSWORD
                  value: test-password
              readinessProbe:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - hoppscotch
                    - -d
                    - hoppscotch
                initialDelaySeconds: 5
                periodSeconds: 5
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
              volumeMounts:
                - name: initdb
                  mountPath: /docker-entrypoint-initdb.d
          volumes:
            - name: initdb
              configMap:
                name: hoppscotch-ci-external-db-init
  - apiVersion: v1
    kind: Service
    metadata:
      name: hoppscotch-ci-external-db-postgresql
      labels:
        app.kubernetes.io/name: hoppscotch-external-postgresql
        app.kubernetes.io/instance: hoppscotch-ci-external-secrets
        app.kubernetes.io/component: external-database
    spec:
      type: ClusterIP
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
          protocol: TCP
      selector:
        app.kubernetes.io/name: hoppscotch-external-postgresql
        app.kubernetes.io/instance: hoppscotch-ci-external-secrets
        app.kubernetes.io/component: external-database
