{{- include "hoppscotch.validateAll" . -}}
# SPDX-License-Identifier: Apache-2.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hoppscotch.fullname" . }}
  labels: {{ include "hoppscotch.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.deployment.strategy.type }}
    {{- if eq .Values.deployment.strategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.deployment.strategy.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.deployment.strategy.rollingUpdate.maxSurge }}
    {{- end }}
  selector:
    matchLabels: {{ include "hoppscotch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{ include "hoppscotch.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "hoppscotch.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: docker.io/library/busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              until nc -z -w2 {{ include "hoppscotch.databaseHost" . }} {{ include "hoppscotch.databasePort" . }} >/dev/null 2>&1; do
                echo "waiting for database..."; sleep 2;
              done
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: [sh, -c, "pnpm exec prisma migrate deploy"]
          env:
            {{- include "hoppscotch.databaseEnv" . | nindent 12 }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
        - name: bootstrap-infra-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              cd /dist/backend
              node <<'NODE'
              const { PrismaService } = require('./dist/src/prisma/prisma.service');
              const {
                buildDerivedEnv,
                disconnectSharedPrismaInstance,
                getDefaultInfraConfigs,
                getEncryptionRequiredInfraConfigEntries,
                getMissingInfraConfigEntries,
              } = require('./dist/src/infra-config/helper');
              const { encrypt } = require('./dist/src/utils');

              async function main() {
                const prisma = new PrismaService();
                try {
                  await prisma.onModuleInit();

                  const defaultInfraConfigs = await getDefaultInfraConfigs();
                  const propsToInsert = await getMissingInfraConfigEntries(defaultInfraConfigs);
                  if (propsToInsert.length > 0) {
                    await prisma.infraConfig.createMany({ data: propsToInsert });
                  }

                  const encryptionRequiredEntries = await getEncryptionRequiredInfraConfigEntries(defaultInfraConfigs);
                  await Promise.allSettled(
                    encryptionRequiredEntries.map((dbConfig) =>
                      prisma.infraConfig.update({
                        where: { name: dbConfig.name },
                        data: {
                          value: dbConfig.value === null ? null : encrypt(dbConfig.value),
                          isEncrypted: true,
                        },
                      })
                    )
                  );

                  const derivedEnv = await buildDerivedEnv();
                  await Promise.allSettled(
                    Object.entries(derivedEnv).map(([name, value]) =>
                      prisma.infraConfig.update({
                        where: { name },
                        data: { value },
                      })
                    )
                  );

                  console.log('Hoppscotch infra config bootstrap completed.');
                } finally {
                  await disconnectSharedPrismaInstance();
                  await prisma.onModuleDestroy();
                }
              }

              main().catch((error) => {
                console.error(error);
                process.exit(1);
              });
              NODE
          envFrom:
            - configMapRef:
                name: {{ include "hoppscotch.fullname" . }}
          env:
            {{- include "hoppscotch.databaseEnv" . | nindent 12 }}
            - name: DATA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hoppscotch.encryptionSecretName" . }}
                  key: {{ include "hoppscotch.encryptionSecretKey" . }}
            - name: WEBAPP_SERVER_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hoppscotch.signingSecretName" . }}
                  key: {{ include "hoppscotch.signingSecretKey" . }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
        - name: prepare-runtime-files
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              cp -R /dist/backend/. /runtime-backend/
              cp -R /site/. /runtime-site/
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: backend-runtime
              mountPath: /runtime-backend
            - name: site-runtime
              mountPath: /runtime-site
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: hoppscotch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "hoppscotch.fullname" . }}
            {{- with .Values.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- include "hoppscotch.databaseEnv" . | nindent 12 }}
            - name: HOME
              value: /tmp
            - name: XDG_DATA_HOME
              value: /tmp/.local/share
            - name: XDG_CONFIG_HOME
              value: /tmp/.config
            - name: DATA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hoppscotch.encryptionSecretName" . }}
                  key: {{ include "hoppscotch.encryptionSecretKey" . }}
            - name: WEBAPP_SERVER_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "hoppscotch.signingSecretName" . }}
                  key: {{ include "hoppscotch.signingSecretKey" . }}
            {{- if .Values.auth.github.enabled }}
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.github.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.github.existingSecretClientIdKey }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.github.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.github.existingSecretClientSecretKey }}
            {{- end }}
            {{- if .Values.auth.google.enabled }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.google.existingSecretClientIdKey }}
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.google.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.google.existingSecretClientSecretKey }}
            {{- end }}
            {{- if .Values.auth.microsoft.enabled }}
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.microsoft.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.microsoft.existingSecretClientIdKey }}
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.microsoft.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.auth.microsoft.existingSecretClientSecretKey }}
            {{- end }}
            {{- if .Values.mailer.enabled }}
            {{- if .Values.mailer.useCustomConfigs }}
            - name: MAILER_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mailer.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.mailer.existingSecretPasswordKey }}
            {{- else }}
            - name: MAILER_SMTP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mailer.existingSecret | default (include "hoppscotch.fullname" .) }}
                  key: {{ .Values.mailer.existingSecretSmtpUrlKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: backend-runtime
              mountPath: /dist/backend
            - name: site-runtime
              mountPath: /site
          livenessProbe:
            httpGet:
              path: /backend/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /backend/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /backend/health
              port: http
            initialDelaySeconds: 20
            failureThreshold: 30
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: backend-runtime
          emptyDir: {}
        - name: site-runtime
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- toYaml . | nindent 8 }}
      {{- end }}
