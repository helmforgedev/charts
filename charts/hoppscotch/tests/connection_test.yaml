# SPDX-License-Identifier: Apache-2.0
suite: Helm Test
templates:
  - templates/tests/connection-test.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render the Helm test hook pod
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.name
          value: test-hoppscotch-test-connection
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
