# SPDX-License-Identifier: Apache-2.0
suite: extra manifests tests
templates:
  - extra-manifests.yaml
release:
  namespace: default
tests:
  - it: should render additional manifests
    values:
      - extra-manifests-values.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: hoppscotch-extra
      - equal:
          path: data.enabled
          value: "true"
      - equal:
          path: data.namespace
          value: default
