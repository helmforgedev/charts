# SPDX-License-Identifier: Apache-2.0
# CI: ingress enabled
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: metabase.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - metabase.example.com
      secretName: metabase-tls
