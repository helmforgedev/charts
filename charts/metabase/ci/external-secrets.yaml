# CI scenario: External Secrets Operator (GR-061).
# metabase.existingSecret is required when externalSecrets.enabled=true
# to prevent credential drift with the chart-managed app Secret.
metabase:
  existingSecret: my-metabase-app-secret

externalSecrets:
  enabled: true
  secretStoreRef:
    name: metabase-ci-fake-store
    kind: SecretStore
  data:
    - secretKey: encryption-secret-key
      remoteRef:
        key: metabase/encryption-secret-key

extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: SecretStore
    metadata:
      name: metabase-ci-fake-store
    spec:
      provider:
        fake:
          data:
            - key: metabase/encryption-secret-key
              value: "0123456789abcdef0123456789abcdef"
