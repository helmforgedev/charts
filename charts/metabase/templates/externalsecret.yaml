{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed app Secret (secret.yaml)
  is still rendered unless metabase.existingSecret is set. Without this guard both
  resources can target the same name, creating two writers for the encryption key
  and causing credential drift. Require metabase.existingSecret explicitly.
*/}}
{{- if not .Values.metabase.existingSecret }}
  {{- fail "externalSecrets.enabled requires metabase.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- $hasEncryptionKey := false }}
{{- range .Values.externalSecrets.data }}
  {{- if eq .secretKey $.Values.metabase.existingSecretKey }}
    {{- $hasEncryptionKey = true }}
  {{- end }}
{{- end }}
{{- if not $hasEncryptionKey }}
  {{- fail (printf "externalSecrets.data must contain an entry with secretKey '%s' when externalSecrets.enabled=true to populate the metabase encryption key." .Values.metabase.existingSecretKey) }}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.metabase.existingSecret }}
  labels:
    {{- include "metabase.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.metabase.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
