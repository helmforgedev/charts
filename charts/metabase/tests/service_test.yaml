# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-metabase

  - it: should use ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should use port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should render ipFamilyPolicy without explicit families
    set:
      service.ipFamilyPolicy: PreferDualStack
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - isNull:
          path: spec.ipFamilies

  - it: should render explicit ipFamilies when provided
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6
