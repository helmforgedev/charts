# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-metabase

  - it: should use RollingUpdate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: should set the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/metabase/metabase:v0.62.1"

  - it: should set custom image tag
    set:
      image.tag: "v0.53.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/metabase/metabase:v0.53.0"

  - it: should set PostgreSQL env vars with subchart
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_TYPE
            value: postgres
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_HOST
            value: test-postgresql
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_DBNAME
            value: metabase
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_AI_FEATURES_ENABLED
            value: "false"

  - it: should allow enabling AI features explicitly
    set:
      metabase.aiFeaturesEnabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_AI_FEATURES_ENABLED
            value: "true"

  - it: should reference postgresql subchart secret for DB password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_PASS
            valueFrom:
              secretKeyRef:
                name: test-postgresql-auth
                key: user-password

  - it: should reference app secret for encryption key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_ENCRYPTION_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: test-metabase-app
                key: encryption-secret-key

  - it: should have wait-for-db init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "docker.io/library/busybox:1.37"
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: IfNotPresent

  - it: should allow overriding the wait-for-db init container image
    set:
      waitForDatabase.image.repository: registry.example.com/mirror/busybox
      waitForDatabase.image.tag: "1.37"
      waitForDatabase.image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "registry.example.com/mirror/busybox:1.37"
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: Always

  - it: should append extra init containers
    set:
      extraInitContainers:
        - name: install-oracle-driver
          image: registry.example.com/tools/curl:8
          command:
            - sh
            - -c
          args:
            - wget -O /plugins/ojdbc.jar http://repo.local/ojdbc.jar
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: install-oracle-driver
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: registry.example.com/tools/curl:8

  - it: should set external database host when subchart is disabled
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.port: "5433"
      database.external.name: my_metabase
      database.external.username: mb_user
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_HOST
            value: db.example.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_PORT
            value: "5433"

  - it: should fail fast when legacy postgresql.primary values are used
    set:
      postgresql:
        enabled: true
        primary:
          persistence:
            enabled: true
            size: 20Gi
    asserts:
      - failedTemplate:
          errorMessage: "postgresql.primary.* is not supported by the HelmForge PostgreSQL 2.x dependency used by this chart. Migrate PostgreSQL values to postgresql.standalone.* before upgrading."

  - it: should ignore stale legacy postgresql.primary values when using an external database
    set:
      database.external.host: db.example.com
      database.external.password: external-password
      postgresql:
        enabled: false
        primary:
          persistence:
            size: 20Gi
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_DB_HOST
            value: db.example.com

  - it: should set probes on health path
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /api/health
      - equal:
          path: spec.template.spec.containers[0].startupProbe.initialDelaySeconds
          value: 90
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/health

  - it: should set JAVA_OPTS
    set:
      metabase.javaOpts: "-Xmx2g"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_OPTS
            value: "-Xmx2g"

  - it: should set site URL
    set:
      metabase.siteUrl: "https://metabase.example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MB_SITE_URL
            value: "https://metabase.example.com"

  - it: should set resources
    set:
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 500m

  - it: should set practical default resource requests and limits
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi
