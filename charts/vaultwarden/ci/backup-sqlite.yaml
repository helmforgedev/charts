domain: "http://vaultwarden.local"

backup:
  enabled: true
  schedule: "0 0 * * *"
  s3:
    endpoint: https://minio.example.com
    bucket: vaultwarden-backups
    prefix: sqlite
    existingSecret: vaultwarden-backup-s3

data:
  persistence:
    enabled: true
