# SPDX-License-Identifier: Apache-2.0
domain: https://vaultwarden.example.com

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: vaultwarden.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - vaultwarden.example.com
      secretName: vaultwarden-tls
