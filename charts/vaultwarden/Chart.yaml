apiVersion: v2
name: vaultwarden
description: Vaultwarden for Kubernetes with persistent SQLite storage and explicit ingress/domain configuration
type: application
version: 1.10.0
appVersion: "1.35.4"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - vaultwarden
  - bitwarden
  - password-manager
  - self-hosted
home: https://github.com/dani-garcia/vaultwarden
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/dani-garcia/vaultwarden
icon: https://raw.githubusercontent.com/dani-garcia/vaultwarden/main/resources/vaultwarden-icon.svg
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/license: MIT
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/vaultwarden
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/vaultwarden
dependencies:
  - name: postgresql
    version: 1.5.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
