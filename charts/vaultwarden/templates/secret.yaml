{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if and (include "vaultwarden.adminEnabled" .) (not .Values.admin.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultwarden.adminSecretName" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.admin.existingSecretTokenKey }}: {{ include "vaultwarden.adminToken" . | b64enc | quote }}
{{- end }}
{{- if and (include "vaultwarden.smtpPasswordEnabled" .) (not .Values.smtp.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultwarden.smtpSecretName" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.smtp.existingSecretPasswordKey }}: {{ include "vaultwarden.smtpPassword" . | b64enc | quote }}
{{- end }}
{{- if and (ne (include "vaultwarden.databaseMode" .) "sqlite") (not (and (eq (include "vaultwarden.databaseMode" .) "external") .Values.database.external.existingSecret)) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultwarden.databasePasswordSecretName" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "vaultwarden.databaseUrl" . | quote }}
  database-password: {{ include "vaultwarden.databasePasswordValue" . | quote }}
{{- end }}
{{- if and (include "vaultwarden.backupEnabled" .) (not .Values.backup.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vaultwarden.backupSecretName" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.backup.s3.existingSecretAccessKeyKey }}: {{ .Values.backup.s3.accessKey | quote }}
  {{ .Values.backup.s3.existingSecretSecretKeyKey }}: {{ .Values.backup.s3.secretKey | quote }}
  {{- if and .Values.backup.database.password (not .Values.backup.database.existingSecret) }}
  {{ .Values.backup.database.existingSecretPasswordKey }}: {{ .Values.backup.database.password | quote }}
  {{- end }}
{{- end }}
