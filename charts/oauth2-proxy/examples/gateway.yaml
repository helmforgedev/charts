# SPDX-License-Identifier: Apache-2.0
auth:
  createSecret: false
  existingSecret: oauth2-proxy-auth

config:
  provider: oidc
  oidcIssuerUrl: https://idp.example.com/realms/platform
  redirectUrl: https://auth.example.com/oauth2/callback
  reverseProxy:
    enabled: true
    trustedProxyIps:
      - 10.42.0.0/16

gateway:
  enabled: true
  parentRefs:
    - name: public
      namespace: gateway-system
  hostnames:
    - auth.example.com
  path: /oauth2
  pathType: PathPrefix
