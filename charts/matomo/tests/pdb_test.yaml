# SPDX-License-Identifier: Apache-2.0
suite: matomo pdb
templates:
  - pdb.yaml
tests:
  - it: does not render for one replica
    asserts:
      - hasDocuments:
          count: 0
  - it: renders for multiple replicas
    set:
      replicaCount: 2
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.maxUnavailable
          value: 1
