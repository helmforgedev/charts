# SPDX-License-Identifier: Apache-2.0
replicaCount: 2
matomo:
  siteUrl: https://analytics.example.com
archiver:
  schedule: "15 * * * *"
podDisruptionBudget:
  enabled: true
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 2Gi
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: matomo
