{{- if .Values.php.ini }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matomo.configMapName" . }}
  namespace: {{ include "matomo.namespace" . | quote }}
  labels:
    {{- include "matomo.labels" . | nindent 4 }}
data:
  custom.ini: |
{{ .Values.php.ini | indent 4 }}
{{- end }}
