apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "matomo.fullname" . }}-test-connection"
  namespace: {{ include "matomo.namespace" . | quote }}
  labels:
    {{- include "matomo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  activeDeadlineSeconds: 60
  containers:
    - name: curl
      image: docker.io/curlimages/curl:8.17.0
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -ec
        - curl -fsS --connect-timeout 5 --max-time 20 "http://{{ include "matomo.fullname" . }}:{{ .Values.service.port }}/matomo.php" >/dev/null
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
