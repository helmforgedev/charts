{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.gatewayAPI.enabled }}
{{- range $index, $route := .Values.gatewayAPI.httpRoutes }}
{{- if gt $index 0 }}
---
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "matomo.httpRouteName" (dict "root" $ "route" $route "index" $index) }}
  namespace: {{ include "matomo.namespace" $ | quote }}
  labels:
    {{- include "matomo.labels" $ | nindent 4 }}
    {{- with $route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $route.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $route.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if $route.rules }}
    {{- range $route.rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .backendRefs }}
      backendRefs:
        {{- toYaml .backendRefs | nindent 8 }}
      {{- else if not .omitDefaultBackend }}
      backendRefs:
        - name: {{ include "matomo.fullname" $ }}
          port: {{ $.Values.service.port }}
      {{- end }}
    {{- end }}
    {{- else }}
    - backendRefs:
        - name: {{ include "matomo.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
{{- end }}
