# Gateway API exposure through a shared HTTP Gateway.
gatewayAPI:
  enabled: true
  httpRoutes:
    - name: public
      parentRefs:
        - name: shared-gateway
          namespace: gateway-system
          sectionName: https
      hostnames:
        - analytics.example.com
matomo:
  siteUrl: https://analytics.example.com
  trustedHost: analytics.example.com
