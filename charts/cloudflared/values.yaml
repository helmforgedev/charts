# =============================================================================
# Cloudflare Tunnel (cloudflared) Helm Chart - Default Values
# =============================================================================
# Focus: secure outbound tunnel to Cloudflare's network

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- cloudflared container image
  repository: docker.io/cloudflare/cloudflared
  # -- Image tag
  tag: "2026.5.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Tunnel Configuration
# =============================================================================

tunnel:
  # -- Tunnel token obtained from the Cloudflare dashboard
  token: ""
  # -- Use an existing secret containing the tunnel token
  existingSecret: ""
  # -- Key inside the existing secret
  existingSecretKey: token
  quickTunnel:
    # -- Run an ephemeral quick tunnel for demos and smoke tests. Not recommended for production.
    enabled: false
    # -- Run cloudflared's built-in hello-world origin when quickTunnel.enabled=true.
    helloWorld: true
    # -- Origin URL used when quickTunnel.enabled=true and helloWorld=false.
    url: http://localhost:8080

externalSecrets:
  # -- Render an ExternalSecret for the Cloudflare tunnel token.
  # Requires tunnel.existingSecret to prevent drift between chart-managed
  # Secret data and the ExternalSecret target.
  enabled: false
  # -- ExternalSecret API version. Must remain external-secrets.io/v1.
  apiVersion: external-secrets.io/v1
  # -- ExternalSecret refresh interval.
  refreshInterval: "0"
  secretStoreRef:
    # -- Existing SecretStore or ClusterSecretStore name.
    name: ""
    # -- Secret store kind: SecretStore or ClusterSecretStore.
    kind: SecretStore
  target:
    # -- ExternalSecret target creation policy.
    creationPolicy: Owner
  # -- Data entries mapping remote secret data to the tunnel token key.
  data: []
  #   - secretKey: token
  #     remoteRef:
  #       key: cloudflared/tunnel
  #       property: token

# =============================================================================
# cloudflared Options
# =============================================================================

cloudflared:
  # -- Log level (info, debug, warn, error, fatal)
  logLevel: info
  # -- Disable auto-update (recommended in containers)
  noAutoupdate: true
  # -- Metrics listen port (serves /ready and /metrics)
  metricsPort: 2000
  # -- Extra arguments appended to the cloudflared command
  extraArgs: []
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []
    # - name: TUNNEL_LOGLEVEL
    #   value: debug

# =============================================================================
# Replicas & Availability
# =============================================================================

# -- Number of replicas (Cloudflare recommends 2+ for HA)
replicaCount: 2

pdb:
  # -- Create a PodDisruptionBudget
  enabled: true
  # -- Minimum available replicas during disruption
  minAvailable: 1

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service (metrics)
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- Metrics service port
  port: 2000
  # -- Annotations for the Service
  annotations: {}
  # -- Service IP family policy: SingleStack | PreferDualStack | RequireDualStack. Empty uses cluster default.
  ipFamilyPolicy: ""
  # -- Ordered list of IP families for the Service: IPv4 | IPv6. Empty uses cluster default.
  ipFamilies: []

# =============================================================================
# Metrics / Monitoring
# =============================================================================

metrics:
  # -- Expose metrics service
  enabled: true

serviceMonitor:
  # -- Create a Prometheus ServiceMonitor
  enabled: false
  # -- Scrape interval
  interval: 30s
  # -- Extra labels for the ServiceMonitor
  labels: {}

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    path: /ready
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12
  liveness:
    enabled: true
    path: /ready
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /ready
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
