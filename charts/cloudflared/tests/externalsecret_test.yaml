# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/externalsecret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render tunnel token ExternalSecret
    set:
      tunnel.existingSecret: cloudflared-tunnel-token
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.secretStoreRef.kind: ClusterSecretStore
      externalSecrets.data:
        - secretKey: token
          remoteRef:
            key: cloudflared/tunnel
            property: token
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: metadata.name
          value: test-cloudflared-tunnel
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.target.name
          value: cloudflared-tunnel-token
      - equal:
          path: spec.data[0].secretKey
          value: token

  - it: should fail without existing tunnel secret
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: token
          remoteRef:
            key: cloudflared/tunnel
            property: token
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.enabled requires tunnel.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret."

  - it: should fail without data mappings
    set:
      tunnel.existingSecret: cloudflared-tunnel-token
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.data must not be empty when externalSecrets.enabled=true"
