# CI scenario: ExternalSecrets with drift guard (GR-061)
tunnel:
  quickTunnel:
    enabled: true
  existingSecret: cloudflared-tunnel-token

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: token
      remoteRef:
        key: test/password
