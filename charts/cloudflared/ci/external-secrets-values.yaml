# CI scenario: ExternalSecrets with drift guard (GR-061)
tunnel:
  existingSecret: cloudflared-tunnel-token

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  data:
    - secretKey: token
      remoteRef:
        key: cloudflared/tunnel
        property: token
