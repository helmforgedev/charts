# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render ingress-only policy when egress is disabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: false
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - notContains:
          path: spec.policyTypes
          content: Egress
      - notExists:
          path: spec.egress

  - it: should render egress rules when egress is enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - exists:
          path: spec.egress

  - it: should append extra egress rules
    values:
      - networkpolicy-extra-egress-values.yaml
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.0.0.0/8
            ports:
              - protocol: TCP
                port: 443
