# SPDX-License-Identifier: Apache-2.0
persistence:
  enabled: false
admin:
  password: helmforge-k3d-admin
resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 2Gi
startupProbe:
  initialDelaySeconds: 60
  failureThreshold: 90
livenessProbe:
  initialDelaySeconds: 180
readinessProbe:
  initialDelaySeconds: 60
