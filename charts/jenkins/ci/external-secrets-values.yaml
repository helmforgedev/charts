# SPDX-License-Identifier: Apache-2.0
persistence:
  enabled: false
admin:
  existingSecret: jenkins-admin-managed
externalSecrets:
  enabled: true
  secretStoreRef:
    name: cluster-secrets
    kind: ClusterSecretStore
  data:
    - secretKey: jenkins-admin-user
      remoteRef:
        key: jenkins/admin
        property: username
    - secretKey: jenkins-admin-password
      remoteRef:
        key: jenkins/admin
        property: password
  dataFrom: []
