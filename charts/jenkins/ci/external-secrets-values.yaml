persistence:
  enabled: false
admin:
  existingSecret: jenkins-admin-managed
externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: jenkins-admin-user
      remoteRef:
        key: test/username
    - secretKey: jenkins-admin-password
      remoteRef:
        key: test/password
  dataFrom: []
