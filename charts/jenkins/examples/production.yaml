# SPDX-License-Identifier: Apache-2.0
persistence:
  enabled: true
  size: 100Gi

admin:
  existingSecret: jenkins-admin

resources:
  requests:
    cpu: 1
    memory: 2Gi
  limits:
    cpu: 4
    memory: 6Gi

networkPolicy:
  enabled: true
  egress:
    enabled: true
    allowDns: true
    allowInternet: true
