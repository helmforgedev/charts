# SPDX-License-Identifier: Apache-2.0
replicaCount: 2

pdb:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

networkPolicy:
  enabled: true
  ingress:
    extraFrom:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: gateway-system
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true
