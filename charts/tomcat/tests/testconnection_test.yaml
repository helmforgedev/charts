# SPDX-License-Identifier: Apache-2.0
suite: TestConnection
templates:
  - tests/test-connection.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render helm test pod
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - matchRegex:
          path: spec.containers[0].args[0]
          pattern: "/health.jsp"
