# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render service on port 80 targeting Tomcat 8080
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-tomcat
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should support dual-stack values
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6

  - it: should expose JMX when enabled
    set:
      jmx.enabled: true
    asserts:
      - contains:
          path: spec.ports
          content:
            name: jmx
            port: 9010
            targetPort: jmx
            protocol: TCP
