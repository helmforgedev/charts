# Expose MediKeep via Gateway API HTTPRoute
# The chart auto-generates backendRefs pointing to the MediKeep Service.
gatewayAPI:
  enabled: true
  httpRoutes:
    - parentRefs:
        - name: public
          namespace: gateway-system
      hostnames:
        - medikeep.example.com
