# SPDX-License-Identifier: Apache-2.0
secrets:
  existingSecret: medikeep-runtime
externalSecrets:
  enabled: true
  items:
    - fullnameOverride: medikeep-runtime
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: helmforge-fake-store
        target:
          name: medikeep-runtime
          creationPolicy: Owner
          template:
            data:
              secret-key: '{{ index . "secret-key" }}'
              admin-password: '{{ index . "admin-password" }}1'
        data:
          - secretKey: secret-key
            remoteRef:
              key: test/token
          - secretKey: admin-password
            remoteRef:
              key: test/password
