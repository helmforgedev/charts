# SPDX-License-Identifier: Apache-2.0
suite: medikeep external secrets
templates:
  - templates/externalsecret.yaml
tests:
  - it: renders an ExternalSecret for app secrets
    values:
      - external-secrets-values.yaml
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-medikeep-app
      - equal:
          path: spec.secretStoreRef.name
          value: fake
      - equal:
          path: spec.target.name
          value: RELEASE-NAME-medikeep-app
      - equal:
          path: spec.data[0].secretKey
          value: secret-key
      - equal:
          path: spec.refreshInterval
          value: 1h
  - it: gives multiple unnamed ExternalSecrets unique fallback names
    values:
      - external-secrets-multiple-unnamed-values.yaml
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: RELEASE-NAME-medikeep-app
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-medikeep-1
        documentIndex: 1
  - it: fails without a secretStoreRef or sourceRef
    set:
      externalSecrets.enabled: true
      externalSecrets.items[0].spec.data[0].secretKey: secret-key
      externalSecrets.items[0].spec.data[0].remoteRef.key: medikeep
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.items[].spec.secretStoreRef.name or item sourceRef.storeRef.name/sourceRef.generatorRef.name is required when externalSecrets.enabled=true"
