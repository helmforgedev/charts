secrets:
  existingSecret: RELEASE-NAME-medikeep-app
externalSecrets:
  enabled: true
  items:
    - name: app
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: fake
        target:
          name: RELEASE-NAME-medikeep-app
          creationPolicy: Owner
        data:
          - secretKey: secret-key
            remoteRef:
              key: medikeep
              property: secret-key
