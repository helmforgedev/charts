# SPDX-License-Identifier: Apache-2.0

# -- Override the chart name used in Kubernetes object names.
nameOverride: ""

# -- Override the full release name used in Kubernetes object names.
fullnameOverride: ""

# -- Extra labels applied to all Kubernetes objects rendered by this chart.
commonLabels: {}

image:
  # -- Official MediKeep container image repository.
  repository: ghcr.io/afairgiant/medikeep
  # -- Pinned MediKeep image tag. Floating tags such as latest are not used by default.
  tag: "v0.68.0"
  # -- Kubernetes image pull policy.
  pullPolicy: IfNotPresent

# -- Optional image pull secrets for private registries or mirrored images.
imagePullSecrets: []

# -- Number of MediKeep pods. Keep 1 because MediKeep stores uploads and generated backups on local writable volumes.
replicaCount: 1

app:
  # -- HTTP port exposed by MediKeep inside the container.
  port: 8000
  # -- Timezone passed to the container.
  timezone: UTC
  # -- Log level passed to MediKeep. Valid upstream values are INFO and DEBUG.
  logLevel: INFO
  # -- Enable FastAPI debug responses. Keep disabled in production.
  debug: false
  # -- Expose FastAPI API docs. Keep disabled unless protected by network policy or authentication.
  enableApiDocs: false
  # -- Enable MediKeep's internal HTTPS mode. Prefer TLS termination at ingress or gateway in Kubernetes.
  enableSsl: false
  # -- Optional command override. Leave empty to use the upstream image entrypoint.
  command: []
  # -- Optional argument override. Leave empty to use the upstream image defaults.
  args: []
  # -- Additional environment variables for advanced upstream flags.
  env: []
  # -- Additional envFrom sources such as Secret or ConfigMap references.
  envFrom: []

secrets:
  # -- Existing Secret containing MediKeep sensitive values. Recommended for production.
  existingSecret: ""
  # -- Secret key containing SECRET_KEY.
  secretKeyKey: secret-key
  # -- Inline SECRET_KEY. If empty and no existingSecret is set, the chart generates one on install and reuses it on upgrades.
  secretKey: ""
  # -- Secret key containing ADMIN_DEFAULT_PASSWORD.
  adminDefaultPasswordKey: admin-password
  # -- Optional inline default admin password for first install only. Empty leaves the upstream default.
  adminDefaultPassword: ""
  # -- Secret key containing SSO_CLIENT_SECRET.
  ssoClientSecretKey: sso-client-secret
  # -- Optional inline SSO client secret.
  ssoClientSecret: ""

database:
  # -- External PostgreSQL configuration used when postgresql.enabled=false.
  external:
    host: ""
    port: "5432"
    name: medical_records
    username: medapp
    password: ""
    # -- Existing Secret containing the external database password.
    existingSecret: ""
    # -- Key in database.external.existingSecret containing the password.
    existingSecretPasswordKey: password

medikeep:
  sso:
    # -- Enable MediKeep SSO integration.
    enabled: false
    # -- SSO provider type. Upstream supports github, google, and oidc-style providers.
    providerType: oidc
    # -- SSO client ID.
    clientId: ""
    # -- SSO issuer URL for OIDC providers.
    issuerUrl: ""
    # -- SSO redirect URI registered with the provider.
    redirectUri: ""
    # -- JSON array string with allowed SSO domains.
    allowedDomains: "[]"

persistence:
  uploads:
    # -- Persist uploaded lab files, patient photos, and record attachments.
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
  backups:
    # -- Persist backup files generated by MediKeep's admin dashboard and CLI.
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""
  logs:
    # -- Persist application logs. Disabled by default to avoid retaining sensitive health data in PVC-backed logs.
    enabled: false
    size: 2Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    existingClaim: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- ServiceAccount name. Defaults to the release fullname when create=true.
  name: ""
  # -- Annotations for the ServiceAccount.
  annotations: {}
  # -- Mount the ServiceAccount token in the pod.
  automountServiceAccountToken: false

service:
  # -- Service type.
  type: ClusterIP
  # -- Service port.
  port: 8000
  # -- Service annotations.
  annotations: {}
  # -- IP family policy. Options: SingleStack, PreferDualStack, RequireDualStack.
  ipFamilyPolicy: ""
  # -- Ordered list of IP families, for example ["IPv4", "IPv6"].
  ipFamilies: []

ingress:
  # -- Enable Kubernetes Ingress.
  enabled: false
  # -- IngressClassName for the generated Ingress.
  ingressClassName: traefik
  # -- Ingress annotations.
  annotations: {}
  # -- Ingress hosts and paths.
  hosts: []
  # -- Ingress TLS blocks.
  tls: []

gatewayAPI:
  # -- Enable Gateway API HTTPRoute templates.
  enabled: false
  # -- List of HTTPRoute definitions. Each item is rendered as one HTTPRoute.
  httpRoutes: []

externalSecrets:
  # -- Render external-secrets.io ExternalSecret resources.
  enabled: false
  # -- ExternalSecret apiVersion.
  apiVersion: external-secrets.io/v1
  # -- Default sync interval applied to items without their own value.
  refreshInterval: 1h
  # -- List of ExternalSecret definitions. Each item carries a complete spec.
  items: []

probes:
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

# -- Container resource requests and limits.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi

# -- Resources for the wait-for-database init container.
waitForDatabase:
  image:
    repository: docker.io/library/busybox
    tag: "1.37"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

# -- Pod security context.
podSecurityContext:
  fsGroup: 999
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

# -- Container security context.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  seccompProfile:
    type: RuntimeDefault

pdb:
  # -- Create a PodDisruptionBudget.
  enabled: false
  # -- Minimum available pods during voluntary disruptions.
  minAvailable: 1

networkPolicy:
  # -- Create a NetworkPolicy that restricts inbound HTTP traffic to MediKeep.
  enabled: false
  # -- Custom ingress peers. Empty allows ingress from any namespace.
  ingressFrom: []
  egress:
    # -- Restrict egress to DNS and PostgreSQL destinations.
    enabled: false
    # -- Allow DNS egress on TCP/UDP 53.
    allowDNS: true
    # -- Additional egress destinations appended to the generated policy.
    extraTo: []
    # -- Additional egress rules (full rule objects) appended to the policy.
    extraEgress: []

# -- Node selector for scheduling the pod.
nodeSelector: {}

# -- Tolerations for scheduling the pod.
tolerations: []

# -- Affinity rules for scheduling the pod.
affinity: {}

# -- Topology spread constraints for scheduling the pod.
topologySpreadConstraints: []

# -- Optional PriorityClass name.
priorityClassName: ""

# -- Pod termination grace period in seconds.
terminationGracePeriodSeconds: 30

# -- Extra labels applied to the pod template.
podLabels: {}

# -- Extra annotations applied to the pod template.
podAnnotations: {}

# -- Extra volumes mounted into the pod.
extraVolumes: []

# -- Extra volume mounts added to the MediKeep container.
extraVolumeMounts: []

# -- Additional Kubernetes manifests rendered with the chart.
extraManifests: []

postgresql:
  # -- Deploy PostgreSQL as a subchart for MediKeep.
  enabled: true
  architecture: standalone
  auth:
    database: medical_records
    username: medapp
    password: ""
  standalone:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 768Mi
