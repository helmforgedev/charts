mode: production

hostname:
  hostname: https://sso.example.com

database:
  external:
    host: postgresql.example.com
    password: change-me

deployment:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

serviceAccount:
  automountServiceAccountToken: false

truststore:
  kubernetes:
    enabled: false

capacity:
  profile: small
