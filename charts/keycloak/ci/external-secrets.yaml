mode: production

hostname:
  hostname: https://sso.example.com

postgresql:
  enabled: true
  auth:
    database: keycloak
    username: keycloak
    password: helmforge-test-password

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  admin:
    enabled: true
    usernameRemoteRef:
      key: test/username
    passwordRemoteRef:
      key: test/password
  database:
    enabled: true
    passwordRemoteRef:
      key: test/password
