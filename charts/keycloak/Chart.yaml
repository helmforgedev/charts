apiVersion: v2
name: keycloak
description: Keycloak for Kubernetes with explicit dev and production modes
home: https://helmforge.dev
icon: https://helmforge.dev/icons/charts/keycloak.png
type: application
version: 2.7.9
appVersion: "26.5.5"
kubeVersion: ">=1.26.0-0"
keywords:
  - keycloak
  - identity
  - oidc
  - sso
maintainers:
  - name: helmforgedev
  - name: mberlofa
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "prepare sandbox governance and Apache licensing (#124)"
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: berlofa@helmforge.dev
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: Official Website
      url: https://www.keycloak.org
    - name: Documentation
      url: https://helmforge.dev/docs/charts/keycloak
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/keycloak
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/authelia
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
dependencies:
  - name: postgresql
    version: 1.9.11
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.8.5
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
