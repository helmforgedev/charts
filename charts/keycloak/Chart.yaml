apiVersion: v2
name: keycloak
description: Keycloak for Kubernetes with explicit dev and production modes
icon: https://raw.githubusercontent.com/keycloak/keycloak/main/js/apps/admin-ui/public/logo.svg
type: application
version: 2.5.0
appVersion: "26.5.5"
kubeVersion: ">=1.26.0-0"
keywords:
  - keycloak
  - identity
  - oidc
  - sso
maintainers:
  - name: helmforgedev
  - name: mberlofa
annotations:
  helmforge.dev/maturity: stable
  artifacthub.io/license: MIT
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/keycloak
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/keycloak
dependencies:
  - name: postgresql
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
