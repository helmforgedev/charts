apiVersion: v2
name: keycloak
description: Keycloak for Kubernetes with explicit dev and production modes
icon: https://helmforge.dev/icons/charts/keycloak.png
type: application
version: 2.6.4
appVersion: "26.5.5"
kubeVersion: ">=1.26.0-0"
keywords:
  - keycloak
  - identity
  - oidc
  - sso
maintainers:
  - name: helmforgedev
  - name: mberlofa
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: MIT
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/keycloak
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/keycloak
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.7.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
