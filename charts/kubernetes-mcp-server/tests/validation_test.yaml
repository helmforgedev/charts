# SPDX-License-Identifier: Apache-2.0
suite: kubernetes-mcp-server validation
templates:
  - templates/validate.yaml
tests:
  - it: fails when destructive write mode is not explicitly acknowledged
    set:
      mcp.readOnly: false
      mcp.disableDestructive: false
    asserts:
      - failedTemplate:
          errorMessage: "write access with destructive tools requires mcp.allowUnsafeWriteAccess=true"
  - it: fails when scaling with a shared RWO PVC
    set:
      replicaCount: 2
      persistence.enabled: true
      persistence.accessModes[0]: ReadWriteOnce
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 with persistence.enabled requires persistence.accessModes to include ReadWriteMany or persistence.enabled=false"
