# SPDX-License-Identifier: Apache-2.0
suite: kubernetes-mcp-server rbac
templates:
  - templates/rbac.yaml
tests:
  - it: binds the service account to the Kubernetes view ClusterRole by default
    asserts:
      - isKind:
          of: ClusterRoleBinding
      - equal:
          path: roleRef.name
          value: view
      - equal:
          path: subjects[0].kind
          value: ServiceAccount
