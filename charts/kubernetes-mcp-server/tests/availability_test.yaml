# SPDX-License-Identifier: Apache-2.0
suite: kubernetes-mcp-server availability
templates:
  - templates/deployment.yaml
  - templates/pdb.yaml
tests:
  - it: renders replicas and PDB
    values:
      - scaled-values.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        template: templates/deployment.yaml
      - isKind:
          of: PodDisruptionBudget
        template: templates/pdb.yaml
