# SPDX-License-Identifier: Apache-2.0
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: kubernetes-mcp-server.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: kubernetes-mcp-server-tls
      hosts:
        - kubernetes-mcp-server.example.com
