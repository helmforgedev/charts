replicaCount: 2
mcp:
  readOnly: true
  disableDestructive: true
  stateless: true
  disableMultiCluster: true
rbac:
  clusterRoleName: view
pdb:
  enabled: true
networkPolicy:
  enabled: true
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi
