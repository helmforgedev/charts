{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubernetes-mcp-server.fullname" . }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubernetes-mcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubernetes-mcp-server.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubernetes-mcp-server.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ include "kubernetes-mcp-server.name" . }}
          image: {{ include "kubernetes-mcp-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.app.command }}
          command:
            {{- toYaml .Values.app.command | nindent 12 }}
          {{- end }}
          args:
            {{- if .Values.app.args }}
            {{- toYaml .Values.app.args | nindent 12 }}
            {{- else }}
            - --port
            - {{ .Values.app.port | quote }}
            {{- if .Values.mcp.configToml }}
            - --config
            - /etc/kubernetes-mcp-server/config.toml
            {{- end }}
            {{- if .Values.mcp.readOnly }}
            - --read-only
            {{- end }}
            {{- if .Values.mcp.disableDestructive }}
            - --disable-destructive
            {{- end }}
            {{- if .Values.mcp.stateless }}
            - --stateless
            {{- end }}
            {{- with .Values.mcp.clusterProvider }}
            - {{ printf "--cluster-provider=%s" . | quote }}
            {{- end }}
            {{- if .Values.mcp.disableMultiCluster }}
            - --disable-multi-cluster
            {{- end }}
            - {{ printf "--list-output=%s" .Values.mcp.listOutput | quote }}
            {{- with .Values.mcp.toolsets }}
            - {{ printf "--toolsets=%s" (join "," .) | quote }}
            {{- end }}
            - {{ printf "--log-level=%v" .Values.mcp.logLevel | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP

          env:
            {{- range .Values.app.env }}
            - name: {{ .name }}
              {{- if hasKey . "valueFrom" }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- else }}
              value: {{ default "" .value | quote }}
              {{- end }}
            {{- end }}
            
            {{- with .Values.app.extraEnv }}{{- toYaml . | nindent 12 }}{{- end }}
          {{- with .Values.app.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          startupProbe:
            tcpSocket: { port: http }
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          livenessProbe:
            tcpSocket: { port: http }
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            tcpSocket: { port: http }
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.mcp.configToml .Values.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.mcp.configToml }}
            - name: config
              mountPath: /etc/kubernetes-mcp-server/config.toml
              subPath: config.toml
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.mcp.configToml .Values.extraVolumes }}
      volumes:
        {{- if .Values.mcp.configToml }}
        - name: config
          configMap:
            name: {{ include "kubernetes-mcp-server.fullname" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
