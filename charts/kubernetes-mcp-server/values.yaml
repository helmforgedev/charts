# SPDX-License-Identifier: Apache-2.0
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
image:
  repository: ghcr.io/containers/kubernetes-mcp-server
  tag: "v0.0.63"
  pullPolicy: IfNotPresent
imagePullSecrets: []
replicaCount: 1
app:
  port: 8080
  command: []
  args: []
  env: []
  envFrom: []
  extraEnv: []
mcp:
  readOnly: true
  disableDestructive: true
  allowUnsafeWriteAccess: false
  stateless: true
  clusterProvider: in-cluster
  disableMultiCluster: true
  listOutput: table
  toolsets:
    - core
    - config
  logLevel: 0
  configToml: ""
rbac:
  create: true
  clusterRoleName: view
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  # -- Include ReadWriteMany before scaling replicas with persistence enabled.
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /data
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: true
service:
  type: ClusterIP
  port: 8080
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}
  hosts: []
  tls: []
gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix
pdb:
  enabled: false
  minAvailable: 1
networkPolicy:
  enabled: false
  ingressFrom: []
probes:
  startup: { enabled: true, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 60 }
  liveness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 3 }
  readiness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 6 }
resources: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30
podLabels: {}
podAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
