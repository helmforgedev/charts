{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if include "redis.isCluster" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.clusterStatefulSetName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "redis.headlessServiceName" . }}
  replicas: {{ .Values.cluster.nodes }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "redis.componentLabels" (dict "root" . "role" "cluster") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.componentLabels" (dict "root" . "role" "cluster") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "redis.podSpecCommon" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["redis-server"]
          args:
            - /etc/redis/redis.conf
            {{- if .Values.auth.enabled }}
            - --requirepass
            - $(REDIS_PASSWORD)
            - --masterauth
            - $(REDIS_PASSWORD)
            {{- end }}
            - --cluster-announce-hostname
            - $(POD_NAME).{{ include "redis.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local
          ports:
            - name: redis
              containerPort: {{ .Values.service.ports.redis }}
            - name: bus
              containerPort: 16379
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ .Values.auth.existingSecretPasswordKey }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.cluster.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis-cluster.conf
            - name: data
              mountPath: /data
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          env:
            {{- include "redis.exporterEnv" . | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.configMapName" . }}
        {{- if not .Values.cluster.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.cluster.persistence.enabled }}
  volumeClaimTemplates:
    {{- include "redis.volumeClaimTemplate" (dict "root" . "persistence" .Values.cluster.persistence) | nindent 4 }}
  {{- end }}
{{- end }}
