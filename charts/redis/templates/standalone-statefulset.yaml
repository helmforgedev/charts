{{- if include "redis.isStandalone" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.fullname" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "redis.headlessServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "redis.componentLabels" (dict "root" . "role" "standalone") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.componentLabels" (dict "root" . "role" "standalone") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "redis.podSpecCommon" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["redis-server"]
          args:
            {{- include "redis.serverArgs" . | nindent 12 }}
          ports:
            - name: redis
              containerPort: {{ .Values.service.ports.redis }}
          env:
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ .Values.auth.existingSecretPasswordKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.standalone.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis-standalone.conf
            - name: data
              mountPath: /data
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          env:
            {{- include "redis.exporterEnv" . | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
          {{- with .Values.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.configMapName" . }}
        {{- if not .Values.standalone.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.standalone.persistence.enabled }}
  volumeClaimTemplates:
    {{- include "redis.volumeClaimTemplate" (dict "root" . "persistence" .Values.standalone.persistence) | nindent 4 }}
  {{- else }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Delete
  {{- end }}
{{- end }}
