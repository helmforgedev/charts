{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.gateway.enabled }}
{{- if not .Values.gateway.parentRefs }}
  {{- fail "gateway.enabled requires gateway.parentRefs to be populated to create a valid HTTPRoute." }}
{{- end }}
{{- /*
  Note: Redis is a TCP protocol (not HTTP). Gateway API HTTPRoute is not applicable.
  This template renders an HTTPRoute only when enabled - users should use TCPRoute
  via a Gateway implementation that supports layer-4 routing (e.g., Envoy Gateway).
  This stub keeps the gateway block consistent across HelmForge charts.
*/}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "redis.fullname" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.pathType }}
            value: {{ .Values.gateway.path | quote }}
      backendRefs:
        - name: {{ include "redis.clientServiceName" . }}
          port: {{ .Values.service.ports.redis }}
{{- end }}
