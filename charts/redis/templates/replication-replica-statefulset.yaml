{{- if or (include "redis.isReplication" .) (include "redis.isSentinel" .) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "redis.replicaStatefulSetName" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "redis.headlessServiceName" . }}
  replicas: {{ .Values.replication.replicaCount }}
  selector:
    matchLabels:
      {{- include "redis.componentLabels" (dict "root" . "role" "replica") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "redis.componentLabels" (dict "root" . "role" "replica") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "redis.podSpecCommon" . | nindent 6 }}
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-ec"]
          args:
            - |
              exec redis-server /etc/redis/redis.conf \
                --replicaof {{ include "redis.primaryStatefulSetName" . }}-0.{{ include "redis.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.cluster.local {{ .Values.service.ports.redis }} \
              {{- if .Values.auth.enabled }}
                --masterauth "$REDIS_PASSWORD" \
                --requirepass "$REDIS_PASSWORD"
              {{- end }}
          ports:
            - name: redis
              containerPort: {{ .Values.service.ports.redis }}
          env:
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "redis.secretName" . }}
                  key: {{ .Values.auth.existingSecretPasswordKey }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "redis.probeCommand" . | quote }}
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.replication.replica.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/redis/redis.conf
              subPath: redis-replica.conf
            - name: data
              mountPath: /data
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          env:
            {{- include "redis.exporterEnv" . | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "redis.configMapName" . }}
  {{- if .Values.replication.replica.persistence.enabled }}
  volumeClaimTemplates:
    {{- include "redis.volumeClaimTemplate" (dict "root" . "persistence" .Values.replication.replica.persistence) | nindent 4 }}
  {{- end }}
{{- end }}
