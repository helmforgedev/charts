# =============================================================================
# Middleware Helm Chart — Default Values
# =============================================================================
# Focus: open-source DORA metrics platform for engineering team performance

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Middleware container image
  repository: middlewareeng/middleware
  # -- Image tag (defaults to appVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Middleware Configuration
# =============================================================================

middleware:
  # -- Frontend port (Next.js)
  frontendPort: 3333
  # -- Analytics API port
  analyticsPort: 9696
  # -- Sync server port
  syncPort: 9697
  # -- Environment
  environment: prod
  # -- Disable internal PostgreSQL (use subchart instead)
  internalDbEnabled: "false"
  # -- Disable internal Redis (use subchart instead)
  internalRedisEnabled: "false"
  # -- Timezone
  timezone: UTC
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# External Database (when not using subchart)
# =============================================================================

externalDatabase:
  # -- Use external database instead of subchart
  enabled: false
  # -- Database host
  host: ""
  # -- Database port
  port: 5432
  # -- Database name
  name: "mhq-oss"
  # -- Database user
  user: "middleware"
  # -- Database password
  password: ""
  # -- Existing secret with database credentials
  existingSecret: ""
  # -- Key in existing secret for password
  existingSecretPasswordKey: user-password

# =============================================================================
# External Redis (when not using subchart)
# =============================================================================

externalRedis:
  # -- Use external Redis instead of subchart
  enabled: false
  # -- Redis host
  host: ""
  # -- Redis port
  port: 6379

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /app/keys
  enabled: true
  # -- Storage size
  size: 1Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- Frontend service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Middleware
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: middleware.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - middleware.example.com
    #   secretName: middleware-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled PostgreSQL backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: middleware
  images:
    # -- Image used for PostgreSQL backup (must have pg_dump)
    postgresql: postgres:17.5-alpine
    # -- Image used for S3 upload (MinIO client)
    uploader: minio/mc:RELEASE.2025-04-08T15-18-23Z
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: middleware
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""
  # -- Override database credentials for backup (uses app credentials if empty)
  database:
    host: ""
    port: ""
    name: ""
    username: ""
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: password
    postgresDumpArgs: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# PostgreSQL Subchart
# =============================================================================

postgresql:
  # -- Enable bundled PostgreSQL subchart
  enabled: true
  auth:
    # -- PostgreSQL database name
    database: mhq-oss
    # -- PostgreSQL username
    username: middleware
    # -- PostgreSQL password (auto-generated if empty)
    password: ""

# =============================================================================
# Redis Subchart
# =============================================================================

redis:
  # -- Enable bundled Redis subchart
  enabled: true
  # -- Redis architecture
  architecture: standalone
