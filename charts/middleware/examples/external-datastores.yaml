# Middleware against managed PostgreSQL and Redis (no bundled subcharts).
# The app's DORA data lives in your managed PostgreSQL; Redis is the cache/queue.
#
#   helm install middleware helmforge/middleware -f external-datastores.yaml
#
# Create the DB password secret first:
#   kubectl create secret generic middleware-db --from-literal=user-password=<pass>

postgresql:
  enabled: false
externalDatabase:
  enabled: true
  host: pg.internal.example.com
  port: 5432
  name: mhq-oss
  user: middleware
  existingSecret: middleware-db
  existingSecretPasswordKey: user-password

redis:
  enabled: false
externalRedis:
  enabled: true
  host: redis.internal.example.com
  port: 6379

# Keep the encryption keys persisted even with external datastores.
persistence:
  enabled: true
  size: 1Gi
