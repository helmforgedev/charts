apiVersion: v2
name: middleware
description: Middleware open-source DORA metrics platform with PostgreSQL and Redis for engineering team performance
type: application
version: 1.1.1
appVersion: "0.3.1"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - middleware
  - dora
  - metrics
  - devops
  - engineering
  - performance
  - self-hosted
icon: https://helmforge.dev/icons/charts/middleware.png
home: https://www.middlewarehq.com
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/middlewarehq/middleware
dependencies:
  - name: postgresql
    version: 1.8.3
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    version: 1.5.4
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
annotations:
