{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.networkPolicy.enabled }}
{{- $egress := .Values.networkPolicy.egress }}
{{- $extraEgress := $egress.extraEgress }}
{{- $hasBaseEgress := and $egress.enabled (or $egress.allowDNS $egress.allowHTTP $egress.allowHTTPS $egress.allowPostgreSQL $egress.extraTo) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "sonarqube.fullname" . }}
  labels:
    {{- include "sonarqube.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "sonarqube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sonarqube
  policyTypes:
    - Ingress
    {{- if or $egress.enabled $extraEgress }}
    - Egress
    {{- end }}
  ingress:
    {{- if or .Values.networkPolicy.ingress.allowSameNamespace .Values.networkPolicy.ingress.extraFrom }}
    - from:
        {{- if .Values.networkPolicy.ingress.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.ingress.extraFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: http
    {{- else }}
    []
    {{- end }}
  {{- if or $egress.enabled $extraEgress }}
  egress:
    {{- if or $hasBaseEgress $extraEgress }}
    {{- if $egress.enabled }}
    {{- if $egress.allowDNS }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- if $egress.allowHTTP }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
    {{- end }}
    {{- if $egress.allowHTTPS }}
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- if $egress.allowPostgreSQL }}
    - ports:
        - protocol: TCP
          port: {{ $egress.postgresqlPort }}
    {{- end }}
    {{- with $egress.extraTo }}
    - to:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- end }}
    {{- with $extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- else }}
    []
    {{- end }}
  {{- end }}
{{- end }}
