sonarqube:
  webJavaOpts: "-Xms128m -Xmx384m"
  ceJavaOpts: "-Xms128m -Xmx384m"
  searchJavaOpts: "-Xms384m -Xmx384m"

postgresql:
  enabled: true
  auth:
    database: sonarqube
    username: sonar
    password: sonar-ci-password
  standalone:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

persistence:
  data:
    enabled: false
  extensions:
    enabled: false
  logs:
    enabled: false

resources:
  requests:
    cpu: 250m
    memory: 1536Mi
  limits:
    cpu: 2
    memory: 2304Mi
