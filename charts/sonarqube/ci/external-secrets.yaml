# SPDX-License-Identifier: Apache-2.0
sonarqube:
  databaseMode: external
  monitoringPasscode: ""

database:
  external:
    jdbcUrl: jdbc:postgresql://sonarqube-external-secrets-postgresql:5432/sonarqube
    username: sonar

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  database:
    enabled: true
    passwordRemoteRef:
      key: test/password
  monitoringPasscode:
    enabled: true
    remoteRef:
      key: test/token

extraManifests:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: sonarqube-external-secrets-postgresql
      labels:
        app.kubernetes.io/name: sonarqube-external-secrets-postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: sonarqube-external-secrets-postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sonarqube-external-secrets-postgresql
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.3-alpine
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgresql
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: sonarqube
                - name: POSTGRES_USER
                  value: sonar
                - name: POSTGRES_PASSWORD
                  value: helmforge-test-password
              readinessProbe:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - sonar
                    - -d
                    - sonarqube
                initialDelaySeconds: 5
                periodSeconds: 5
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
  - apiVersion: v1
    kind: Service
    metadata:
      name: sonarqube-external-secrets-postgresql
      labels:
        app.kubernetes.io/name: sonarqube-external-secrets-postgresql
    spec:
      type: ClusterIP
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: sonarqube-external-secrets-postgresql
