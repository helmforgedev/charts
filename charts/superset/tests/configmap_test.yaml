suite: ConfigMap
templates:
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a ConfigMap
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-superset-config

  - it: should contain superset_config.py
    asserts:
      - isNotNull:
          path: data["superset_config.py"]

  - it: should include CeleryConfig
    asserts:
      - matchRegex:
          path: data["superset_config.py"]
          pattern: "CeleryConfig"
