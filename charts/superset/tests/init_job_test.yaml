# SPDX-License-Identifier: Apache-2.0
suite: Init Job
templates:
  - templates/init-job.yaml
  - templates/secret.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Job
    template: templates/init-job.yaml
    asserts:
      - isKind:
          of: Job
      - matchRegex:
          path: metadata.name
          pattern: ^test-superset-init-\d+$

  - it: should be a managed Job, not a helm hook
    template: templates/init-job.yaml
    asserts:
      # Runs concurrently with the workloads (which wait on it via a wait-for-init
      # initContainer). As a post-install hook it ran too late and the web/worker/
      # beat pods deadlocked racing Flask-AppBuilder schema init.
      - notExists:
          path: metadata.annotations["helm.sh/hook"]

  - it: should not render when disabled
    template: templates/init-job.yaml
    set:
      init.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use correct admin username
    template: templates/init-job.yaml
    set:
      superset.adminUsername: myadmin
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].command[2]
          pattern: "--username \"myadmin\""

  - it: should have init containers for dependencies
    template: templates/init-job.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 2
