# CI scenario — external database and Redis
postgresql:
  enabled: false

redis:
  enabled: false

database:
  mode: external
  external:
    host: postgres.example.com
    port: 5432
    name: superset
    username: superset
    password: external-password

redisConfig:
  mode: external
  external:
    host: redis.example.com
    port: 6379
    password: redis-password
    db: 0
