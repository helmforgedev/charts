bundledElasticsearch:
  enabled: true

elasticsearch:
  hosts:
    - http://kibana-bundled-elasticsearch:9200

bundled-elasticsearch:
  clusterProfile: dev
  image:
    tag: "9.4.2"
  kibana:
    enabled: false
  master:
    persistence:
      enabled: false
  sysctlInit:
    enabled: false
