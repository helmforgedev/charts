# SPDX-License-Identifier: Apache-2.0
elasticsearch:
  auth:
    type: serviceAccountToken

externalSecrets:
  enabled: true
  secretStoreRef:
    name: cluster-secrets
    kind: ClusterSecretStore
  data:
    - secretKey: service-account-token
      remoteRef:
        key: elastic/kibana
        property: service-account-token
