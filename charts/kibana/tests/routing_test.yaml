# SPDX-License-Identifier: Apache-2.0
suite: kibana - routing and policies
templates:
  - templates/service.yaml
  - templates/ingress.yaml
  - templates/httproute.yaml
  - templates/networkpolicy.yaml
  - templates/pdb.yaml
  - templates/servicemonitor.yaml
  - templates/pvc.yaml
  - templates/externalsecret.yaml
  - templates/tests/test-connection.yaml

tests:
  - it: renders dual-stack service fields
    template: templates/service.yaml
    set:
      service:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6

  - it: renders ingress when enabled
    template: templates/ingress.yaml
    set:
      ingress:
        enabled: true
        ingressClassName: nginx
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: renders Gateway API HTTPRoute
    template: templates/httproute.yaml
    set:
      gateway:
        enabled: true
        skipCRDCheck: true
        hostnames:
          - kibana.example.com
        parentRefs:
          - name: shared-gateway
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 5601

  - it: renders NetworkPolicy with egress controls
    template: templates/networkpolicy.yaml
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: appends extra NetworkPolicy egress rules
    template: templates/networkpolicy.yaml
    set:
      networkPolicy:
        enabled: true
        extraEgress:
          - to:
              - ipBlock:
                  cidr: 10.70.0.0/16
            ports:
              - protocol: TCP
                port: 443
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.70.0.0/16
            ports:
              - protocol: TCP
                port: 443

  - it: renders persistence PVC
    template: templates/pvc.yaml
    set:
      persistence:
        enabled: true
        size: 1Gi
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: renders ServiceMonitor
    template: templates/servicemonitor.yaml
    set:
      serviceMonitor:
        enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor

  - it: renders ExternalSecret
    template: templates/externalsecret.yaml
    set:
      elasticsearch:
        auth:
          type: serviceAccountToken
      externalSecrets:
        enabled: true
        skipCRDCheck: true
        secretStoreRef:
          name: cluster-secrets
        data:
          - secretKey: service-account-token
            remoteRef:
              key: elastic/kibana
              property: service-account-token
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.secretStoreRef.name
          value: cluster-secrets

  - it: renders ExternalSecret with dataFrom
    template: templates/externalsecret.yaml
    set:
      elasticsearch:
        auth:
          type: serviceAccountToken
      externalSecrets:
        enabled: true
        skipCRDCheck: true
        secretStoreRef:
          name: cluster-secrets
        dataFrom:
          - extract:
              key: elastic/kibana
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.dataFrom[0].extract.key
          value: elastic/kibana

  - it: fails ExternalSecret without data or dataFrom
    template: templates/externalsecret.yaml
    set:
      elasticsearch:
        auth:
          type: serviceAccountToken
      externalSecrets:
        enabled: true
        skipCRDCheck: true
        secretStoreRef:
          name: cluster-secrets
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.data or externalSecrets.dataFrom must not be empty when externalSecrets.enabled=true"

  - it: renders the Helm test hook pod
    template: templates/tests/test-connection.yaml
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
