suite: kibana - config
templates:
  - templates/configmap.yaml
  - templates/secret.yaml

tests:
  - it: renders kibana.yml with bundled Elasticsearch by default
    template: templates/configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["kibana.yml"]
          pattern: "elasticsearch.hosts:"
      - matchRegex:
          path: data["kibana.yml"]
          pattern: "http://.*-bundled-elasticsearch:9200"

  - it: renders kibana.yml with external Elasticsearch hosts
    template: templates/configmap.yaml
    set:
      bundledElasticsearch.enabled: false
      elasticsearch:
        hosts:
          - http://elasticsearch:9200
    asserts:
      - matchRegex:
          path: data["kibana.yml"]
          pattern: "http://elasticsearch:9200"

  - it: derives the bundled Elasticsearch http host from the subchart fullname
    template: templates/configmap.yaml
    set:
      bundledElasticsearch.enabled: true
    asserts:
      # bundled mode (dev profile) is plain HTTP; host matches the subchart Service
      # (<release>-bundled-elasticsearch), not a hardcoded value.
      - matchRegex:
          path: data["kibana.yml"]
          pattern: "http://.*-bundled-elasticsearch:9200"

  - it: rejects bundled Elasticsearch with security enabled (unsupported)
    template: templates/configmap.yaml
    set:
      bundledElasticsearch.enabled: true
      bundled-elasticsearch.security.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "bundled Elasticsearch with security enabled (bundled-elasticsearch.security.enabled=true or clusterProfile=production-ha) is not supported in bundled mode: this chart wires only the plain-HTTP Service URL, not TLS CA verification or auth, so Kibana would connect to the wrong (https) endpoint. Use external mode instead -- set bundledElasticsearch.enabled=false and configure elasticsearch.hosts + elasticsearch.tls + elasticsearch.auth against your secured cluster."

  - it: renders TLS configuration
    template: templates/configmap.yaml
    set:
      bundledElasticsearch.enabled: false
      elasticsearch:
        hosts:
          - https://elasticsearch:9200
        tls:
          enabled: true
          verificationMode: certificate
          certificateAuthoritiesSecret: elasticsearch-ca
    asserts:
      - matchRegex:
          path: data["kibana.yml"]
          pattern: "elasticsearch.ssl.verificationMode: \"certificate\""

  - it: rejects external auth while bundled Elasticsearch is enabled
    template: templates/configmap.yaml
    set:
      elasticsearch:
        auth:
          type: basic
          password: super-secret
    asserts:
      - failedTemplate:
          errorMessage: "elasticsearch.auth.type must be none when bundledElasticsearch.enabled=true because the bundled dev profile is unauthenticated plain HTTP. Disable bundledElasticsearch to use external secured Elasticsearch."

  - it: rejects external TLS while bundled Elasticsearch is enabled
    template: templates/configmap.yaml
    set:
      elasticsearch:
        tls:
          enabled: true
          certificateAuthoritiesSecret: elasticsearch-ca
    asserts:
      - failedTemplate:
          errorMessage: "elasticsearch.tls.enabled must be false when bundledElasticsearch.enabled=true because the bundled dev profile is plain HTTP. Disable bundledElasticsearch to use external TLS Elasticsearch."

  - it: creates a managed secret for inline auth and encryption keys
    template: templates/secret.yaml
    set:
      bundledElasticsearch.enabled: false
      elasticsearch:
        auth:
          type: basic
          password: super-secret
      encryptionKeys:
        securityKey: "01234567890123456789012345678901"
        reportingKey: "abcdefghijklmnopqrstuvwxyz123456"
        encryptedSavedObjectsKey: "savedobjects01234567890123456789"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.elasticsearch-password
          value: super-secret
