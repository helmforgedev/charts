# SPDX-License-Identifier: Apache-2.0
bundledElasticsearch:
  enabled: true

elasticsearch:
  hosts:
    - http://kibana-ci-bundled-elasticsearch:9200

bundled-elasticsearch:
  clusterProfile: dev
  clusterName: kibana-ci
  image:
    tag: "9.4.2"
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 1536Mi
  startupProbe:
    initialDelaySeconds: 120
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  security:
    enabled: false
  sysctlInit:
    enabled: false
