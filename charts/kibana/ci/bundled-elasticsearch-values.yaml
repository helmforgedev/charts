# SPDX-License-Identifier: Apache-2.0
bundledElasticsearch:
  enabled: true

# elasticsearch.hosts is intentionally NOT set: when bundledElasticsearch is
# enabled the chart auto-derives the host from the bundled subchart Service
# (<release>-bundled-elasticsearch), so this works with any release name.

bundled-elasticsearch:
  clusterProfile: dev
  image:
    tag: "9.4.2"
  master:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 768Mi
      limits:
        cpu: "1"
        memory: 1536Mi
  startupProbe:
    initialDelaySeconds: 120
  data:
    replicaCount: 0
  coordinating:
    replicaCount: 0
  security:
    enabled: false
  sysctlInit:
    enabled: false
