# SPDX-License-Identifier: Apache-2.0
elasticsearch:
  hosts:
    - http://elasticsearch:9200

resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    cpu: "1"
    memory: 1Gi

startupProbe:
  initialDelaySeconds: 120
  failureThreshold: 90

readinessProbe:
  failureThreshold: 20

extraConfig:
  xpack.securitySolution.enabled: false
