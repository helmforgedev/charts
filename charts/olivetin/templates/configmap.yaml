apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "olivetin.fullname" . }}-config
  labels:
    {{- include "olivetin.labels" . | nindent 4 }}
data:
  config.yaml: |
    {{- if .Values.config }}
    {{- if .Values.configTpl.enabled }}
    {{- tpl .Values.config . | nindent 4 }}
    {{- else }}
    {{- .Values.config | nindent 4 }}
    {{- end }}
    {{- else }}
    prometheus:
      enabled: {{ .Values.metrics.enabled }}
      defaultGoMetrics: {{ .Values.metrics.defaultGoMetrics }}
    actions:
      - title: "Ping Google"
        shell: "ping -c 1 google.com"
    {{- end }}
