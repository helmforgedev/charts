{{- if .Values.gatewayAPI.enabled }}
{{- range .Values.gatewayAPI.httpRoutes | default list }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ trunc 63 (printf "%s-%s" (include "olivetin.fullname" $) (.name | default "")) | trimSuffix "-" }}
  labels:
    {{- include "olivetin.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .parentRefs }}
  parentRefs:
    {{- toYaml .parentRefs | nindent 4 }}
  {{- end }}
  {{- with .hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
  {{- if .rules }}
    {{- range .rules }}
    - {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      {{- if .backendRefs }}
      backendRefs:
        {{- toYaml .backendRefs | nindent 8 }}
      {{- else if not .omitDefaultBackend }}
      backendRefs:
        - name: {{ include "olivetin.fullname" $ }}
          port: {{ $.Values.service.port }}
      {{- end }}
    {{- end }}
  {{- else }}
    - backendRefs:
        - name: {{ include "olivetin.fullname" $ }}
          port: {{ $.Values.service.port }}
  {{- end }}
{{- end }}
{{- end }}
