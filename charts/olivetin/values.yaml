# =============================================================================
# OliveTin Helm Chart — Default Values
# =============================================================================
# Focus: web interface for running predefined shell commands

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- OliveTin container image
  repository: jamesread/olivetin
  # -- Image tag (defaults to appVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# OliveTin Configuration
# =============================================================================

olivetin:
  # -- Application port
  port: 1337
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# -- OliveTin YAML configuration mounted at /config/config.yaml
# -- See https://docs.olivetin.app for all options
config: |
  actions:
    - title: "Ping Google"
      shell: "ping -c 1 google.com"

# =============================================================================
# Metrics
# =============================================================================

metrics:
  # -- Enable Prometheus metrics scraping annotations
  enabled: false
  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Namespace for the ServiceMonitor (defaults to chart namespace)
    namespace: ""
    # -- Additional labels for the ServiceMonitor
    labels: {}
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for custom configs or data
  enabled: false
  # -- Storage size
  size: 1Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for OliveTin
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: olivetin.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - olivetin.example.com
    #   secretName: olivetin-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
