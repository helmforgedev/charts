# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# OliveTin Helm Chart - Default Values
# =============================================================================
# Focus: web interface for running predefined shell commands

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- OliveTin container image
  repository: docker.io/jamesread/olivetin
  # -- Image tag
  tag: "3000.17.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Config Directory Bootstrap
# =============================================================================

configInit:
  # -- Create writable runtime files/directories expected by OliveTin before startup
  enabled: true
  image:
    # -- Config init container image
    repository: docker.io/library/busybox
    # -- Config init container image tag
    tag: "1.37"
    pullPolicy: IfNotPresent
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

# =============================================================================
# OliveTin Configuration
# =============================================================================

olivetin:
  # -- Application port
  port: 1337
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# -- OliveTin YAML configuration mounted at /config/config.yaml.
# -- Leave empty to use the chart-managed default config, including metrics values.
# -- See https://docs.olivetin.app for all options.
config: ""

configTpl:
  # -- Render config through Helm tpl. Disabled by default so OliveTin runtime templates such as {{ message }} remain literal.
  enabled: false

# =============================================================================
# Metrics
# =============================================================================

metrics:
  # -- Enable Prometheus metrics scraping annotations
  enabled: false
  # -- Expose default Go runtime metrics alongside OliveTin metrics
  defaultGoMetrics: false
  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Namespace for the ServiceMonitor (defaults to chart namespace)
    namespace: ""
    # -- Additional labels for the ServiceMonitor
    labels: {}
    # -- Scrape interval
    interval: 30s
    # -- Scrape timeout
    scrapeTimeout: 10s

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for custom configs or data
  enabled: false
  # -- Storage size
  size: 1Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Mount the ServiceAccount token into pods
  automountServiceAccountToken: false

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}
  # -- IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for OliveTin
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: olivetin.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - olivetin.example.com
    #   secretName: olivetin-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  fsGroup: 65534
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 999

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# External Secrets
# =============================================================================

externalSecrets:
  # -- Render ExternalSecret resources for credentials used by custom actions
  enabled: false
  # -- ExternalSecret API version
  apiVersion: external-secrets.io/v1
  # -- Default provider sync interval for ExternalSecret items that do not set spec.refreshInterval
  refreshInterval: 1h
  # -- ExternalSecret definitions. Each item requires a full `spec`.
  # @default -- `[]`
  items: []
    # - name: command-credentials
    #   spec:
    #     secretStoreRef:
    #       name: platform-secrets
    #       kind: ClusterSecretStore
    #     target:
    #       name: olivetin-command-credentials
    #       creationPolicy: Owner
    #     data:
    #       - secretKey: API_TOKEN
    #         remoteRef:
    #           key: olivetin/api-token

# =============================================================================
# Gateway API
# =============================================================================

gatewayAPI:
  # -- Render Gateway API HTTPRoute resources
  enabled: false
  # -- HTTPRoute definitions routed to the OliveTin Service by default
  # @default -- `[]`
  httpRoutes: []
