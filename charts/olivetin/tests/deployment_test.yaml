suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-olivetin

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "jamesread/olivetin:3000.11.3"

  - it: should mount config volume as read-only
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config
            readOnly: true

  - it: should reference configmap in volumes
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: test-olivetin-config

  - it: should not mount data volume when persistence disabled
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should mount data volume when persistence enabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should use PVC for data when persistence enabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-olivetin-data

  - it: should use TCP probes
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: http

  - it: should include configmap checksum annotation
    template: templates/deployment.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should set container port to 1337
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 1337
            protocol: TCP

  - it: should not have init containers
    template: templates/deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
