# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-olivetin

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should initialize writable config directory by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: init-config-dir
            image: "docker.io/library/busybox:1.37"
            imagePullPolicy: IfNotPresent
            command:
              - sh
              - -ec
              - mkdir -p /config/custom-webui/themes && touch /config/sessions.yaml && chmod g+rw /config/sessions.yaml && chmod g+rwx /config/custom-webui /config/custom-webui/themes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 65534
              runAsGroup: 65534
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
            volumeMounts:
              - name: config-dir
                mountPath: /config
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 65534
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 999
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].resources.requests.cpu
          value: 10m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: should keep init container compatible with pod runAsNonRoot
    template: templates/deployment.yaml
    set:
      podSecurityContext.runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.initContainers[0].securityContext.runAsUser
          value: 65534

  - it: should set the correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/jamesread/olivetin:3000.17.2"

  - it: should mount writable config directory with read-only config file
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config-dir
            mountPath: /config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config/config.yaml
            subPath: config.yaml
            readOnly: true

  - it: should reference configmap in volumes
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config-dir
            emptyDir: {}
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: test-olivetin-config

  - it: should not mount data volume when persistence disabled
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should mount data volume when persistence enabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should use PVC for data when persistence enabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-olivetin-data

  - it: should use TCP probes
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: http

  - it: should include configmap checksum annotation
    template: templates/deployment.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should set container port to 1337
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 1337
            protocol: TCP

  - it: should allow disabling config directory init container
    template: templates/deployment.yaml
    set:
      configInit.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
