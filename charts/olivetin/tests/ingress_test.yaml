suite: Ingress
templates:
  - templates/ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: olivetin.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress

  - it: should set ingressClassName
    set:
      ingress.enabled: true
      ingress.ingressClassName: nginx
      ingress.hosts:
        - host: olivetin.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should configure TLS
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: olivetin.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - hosts:
            - olivetin.example.com
          secretName: olivetin-tls
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: olivetin-tls
