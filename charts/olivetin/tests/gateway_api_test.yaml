# SPDX-License-Identifier: Apache-2.0
suite: Gateway API
templates:
  - templates/gateway-httproute.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render HTTPRoute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - name: web
          parentRefs:
            - name: public
          hostnames:
            - olivetin.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: test-olivetin-web
      - equal:
          path: spec.parentRefs[0].name
          value: public
      - equal:
          path: spec.hostnames[0]
          value: olivetin.example.com
