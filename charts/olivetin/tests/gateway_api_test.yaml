# SPDX-License-Identifier: Apache-2.0
suite: Gateway API
templates:
  - templates/gateway-httproute.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render HTTPRoute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - name: web
          parentRefs:
            - name: public
          hostnames:
            - olivetin.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: metadata.name
          value: test-olivetin-web
      - equal:
          path: spec.parentRefs[0].name
          value: public
      - equal:
          path: spec.hostnames[0]
          value: olivetin.example.com

  - it: should keep default backend when filters are configured
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - name: web
          rules:
            - filters:
                - type: RequestHeaderModifier
                  requestHeaderModifier:
                    add:
                      - name: X-Forwarded-App
                        value: olivetin
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestHeaderModifier
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: test-olivetin
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should allow backend-less redirect rules when explicitly requested
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - name: redirect
          rules:
            - omitDefaultBackend: true
              filters:
                - type: RequestRedirect
                  requestRedirect:
                    scheme: https
                    statusCode: 301
    asserts:
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestRedirect
      - notExists:
          path: spec.rules[0].backendRefs

  - it: should preserve route suffixes when the fullname is truncated
    set:
      fullnameOverride: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - name: web
        - name: api
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa-web
        documentIndex: 0
      - equal:
          path: metadata.name
          value: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa-api
        documentIndex: 1
