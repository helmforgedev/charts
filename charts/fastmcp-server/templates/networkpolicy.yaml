# SPDX-License-Identifier: Apache-2.0

{{- if .Values.networkPolicy.enabled }}
{{- $extraEgress := .Values.networkPolicy.extraEgress }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fastmcp-server.fullname" . }}
  namespace: {{ include "fastmcp-server.namespace" . }}
  labels:
    {{- include "fastmcp-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fastmcp-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if $extraEgress }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - port: {{ .Values.server.port }}
          protocol: TCP
  {{- with $extraEgress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
