# SPDX-License-Identifier: Apache-2.0

{{- if (include "fastmcp-server.hasInlinePrompts" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fastmcp-server.fullname" . }}-prompts
  namespace: {{ include "fastmcp-server.namespace" . }}
  labels:
    {{- include "fastmcp-server.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.sources.inline.prompts }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
