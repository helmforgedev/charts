apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastmcp-server.fullname" . }}
  labels:
    {{- include "fastmcp-server.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "fastmcp-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if (include "fastmcp-server.hasAnyInline" .) }}
        checksum/tools: {{ .Values.sources.inline.tools | toJson | sha256sum }}
        checksum/resources: {{ .Values.sources.inline.resources | toJson | sha256sum }}
        checksum/prompts: {{ .Values.sources.inline.prompts | toJson | sha256sum }}
        checksum/knowledge: {{ .Values.sources.inline.knowledge | toJson | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "fastmcp-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "fastmcp-server.fullname" .) }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: mcp-server
          image: {{ include "fastmcp-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: MCP_SERVER_NAME
              value: {{ .Values.server.name | quote }}
            - name: MCP_PORT
              value: {{ .Values.server.port | quote }}
            - name: MCP_PATH
              value: {{ .Values.server.path | quote }}
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: LOG_LEVEL
              value: {{ .Values.server.logLevel | quote }}
            {{- if ne .Values.auth.type "none" }}
            - name: MCP_AUTH_TYPE
              value: {{ .Values.auth.type | quote }}
            {{- end }}
            {{- if eq .Values.auth.type "bearer" }}
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastmcp-server.authSecretName" . }}
                  key: {{ .Values.auth.bearer.existingSecretKey | default "token" }}
            {{- end }}
            {{- if eq .Values.auth.type "jwt" }}
            {{- with .Values.auth.jwt.issuer }}
            - name: MCP_AUTH_JWT_ISSUER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.jwt.audience }}
            - name: MCP_AUTH_JWT_AUDIENCE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.auth.jwt.jwksUri }}
            - name: MCP_AUTH_JWT_JWKS_URI
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.sources.s3.enabled }}
            - name: SOURCE_S3_ENABLED
              value: "true"
            {{- with .Values.sources.s3.endpoint }}
            - name: SOURCE_S3_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            - name: SOURCE_S3_BUCKET
              value: {{ .Values.sources.s3.bucket | quote }}
            - name: SOURCE_S3_REGION
              value: {{ .Values.sources.s3.region | quote }}
            {{- with .Values.sources.s3.prefix }}
            - name: SOURCE_S3_PREFIX
              value: {{ . | quote }}
            {{- end }}
            - name: SOURCE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastmcp-server.s3SecretName" . }}
                  key: {{ .Values.sources.s3.existingSecretAccessKeyKey | default "access-key" }}
            - name: SOURCE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastmcp-server.s3SecretName" . }}
                  key: {{ .Values.sources.s3.existingSecretSecretKeyKey | default "secret-key" }}
            {{- end }}
            {{- if .Values.sources.git.enabled }}
            - name: SOURCE_GIT_ENABLED
              value: "true"
            - name: SOURCE_GIT_REPOSITORY
              value: {{ .Values.sources.git.repository | quote }}
            - name: SOURCE_GIT_BRANCH
              value: {{ .Values.sources.git.branch | quote }}
            {{- with .Values.sources.git.path }}
            - name: SOURCE_GIT_PATH
              value: {{ . | quote }}
            {{- end }}
            {{- if or .Values.sources.git.token .Values.sources.git.existingSecret }}
            - name: SOURCE_GIT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fastmcp-server.gitSecretName" . }}
                  key: {{ .Values.sources.git.existingSecretTokenKey | default "token" }}
            {{- end }}
            {{- end }}
            {{- if .Values.extraPipPackages }}
            - name: EXTRA_PIP_PACKAGES
              value: {{ join "," .Values.extraPipPackages | quote }}
            {{- end }}
            {{- if (include "fastmcp-server.hasAnyInline" .) }}
            - name: SOURCE_INLINE_DIR
              value: /app/inline
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.httpGet.path }}
              port: {{ .Values.probes.startup.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.httpGet.path }}
              port: {{ .Values.probes.liveness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.httpGet.path }}
              port: {{ .Values.probes.readiness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /app/workspace
            {{- if (include "fastmcp-server.hasInlineTools" .) }}
            - name: inline-tools
              mountPath: /app/inline/tools
              readOnly: true
            {{- end }}
            {{- if (include "fastmcp-server.hasInlineResources" .) }}
            - name: inline-resources
              mountPath: /app/inline/resources
              readOnly: true
            {{- end }}
            {{- if (include "fastmcp-server.hasInlinePrompts" .) }}
            - name: inline-prompts
              mountPath: /app/inline/prompts
              readOnly: true
            {{- end }}
            {{- if (include "fastmcp-server.hasInlineKnowledge" .) }}
            - name: inline-knowledge
              mountPath: /app/inline/knowledge
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: workspace
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "fastmcp-server.claimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if (include "fastmcp-server.hasInlineTools" .) }}
        - name: inline-tools
          configMap:
            name: {{ include "fastmcp-server.fullname" . }}-tools
        {{- end }}
        {{- if (include "fastmcp-server.hasInlineResources" .) }}
        - name: inline-resources
          configMap:
            name: {{ include "fastmcp-server.fullname" . }}-resources
        {{- end }}
        {{- if (include "fastmcp-server.hasInlinePrompts" .) }}
        - name: inline-prompts
          configMap:
            name: {{ include "fastmcp-server.fullname" . }}-prompts
        {{- end }}
        {{- if (include "fastmcp-server.hasInlineKnowledge" .) }}
        - name: inline-knowledge
          configMap:
            name: {{ include "fastmcp-server.fullname" . }}-knowledge
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
