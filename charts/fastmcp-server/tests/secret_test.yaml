suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should not render when auth is none and no sources
    asserts:
      - hasDocuments:
          count: 0

  - it: should render auth secret for bearer
    set:
      auth:
        type: bearer
        bearer:
          token: my-secret-token
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-auth
      - equal:
          path: stringData.token
          value: my-secret-token

  - it: should not render auth secret when using existingSecret
    set:
      auth:
        type: bearer
        bearer:
          token: ignored
          existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render admin secret when adminToken is set
    set:
      auth:
        adminToken: admin-secret-token
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-admin
        documentIndex: 0
      - equal:
          path: stringData.admin-token
          value: admin-secret-token
        documentIndex: 0

  - it: should render auth secret for multi bearer provider
    set:
      auth:
        type: multi
        providers:
          - bearer
          - jwt
        bearer:
          token: my-secret-token
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-auth
        documentIndex: 0

  - it: should render JWT public key secret
    set:
      auth:
        type: jwt
        jwt:
          publicKey: jwt-secret
          algorithm: HS256
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-jwt
        documentIndex: 0
      - equal:
          path: stringData.public-key
          value: jwt-secret
        documentIndex: 0

  - it: should render S3 secret when enabled
    set:
      sources:
        s3:
          enabled: true
          bucket: test
          accessKey: AKID
          secretKey: SKEY
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-s3
        documentIndex: 0

  - it: should not render S3 secret when using existingSecret
    set:
      sources:
        s3:
          enabled: true
          bucket: test
          existingSecret: my-s3-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render Git secret when token is set
    set:
      sources:
        git:
          enabled: true
          repository: "https://github.com/example/tools.git"
          token: example-git-token
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-git
        documentIndex: 0

  - it: should render OCI secret when credentials are set
    set:
      sources:
        oci:
          enabled: true
          registry: "oci://registry.example.com/mcp"
          username: user
          password: pass
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server-oci
        documentIndex: 0
      - equal:
          path: stringData.username
          value: user
        documentIndex: 0
