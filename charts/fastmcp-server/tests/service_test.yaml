suite: service
templates:
  - templates/service.yaml
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 8000
    asserts:
      - equal:
          path: spec.ports[0]
          value:
            name: http
            port: 8000
            targetPort: http
            protocol: TCP

  - it: should use correct selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            app.kubernetes.io/name: fastmcp-server
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should have helmforge labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/part-of: helmforge

  - it: should support custom service type
    set:
      service:
        type: LoadBalancer
    asserts:
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: should support annotations
    set:
      service:
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: nlb
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            service.beta.kubernetes.io/aws-load-balancer-type: nlb
