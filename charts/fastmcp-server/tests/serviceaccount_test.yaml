suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should not render when create is false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when create is true
    set:
      serviceAccount:
        create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should support namespace override
    set:
      namespaceOverride: fastmcp-runtime
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime

  - it: should use custom name
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set annotations
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::role/test
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            eks.amazonaws.com/role-arn: arn:aws:iam::role/test
