suite: namespace override
templates:
  - templates/configmap-tools.yaml
  - templates/configmap-resources.yaml
  - templates/configmap-prompts.yaml
  - templates/configmap-knowledge.yaml
  - templates/secret.yaml
  - templates/pvc.yaml
  - templates/hpa.yaml
  - templates/pdb.yaml
  - templates/ingress.yaml
  - templates/networkpolicy.yaml
  - templates/servicemonitor.yaml
tests:
  - it: should place optional namespaced resources in the override namespace
    set:
      namespaceOverride: fastmcp-runtime
      sources:
        inline:
          tools:
            tool.py: "def run(): return 'ok'"
          resources:
            resource.py: "RESOURCE_URI = 'test://resource'"
          prompts:
            prompt.py: "def prompt(): return 'ok'"
          knowledge:
            doc.md: "hello"
        s3:
          enabled: true
          bucket: tools
          accessKey: AKID
          secretKey: SKEY
        git:
          enabled: true
          repository: "https://github.com/example/tools.git"
          token: ghp_test
      auth:
        type: bearer
        bearer:
          token: secret
      persistence:
        enabled: true
      autoscaling:
        enabled: true
      pdb:
        enabled: true
      ingress:
        enabled: true
        hosts:
          - host: mcp.example.com
      networkPolicy:
        enabled: true
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/configmap-tools.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/configmap-resources.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/configmap-prompts.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/configmap-knowledge.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/secret.yaml
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/secret.yaml
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/secret.yaml
        documentIndex: 2
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/pvc.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/hpa.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/pdb.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/ingress.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/networkpolicy.yaml
      - equal:
          path: metadata.namespace
          value: fastmcp-runtime
        template: templates/servicemonitor.yaml
