suite: deployment
templates:
  - templates/deployment.yaml
tests:
  - it: should render a Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server

  - it: should set MCP_SERVER_NAME env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_SERVER_NAME
            value: "fastmcp-server"

  - it: should set MCP_PORT env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_PORT
            value: "8000"

  - it: should set MCP_PATH env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_PATH
            value: "/mcp"

  - it: should set server runtime env defaults
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_SERVER_VERSION
            value: "0.11.0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ENV
            value: "dev"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_HOST
            value: "0.0.0.0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_WORKSPACE
            value: "/app/workspace"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ON_DUPLICATE_TOOLS
            value: "warn"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_SOURCE_FILE_SIZE_BYTES
            value: "1048576"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_KNOWLEDGE_BYTES
            value: "10485760"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ALLOWED_KNOWLEDGE_EXTENSIONS
            value: ".md,.txt,.json,.yaml,.yml,.html,.htm,.csv,.xml"

  - it: should set optional server runtime env values when configured
    set:
      server:
        version: "0.12.0"
        environment: production
        host: "127.0.0.1"
        workspace: /custom/workspace
        maskErrorDetails: true
        onDuplicateTools: error
        corsAllowedOrigins:
          - https://mcp.example.com
          - https://ui.example.com
        maxSourceFileSizeBytes: 2097152
        maxKnowledgeBytes: 31457280
        allowedKnowledgeExtensions:
          - .md
          - .json
      sources:
        blockedFileAllowlist:
          - knowledge/private-config.example
      auth:
        allowNoAuth: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_SERVER_VERSION
            value: "0.12.0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ENV
            value: "production"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_HOST
            value: "127.0.0.1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_WORKSPACE
            value: "/custom/workspace"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MASK_ERROR_DETAILS
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ON_DUPLICATE_TOOLS
            value: "error"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_CORS_ALLOWED_ORIGINS
            value: "https://mcp.example.com,https://ui.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_SOURCE_FILE_SIZE_BYTES
            value: "2097152"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_KNOWLEDGE_BYTES
            value: "31457280"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ALLOWED_KNOWLEDGE_EXTENSIONS
            value: ".md,.json"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_BLOCKED_FILE_ALLOWLIST
            value: "knowledge/private-config.example"
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: workspace
            mountPath: "/custom/workspace"

  - it: should not set mask error details env by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MASK_ERROR_DETAILS
          any: true

  - it: should expose http port 8000
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0]
          value:
            name: http
            containerPort: 8000
            protocol: TCP

  - it: should have probes by default
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should use new health endpoints for probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /startupz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz

  - it: should have helmforge labels
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/part-of: helmforge
            app.kubernetes.io/name: fastmcp-server
            app.kubernetes.io/instance: RELEASE-NAME

  - it: should use workspace emptyDir by default
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workspace
            emptyDir: {}

  - it: should use PVC when persistence enabled
    set:
      persistence:
        enabled: true
        size: 2Gi
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workspace
            persistentVolumeClaim:
              claimName: RELEASE-NAME-fastmcp-server-workspace

  - it: should not set auth env when auth is none
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_TYPE
          any: true

  - it: should set bearer auth env
    set:
      auth:
        type: bearer
        bearer:
          token: test-token
    templates:
      - templates/deployment.yaml
      - templates/secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_TYPE
            value: "bearer"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-fastmcp-server-auth
                key: token
        template: templates/deployment.yaml

  - it: should set multi auth, scopes, and JWT env vars
    set:
      auth:
        type: multi
        allowNoAuth: true
        scopes:
          - mcp:read
          - mcp:admin
        requiredScopes:
          - mcp:read
        clientId: ci-client
        providers:
          - bearer
          - jwt
        reloadRequiredScopes:
          - mcp:admin
        requireHumanApprovalForDestructive: false
        bearer:
          token: test-token
        jwt:
          issuer: https://auth.example.com
          audience: fastmcp
          jwksUri: https://auth.example.com/jwks.json
          publicKey: jwt-secret
          algorithm: HS256
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_TYPE
            value: "multi"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_PROVIDERS
            value: "bearer,jwt"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_SCOPES
            value: "mcp:read,mcp:admin"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_REQUIRED_SCOPES
            value: "mcp:read"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_CLIENT_ID
            value: "ci-client"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ALLOW_NO_AUTH
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_REQUIRE_HUMAN_APPROVAL_FOR_DESTRUCTIVE
            value: "false"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_RELOAD_REQUIRED_SCOPES
            value: "mcp:admin"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_JWT_ALGORITHM
            value: "HS256"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_AUTH_JWT_PUBLIC_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-fastmcp-server-jwt
                key: public-key

  - it: should set S3 env vars when enabled
    set:
      sources:
        s3:
          enabled: true
          endpoint: "https://minio.local"
          bucket: tools
          region: us-east-1
          include:
            - tools/**
          exclude:
            - "**/*.tmp"
          syncInterval: 60
          accessKey: admin
          secretKey: secret
    templates:
      - templates/deployment.yaml
      - templates/secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_S3_ENABLED
            value: "true"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_S3_BUCKET
            value: "tools"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_S3_INCLUDE
            value: "tools/**"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_S3_SYNC_INTERVAL
            value: "60"
        template: templates/deployment.yaml

  - it: should set Git env vars when enabled
    set:
      sources:
        git:
          enabled: true
          repository: "https://github.com/example/tools.git"
          branch: main
          username: git-user
          allowedRepositories:
            - https://github.com/example/*
          allowedBranches:
            - main
          include:
            - tools/**
          exclude:
            - "**/*.tmp"
          syncInterval: 120
          token: example-git-token
    templates:
      - templates/deployment.yaml
      - templates/secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_GIT_ENABLED
            value: "true"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_GIT_REPOSITORY
            value: "https://github.com/example/tools.git"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_GIT_USERNAME
            value: "git-user"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_GIT_ALLOWED_REPOSITORIES
            value: "https://github.com/example/*"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_GIT_SYNC_INTERVAL
            value: "120"
        template: templates/deployment.yaml

  - it: should set OCI source env vars when enabled
    set:
      sources:
        oci:
          enabled: true
          registry: "oci://registry.example.com/mcp"
          tag: "1.0.0"
          username: user
          password: pass
          include:
            - tools/**
          exclude:
            - "**/*.tmp"
    templates:
      - templates/deployment.yaml
      - templates/secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_OCI_ENABLED
            value: "true"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_OCI_REGISTRY
            value: "oci://registry.example.com/mcp"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_OCI_TAG
            value: "1.0.0"
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_OCI_USERNAME
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-fastmcp-server-oci
                key: username
        template: templates/deployment.yaml

  - it: should mount inline tools when configured
    set:
      sources:
        inline:
          tools:
            greet.py: |
              def greet(): return "hi"
    templates:
      - templates/deployment.yaml
      - templates/configmap-tools.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: inline-tools
            mountPath: /app/inline/tools
            readOnly: true
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: inline-tools
            configMap:
              name: RELEASE-NAME-fastmcp-server-tools
        template: templates/deployment.yaml

  - it: should not mount inline volumes when empty
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: inline-tools
          any: true

  - it: should support custom inline directory and hot reload
    set:
      hotReload:
        enabled: true
      sources:
        inline:
          dir: /custom/inline
          tools:
            greet.py: |
              def greet(): return "hi"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_HOT_RELOAD
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SOURCE_INLINE_DIR
            value: "/custom/inline"
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: inline-tools
            mountPath: "/custom/inline/tools"
            readOnly: true

  - it: should set gateway and visibility env vars
    set:
      gateway:
        enabled: true
        mountServers:
          remote:
            transport: streamable-http
            url: https://remote.example.com/mcp
            namespace: remote
      visibility:
        mode: allowlist
        enableTags:
          - public
        disableTags:
          - admin
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MODE
            value: "gateway"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MOUNT_SERVERS
            value: '{"remote":{"namespace":"remote","transport":"streamable-http","url":"https://remote.example.com/mcp"}}'
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_VISIBILITY_MODE
            value: "allowlist"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_ENABLE_TAGS
            value: "public"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_DISABLE_TAGS
            value: "admin"

  - it: should set EXTRA_PIP_PACKAGES when configured
    set:
      extraPipPackages:
        - requests
        - pandas
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXTRA_PIP_PACKAGES
            value: "requests,pandas"

  - it: should set custom server name
    set:
      server:
        name: my-mcp
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_SERVER_NAME
            value: "my-mcp"

  - it: should set resources when configured
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  - it: should set serviceAccountName when SA is created
    set:
      serviceAccount:
        create: true
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: RELEASE-NAME-fastmcp-server

  - it: should disable service account token automount by default
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  # --- v0.4.0: New features ---

  - it: should enable UI by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_UI_ENABLED
            value: "true"

  - it: should disable UI when configured
    set:
      ui:
        enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_UI_ENABLED
            value: "false"

  - it: should set metrics env when enabled
    set:
      metrics:
        enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_METRICS_ENABLED
            value: "true"

  - it: should not set metrics env by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_METRICS_ENABLED
          any: true

  - it: should set LOG_FORMAT env
    set:
      server:
        logFormat: json
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_FORMAT
            value: "json"

  - it: should set strict loading env when enabled
    set:
      server:
        strictLoading: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_STRICT_LOADING
            value: "true"

  - it: should not have init container by default
    asserts:
      - isNull:
          path: spec.template.spec.initContainers

  - it: should add init container when initSync enabled
    set:
      initSync:
        enabled: true
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: source-sync
      - equal:
          path: spec.template.spec.initContainers[0].command
          value: ["python", "/app/sync_only.py"]

  - it: should pass runtime source safety env to init container
    set:
      initSync:
        enabled: true
      server:
        workspace: /custom/workspace
        maxSourceFileSizeBytes: 2097152
      sources:
        blockedFileAllowlist:
          - knowledge/private-config.example
    asserts:
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: MCP_WORKSPACE
            value: "/custom/workspace"
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: MCP_MAX_SOURCE_FILE_SIZE_BYTES
            value: "2097152"
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: SOURCE_BLOCKED_FILE_ALLOWLIST
            value: "knowledge/private-config.example"
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: workspace
            mountPath: "/custom/workspace"

  # --- v1.0.0: Production features ---

  - it: should set rate limit default env
    set:
      rateLimiting:
        default: "100/min"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_RATE_LIMIT_DEFAULT
            value: "100/min"

  - it: should set per-tool rate limit env
    set:
      rateLimiting:
        perTool:
          DEPLOY: "5/min"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_RATE_LIMIT_DEPLOY
            value: "5/min"

  - it: should disable caching via env
    set:
      caching:
        enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_CACHE_ENABLED
            value: "false"

  - it: should set cache max size env
    set:
      caching:
        maxSize: 500
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_CACHE_MAX_SIZE
            value: "500"

  - it: should set sandboxing memory limit env
    set:
      sandboxing:
        maxMemoryMb: 256
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_MEMORY_MB
            value: "256"

  - it: should set sandboxing output limit env
    set:
      sandboxing:
        maxOutputSizeKb: 100
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MCP_MAX_OUTPUT_SIZE_KB
            value: "100"

  - it: should use replicaCount when autoscaling disabled
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should not set replicas when autoscaling enabled
    set:
      autoscaling:
        enabled: true
    asserts:
      - isNull:
          path: spec.replicas
