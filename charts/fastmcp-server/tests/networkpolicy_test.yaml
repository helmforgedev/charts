# SPDX-License-Identifier: Apache-2.0
suite: networkpolicy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fastmcp-server

  - it: should allow ingress on server port
    set:
      networkPolicy:
        enabled: true
      server:
        port: 8000
    asserts:
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 8000

  - it: should render extra egress rules
    set:
      networkPolicy:
        enabled: true
        extraEgress:
          - to:
              - ipBlock:
                  cidr: 10.0.0.0/8
            ports:
              - protocol: TCP
                port: 443
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.0.0.0/8
            ports:
              - protocol: TCP
                port: 443

  - it: should have correct pod selector
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isSubset:
          path: spec.podSelector.matchLabels
          content:
            app.kubernetes.io/name: fastmcp-server
            app.kubernetes.io/instance: RELEASE-NAME
