suite: notes
templates:
  - templates/NOTES.txt
tests:
  - it: should use namespace override in port-forward command
    set:
      namespaceOverride: fastmcp-runtime
    asserts:
      - matchRegexRaw:
          pattern: "kubectl port-forward svc/RELEASE-NAME-fastmcp-server 8000:8000 -n fastmcp-runtime"
