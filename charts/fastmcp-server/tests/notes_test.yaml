# SPDX-License-Identifier: Apache-2.0

suite: notes
templates:
  - templates/NOTES.txt
tests:
  - it: should use namespace override in port-forward command
    set:
      namespaceOverride: fastmcp-runtime
    asserts:
      - matchRegexRaw:
          pattern: "kubectl port-forward svc/RELEASE-NAME-fastmcp-server 8000:8000 -n fastmcp-runtime"

  - it: should not derive Gateway API route scheme from ingress TLS
    set:
      ingress.tls:
        - hosts:
            - mcp.example.com
          secretName: mcp-tls
      gatewayAPI:
        enabled: true
        parentRefs:
          - name: public-gateway
        hostnames:
          - mcp.example.com
    asserts:
      - matchRegexRaw:
          pattern: "http://mcp.example.com/mcp"
      - notMatchRegexRaw:
          pattern: "https://mcp.example.com/mcp"
