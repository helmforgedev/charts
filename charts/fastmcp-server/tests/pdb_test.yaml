suite: pdb
templates:
  - templates/pdb.yaml
tests:
  - it: should not create PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB when enabled
    set:
      pdb:
        enabled: true
        minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should set custom minAvailable
    set:
      pdb:
        enabled: true
        minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
