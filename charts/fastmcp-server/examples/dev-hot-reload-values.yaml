# Development hot reload example.
# Use case: local iteration with inline ConfigMaps and hot reload enabled.

server:
  environment: dev
  logLevel: DEBUG

hotReload:
  enabled: true

sources:
  inline:
    dir: /app/inline
    tools:
      greet.py: |
        def greet(name: str) -> str:
            return f"Hello, {name}!"
    knowledge:
      overview.md: |
        # Development Knowledge
        Local development context for FastMCP Server.
