# S3 source with MinIO
# Assumes MinIO is already running in the cluster at minio.minio.svc:9000
# with a bucket "mcp-tools" containing:
#   tools/greet.py
#   resources/status.py
#   prompts/translate.py
#   knowledge/architecture.md

sources:
  s3:
    enabled: true
    endpoint: "http://minio.minio.svc:9000"
    bucket: mcp-tools
    region: us-east-1
    existingSecret: minio-credentials
    existingSecretAccessKeyKey: access-key
    existingSecretSecretKeyKey: secret-key
