# =============================================================================
# FastMCP Server Helm Chart — Default Values
# =============================================================================
# FastMCP server with multi-source tool, resource, prompt, and knowledge loading

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- FastMCP server container image
  repository: docker.io/helmforge/fastmcp-server
  # -- Image tag (pinned to appVersion)
  tag: "0.10.8"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Server Configuration
# =============================================================================

server:
  # -- Server name announced in MCP responses
  name: fastmcp-server
  # -- HTTP port for the MCP endpoint
  port: 8000
  # -- URL path for the MCP endpoint
  path: /mcp
  # -- Log level (DEBUG, INFO, WARNING, ERROR)
  logLevel: INFO
  # -- Log format: text or json (structured logging)
  logFormat: text
  # -- Strict loading: fail on boot if any tool/resource has errors
  strictLoading: false

# =============================================================================
# Web UI
# =============================================================================

ui:
  # -- Enable built-in Web UI at /ui
  enabled: true

# =============================================================================
# Metrics
# =============================================================================

metrics:
  # -- Enable Prometheus metrics at /metrics
  enabled: false
  # -- Create ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# =============================================================================
# Rate Limiting
# =============================================================================

rateLimiting:
  # -- Default rate limit for all tools (e.g., "100/min")
  default: ""
  # -- Per-tool rate limits (key = TOOL_NAME_UPPER, value = rate string)
  perTool: {}
    # DEPLOY: "5/min"
    # DELETE_DATA: "2/min"

# =============================================================================
# Caching
# =============================================================================

caching:
  # -- Enable result caching for tools with __cache_ttl__
  enabled: true
  # -- Maximum cache entries per tool
  maxSize: 1000

# =============================================================================
# Sandboxing
# =============================================================================

sandboxing:
  # -- Default max memory per tool call (MB, 0 = unlimited)
  maxMemoryMb: 0
  # -- Default max output size per tool call (KB, 0 = unlimited)
  maxOutputSizeKb: 0

# =============================================================================
# Authentication
# =============================================================================

auth:
  # -- Authentication type: none, bearer, jwt
  type: none
  bearer:
    # -- Static bearer token for authentication
    token: ""
    # -- Use an existing secret instead of inline token
    existingSecret: ""
    # -- Key in the existing secret containing the token
    existingSecretKey: token
  jwt:
    # -- JWT issuer URL
    issuer: ""
    # -- JWT audience
    audience: ""
    # -- JWKS URI for JWT key verification
    jwksUri: ""

# =============================================================================
# Sources — Inline, S3, Git
# =============================================================================
# Merge precedence: Inline (highest) > S3 > Git (lowest)

sources:
  # -- Inline tools, resources, prompts, and knowledge mounted via ConfigMaps
  inline:
    # -- Python tool files (key = filename, value = file content)
    # -- @default -- `{}` (no inline tools)
    tools: {}
      # greet.py: |
      #   def greet(name: str) -> str:
      #       """Greet someone by name."""
      #       return f"Hello, {name}!"
      # math_ops.py: |
      #   def add(a: float, b: float) -> float:
      #       """Add two numbers."""
      #       return a + b

    # -- Python resource files (key = filename, value = file content)
    # -- @default -- `{}` (no inline resources)
    resources: {}
      # status.py: |
      #   RESOURCE_URI = "status://server"
      #   def get_status() -> dict:
      #       """Server status."""
      #       return {"status": "healthy"}

    # -- Python prompt files (key = filename, value = file content)
    # -- @default -- `{}` (no inline prompts)
    prompts: {}
      # summarize.py: |
      #   def summarize(text: str) -> str:
      #       """Summarize the given text."""
      #       return f"Please summarize:\n\n{text}"

    # -- Knowledge base files (key = filename, value = file content)
    # -- @default -- `{}` (no inline knowledge)
    knowledge: {}
      # overview.md: |
      #   # Product Overview
      #   This is the product overview document.

  # -- S3-compatible storage source (AWS S3, MinIO, Cloudflare R2)
  s3:
    # -- Enable S3 source
    enabled: false
    # -- S3-compatible endpoint URL (leave empty for AWS S3)
    endpoint: ""
    # -- Bucket name
    bucket: ""
    # -- AWS region
    region: us-east-1
    # -- Key prefix inside the bucket
    prefix: ""
    # -- S3 access key (ignored if existingSecret is set)
    accessKey: ""
    # -- S3 secret key (ignored if existingSecret is set)
    secretKey: ""
    # -- Existing secret with S3 credentials
    existingSecret: ""
    # -- Key in existing secret for access key
    existingSecretAccessKeyKey: access-key
    # -- Key in existing secret for secret key
    existingSecretSecretKeyKey: secret-key

  # -- Git repository source
  git:
    # -- Enable Git source
    enabled: false
    # -- Git repository HTTPS URL
    repository: ""
    # -- Branch to clone
    branch: main
    # -- Subdirectory path inside the repo
    path: ""
    # -- Git token for private repos (ignored if existingSecret is set)
    token: ""
    # -- Existing secret with Git token
    existingSecret: ""
    # -- Key in existing secret for Git token
    existingSecretTokenKey: token

# =============================================================================
# Extra Pip Packages
# =============================================================================

# -- Extra pip packages to install at startup (before loading tools)
# -- @default -- `[]`
extraPipPackages: []
  # - requests
  # - pandas

# =============================================================================
# Service
# =============================================================================

service:
  type: ClusterIP
  port: 8000
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for the MCP endpoint
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: mcp.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - mcp.example.com
    #   secretName: mcp-server-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    httpGet:
      path: /startupz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Persistence
# =============================================================================
# Optional PVC for the workspace directory (useful for large knowledge bases
# that persist across restarts instead of re-downloading from S3/Git).

persistence:
  # -- Enable persistent workspace volume
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""

# =============================================================================
# Init Sync
# =============================================================================

initSync:
  # -- Run source sync as an init container before the server starts
  enabled: false

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Network Policy
# =============================================================================

networkPolicy:
  # -- Enable NetworkPolicy
  enabled: false

# =============================================================================
# Resources and Security
# =============================================================================

# =============================================================================
# Pod Disruption Budget
# =============================================================================

pdb:
  # -- Enable PodDisruptionBudget (requires replicas > 1)
  enabled: false
  # -- Minimum available pods during disruption
  minAvailable: 1

# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================

autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage (optional)
  targetMemoryUtilizationPercentage: ""

# =============================================================================
# Replicas (when autoscaling is disabled)
# =============================================================================

replicaCount: 1

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
