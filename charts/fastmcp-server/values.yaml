# =============================================================================
# FastMCP Server Helm Chart — Default Values
# =============================================================================
# FastMCP server with multi-source tool, resource, prompt, and knowledge loading

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- FastMCP server container image
  repository: docker.io/helmforge/fastmcp-server
  # -- Image tag (pinned to appVersion)
  tag: "0.11.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Server Configuration
# =============================================================================

server:
  # -- Server name announced in MCP responses
  name: fastmcp-server
  # -- Server version announced by diagnostics APIs (defaults to Chart appVersion when empty)
  version: ""
  # -- Deployment environment. Production-like values enable stricter runtime defaults in the server.
  environment: dev
  # -- Listen address for the HTTP server
  host: 0.0.0.0
  # -- HTTP port for the MCP endpoint
  port: 8000
  # -- URL path for the MCP endpoint
  path: /mcp
  # -- Workspace directory used to stage synced MCP components
  workspace: /app/workspace
  # -- Log level (DEBUG, INFO, WARNING, ERROR)
  logLevel: INFO
  # -- Log format: text or json (structured logging)
  logFormat: text
  # -- Strict loading: fail on boot if any tool/resource has errors
  strictLoading: false
  # -- Hide internal error details from MCP clients. Empty uses the server runtime default.
  maskErrorDetails: ""
  # -- Duplicate tool handling mode: warn, error, replace, or ignore
  onDuplicateTools: warn
  # -- Comma-separated CORS origins for external UI clients
  corsAllowedOrigins: []
  # -- Maximum size in bytes for any loaded source file; 0 disables
  maxSourceFileSizeBytes: 1048576
  # -- Maximum total loaded knowledge size in bytes; 0 disables
  maxKnowledgeBytes: 10485760
  # -- Knowledge file extensions accepted by the server
  allowedKnowledgeExtensions:
    - .md
    - .txt
    - .json
    - .yaml
    - .yml
    - .html
    - .htm
    - .csv
    - .xml
  # -- Deployment strategy for the server Deployment
  strategy:
    type: Recreate
  # -- Number of old ReplicaSets to retain
  revisionHistoryLimit: 10

# =============================================================================
# Web UI
# =============================================================================

ui:
  # -- Enable built-in Web UI at /ui
  enabled: true

# =============================================================================
# Metrics
# =============================================================================

metrics:
  # -- Enable Prometheus metrics at /metrics
  enabled: false
  # -- Create ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

# =============================================================================
# Rate Limiting
# =============================================================================

rateLimiting:
  # -- Default rate limit for all tools (e.g., "100/min")
  default: ""
  # -- Per-tool rate limits (key = TOOL_NAME_UPPER, value = rate string)
  perTool: {}
    # DEPLOY: "5/min"
    # DELETE_DATA: "2/min"

# =============================================================================
# Caching
# =============================================================================

caching:
  # -- Enable result caching for tools with __cache_ttl__
  enabled: true
  # -- Maximum cache entries per tool
  maxSize: 1000

# =============================================================================
# Sandboxing
# =============================================================================

sandboxing:
  # -- Default max memory per tool call (MB, 0 = unlimited)
  maxMemoryMb: 0
  # -- Default max output size per tool call (KB, 0 = unlimited)
  maxOutputSizeKb: 0

# =============================================================================
# Authentication
# =============================================================================

auth:
  # -- Authentication type: none, bearer, jwt, multi
  type: none
  # -- Explicitly allow no-auth in production-like environments
  allowNoAuth: false
  # -- Scopes granted to the static bearer token
  scopes: []
  # -- Scopes required on every authenticated request
  requiredScopes: []
  # -- Client ID used for bearer-token audit logs
  clientId: bearer-user
  # -- Providers enabled when auth.type is multi
  providers: []
  # -- Scopes required for the /reload endpoint
  reloadRequiredScopes:
    - mcp:admin
  # -- Require human_approved=true for destructive tools
  requireHumanApprovalForDestructive: true
  bearer:
    # -- Static bearer token for authentication
    token: ""
    # -- Use an existing secret instead of inline token
    existingSecret: ""
    # -- Key in the existing secret containing the token
    existingSecretKey: token
  jwt:
    # -- JWT issuer URL
    issuer: ""
    # -- JWT audience
    audience: ""
    # -- JWKS URI for JWT key verification
    jwksUri: ""
    # -- JWT public key or HS* shared secret value (ignored if publicKeyExistingSecret is set)
    publicKey: ""
    # -- Existing secret containing JWT public key or HS* shared secret
    publicKeyExistingSecret: ""
    # -- Key in existing secret containing JWT public key or HS* shared secret
    publicKeyExistingSecretKey: public-key
    # -- JWT algorithm, for example RS256 or HS256
    algorithm: ""

# =============================================================================
# Sources — Inline, S3, Git
# =============================================================================
# Merge precedence: Inline (highest) > S3 > Git (lowest)

sources:
  # -- Explicit allowlist for source files normally blocked by the server safety filter
  blockedFileAllowlist: []

  # -- Inline tools, resources, prompts, and knowledge mounted via ConfigMaps
  inline:
    # -- Inline source directory inside the container
    dir: /app/inline
    # -- Python tool files (key = filename, value = file content)
    # -- @default -- `{}` (no inline tools)
    tools: {}
      # greet.py: |
      #   def greet(name: str) -> str:
      #       """Greet someone by name."""
      #       return f"Hello, {name}!"
      # math_ops.py: |
      #   def add(a: float, b: float) -> float:
      #       """Add two numbers."""
      #       return a + b

    # -- Python resource files (key = filename, value = file content)
    # -- @default -- `{}` (no inline resources)
    resources: {}
      # status.py: |
      #   RESOURCE_URI = "status://server"
      #   def get_status() -> dict:
      #       """Server status."""
      #       return {"status": "healthy"}

    # -- Python prompt files (key = filename, value = file content)
    # -- @default -- `{}` (no inline prompts)
    prompts: {}
      # summarize.py: |
      #   def summarize(text: str) -> str:
      #       """Summarize the given text."""
      #       return f"Please summarize:\n\n{text}"

    # -- Knowledge base files (key = filename, value = file content)
    # -- @default -- `{}` (no inline knowledge)
    knowledge: {}
      # overview.md: |
      #   # Product Overview
      #   This is the product overview document.

  # -- S3-compatible storage source (AWS S3, MinIO, Cloudflare R2)
  s3:
    # -- Enable S3 source
    enabled: false
    # -- S3-compatible endpoint URL (leave empty for AWS S3)
    endpoint: ""
    # -- Bucket name
    bucket: ""
    # -- AWS region
    region: us-east-1
    # -- Key prefix inside the bucket
    prefix: ""
    # -- S3 access key (ignored if existingSecret is set)
    accessKey: ""
    # -- S3 secret key (ignored if existingSecret is set)
    secretKey: ""
    # -- Existing secret with S3 credentials
    existingSecret: ""
    # -- Key in existing secret for access key
    existingSecretAccessKeyKey: access-key
    # -- Key in existing secret for secret key
    existingSecretSecretKeyKey: secret-key
    # -- Include glob patterns within each asset directory
    include: []
    # -- Exclude glob patterns within each asset directory
    exclude: []
    # -- Background sync interval in seconds; 0 disables periodic sync
    syncInterval: 0

  # -- Git repository source
  git:
    # -- Enable Git source
    enabled: false
    # -- Git repository HTTPS URL
    repository: ""
    # -- Branch to clone
    branch: main
    # -- Subdirectory path inside the repo
    path: ""
    # -- Git token for private repos (ignored if existingSecret is set)
    token: ""
    # -- Existing secret with Git token
    existingSecret: ""
    # -- Key in existing secret for Git token
    existingSecretTokenKey: token
    # -- Username used by the temporary Git askpass helper
    username: x-access-token
    # -- Allowed repository URL patterns
    allowedRepositories: []
    # -- Allowed branch name patterns
    allowedBranches: []
    # -- Include glob patterns within each asset directory
    include: []
    # -- Exclude glob patterns within each asset directory
    exclude: []
    # -- Background sync interval in seconds; 0 disables periodic sync
    syncInterval: 0

  # -- OCI artifact source
  oci:
    # -- Enable OCI source
    enabled: false
    # -- OCI artifact reference without tag
    registry: ""
    # -- OCI artifact tag
    tag: ""
    # -- Registry username (ignored if existingSecret is set)
    username: ""
    # -- Registry password (ignored if existingSecret is set)
    password: ""
    # -- Existing secret with OCI credentials
    existingSecret: ""
    # -- Key in existing secret for OCI username
    existingSecretUsernameKey: username
    # -- Key in existing secret for OCI password
    existingSecretPasswordKey: password
    # -- Include glob patterns within each asset directory
    include: []
    # -- Exclude glob patterns within each asset directory
    exclude: []

# =============================================================================
# Hot Reload
# =============================================================================

hotReload:
  # -- Watch inline Python files and rebuild components automatically
  enabled: false

# =============================================================================
# Gateway
# =============================================================================

gateway:
  # -- Run in gateway mode and mount remote MCP servers
  enabled: false
  # -- Structured remote MCP server mounts rendered as MCP_MOUNT_SERVERS JSON
  mountServers: {}
    # remote:
    #   transport: streamable-http
    #   url: https://remote.example.com/mcp
  # -- Raw MCP_MOUNT_SERVERS JSON override. When set, mountServers is ignored.
  rawMountServersJson: ""

# =============================================================================
# Visibility
# =============================================================================

visibility:
  # -- Visibility mode: blocklist or allowlist
  mode: blocklist
  # -- Tags to expose when using allowlist mode
  enableTags: []
  # -- Tags to hide when using blocklist mode
  disableTags: []

# =============================================================================
# Extra Pip Packages
# =============================================================================

# -- Extra pip packages to install at startup (before loading tools)
# -- @default -- `[]`
extraPipPackages: []
  # - requests
  # - pandas

# =============================================================================
# Service
# =============================================================================

service:
  type: ClusterIP
  port: 8000
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for the MCP endpoint
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: mcp.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - mcp.example.com
    #   secretName: mcp-server-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    httpGet:
      path: /startupz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Persistence
# =============================================================================
# Optional PVC for the workspace directory (useful for large knowledge bases
# that persist across restarts instead of re-downloading from S3/Git).

persistence:
  # -- Enable persistent workspace volume
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""

# =============================================================================
# Init Sync
# =============================================================================

initSync:
  # -- Run source sync as an init container before the server starts
  enabled: false

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Automount the Kubernetes service account token
  automountServiceAccountToken: false

# =============================================================================
# Network Policy
# =============================================================================

networkPolicy:
  # -- Enable NetworkPolicy
  enabled: false
  # -- Ingress rules. Empty allows TCP traffic to server.port from all sources.
  ingress: []
  # -- Egress rules. Empty allows all egress when networkPolicy.enabled is true.
  egress: []

# =============================================================================
# Resources and Security
# =============================================================================

# =============================================================================
# Pod Disruption Budget
# =============================================================================

pdb:
  # -- Enable PodDisruptionBudget (requires replicas > 1)
  enabled: false
  # -- Minimum available pods during disruption
  minAvailable: 1

# =============================================================================
# Horizontal Pod Autoscaler
# =============================================================================

autoscaling:
  # -- Enable HPA
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target memory utilization percentage (optional)
  targetMemoryUtilizationPercentage: ""

# =============================================================================
# Replicas (when autoscaling is disabled)
# =============================================================================

replicaCount: 1

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  readOnlyRootFilesystem: false

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
