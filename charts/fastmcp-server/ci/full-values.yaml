# SPDX-License-Identifier: Apache-2.0
# CI: production-style k3d-safe values without unreachable external sources
server:
  name: full-test-server
  logLevel: DEBUG

auth:
  type: bearer
  bearer:
    token: ci-test-token-full

sources:
  inline:
    tools:
      greet.py: |
        def greet(name: str) -> str:
            """Greet someone."""
            return f"Hello, {name}!"
    knowledge:
      docs.md: |
        # Documentation
        Full test documentation.

extraPipPackages:
  - requests
  - pandas

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - mcp.example.com
      secretName: mcp-tls

persistence:
  enabled: true
  size: 5Gi

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::role/mcp-server

networkPolicy:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
