auth:
  type: multi
  providers:
    - bearer
    - jwt
  scopes:
    - tools:read
    - tools:execute
  requiredScopes:
    - tools:execute
  adminExistingSecret: fastmcp-admin
  bearer:
    existingSecret: fastmcp-auth
  jwt:
    issuer: "https://auth.example.com"
    audience: "fastmcp-server"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"

sources:
  inline:
    tools:
      hello.py: |
        def hello() -> str:
            return "hello"
