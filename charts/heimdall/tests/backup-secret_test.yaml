suite: backup-secret
templates:
  - templates/backup-secret.yaml
tests:
  - it: should not render when backup is disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when backup is enabled with inline credentials
    set:
      backup.enabled: true
      backup.s3.accessKey: AKIATEST
      backup.s3.secretKey: secrettest
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.access-key
          value: AKIATEST

  - it: should not render when using existing secret
    set:
      backup.enabled: true
      backup.s3.accessKey: AKIATEST
      backup.s3.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
