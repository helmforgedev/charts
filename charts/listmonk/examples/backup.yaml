# PostgreSQL backup CronJob using existing S3-compatible credentials.

backup:
  enabled: true
  schedule: "0 3 * * *"
  archivePrefix: listmonk
  s3:
    endpoint: https://s3.amazonaws.com
    bucket: listmonk-backups
    prefix: listmonk
    existingSecret: listmonk-s3-credentials
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
