# Listmonk connected to an externally managed PostgreSQL database.

postgresql:
  enabled: false

database:
  mode: external
  external:
    host: postgres.example.com
    port: 5432
    name: listmonk
    username: listmonk
    existingSecret: listmonk-db-credentials
    existingSecretPasswordKey: database-password
    sslMode: require

storage:
  enabled: true
  size: 10Gi
