# SPDX-License-Identifier: Apache-2.0
# Bundled PostgreSQL with persistent uploads for a private Listmonk install.

replicaCount: 1

storage:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

postgresql:
  enabled: true
  standalone:
    persistence:
      enabled: true
      size: 8Gi
