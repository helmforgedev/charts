# CI: external PostgreSQL database
postgresql:
  enabled: false

database:
  mode: external
  external:
    host: listmonk-external-postgres
    port: 5432
    name: listmonk
    username: listmonk
    password: changeme
    sslMode: disable

extraManifests:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: listmonk-external-postgres
      labels:
        app.kubernetes.io/name: listmonk-external-postgres
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: listmonk-external-postgres
      template:
        metadata:
          labels:
            app.kubernetes.io/name: listmonk-external-postgres
        spec:
          containers:
            - name: postgres
              image: docker.io/library/postgres:17-alpine
              ports:
                - name: postgres
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: listmonk
                - name: POSTGRES_USER
                  value: listmonk
                - name: POSTGRES_PASSWORD
                  value: changeme
              readinessProbe:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - listmonk
                    - -d
                    - listmonk
                initialDelaySeconds: 5
                periodSeconds: 5
  - apiVersion: v1
    kind: Service
    metadata:
      name: listmonk-external-postgres
      labels:
        app.kubernetes.io/name: listmonk-external-postgres
    spec:
      ports:
        - name: postgres
          port: 5432
          targetPort: postgres
      selector:
        app.kubernetes.io/name: listmonk-external-postgres
