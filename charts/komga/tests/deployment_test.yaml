suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-komga

  - it: should use default image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/gotson/komga:1.24.4"

  - it: should set container port to 25600
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 25600

  - it: should set SERVER_PORT env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_PORT
            value: "25600"

  - it: should set TZ env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: "UTC"

  - it: should set context path env
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SERVER_SERVLET_CONTEXTPATH
            value: "/"

  - it: should not set JAVA_TOOL_OPTIONS by default
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_TOOL_OPTIONS
            value: ""
          any: true

  - it: should set JAVA_TOOL_OPTIONS when javaToolOptions is set
    set:
      komga.javaToolOptions: "-Xmx2g -XX:+UseG1GC"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_TOOL_OPTIONS
            value: "-Xmx2g -XX:+UseG1GC"

  - it: should set JAVA_TOOL_OPTIONS when deprecated javaMemory is set
    set:
      komga.javaMemory: "-Xmx2g"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_TOOL_OPTIONS
            value: "-Xmx2g"

  - it: should prefer javaToolOptions over deprecated javaMemory
    set:
      komga.javaToolOptions: "-Xmx2g -XX:+UseG1GC"
      komga.javaMemory: "-Xmx1g"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JAVA_TOOL_OPTIONS
            value: "-Xmx2g -XX:+UseG1GC"

  - it: should mount config and data volumes
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should use PVC for config volume
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: test-komga-config

  - it: should use PVC for data volume
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-komga-data

  - it: should use emptyDir when config persistence disabled
    set:
      persistence.config.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            emptyDir: {}

  - it: should use emptyDir when data persistence disabled
    set:
      persistence.data.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should use existingClaim for config
    set:
      persistence.config.existingClaim: my-config-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            persistentVolumeClaim:
              claimName: my-config-pvc

  - it: should render startup probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /

  - it: should render liveness probe
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /

  - it: should set custom timezone
    set:
      komga.timezone: "Europe/London"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: "Europe/London"

  - it: should render extra env vars
    set:
      komga.extraEnv:
        - name: KOMGA_CORS_ALLOWEDORIGINS
          value: "http://localhost:8080"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KOMGA_CORS_ALLOWEDORIGINS
            value: "http://localhost:8080"

  - it: should set custom image tag
    set:
      image.tag: "1.20.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/gotson/komga:1.20.0"
