suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup S3 secret when backup enabled with inline keys
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-komga-backup-s3

  - it: should not render backup secret when existingSecret set
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: my-s3-secret
    asserts:
      - hasDocuments:
          count: 0
