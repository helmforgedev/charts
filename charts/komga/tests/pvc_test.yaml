suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render config PVC by default
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-komga-config
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi

  - it: should render data PVC by default
    documentIndex: 1
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-komga-data
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: should not render config PVC when disabled
    set:
      persistence.config.enabled: false
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-komga-data

  - it: should not render config PVC when existingClaim set
    set:
      persistence.config.existingClaim: my-config
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-komga-data

  - it: should not render any PVC when both disabled
    set:
      persistence.config.enabled: false
      persistence.data.enabled: false
    asserts:
      - hasDocuments:
          count: 0
