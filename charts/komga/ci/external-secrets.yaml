# CI scenario: External Secrets Operator integration (GR-061)
# Renders the ExternalSecret manifest for backup S3 credentials
externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: access-key
      remoteRef:
        key: komga/backup
        property: access-key
    - secretKey: secret-key
      remoteRef:
        key: komga/backup
        property: secret-key
