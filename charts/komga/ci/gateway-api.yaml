# CI scenario: Gateway API HTTPRoute opt-in (GR-060)
# Renders the HTTPRoute manifest without requiring a live Gateway controller
gateway:
  enabled: true
  parentRefs:
    - name: envoy
      namespace: envoy-gateway
  hostnames:
    - komga.example.com
  path: /
  pathType: PathPrefix
