{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "komga.fullname" . }}-backup-scripts
  labels:
    {{- include "komga.labels" . | nindent 4 }}
data:
  sqlite-backup.sh: |
    #!/bin/sh
    set -e
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    ARCHIVE="/backup/{{ .Values.backup.archivePrefix }}-${TIMESTAMP}.tar.gz"
    echo "Creating SQLite backup archive..."
    tar -czf "${ARCHIVE}" -C /config .
    echo "Archive created: ${ARCHIVE}"
  upload-backup.sh: |
    #!/bin/sh
    set -e
    ARCHIVE=$(ls -t /backup/*.tar.gz 2>/dev/null | head -1)
    if [ -z "${ARCHIVE}" ]; then
      echo "No backup archive found"; exit 1
    fi
    mc alias set s3 "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    {{- if .Values.backup.s3.createBucketIfNotExists }}
    mc mb --ignore-existing "s3/${S3_BUCKET}"
    {{- end }}
    mc cp "${ARCHIVE}" "s3/${S3_BUCKET}/${S3_PREFIX}/$(basename "${ARCHIVE}")"
    echo "Upload complete: $(basename "${ARCHIVE}")"
{{- end }}
