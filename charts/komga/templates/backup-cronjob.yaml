{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "komga.fullname" . }}-backup
  labels:
    {{- include "komga.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  suspend: {{ .Values.backup.suspend }}
  concurrencyPolicy: {{ .Values.backup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backup.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "komga.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: sqlite-backup
              image: "{{ .Values.backup.images.sqlite.repository }}:{{ .Values.backup.images.sqlite.tag }}"
              imagePullPolicy: {{ .Values.backup.images.sqlite.pullPolicy }}
              command: ["/bin/sh", "/scripts/sqlite-backup.sh"]
              {{- with .Values.backup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: backup-scratch
                  mountPath: /backup
                - name: scripts
                  mountPath: /scripts
          containers:
            - name: upload
              image: "{{ .Values.backup.images.uploader.repository }}:{{ .Values.backup.images.uploader.tag }}"
              imagePullPolicy: {{ .Values.backup.images.uploader.pullPolicy }}
              command: ["/bin/sh", "/scripts/upload-backup.sh"]
              env:
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3.bucket | quote }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3.prefix | quote }}
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "komga.backupSecretName" . }}
                      key: {{ include "komga.backupSecretAccessKeyKey" . }}
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "komga.backupSecretName" . }}
                      key: {{ include "komga.backupSecretSecretKeyKey" . }}
              {{- with .Values.backup.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              volumeMounts:
                - name: backup-scratch
                  mountPath: /backup
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: config
              persistentVolumeClaim:
                claimName: {{ include "komga.configClaimName" . }}
            - name: backup-scratch
              emptyDir: {}
            - name: scripts
              configMap:
                name: {{ include "komga.fullname" . }}-backup-scripts
                defaultMode: 0755
{{- end }}
