suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: should not render when persistence disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PVC when enabled
    set:
      persistence:
        enabled: true
        size: 2Gi
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mcp-server-workspace

  - it: should set storage size
    set:
      persistence:
        enabled: true
        size: 5Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: should set storage class
    set:
      persistence:
        enabled: true
        size: 1Gi
        storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: should not render when using existingClaim
    set:
      persistence:
        enabled: true
        existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should have helmforge labels
    set:
      persistence:
        enabled: true
        size: 1Gi
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/part-of: helmforge
