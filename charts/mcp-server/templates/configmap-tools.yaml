{{- if (include "mcp-server.hasInlineTools" .) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-server.fullname" . }}-tools
  labels:
    {{- include "mcp-server.labels" . | nindent 4 }}
data:
  {{- range $filename, $content := .Values.sources.inline.tools }}
  {{ $filename }}: |
    {{- $content | nindent 4 }}
  {{- end }}
{{- end }}
