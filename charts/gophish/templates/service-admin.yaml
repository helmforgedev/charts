{{- include "gophish.validateAll" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gophish.fullname" . }}-admin
  labels:
    {{- include "gophish.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
  {{- with .Values.adminService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.adminService.type }}
  ports:
    - name: admin
      port: {{ .Values.adminService.port }}
      targetPort: admin
      protocol: TCP
  selector:
    {{- include "gophish.selectorLabels" . | nindent 4 }}
