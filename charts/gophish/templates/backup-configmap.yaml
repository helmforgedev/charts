{{- include "gophish.validateAll" . }}
{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gophish.fullname" . }}-backup
  labels:
    {{- include "gophish.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
data:
  backup.sh: |
    #!/bin/sh
    set -eu
    ts="$(date -u +%Y%m%dT%H%M%SZ)"
    archive="/backup/{{ .Values.backup.archivePrefix }}-${ts}.tar.gz"
    db_path="{{ .Values.database.sqlite.path }}"
    data_dir="{{ include "gophish.sqliteDirectory" . }}"
    if [ ! -f "${db_path}" ]; then
      echo "SQLite database not found at ${db_path}" >&2
      exit 1
    fi
    tar -czf "${archive}" -C "${data_dir}" .
    sha256sum "${archive}" > "${archive}.sha256"
    echo "${archive}" > /backup/latest-archive
    echo "Created ${archive}"
  upload.sh: |
    #!/bin/sh
    set -eu
    archive="$(cat /backup/latest-archive)"
    target="backup-target/{{ .Values.backup.s3.prefix }}/$(basename "${archive}")"
    mc alias set backup-target "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    {{- if .Values.backup.s3.createBucketIfNotExists }}
    mc mb --ignore-existing "backup-target/{{ .Values.backup.s3.bucket }}"
    {{- end }}
    mc cp "${archive}" "backup-target/{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/"
    mc cp "${archive}.sha256" "backup-target/{{ .Values.backup.s3.bucket }}/{{ .Values.backup.s3.prefix }}/"
    echo "Uploaded ${target}"
{{- end }}
