# =============================================================================
# Gophish Helm Chart - Default Values
# =============================================================================
# Focus: separated admin/campaign traffic, generated config Secret,
# single-replica SQLite by default, and explicit MySQL options.

# -- Override the chart name used in resource names
nameOverride: ""

# -- Override the full release name used in resource names
fullnameOverride: ""

# -- Labels added to every resource created by this chart
commonLabels: {}

# -- Number of Gophish replicas. SQLite mode requires 1.
replicaCount: 1

# -- Kubernetes cluster domain
clusterDomain: cluster.local

# =============================================================================
# Image
# =============================================================================

image:
  # -- Gophish official upstream image repository
  repository: docker.io/gophish/gophish
  # -- Gophish image tag
  tag: "0.12.1"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# =============================================================================
# Gophish Configuration
# =============================================================================

gophish:
  config:
    # -- Use an existing Secret containing a complete config.json
    existingSecret: ""
    # -- Secret key for config.json when gophish.config.existingSecret is set
    existingSecretKey: config.json

  adminServer:
    # -- Admin server listen URL inside the container
    listenUrl: 0.0.0.0:3333
    # -- Enable Gophish native TLS for the admin server
    useTls: false
    # -- Secret containing native TLS certificate and key for the admin server
    certSecret: ""
    # -- Key in certSecret containing the certificate
    certKey: tls.crt
    # -- Key in certSecret containing the private key
    keyKey: tls.key
    # -- Path used in rendered config.json for the admin TLS certificate
    certPath: /opt/gophish/tls/admin/tls.crt
    # -- Path used in rendered config.json for the admin TLS private key
    keyPath: /opt/gophish/tls/admin/tls.key
    # -- Trusted origins for CSRF handling behind ingress or load balancers
    trustedOrigins: []

  phishServer:
    # -- Phishing server listen URL inside the container
    listenUrl: 0.0.0.0:80
    # -- Enable Gophish native TLS for the phishing server
    useTls: false
    # -- Secret containing native TLS certificate and key for the phishing server
    certSecret: ""
    # -- Key in certSecret containing the certificate
    certKey: tls.crt
    # -- Key in certSecret containing the private key
    keyKey: tls.key
    # -- Path used in rendered config.json for the phishing TLS certificate
    certPath: /opt/gophish/tls/phish/tls.crt
    # -- Path used in rendered config.json for the phishing TLS private key
    keyPath: /opt/gophish/tls/phish/tls.key

  logging:
    # -- Optional Gophish log filename. Empty logs to stdout/stderr.
    filename: ""
    # -- Optional Gophish log level
    level: ""

  # -- Optional contact address shown in Gophish warnings and configuration
  contactAddress: ""

# =============================================================================
# Database
# =============================================================================

database:
  # -- Database mode: auto | sqlite | mysql | external
  mode: auto
  sqlite:
    # -- SQLite database path in config.json
    path: /opt/gophish/data/gophish.db
  external:
    # -- External database vendor. Gophish supports MySQL-compatible DSNs.
    vendor: mysql
    # -- External database host
    host: ""
    # -- External database port
    port: 3306
    # -- External database name
    name: gophish
    # -- External database username
    username: gophish
    # -- External database password. Prefer existingSecret for production.
    password: ""
    # -- Permit rendering database.external.password into the generated config Secret for local tests only
    allowInlinePassword: false
    # -- Existing Secret containing a complete Gophish MySQL DSN
    existingSecret: ""
    # -- Secret key for the complete DSN
    existingSecretDsnKey: dsn
    # -- Optional DSN query parameters
    parameters: charset=utf8&parseTime=True&loc=UTC

mysql:
  # -- Enable HelmForge MySQL dependency
  enabled: false
  config:
    # -- Gophish stores zero-date defaults during bootstrap; keep embedded MySQL compatible with that behavior.
    myCnf: |
      [mysqld]
      sql_mode=NO_ENGINE_SUBSTITUTION
  auth:
    # -- MySQL database name
    database: gophish
    # -- MySQL username
    username: gophish
    # -- MySQL user password. Auto-generated by the MySQL dependency when empty.
    password: ""
    # -- Existing Secret for MySQL credentials
    existingSecret: ""
    # -- Secret key for the MySQL application user password
    existingSecretUserPasswordKey: mysql-user-password

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for SQLite database and chart-managed runtime files
  enabled: true
  # -- Use an existing PVC
  existingClaim: ""
  # -- Storage class for the PVC
  storageClass: ""
  # -- Access modes for the PVC
  accessModes:
    - ReadWriteOnce
  # -- Size of the PVC
  size: 5Gi
  # -- Annotations added to the PVC
  annotations: {}

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- Automount the service account token
  automountServiceAccountToken: false

# =============================================================================
# Services
# =============================================================================

adminService:
  # -- Admin Service type
  type: ClusterIP
  # -- Admin Service port
  port: 3333
  # -- Admin container target port
  targetPort: 3333
  # -- Admin Service annotations
  annotations: {}
  # -- Admin Service IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the admin Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

phishService:
  # -- Phishing Service type
  type: ClusterIP
  # -- Phishing Service port
  port: 80
  # -- Phishing container target port
  targetPort: 80
  # -- Phishing Service annotations
  annotations: {}
  # -- Phishing Service IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the phishing Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

# =============================================================================
# Ingress
# =============================================================================

adminIngress:
  # -- Enable ingress for the admin UI
  enabled: false
  # -- Ingress class name
  ingressClassName: traefik
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts: []
  # -- Ingress TLS configuration
  tls: []

phishIngress:
  # -- Enable ingress for the phishing listener
  enabled: false
  # -- Ingress class name
  ingressClassName: traefik
  # -- Ingress annotations
  annotations: {}
  # -- Ingress hosts
  hosts: []
  # -- Ingress TLS configuration
  tls: []

# =============================================================================
# Network Policy
# =============================================================================

networkPolicy:
  # -- Enable NetworkPolicy resources
  enabled: false
  admin:
    # -- Allow admin ingress from any pod in the same namespace
    allowSameNamespace: false
    # -- Namespace selectors allowed to reach the admin port
    namespaceSelectors: []
    # -- Pod selectors allowed to reach the admin port
    podSelectors: []
    # -- CIDRs allowed to reach the admin port
    ipBlocks: []
    # -- Additional raw NetworkPolicy ingress from rules for admin traffic
    extraFrom: []
  phish:
    # -- Allow phishing ingress from any pod in the same namespace
    allowSameNamespace: false
    # -- Namespace selectors allowed to reach the phishing port, typically ingress controller namespaces
    namespaceSelectors: []
    # -- Pod selectors allowed to reach the phishing port
    podSelectors: []
    # -- CIDRs allowed to reach the phishing port
    ipBlocks: []
    # -- Additional raw NetworkPolicy ingress from rules for phishing traffic
    extraFrom: []
  egress:
    # -- Add egress policy rules when NetworkPolicy is enabled
    enabled: true
    # -- Allow DNS egress
    allowDns: true
    externalDatabase:
      # -- Allow egress to an external database destination
      enabled: false
      # -- External database CIDRs
      cidrs: []
      # -- External database namespace selectors
      namespaceSelectors: []
      # -- External database pod selectors
      podSelectors: []
      # -- External database ports
      ports:
        - 3306
    smtp:
      # -- Allow egress to SMTP destinations
      enabled: false
      # -- SMTP CIDRs
      cidrs: []
      # -- SMTP ports
      ports:
        - 25
        - 465
        - 587
    # -- Additional raw NetworkPolicy egress rules
    extra: []

# =============================================================================
# Backup
# =============================================================================

backup:
  # Persistent filesystem coverage: SQLite backup archives the chart-managed PVC path.
  # Database coverage: SQLite database is inside that archive; MySQL coverage is delegated.
  # -- Enable SQLite backup CronJob
  enabled: false
  # -- Backup schedule in Cron format
  schedule: "0 3 * * *"
  # -- Suspend backup CronJob execution
  suspend: false
  # -- CronJob concurrency policy
  concurrencyPolicy: Forbid
  # -- Successful job history retained by the CronJob
  successfulJobsHistoryLimit: 3
  # -- Failed job history retained by the CronJob
  failedJobsHistoryLimit: 3
  # -- Backup job backoff limit
  backoffLimit: 1
  # -- Backup archive prefix
  archivePrefix: gophish
  images:
    archive:
      # -- Image used to create the local backup archive
      repository: docker.io/library/busybox
      tag: "1.37"
      pullPolicy: IfNotPresent
    uploader:
      # -- HelmForge S3 uploader image
      repository: docker.io/helmforge/mc
      tag: "1.0.0"
      pullPolicy: IfNotPresent
  s3:
    # -- S3-compatible endpoint URL, for example https://s3.amazonaws.com or http://minio.minio.svc.cluster.local:9000
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Optional key prefix inside the bucket
    prefix: gophish
    # -- Create the bucket when it does not exist
    createBucketIfNotExists: true
    # -- Existing Secret containing S3 credentials
    existingSecret: ""
    # -- Secret key name for the access key
    existingSecretAccessKeyKey: access-key
    # -- Secret key name for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline access key for local tests only
    accessKey: ""
    # -- Inline secret key for local tests only
    secretKey: ""
  # -- Resources applied to backup containers
  resources: {}
  # -- Security context applied to backup containers
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE
  seccompProfile:
    type: RuntimeDefault

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
