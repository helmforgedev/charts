networkPolicy:
  enabled: true
  admin:
    namespaceSelectors:
      - matchLabels:
          kubernetes.io/metadata.name: platform-admin
    ipBlocks:
      - cidr: 10.10.0.0/16
  phish:
    namespaceSelectors:
      - matchLabels:
          kubernetes.io/metadata.name: ingress-system
  egress:
    externalDatabase:
      enabled: true
      cidrs:
        - 10.0.0.0/8
    smtp:
      enabled: true
      cidrs:
        - 10.20.0.0/16
