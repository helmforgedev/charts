# CI scenario: Gateway API HTTPRoutes for separated admin and phishing traffic.

gateway:
  enabled: true
  admin:
    enabled: true
    parentRefs:
      - name: internal-gateway
        namespace: gateway-system
    hostnames:
      - gophish-admin.example.com
  phish:
    enabled: true
    parentRefs:
      - name: public-gateway
        namespace: gateway-system
    hostnames:
      - training.example.com
