suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-gophish
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should use custom name and annotations
    set:
      serviceAccount.name: custom-sa
      serviceAccount.annotations:
        example.com/role: gophish
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
      - equal:
          path: metadata.annotations["example.com/role"]
          value: gophish

  - it: should not render when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
