suite: Extra manifests
templates:
  - templates/extra-manifests.yaml
tests:
  - it: should not render extra manifests by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render extra manifests
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: extra-config
          data:
            key: value
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: extra-config
