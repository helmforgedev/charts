# Gophish public phishing listener with private admin access.
# Use case: expose only campaign landing pages through ingress.

phishIngress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: training.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gophish-phish-tls
      hosts:
        - training.example.com
