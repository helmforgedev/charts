apiVersion: v1
kind: Service
metadata:
  name: {{ include "qdrant.fullname" . }}-headless
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
    app.kubernetes.io/component: peer-discovery
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    - name: p2p
      port: {{ .Values.cluster.p2pPort }}
      targetPort: p2p
      protocol: TCP
  selector:
    {{- include "qdrant.selectorLabels" . | nindent 4 }}
