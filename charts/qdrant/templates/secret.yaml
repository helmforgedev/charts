{{- if and (not .Values.auth.existingSecret) (or .Values.auth.apiKey .Values.auth.readOnlyApiKey) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "qdrant.fullname" . }}
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.apiKey }}
  {{ .Values.auth.apiKeyKey }}: {{ .Values.auth.apiKey | quote }}
  {{- end }}
  {{- if .Values.auth.readOnlyApiKey }}
  {{ .Values.auth.readOnlyApiKeyKey }}: {{ .Values.auth.readOnlyApiKey | quote }}
  {{- end }}
{{- end }}
