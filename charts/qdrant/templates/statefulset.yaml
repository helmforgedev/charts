{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qdrant.fullname" . }}
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "qdrant.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qdrant.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "qdrant.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ include "qdrant.name" . }}
          image: {{ include "qdrant.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.cluster.enabled }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              set -eu
              ordinal="${HOSTNAME##*-}"
              service="{{ include "qdrant.fullname" . }}-headless.{{ .Release.Namespace }}.svc.{{ trimSuffix "." .Values.clusterDomain }}"
              self_uri="http://${HOSTNAME}.${service}:{{ .Values.cluster.p2pPort }}"
              first_peer="http://{{ include "qdrant.fullname" . }}-0.${service}:{{ .Values.cluster.p2pPort }}"

              if [ "$ordinal" = "0" ]; then
                exec /qdrant/qdrant --uri "$self_uri"{{- range .Values.app.args }} {{ . | quote }}{{- end }}
              fi

              exec /qdrant/qdrant --bootstrap "$first_peer" --uri "$self_uri"{{- range .Values.app.args }} {{ . | quote }}{{- end }}
          {{- else if .Values.app.command }}
          command:
            {{- toYaml .Values.app.command | nindent 12 }}
          {{- end }}
          {{- if and (not .Values.cluster.enabled) .Values.app.args }}
          args:
            {{- toYaml .Values.app.args | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.app.grpcPort }}
              protocol: TCP
            - name: p2p
              containerPort: {{ .Values.cluster.p2pPort }}
              protocol: TCP
          env:
            - name: QDRANT__SERVICE__HTTP_PORT
              value: {{ .Values.app.port | quote }}
            - name: QDRANT__SERVICE__GRPC_PORT
              value: {{ .Values.app.grpcPort | quote }}
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: {{ .Values.persistence.mountPath | quote }}
            - name: QDRANT__STORAGE__SNAPSHOTS_PATH
              value: {{ .Values.snapshots.path | quote }}
            - name: QDRANT__CLUSTER__P2P__PORT
              value: {{ .Values.cluster.p2pPort | quote }}
            {{- if .Values.cluster.enabled }}
            - name: QDRANT__CLUSTER__ENABLED
              value: "true"
            {{- end }}
            {{- if or .Values.auth.apiKey .Values.auth.existingSecret }}
            - name: QDRANT__SERVICE__API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "qdrant.fullname" .) .Values.auth.existingSecret }}
                  key: {{ .Values.auth.apiKeyKey }}
            {{- end }}
            {{- if or .Values.auth.readOnlyApiKey .Values.auth.existingSecret }}
            - name: QDRANT__SERVICE__READ_ONLY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ default (include "qdrant.fullname" .) .Values.auth.existingSecret }}
                  key: {{ .Values.auth.readOnlyApiKeyKey }}
                  optional: true
            {{- end }}
            {{- range .Values.app.env }}
            - name: {{ .name }}
              {{- if hasKey . "valueFrom" }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- else }}
              value: {{ default "" .value | quote }}
              {{- end }}
            {{- end }}
            
            {{- with .Values.app.extraEnv }}{{- toYaml . | nindent 12 }}{{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- if .Values.config.localYaml }}
            - name: config
              mountPath: /qdrant/config/local.yaml
              subPath: local.yaml
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (not .Values.persistence.enabled) .Values.persistence.existingClaim .Values.config.localYaml .Values.extraVolumes }}
      volumes:
        {{- if .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | quote }}
        {{- else if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.config.localYaml }}
        - name: config
          configMap:
            name: {{ include "qdrant.fullname" . }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
  {{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
