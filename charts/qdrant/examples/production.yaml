# SPDX-License-Identifier: Apache-2.0
replicaCount: 1
auth:
  existingSecret: qdrant-api-keys
persistence:
  size: 100Gi
resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: 4
    memory: 8Gi
metrics:
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus
networkPolicy:
  enabled: true
config:
  localYaml: |
    log_level: INFO
    storage:
      performance:
        max_search_threads: 4
