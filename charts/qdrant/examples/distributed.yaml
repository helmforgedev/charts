# SPDX-License-Identifier: Apache-2.0
replicaCount: 3
cluster:
  enabled: true
pdb:
  enabled: true
auth:
  existingSecret: qdrant-api-keys
persistence:
  size: 200Gi
resources:
  requests:
    cpu: 1
    memory: 4Gi
  limits:
    cpu: 8
    memory: 16Gi
metrics:
  serviceMonitor:
    enabled: true
