# SPDX-License-Identifier: Apache-2.0
suite: qdrant network policy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: limits inbound traffic to Qdrant API ports
    values:
      - networkpolicy-values.yaml
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: grpc
  - it: allows Qdrant p2p traffic when clustering is enabled
    values:
      - networkpolicy-values.yaml
      - cluster-values.yaml
    asserts:
      - contains:
          path: spec.ingress[1].from
          content:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: qdrant
                app.kubernetes.io/instance: RELEASE-NAME
      - contains:
          path: spec.ingress[1].ports
          content:
            protocol: TCP
            port: p2p
