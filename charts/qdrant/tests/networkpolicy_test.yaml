# SPDX-License-Identifier: Apache-2.0
suite: qdrant network policy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: limits inbound traffic to Qdrant API ports
    values:
      - networkpolicy-values.yaml
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: grpc
