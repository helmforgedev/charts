# SPDX-License-Identifier: Apache-2.0
suite: qdrant network policy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: limits inbound traffic to Qdrant API ports
    values:
      - networkpolicy-values.yaml
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: grpc
      - notContains:
          path: spec.policyTypes
          content: Egress
  - it: allows Qdrant p2p traffic when clustering is enabled
    values:
      - networkpolicy-values.yaml
      - cluster-values.yaml
    asserts:
      - contains:
          path: spec.ingress[1].from
          content:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: qdrant
                app.kubernetes.io/instance: RELEASE-NAME
      - contains:
          path: spec.ingress[1].ports
          content:
            protocol: TCP
            port: p2p
  - it: enables egress isolation when extraEgress is configured
    values:
      - networkpolicy-extra-egress-values.yaml
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - equal:
          path: spec.egress[0].ports[0].port
          value: 53
      - equal:
          path: spec.egress[1].ports[0].port
          value: 443
      - equal:
          path: spec.egress[2].ports[0].port
          value: 6333
  - it: preserves cluster p2p egress when egress is isolated
    values:
      - networkpolicy-extra-egress-values.yaml
      - cluster-values.yaml
    asserts:
      - contains:
          path: spec.egress[2].to
          content:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: qdrant
                app.kubernetes.io/instance: RELEASE-NAME
      - contains:
          path: spec.egress[2].ports
          content:
            protocol: TCP
            port: p2p
