# SPDX-License-Identifier: Apache-2.0
suite: qdrant gateway
templates:
  - templates/httproute.yaml
tests:
  - it: renders HTTPRoute hostnames
    set:
      gateway.enabled: true
      gateway.parentRefs[0].name: test-gateway
      gateway.hostnames[0]: qdrant.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.hostnames[0]
          value: qdrant.example.com
