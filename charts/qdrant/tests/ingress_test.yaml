# SPDX-License-Identifier: Apache-2.0
suite: qdrant ingress
templates:
  - templates/ingress.yaml
tests:
  - it: renders ingress TLS
    values:
      - ingress-tls-values.yaml
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.tls[0].secretName
          value: qdrant-tls
      - equal:
          path: spec.tls[0].hosts[0]
          value: qdrant.example.com
