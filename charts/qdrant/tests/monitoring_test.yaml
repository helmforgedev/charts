# SPDX-License-Identifier: Apache-2.0
suite: qdrant monitoring
templates:
  - templates/servicemonitor.yaml
tests:
  - it: renders ServiceMonitor for /metrics
    values:
      - monitoring-values.yaml
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].path
          value: /metrics
      - equal:
          path: spec.endpoints[0].port
          value: http
