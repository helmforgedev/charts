# SPDX-License-Identifier: Apache-2.0
# Public Liwan deployment through Gateway API.
liwan:
  baseUrl: https://analytics.example.com

gatewayAPI:
  enabled: true
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - analytics.example.com
  paths:
    - type: PathPrefix
      value: /
