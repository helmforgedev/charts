suite: Backup Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create backup secret when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create backup secret when enabled with inline credentials
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: stringData.access-key
          value: admin

  - it: should not create backup secret when using existing secret
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
