suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-liwan

  - it: should use port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP
