{{- if .Values.valkey.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "immich.fullname" . }}-valkey
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
  selector:
    {{- include "immich.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "immich.fullname" . }}-valkey
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  serviceName: {{ include "immich.fullname" . }}-valkey
  replicas: 1
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: "{{ .Values.valkey.internal.image.repository }}:{{ .Values.valkey.internal.image.tag }}"
          imagePullPolicy: {{ .Values.valkey.internal.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.valkey.internal.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
        {{- if not .Values.valkey.internal.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.valkey.internal.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.valkey.internal.persistence.size }}
  {{- end }}
{{- end }}
