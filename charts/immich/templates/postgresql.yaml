{{- if .Values.database.internal.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "immich.fullname" . }}-postgresql
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
  selector:
    {{- include "immich.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "immich.fullname" . }}-postgresql
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: {{ include "immich.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: "{{ .Values.database.internal.image.repository }}:{{ .Values.database.internal.image.tag }}"
          imagePullPolicy: {{ .Values.database.internal.image.pullPolicy }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.database.external.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.database.external.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "immich.databaseSecretName" . }}
                  key: {{ include "immich.databaseSecretKey" . }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_INITDB_ARGS
              value: --data-checksums
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.database.external.username }}", "-d", "{{ .Values.database.external.database }}"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.database.internal.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.database.internal.shmSize }}
        {{- if not .Values.database.internal.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.database.internal.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.database.internal.persistence.size }}
  {{- end }}
{{- end }}
