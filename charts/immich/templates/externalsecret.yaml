{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- if not .Values.externalSecrets.secretStoreRef.name }}
  {{- fail "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" }}
{{- end }}
{{- if and .Values.externalSecrets.database.enabled (not .Values.database.external.existingSecret) }}
  {{- fail "externalSecrets.database.enabled requires database.external.existingSecret" }}
{{- end }}
{{- if and .Values.externalSecrets.redis.enabled (not .Values.valkey.external.existingSecret) }}
  {{- fail "externalSecrets.redis.enabled requires valkey.external.existingSecret" }}
{{- end }}
{{- $databaseData := .Values.externalSecrets.database.data | default list -}}
{{- $databaseDataFrom := .Values.externalSecrets.database.dataFrom | default list -}}
{{- $redisData := .Values.externalSecrets.redis.data | default list -}}
{{- $redisDataFrom := .Values.externalSecrets.redis.dataFrom | default list -}}
{{- if and .Values.externalSecrets.database.enabled (eq (add (len $databaseData) (len $databaseDataFrom)) 0) }}
  {{- fail "externalSecrets.database.enabled requires externalSecrets.database.data or externalSecrets.database.dataFrom" }}
{{- end }}
{{- if and .Values.externalSecrets.redis.enabled (eq (add (len $redisData) (len $redisDataFrom)) 0) }}
  {{- fail "externalSecrets.redis.enabled requires externalSecrets.redis.data or externalSecrets.redis.dataFrom" }}
{{- end }}
{{- if .Values.externalSecrets.database.enabled }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.database.external.existingSecret | quote }}
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.database.external.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  {{- if $databaseData }}
  data:
    {{- toYaml $databaseData | nindent 4 }}
  {{- end }}
  {{- if $databaseDataFrom }}
  dataFrom:
    {{- toYaml $databaseDataFrom | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.externalSecrets.redis.enabled }}
---
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.valkey.external.existingSecret | quote }}
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.valkey.external.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  {{- if $redisData }}
  data:
    {{- toYaml $redisData | nindent 4 }}
  {{- end }}
  {{- if $redisDataFrom }}
  dataFrom:
    {{- toYaml $redisDataFrom | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
