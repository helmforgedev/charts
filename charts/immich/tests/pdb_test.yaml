# SPDX-License-Identifier: Apache-2.0
suite: PodDisruptionBudget
templates:
  - templates/pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render PDB by default for single replica installs
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PDB when explicitly enabled
    set:
      pdb.enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
