# SPDX-License-Identifier: Apache-2.0
suite: PostgreSQL
templates:
  - templates/postgresql.yaml
release:
  name: test
  namespace: default
tests:
  - it: should place PGDATA in a subdirectory of the data volume
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGDATA
            value: /var/lib/postgresql/data/pgdata
