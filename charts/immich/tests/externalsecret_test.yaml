# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/externalsecret.yaml
release:
  name: test
tests:
  - it: should render external database secret
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.database.enabled: true
      externalSecrets.database.data:
        - secretKey: database-password
          remoteRef:
            key: immich/database
            property: password
      postgresql.enabled: false
      database.external.host: postgres.example.com
      database.external.existingSecret: immich-db
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: immich-db
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets

  - it: should render external database secret from dataFrom
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.database.enabled: true
      externalSecrets.database.dataFrom:
        - extract:
            key: immich/database
      postgresql.enabled: false
      database.external.host: postgres.example.com
      database.external.existingSecret: immich-db
    asserts:
      - equal:
          path: spec.dataFrom[0].extract.key
          value: immich/database
      - notExists:
          path: spec.data

  - it: should fail external database secret without data mappings
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.database.enabled: true
      postgresql.enabled: false
      database.external.host: postgres.example.com
      database.external.existingSecret: immich-db
    asserts:
      - failedTemplate:
          errorMessage: externalSecrets.database.enabled requires externalSecrets.database.data or externalSecrets.database.dataFrom
        template: templates/externalsecret.yaml

  - it: should fail external redis secret without data mappings
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.redis.enabled: true
      valkey.internal.enabled: false
      valkey.external.host: valkey.example.com
      valkey.external.existingSecret: immich-redis
    asserts:
      - failedTemplate:
          errorMessage: externalSecrets.redis.enabled requires externalSecrets.redis.data or externalSecrets.redis.dataFrom
        template: templates/externalsecret.yaml
