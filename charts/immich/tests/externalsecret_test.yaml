# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/externalsecret.yaml
release:
  name: test
tests:
  - it: should render external database secret
    set:
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.database.enabled: true
      externalSecrets.database.data:
        - secretKey: database-password
          remoteRef:
            key: immich/database
            property: password
      database.internal.enabled: false
      database.external.host: postgres.example.com
      database.external.existingSecret: immich-db
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: immich-db
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets
