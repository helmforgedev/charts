# SPDX-License-Identifier: Apache-2.0
# Immich with external PostgreSQL and Redis/Valkey-compatible cache

postgresql:
  enabled: false

database:
  external:
    host: postgres.example.com
    port: 5432
    database: immich
    username: immich
    existingSecret: immich-db
    existingSecretPasswordKey: database-password

valkey:
  internal:
    enabled: false
  external:
    host: valkey.example.com
    port: 6379
    existingSecret: immich-cache
    existingSecretPasswordKey: redis-password

server:
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 500Gi
