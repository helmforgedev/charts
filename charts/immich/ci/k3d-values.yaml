# SPDX-License-Identifier: Apache-2.0
server:
  persistence:
    enabled: false

machineLearning:
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 384Mi
    limits:
      cpu: "1"
      memory: 1536Mi

postgresql:
  standalone:
    persistence:
      enabled: false

valkey:
  standalone:
    persistence:
      enabled: false

pdb:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1536Mi

extraObjects:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: immich-extra-config
    data:
      custom.yaml: |
        source: helmforge-ci

extraVolumes:
  - name: immich-extra-config
    configMap:
      name: immich-extra-config

extraVolumeMounts:
  - name: immich-extra-config
    mountPath: /config/immich
    readOnly: true
