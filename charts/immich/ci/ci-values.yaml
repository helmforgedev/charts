# SPDX-License-Identifier: Apache-2.0
server:
  replicaCount: 2
  persistence:
    enabled: false

machineLearning:
  persistence:
    enabled: false

postgresql:
  standalone:
    persistence:
      enabled: false

valkey:
  standalone:
    persistence:
      enabled: false

service:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: immich.example.com
      paths:
        - path: /
          pathType: Prefix

gateway:
  enabled: true
  parentRefs:
    - name: public
      namespace: gateway-system
  hostnames:
    - immich.example.com

networkPolicy:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4

pdb:
  enabled: true
  minAvailable: 1
