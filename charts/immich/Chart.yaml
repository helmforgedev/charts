apiVersion: v2
name: immich
description: Immich photo and video management with HelmForge PostgreSQL, Redis-compatible cache, and machine learning
type: application
version: 1.0.1
appVersion: "2.7.5"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - immich
  - photos
  - videos
  - backup
  - machine-learning
  - postgresql
  - redis
  - valkey
home: https://helmforge.dev
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/immich
  - https://github.com/immich-app/immich
icon: https://helmforge.dev/icons/charts/immich.png
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "add Immich chart (#380)"
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: berlofa@helmforge.dev
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: skip-prediction
  artifacthub.io/links: |
    - name: Official Website
      url: https://immich.app
    - name: Documentation
      url: https://helmforge.dev/docs/charts/immich
    - name: Source
      url: https://github.com/immich-app/immich
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
    - url: https://artifacthub.io/packages/helm/helmforge/redis
dependencies:
  - name: postgresql
    version: 2.0.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    alias: valkey
    version: 1.6.17
    repository: oci://ghcr.io/helmforgedev/helm
    condition: valkey.internal.enabled
