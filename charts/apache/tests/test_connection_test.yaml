# SPDX-License-Identifier: Apache-2.0
suite: Helm Test
templates:
  - test-connection.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render helm test pod
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.name
          value: test-apache-test-connection
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - matchRegex:
          path: spec.containers[0].command[2]
          pattern: "/healthz"
