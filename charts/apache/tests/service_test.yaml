# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should expose http port
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-apache
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http

  - it: should render dual-stack fields
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6
