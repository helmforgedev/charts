# SPDX-License-Identifier: Apache-2.0
replicaCount: 3

content:
  existingConfigMap: apache-site-content

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    enabled: false
  egress:
    enabled: true
    allowDns: true
    allowInternet: false
