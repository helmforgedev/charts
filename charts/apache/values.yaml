# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Apache HTTP Server Helm Chart - Default Values
# =============================================================================

replicaCount: 2

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

image:
  repository: docker.io/library/httpd
  tag: "2.4.67"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serverName: localhost

containerPorts:
  http: 8080
  metrics: 9117

httpd:
  serverTokens: Prod
  serverSignature: "Off"
  traceEnable: "Off"
  logLevel: warn
  allowOverride: None
  options: "-Indexes +FollowSymLinks"
  extraConfig: ""
  extraVhosts: {}

content:
  existingConfigMap: ""
  files:
    index.html: |
      <!doctype html>
      <html lang="en">
      <head>
        <meta charset="utf-8">
        <title>HelmForge Apache</title>
      </head>
      <body>
        <h1>HelmForge Apache</h1>
        <p>Apache HTTP Server is running.</p>
      </body>
      </html>

basicAuth:
  enabled: false
  existingSecret: ""
  htpasswdKey: htpasswd

serverStatus:
  enabled: false
  path: /server-status
  require: "local"

service:
  type: ClusterIP
  annotations: {}
  port: 80
  metricsPort: 9117
  ipFamilyPolicy: ~
  ipFamilies: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: apache.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

gateway:
  enabled: false
  apiVersion: gateway.networking.k8s.io/v1
  parentRefs: []
  hostnames: []
  annotations: {}
  labels: {}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

networkPolicy:
  enabled: false
  ingress:
    enabled: true
    namespaceSelector: {}
    podSelector: {}
  egress:
    enabled: true
    allowDns: true
    allowInternet: true
    extraRules: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

startupProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

metrics:
  enabled: false
  image:
    repository: docker.io/lusotycoon/apache-exporter
    tag: v1.0.11
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podLabels: {}
podAnnotations: {}
annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

pdb:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
extraManifests: []

externalSecrets:
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: "0"
  secretStoreRef:
    name: ""
    kind: SecretStore
  target:
    creationPolicy: Owner
  data: []
