# SPDX-License-Identifier: Apache-2.0
replicaCount: 2
pdb:
  enabled: true
autoscaling:
  enabled: false
networkPolicy:
  enabled: true
basicAuth:
  enabled: true
  existingSecret: apache-basicauth
externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: htpasswd
      remoteRef:
        key: test/password
httpd:
  extraConfig: |
    Header always set X-Content-Type-Options "nosniff"
