# SPDX-License-Identifier: Apache-2.0
suite: Operations
templates:
  - templates/pdb.yaml
  - templates/networkpolicy.yaml
  - templates/servicemonitor.yaml
release:
  name: test
  namespace: metrics
tests:
  - it: should render PDB with unhealthy eviction policy
    template: templates/pdb.yaml
    set:
      pdb.enabled: true
      pdb.maxUnavailable: 1
      pdb.unhealthyPodEvictionPolicy: AlwaysAllow
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.maxUnavailable
          value: 1
      - equal:
          path: spec.unhealthyPodEvictionPolicy
          value: AlwaysAllow

  - it: should prefer minAvailable when maxUnavailable keeps its default
    template: templates/pdb.yaml
    set:
      pdb.enabled: true
      pdb.minAvailable: 1
    asserts:
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable

  - it: should render NetworkPolicy with egress controls
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.ingress[0].from
          content:
            ipBlock:
              cidr: 0.0.0.0/0
      - contains:
          path: spec.ingress[0].from
          content:
            ipBlock:
              cidr: ::/0
      - equal:
          path: spec.egress[2].ports[0].port
          value: 10250
      - contains:
          path: spec.egress[2].to
          content:
            ipBlock:
              cidr: 0.0.0.0/0
      - contains:
          path: spec.egress[2].to
          content:
            ipBlock:
              cidr: ::/0
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: 0.0.0.0/0
      - contains:
          path: spec.egress[1].to
          content:
            ipBlock:
              cidr: ::/0

  - it: should append custom NetworkPolicy egress rules
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
      networkPolicy.egress.allowDNS: false
      networkPolicy.egress.allowAPIServer: false
      networkPolicy.egress.allowKubelet: false
      networkPolicy.extraEgress:
        - to:
            - ipBlock:
                cidr: 10.80.0.0/16
          ports:
            - protocol: TCP
              port: 443
    asserts:
      - equal:
          path: spec.egress[0].to[0].ipBlock.cidr
          value: 10.80.0.0/16
      - equal:
          path: spec.egress[0].ports[0].port
          value: 443

  - it: should render deny-all ingress when no sources are allowed
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
      networkPolicy.ingress.allowSameNamespace: false
      networkPolicy.ingress.allowAPIServer: false
      networkPolicy.ingress.extraFrom: []
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.ingress
          value: []

  - it: should render ServiceMonitor when enabled
    template: templates/servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
      serviceMonitor.additionalLabels.release: prometheus
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.labels.release
          value: prometheus
      - equal:
          path: spec.endpoints[0].port
          value: https
