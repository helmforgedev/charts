# SPDX-License-Identifier: Apache-2.0
suite: RBAC
templates:
  - templates/rbac.yaml
  - templates/apiservice.yaml
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: metrics
tests:
  - it: should render service account
    template: templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-metrics-server

  - it: should render APIService
    template: templates/apiservice.yaml
    asserts:
      - isKind:
          of: APIService
      - equal:
          path: metadata.name
          value: v1beta1.metrics.k8s.io
      - equal:
          path: spec.service.name
          value: test-metrics-server
      - equal:
          path: spec.insecureSkipTLSVerify
          value: true

  - it: should render ClusterRole and bindings
    template: templates/rbac.yaml
    asserts:
      - hasDocuments:
          count: 5
      - isKind:
          of: ClusterRole
        documentIndex: 0
      - equal:
          path: metadata.name
          value: system:aggregated-metrics-reader
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-metrics-server
        documentIndex: 1
      - equal:
          path: metadata.namespace
          value: kube-system
        documentIndex: 4
