architecture:
  mode: queue

flowise:
  replicaCount: 2
  appUrl: https://flowise.example.com

queue:
  worker:
    replicaCount: 2

persistence:
  enabled: false

postgresql:
  enabled: true

redis:
  enabled: true

storage:
  type: s3
  s3:
    bucketName: flowise
    existingSecret: flowise-s3
    endpointUrl: https://minio.example.com
    forcePathStyle: true

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: flowise.example.com
      paths:
        - path: /
          pathType: Prefix
