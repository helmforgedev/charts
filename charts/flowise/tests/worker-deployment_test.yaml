# SPDX-License-Identifier: Apache-2.0
suite: Worker Deployment
templates:
  - templates/worker-deployment.yaml
  - templates/secret.yaml
  - templates/_helpers.tpl
tests:
  - it: does not render worker deployment in standalone mode
    template: templates/worker-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders worker deployment in queue mode
    template: templates/worker-deployment.yaml
    set:
      architecture.mode: queue
      persistence.enabled: false
      storage.type: s3
      storage.s3.bucketName: flowise
      storage.s3.accessKeyId: minio
      storage.s3.secretAccessKey: secret123
      postgresql.enabled: true
      redis.enabled: true
      queue.worker.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - contains:
          path: spec.template.spec.containers[0].args
          content: sleep 3; flowise worker
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MODE
            value: queue
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WORKER_CONCURRENCY
            value: "100000"
