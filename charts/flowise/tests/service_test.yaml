# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
tests:
  - it: renders a clusterip service for the main Flowise deployment
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 3000
