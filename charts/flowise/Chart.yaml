apiVersion: v2
name: flowise
description: Flowise visual AI orchestration with standalone SQLite mode or scalable queue mode backed by Redis and PostgreSQL
type: application
version: 1.0.0
appVersion: "3.1.1"
kubeVersion: ">=1.26.0-0"
home: https://helmforge.dev/docs/charts/flowise
icon: https://flowiseai.com/favicon.ico
keywords:
  - flowise
  - ai
  - llm
  - agents
  - automation
  - redis
  - postgresql
maintainers:
  - name: helmforgedev
  - name: mberlofa
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/FlowiseAI/Flowise
  - https://docs.flowiseai.com/
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/flowise
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/flowise
  helmforge.dev/maturity: alpha
dependencies:
  - name: postgresql
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    version: 1.2.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
