credentials:
  existingSecret: velero-cloud-credentials

configuration:
  backupStorageLocations:
    - name: default
      provider: aws
      bucket: velero
      default: true
      config:
        region: minio
        s3Url: http://minio.minio.svc.cluster.local:9000
        s3ForcePathStyle: true
        insecureSkipTLSVerify: true

nodeAgent:
  enabled: true

schedules:
  - name: daily
    schedule: "0 3 * * *"
    template:
      ttl: 168h
      includedNamespaces:
        - apps
      defaultVolumesToFsBackup: true
