# SPDX-License-Identifier: Apache-2.0
suite: service
templates:
  - templates/service.yaml
tests:
  - it: renders metrics service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 8085

  - it: renders dual-stack service settings when configured
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6
