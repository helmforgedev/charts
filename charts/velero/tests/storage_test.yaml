suite: storage
templates:
  - templates/backupstoragelocations.yaml
  - templates/volumesnapshotlocations.yaml
  - templates/schedules.yaml
tests:
  - it: renders a default backup storage location
    values:
      - ../ci/s3-compatible.yaml
    template: templates/backupstoragelocations.yaml
    asserts:
      - equal:
          path: spec.objectStorage.bucket
          value: velero
      - equal:
          path: spec.provider
          value: aws
  - it: renders a volume snapshot location when configured
    values:
      - ../ci/volume-snapshots.yaml
    template: templates/volumesnapshotlocations.yaml
    asserts:
      - equal:
          path: spec.provider
          value: aws
  - it: renders schedules when provided
    values:
      - ../ci/schedules.yaml
    template: templates/schedules.yaml
    asserts:
      - equal:
          path: spec.schedule
          value: "0 3 * * *"
      - equal:
          path: spec.template.ttl
          value: 168h
