suite: node-agent daemonset
templates:
  - templates/node-agent-daemonset.yaml
tests:
  - it: renders node-agent without server-only uploader flag
    set:
      nodeAgent.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: node-agent
      - contains:
          path: spec.template.spec.containers[0].args
          content: server
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --uploader-type=kopia
