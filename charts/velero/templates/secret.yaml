{{- if and .Values.credentials.useSecret (not .Values.credentials.existingSecret) .Values.credentials.secretContents }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "velero.secretName" . }}
  labels:
    {{- include "velero.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.credentials.key }}: |
{{ .Values.credentials.secretContents | indent 4 }}
{{- range $key, $value := .Values.credentials.extraEnvVars }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
