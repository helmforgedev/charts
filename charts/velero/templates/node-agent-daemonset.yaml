{{- if .Values.nodeAgent.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "velero.fullname" . }}-node-agent
  labels:
    {{- include "velero.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "velero.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node-agent
  template:
    metadata:
      labels:
        {{- include "velero.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node-agent
      {{- if and .Values.credentials.useSecret (not .Values.credentials.existingSecret) .Values.credentials.secretContents }}
      annotations:
        checksum/credentials: {{ printf "%s" .Values.credentials.secretContents | sha256sum }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "velero.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.server.automountServiceAccountToken }}
      {{- with .Values.nodeAgent.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-agent
          image: {{ include "velero.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /velero
          args:
            - node-agent
            - server
            - --uploader-type={{ .Values.configuration.uploaderType }}
            - --log-level={{ .Values.configuration.logLevel }}
            - --log-format={{ .Values.configuration.logFormat }}
            {{- with .Values.configuration.features }}
            - --features={{ . }}
            {{- end }}
            {{- with .Values.nodeAgent.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: VELERO_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: VELERO_SCRATCH_DIR
              value: /scratch
            {{- if .Values.credentials.useSecret }}
            - name: AWS_SHARED_CREDENTIALS_FILE
              value: /credentials/{{ .Values.credentials.key }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /credentials/{{ .Values.credentials.key }}
            - name: AZURE_CREDENTIALS_FILE
              value: /credentials/{{ .Values.credentials.key }}
            {{- end }}
            {{- with .Values.configuration.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.nodeAgent.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.credentials.extraSecretRef }}
          envFrom:
            - secretRef:
                name: {{ .Values.credentials.extraSecretRef }}
          {{- end }}
          volumeMounts:
            {{- if .Values.credentials.useSecret }}
            - name: cloud-credentials
              mountPath: /credentials
            {{- end }}
            - name: scratch
              mountPath: /scratch
            {{- if not .Values.nodeAgent.disableHostPath }}
            - name: host-pods
              mountPath: /host_pods
              mountPropagation: HostToContainer
            - name: host-plugins
              mountPath: /host_plugins
              mountPropagation: HostToContainer
            {{- end }}
            {{- with .Values.nodeAgent.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.nodeAgent.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeAgent.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: scratch
          emptyDir: {}
        {{- if .Values.credentials.useSecret }}
        - name: cloud-credentials
          secret:
            secretName: {{ include "velero.secretName" . }}
        {{- end }}
        {{- if not .Values.nodeAgent.disableHostPath }}
        - name: host-pods
          hostPath:
            path: {{ .Values.nodeAgent.podVolumePath }}
        - name: host-plugins
          hostPath:
            path: {{ .Values.nodeAgent.pluginVolumePath }}
        {{- end }}
        {{- with .Values.nodeAgent.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      dnsPolicy: {{ .Values.nodeAgent.dnsPolicy }}
      {{- with .Values.nodeAgent.dnsConfig }}
      dnsConfig:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeAgent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeAgent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeAgent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- with .Values.nodeAgent.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
