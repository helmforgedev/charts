{{- if .Values.serviceAccount.server.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "velero.serviceAccountName" . }}
  labels:
    {{- include "velero.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.server.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.server.automountServiceAccountToken }}
{{- end }}
