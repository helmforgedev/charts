# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Apache Druid Configuration
# =============================================================================

# -- Override the chart name used in resource names
nameOverride: ""

# -- Override the full release name used in resource names
fullnameOverride: ""

# -- Labels added to every resource created by this chart
commonLabels: {}

image:
  # -- Druid container image repository
  repository: docker.io/apache/druid
  # -- Druid image tag. Defaults to appVersion.
  tag: "37.0.0"
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# =============================================================================
# Common Druid Configuration
# =============================================================================

druid:
  # -- Extra common runtime properties applied to all components
  extraCommonProperties: ""
  # -- Extra environment variables for all components
  extraEnv: []

# =============================================================================
# Metadata Storage (PostgreSQL)
# =============================================================================

metadata:
  # -- Metadata storage mode: subchart | external
  mode: subchart
  external:
    # -- External metadata storage type (postgresql or mysql)
    type: postgresql
    # -- External database host
    host: ""
    # -- External database port
    port: 5432
    # -- External database name
    name: druid
    # -- External database username
    username: druid
    # -- External database password
    password: ""
    # -- Existing secret with external database password
    existingSecret: ""
    # -- Key in existingSecret for password
    existingSecretPasswordKey: password

# =============================================================================
# ZooKeeper
# =============================================================================

zookeeperConfig:
  # -- ZooKeeper mode: subchart | external
  mode: subchart
  external:
    # -- External ZooKeeper connection string (host1:port1,host2:port2)
    hosts: ""

# =============================================================================
# Deep Storage
# =============================================================================

deepStorage:
  # -- Deep storage type: local | s3
  type: local
  s3:
    # -- S3 bucket name
    bucket: ""
    # -- S3 base key (prefix)
    baseKey: druid/segments
    # -- S3 region
    region: us-east-1
    # -- S3 endpoint URL (for MinIO or compatible)
    endpointUrl: ""
    # -- S3 access key
    accessKey: ""
    # -- S3 secret key
    secretKey: ""
    # -- Existing secret with S3 credentials
    existingSecret: ""
    # -- Key in existingSecret for access key
    existingSecretAccessKeyKey: access-key
    # -- Key in existingSecret for secret key
    existingSecretSecretKeyKey: secret-key

# =============================================================================
# Coordinator
# =============================================================================

coordinator:
  # -- Enable coordinator
  enabled: true
  # -- Number of coordinator replicas
  replicaCount: 1
  # -- Coordinator port
  port: 8081
  # -- JVM options
  javaOpts: "-Xms128m -Xmx256m"
  # -- Extra runtime properties
  extraProperties: ""
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# Overlord
# =============================================================================

overlord:
  # -- Enable overlord (can be combined with coordinator)
  enabled: false
  # -- Number of overlord replicas
  replicaCount: 1
  # -- Overlord port
  port: 8090
  # -- JVM options
  javaOpts: "-Xms128m -Xmx256m"
  # -- Extra runtime properties
  extraProperties: ""
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# Broker
# =============================================================================

broker:
  # -- Enable broker
  enabled: true
  # -- Number of broker replicas
  replicaCount: 1
  # -- Broker port
  port: 8082
  # -- JVM options
  javaOpts: "-Xms256m -Xmx512m"
  # -- Extra runtime properties
  extraProperties: ""
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# Router (Web Console)
# =============================================================================

router:
  # -- Enable router (web console)
  enabled: true
  # -- Number of router replicas
  replicaCount: 1
  # -- Router port
  port: 8888
  # -- JVM options
  javaOpts: "-Xms128m -Xmx256m"
  # -- Extra runtime properties
  extraProperties: ""
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# Historical
# =============================================================================

historical:
  # -- Enable historical
  enabled: false
  # -- Number of historical replicas
  replicaCount: 1
  # -- Historical port
  port: 8083
  # -- JVM options
  javaOpts: "-Xms256m -Xmx512m"
  # -- Extra runtime properties
  extraProperties: ""
  # -- Segment cache persistence
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# MiddleManager
# =============================================================================

middleManager:
  # -- Enable middle manager
  enabled: false
  # -- Number of middle manager replicas
  replicaCount: 1
  # -- MiddleManager port
  port: 8091
  # -- JVM options
  javaOpts: "-Xms128m -Xmx256m"
  # -- Number of task workers per middle manager
  workerCapacity: 2
  # -- Extra runtime properties
  extraProperties: ""
  # -- Task storage persistence
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce
  # -- Resource requests and limits
  resources: {}
  # -- Pod labels
  podLabels: {}
  # -- Pod annotations
  podAnnotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type for the router (web console)
  type: ClusterIP
  # -- Service port
  port: 80
  # -- Service annotations
  annotations: {}
  # -- IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress (routes to the router/web console)
  enabled: false
  # -- Ingress class name (traefik, nginx, etc.)
  ingressClassName: traefik
  # -- Ingress annotations
  # @default -- `{}`
  # Example:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}
  # -- Ingress hosts
  hosts: []
  # -- Ingress TLS
  tls: []

# =============================================================================
# Gateway API
# =============================================================================

gatewayAPI:
  # -- Enable Gateway API HTTPRoute for the router/web console
  enabled: false
  # -- Parent Gateway references. Gateways are managed outside this chart.
  parentRefs: []
    # - name: shared-gateway
    #   namespace: gateway-system
    #   sectionName: https
  # -- Hostnames attached to the HTTPRoute
  hostnames: []
  # -- Path matches attached to the HTTPRoute
  paths:
    - type: PathPrefix
      value: /
  # -- HTTPRoute annotations
  annotations: {}

# =============================================================================
# External Secrets
# =============================================================================

externalSecrets:
  # -- Render ExternalSecret resources for clusters that already run External Secrets Operator
  enabled: false
  # -- ExternalSecret API version
  apiVersion: external-secrets.io/v1
  # -- Refresh interval used by rendered ExternalSecret resources
  refreshInterval: 1h
  secretStoreRef:
    # -- SecretStore or ClusterSecretStore name. Required when externalSecrets.enabled=true.
    name: ""
    # -- Secret store kind
    kind: SecretStore
  target:
    # -- ExternalSecret target creation policy
    creationPolicy: Owner
  metadata:
    # -- Manage the external metadata database password Secret with External Secrets Operator.
    # Requires metadata.mode=external and metadata.external.existingSecret to point at the target Secret.
    enabled: false
    # -- Remote mappings for metadata password keys
    data: []
      # - secretKey: password
      #   remoteRef:
      #     key: druid/metadata
      #     property: password
    # -- Optional dataFrom rules for metadata Secret projection
    dataFrom: []
  deepStorage:
    # -- Manage the S3 deep storage credential Secret with External Secrets Operator.
    # Requires deepStorage.type=s3 and deepStorage.s3.existingSecret to point at the target Secret.
    enabled: false
    # -- Remote mappings for S3 credential keys
    data: []
      # - secretKey: access-key
      #   remoteRef:
      #     key: druid/s3
      #     property: access-key
      # - secretKey: secret-key
      #   remoteRef:
      #     key: druid/s3
      #     property: secret-key
    # -- Optional dataFrom rules for S3 Secret projection
    dataFrom: []

# =============================================================================
# NetworkPolicy
# =============================================================================

networkPolicy:
  # -- Enable NetworkPolicy resources
  enabled: false
  ingress:
    # -- Allow ingress from pods in the same namespace to Druid component ports
    allowSameNamespace: true
    # -- Additional ingress peers, for example Gateway controller namespaces
    extraFrom: []
  egress:
    # -- Enable egress policy rules. Disabled by default to avoid blocking unknown metadata, ZooKeeper, or S3 endpoints.
    enabled: false
    # -- Allow DNS egress to kube-system
    allowDNS: true
    # -- Allow egress to pods in the same namespace for Druid components, PostgreSQL, and ZooKeeper
    allowSameNamespace: true
    # -- Allow HTTPS egress to public internet for S3-compatible endpoints and integrations
    allowHTTPS: true
    # -- Allow HTTP egress to public internet for non-TLS S3-compatible endpoints
    allowHTTP: false
    # -- Additional egress peers
    extraTo: []

# =============================================================================
# ServiceAccount
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- ServiceAccount annotations
  annotations: {}

# =============================================================================
# Security & Scheduling
# =============================================================================

# -- Pod-level security context (fsGroup matches the druid image UID)
podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Priority class name
priorityClassName: ""

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30

# -- Extra volumes
extraVolumes: []

# -- Extra volume mounts
extraVolumeMounts: []

# -- Extra Kubernetes manifests to deploy
extraManifests: []

# =============================================================================
# PostgreSQL Subchart
# =============================================================================

postgresql:
  # -- Enable PostgreSQL subchart for metadata storage
  enabled: true
  auth:
    # -- PostgreSQL database name
    database: druid
    # -- PostgreSQL username
    username: druid
    # -- PostgreSQL password. Auto-generated if empty.
    password: ""

# =============================================================================
# Bundled ZooKeeper
# =============================================================================

zookeeper:
  # -- Enable bundled ZooKeeper
  enabled: true
  image:
    # -- ZooKeeper container image repository
    repository: docker.io/library/zookeeper
    # -- ZooKeeper container image tag
    tag: "3.9.4"
    # -- ZooKeeper image pull policy
    pullPolicy: IfNotPresent
  # -- Number of ZooKeeper replicas
  replicaCount: 1
  # -- ZooKeeper client port
  clientPort: 2181
  # -- ZooKeeper peer port
  peerPort: 2888
  # -- ZooKeeper leader election port
  electionPort: 3888
  # -- ZooKeeper tick time in milliseconds
  tickTime: 2000
  # -- ZooKeeper init limit
  initLimit: 10
  # -- ZooKeeper sync limit
  syncLimit: 5
  # -- ZooKeeper 4-letter commands exposed for probes and diagnostics
  fourLetterWordWhitelist: ruok,mntr,conf
  # -- ZooKeeper resources
  resources: {}
  # -- ZooKeeper pod security context
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  # -- ZooKeeper container security context
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  # -- ZooKeeper pod annotations
  podAnnotations: {}
  # -- ZooKeeper pod labels
  podLabels: {}
  persistence:
    # -- Enable ZooKeeper persistence
    enabled: true
    # -- ZooKeeper data volume size
    size: 2Gi
    # -- ZooKeeper storage class
    storageClass: ""
    # -- ZooKeeper access modes
    accessModes:
      - ReadWriteOnce
