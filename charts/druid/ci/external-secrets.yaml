# CI scenario: External Secrets Operator integration for external metadata and S3 credentials (GR-061)
postgresql:
  enabled: false

metadata:
  mode: external
  external:
    type: postgresql
    host: postgres.example.com
    port: 5432
    name: druid
    username: druid
    existingSecret: druid-metadata

zookeeperConfig:
  mode: external
  external:
    hosts: "zk1.example.com:2181,zk2.example.com:2181"

zookeeper:
  enabled: false

deepStorage:
  type: s3
  s3:
    bucket: my-druid-bucket
    existingSecret: druid-s3

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  metadata:
    enabled: true
    data:
      - secretKey: password
        remoteRef:
          key: druid/metadata
          property: password
  deepStorage:
    enabled: true
    data:
      - secretKey: access-key
        remoteRef:
          key: druid/s3
          property: access-key
      - secretKey: secret-key
        remoteRef:
          key: druid/s3
          property: secret-key

