# SPDX-License-Identifier: Apache-2.0
# CI scenario: External Secrets Operator integration for external metadata and S3 credentials (GR-061)
postgresql:
  enabled: false

metadata:
  mode: external
  external:
    type: postgresql
    host: druid-eso-postgresql
    port: 5432
    name: druid
    username: druid
    existingSecret: druid-metadata

zookeeperConfig:
  mode: external
  external:
    hosts: "druid-eso-zookeeper:2181"

zookeeper:
  enabled: false

deepStorage:
  type: s3
  s3:
    bucket: my-druid-bucket
    existingSecret: druid-s3

externalSecrets:
  enabled: true
  secretStoreRef:
    name: druid-ci-fake-store
    kind: SecretStore
  metadata:
    enabled: true
    data:
      - secretKey: password
        remoteRef:
          key: druid/metadata
          property: password
  deepStorage:
    enabled: true
    data:
      - secretKey: access-key
        remoteRef:
          key: druid/s3
          property: access-key
      - secretKey: secret-key
        remoteRef:
          key: druid/s3
          property: secret-key

extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: SecretStore
    metadata:
      name: druid-ci-fake-store
    spec:
      provider:
        fake:
          data:
            - key: druid/metadata
              value: '{"password":"external-password"}'
            - key: druid/s3
              value: '{"access-key":"test-access-key","secret-key":"test-secret-key"}'
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: druid-eso-postgresql
      labels:
        app.kubernetes.io/name: druid-eso-postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: druid-eso-postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: druid-eso-postgresql
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.3-trixie
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTGRES_DB
                  value: druid
                - name: POSTGRES_USER
                  value: druid
                - name: POSTGRES_PASSWORD
                  value: external-password
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
              ports:
                - name: postgres
                  containerPort: 5432
              readinessProbe:
                exec:
                  command:
                    - sh
                    - -ec
                    - pg_isready -U druid -d druid -h 127.0.0.1
                initialDelaySeconds: 5
                periodSeconds: 5
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql/data
          volumes:
            - name: data
              emptyDir: {}
  - apiVersion: v1
    kind: Service
    metadata:
      name: druid-eso-postgresql
      labels:
        app.kubernetes.io/name: druid-eso-postgresql
    spec:
      type: ClusterIP
      ports:
        - name: postgres
          port: 5432
          targetPort: postgres
      selector:
        app.kubernetes.io/name: druid-eso-postgresql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: druid-eso-zookeeper
      labels:
        app.kubernetes.io/name: druid-eso-zookeeper
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: druid-eso-zookeeper
      template:
        metadata:
          labels:
            app.kubernetes.io/name: druid-eso-zookeeper
        spec:
          containers:
            - name: zookeeper
              image: docker.io/library/zookeeper:3.9.4
              imagePullPolicy: IfNotPresent
              env:
                - name: ZOO_4LW_COMMANDS_WHITELIST
                  value: ruok,mntr,conf
              ports:
                - name: client
                  containerPort: 2181
              readinessProbe:
                tcpSocket:
                  port: client
                initialDelaySeconds: 10
                periodSeconds: 5
  - apiVersion: v1
    kind: Service
    metadata:
      name: druid-eso-zookeeper
      labels:
        app.kubernetes.io/name: druid-eso-zookeeper
    spec:
      type: ClusterIP
      ports:
        - name: client
          port: 2181
          targetPort: client
      selector:
        app.kubernetes.io/name: druid-eso-zookeeper
