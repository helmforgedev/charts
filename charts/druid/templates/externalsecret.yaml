{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- include "druid.validateExternalSecrets" . }}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.metadata.enabled }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "druid.fullname" . }}-metadata
  labels:
    {{- include "druid.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ include "druid.metadataSecretName" . | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  {{- with .Values.externalSecrets.metadata.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.externalSecrets.metadata.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.deepStorage.enabled }}
---
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "druid.fullname" . }}-deep-storage
  labels:
    {{- include "druid.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ include "druid.deepStorageSecretName" . | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  {{- with .Values.externalSecrets.deepStorage.data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.externalSecrets.deepStorage.dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
