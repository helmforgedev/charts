{{- if .Values.gatewayAPI.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "druid.fullname" . }}
  labels:
    {{- include "druid.labels" . | nindent 4 }}
  {{- with .Values.gatewayAPI.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.gatewayAPI.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.gatewayAPI.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- range .Values.gatewayAPI.paths }}
        - path:
            type: {{ .type | default "PathPrefix" }}
            value: {{ .value | default "/" | quote }}
        {{- end }}
      backendRefs:
        - name: {{ include "druid.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
