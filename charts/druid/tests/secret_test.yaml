suite: secrets
templates:
  - templates/secret.yaml
tests:
  - it: should not render any secrets in default subchart mode with local storage
    asserts:
      - hasDocuments:
          count: 0

  - it: should render metadata secret in external mode
    set:
      metadata:
        mode: external
        external:
          password: my-password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0

  - it: should render deep storage secret for s3
    set:
      deepStorage:
        type: s3
        s3:
          bucket: test
          accessKey: AKID
          secretKey: SKEY
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
        documentIndex: 0

  - it: should render both secrets when external metadata and s3
    set:
      metadata:
        mode: external
        external:
          password: my-password
      deepStorage:
        type: s3
        s3:
          bucket: test
          accessKey: AKID
          secretKey: SKEY
    asserts:
      - hasDocuments:
          count: 2
