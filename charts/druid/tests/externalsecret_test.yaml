suite: externalsecrets
templates:
  - templates/externalsecret.yaml
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render metadata ExternalSecret
    set:
      metadata:
        mode: external
        external:
          existingSecret: druid-metadata
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: platform-secrets
          kind: ClusterSecretStore
        metadata:
          enabled: true
          data:
            - secretKey: password
              remoteRef:
                key: druid/metadata
                property: password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
      - equal:
          path: spec.target.name
          value: druid-metadata
      - equal:
          path: spec.data[0].secretKey
          value: password

  - it: should render deep storage ExternalSecret
    set:
      deepStorage:
        type: s3
        s3:
          existingSecret: druid-s3
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: platform-secrets
          kind: SecretStore
        deepStorage:
          enabled: true
          data:
            - secretKey: access-key
              remoteRef:
                key: druid/s3
                property: access-key
            - secretKey: secret-key
              remoteRef:
                key: druid/s3
                property: secret-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: spec.target.name
          value: druid-s3
      - equal:
          path: spec.data[0].secretKey
          value: access-key
      - equal:
          path: spec.data[1].secretKey
          value: secret-key

  - it: should render both ExternalSecrets
    set:
      metadata:
        mode: external
        external:
          existingSecret: druid-metadata
      deepStorage:
        type: s3
        s3:
          existingSecret: druid-s3
      externalSecrets:
        enabled: true
        secretStoreRef:
          name: platform-secrets
        metadata:
          enabled: true
          data:
            - secretKey: password
              remoteRef:
                key: druid/metadata
                property: password
        deepStorage:
          enabled: true
          data:
            - secretKey: access-key
              remoteRef:
                key: druid/s3
                property: access-key
            - secretKey: secret-key
              remoteRef:
                key: druid/s3
                property: secret-key
    asserts:
      - hasDocuments:
          count: 2

