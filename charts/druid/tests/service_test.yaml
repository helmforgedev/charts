# SPDX-License-Identifier: Apache-2.0
suite: services
templates:
  - templates/service.yaml
tests:
  - it: should render router service with correct port
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.type
          value: ClusterIP
      - notExists:
          path: spec.ipFamilyPolicy
      - notExists:
          path: spec.ipFamilies

  - it: should render coordinator headless service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid-coordinator-headless
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true

  - it: should render broker service
    documentIndex: 5
    set:
      overlord.enabled: true
      historical.enabled: true
      middleManager.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid-broker
      - equal:
          path: spec.ports[0].port
          value: 8082

  - it: should render dual-stack settings on router service
    documentIndex: 0
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6

  - it: should render dual-stack settings on headless services
    documentIndex: 1
    set:
      service.ipFamilyPolicy: RequireDualStack
      service.ipFamilies:
        - IPv6
        - IPv4
    asserts:
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.publishNotReadyAddresses
          value: true
      - equal:
          path: spec.ipFamilyPolicy
          value: RequireDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv6
      - equal:
          path: spec.ipFamilies[1]
          value: IPv4
