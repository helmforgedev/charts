suite: services
templates:
  - templates/service.yaml
tests:
  - it: should render router service with correct port
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should render coordinator headless service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid-coordinator-headless
      - equal:
          path: spec.clusterIP
          value: None

  - it: should render broker service
    documentIndex: 5
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-druid-broker
      - equal:
          path: spec.ports[0].port
          value: 8082
