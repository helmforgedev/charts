# SPDX-License-Identifier: Apache-2.0
# Simple Druid deployment for development and chart evaluation.
# Use case: bundled PostgreSQL and ZooKeeper with a dev MinIO backend for shared deep storage.

postgresql:
  enabled: true

zookeeper:
  enabled: true

deepStorage:
  type: s3
  s3:
    bucket: druid-dev-segments
    baseKey: simple/segments
    region: us-east-1
    endpointUrl: http://druid-dev-minio:9000
    accessKey: minioadmin
    secretKey: minioadmin

service:
  type: ClusterIP
  port: 80

overlord:
  enabled: true

historical:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi

middleManager:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: druid-dev-minio
      labels:
        app.kubernetes.io/name: druid-dev-minio
        app.kubernetes.io/component: deep-storage
    spec:
      type: ClusterIP
      ports:
        - name: api
          port: 9000
          targetPort: api
        - name: console
          port: 9001
          targetPort: console
      selector:
        app.kubernetes.io/name: druid-dev-minio
        app.kubernetes.io/component: deep-storage
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: druid-dev-minio
      labels:
        app.kubernetes.io/name: druid-dev-minio
        app.kubernetes.io/component: deep-storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: druid-dev-minio
      labels:
        app.kubernetes.io/name: druid-dev-minio
        app.kubernetes.io/component: deep-storage
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: druid-dev-minio
          app.kubernetes.io/component: deep-storage
      template:
        metadata:
          labels:
            app.kubernetes.io/name: druid-dev-minio
            app.kubernetes.io/component: deep-storage
        spec:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: minio
              image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
              imagePullPolicy: IfNotPresent
              args:
                - server
                - /data
                - --console-address
                - :9001
              env:
                - name: MINIO_ROOT_USER
                  value: minioadmin
                - name: MINIO_ROOT_PASSWORD
                  value: minioadmin
              ports:
                - name: api
                  containerPort: 9000
                - name: console
                  containerPort: 9001
              livenessProbe:
                httpGet:
                  path: /minio/health/live
                  port: api
              readinessProbe:
                httpGet:
                  path: /minio/health/ready
                  port: api
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: druid-dev-minio
  - apiVersion: batch/v1
    kind: Job
    metadata:
      name: druid-dev-minio-bucket
      labels:
        app.kubernetes.io/name: druid-dev-minio
        app.kubernetes.io/component: bucket-bootstrap
      annotations:
        helm.sh/hook: post-install,post-upgrade
        helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app.kubernetes.io/name: druid-dev-minio
            app.kubernetes.io/component: bucket-bootstrap
        spec:
          restartPolicy: OnFailure
          containers:
            - name: create-bucket
              image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  until mc alias set local http://druid-dev-minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                    sleep 5
                  done
                  mc mb --ignore-existing local/druid-dev-segments
              env:
                - name: MINIO_ROOT_USER
                  value: minioadmin
                - name: MINIO_ROOT_PASSWORD
                  value: minioadmin
              resources:
                requests:
                  cpu: 25m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsGroup: 1000
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
