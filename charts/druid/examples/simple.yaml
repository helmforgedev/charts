# Simple Druid deployment for development and chart evaluation.
# Use case: self-contained install with bundled PostgreSQL and ZooKeeper.

postgresql:
  enabled: true

zookeeper:
  enabled: true

deepStorage:
  type: local

service:
  type: ClusterIP
  port: 80

historical:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi

middleManager:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
