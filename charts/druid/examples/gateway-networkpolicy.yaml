# Druid router exposed through Gateway API with NetworkPolicy enabled.
# Use case: platform Gateway owns TLS and listener policy.

gatewayAPI:
  enabled: true
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: https
  hostnames:
    - druid.example.com
  paths:
    - type: PathPrefix
      value: /

networkPolicy:
  enabled: true
  ingress:
    allowSameNamespace: true
    extraFrom:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: gateway-system
  egress:
    enabled: true
    allowDNS: true
    allowSameNamespace: true
    allowHTTPS: true

