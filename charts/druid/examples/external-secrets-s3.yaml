# SPDX-License-Identifier: Apache-2.0
# Druid with External Secrets Operator managing metadata and S3 credentials.
# Use case: secret rotation owned by the platform secret store.

postgresql:
  enabled: false

metadata:
  mode: external
  external:
    type: postgresql
    host: postgresql.druid-data.svc.cluster.local
    port: 5432
    name: druid
    username: druid
    existingSecret: druid-metadata

deepStorage:
  type: s3
  s3:
    bucket: druid-segments
    baseKey: production/segments
    region: us-east-1
    existingSecret: druid-s3

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  metadata:
    enabled: true
    data:
      - secretKey: password
        remoteRef:
          key: druid/metadata
          property: password
  deepStorage:
    enabled: true
    data:
      - secretKey: access-key
        remoteRef:
          key: druid/s3
          property: access-key
      - secretKey: secret-key
        remoteRef:
          key: druid/s3
          property: secret-key

