# CI: ingress enabled
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: deals.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - deals.example.com
      secretName: discount-bandit-tls
