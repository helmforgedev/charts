# SPDX-License-Identifier: Apache-2.0
# CI: External Secrets for app and external database credentials with local fake store
database:
  mode: external
  external:
    host: discount-bandit-eso-mysql
    name: discount_bandit
    username: discount_bandit
mysql:
  enabled: false
externalSecrets:
  enabled: true
  secretStoreRef:
    name: discount-bandit-ci-fake-store
    kind: SecretStore
  app:
    enabled: true
    appKeyRemoteRef:
      key: app-key
    exchangeRateApiKeyRemoteRef:
      key: exchange-rate-api-key
  database:
    enabled: true
    passwordRemoteRef:
      key: database-password
extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: SecretStore
    metadata:
      name: discount-bandit-ci-fake-store
    spec:
      provider:
        fake:
          data:
            - key: app-key
              value: base64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
            - key: exchange-rate-api-key
              value: test-exchange-rate-key
            - key: database-password
              value: helmforge-test-password
  - apiVersion: v1
    kind: Service
    metadata:
      name: discount-bandit-eso-mysql
      labels:
        app.kubernetes.io/name: discount-bandit-eso-mysql
    spec:
      type: ClusterIP
      ports:
        - name: mysql
          port: 3306
          targetPort: mysql
      selector:
        app.kubernetes.io/name: discount-bandit-eso-mysql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: discount-bandit-eso-mysql
      labels:
        app.kubernetes.io/name: discount-bandit-eso-mysql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: discount-bandit-eso-mysql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: discount-bandit-eso-mysql
        spec:
          automountServiceAccountToken: false
          securityContext:
            fsGroup: 999
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mysql
              image: docker.io/library/mysql:9.7.0
              imagePullPolicy: IfNotPresent
              ports:
                - name: mysql
                  containerPort: 3306
              env:
                - name: MYSQL_DATABASE
                  value: discount_bandit
                - name: MYSQL_USER
                  value: discount_bandit
                - name: MYSQL_PASSWORD
                  value: helmforge-test-password
                - name: MYSQL_ROOT_PASSWORD
                  value: root-change-me
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: false
                runAsGroup: 999
                runAsNonRoot: true
                runAsUser: 999
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
