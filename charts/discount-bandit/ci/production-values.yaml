# SPDX-License-Identifier: Apache-2.0
# CI: production-style deployment with MySQL, Gateway API, and NetworkPolicy
replicaCount: 1
discountBandit:
  appUrl: https://deals.example.com
  assetUrl: https://deals.example.com
  timezone: UTC
  themeColor: Stone
mysql:
  enabled: true
  standalone:
    persistence:
      enabled: true
      size: 20Gi
serviceAccount:
  automountServiceAccountToken: false
gatewayAPI:
  enabled: true
  parentRefs:
    - name: public-gateway
      namespace: gateway-system
  hostnames:
    - deals.example.com
networkPolicy:
  enabled: true
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true
    allowHTTP: false
    allowSameNamespaceDatabase: true
pdb:
  enabled: true
  minAvailable: 1
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
