suite: NetworkPolicy
templates:
  - templates/networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress and egress policy
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress
