# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - templates/networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress and egress policy
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress

  - it: should render canonical extra egress rules
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
      networkPolicy.egress.allowDNS: false
      networkPolicy.egress.allowHTTPS: false
      networkPolicy.egress.allowHTTP: false
      networkPolicy.egress.allowSameNamespaceDatabase: false
      networkPolicy.egress.extraEgress:
        - to:
            - ipBlock:
                cidr: 10.0.0.0/8
          ports:
            - protocol: TCP
              port: 443
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.0.0.0/8
            ports:
              - protocol: TCP
                port: 443
