suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-discount-bandit

  - it: should use port 80
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should use ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should render dual-stack fields
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
