# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-discount-bandit

  - it: should use Recreate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/cybrarist/discount-bandit:v4.0.3"

  - it: should expose port 80
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP

  - it: should mount data volume at /app/database/sqlite
    set:
      database.mode: sqlite
      database.sqlite.enabled: true
      mysql.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: database
            mountPath: /app/database/sqlite

  - it: should use MySQL by default
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_CONNECTION
            value: mysql
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            value: test-mysql

  - it: should use the configured MySQL existingSecret
    set:
      mysql.auth.existingSecret: discount-bandit-mysql
      mysql.auth.existingSecretUserPasswordKey: app-password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: discount-bandit-mysql
                key: app-password

  - it: should honor MySQL fullnameOverride
    set:
      mysql.fullnameOverride: platform-mysql
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            value: platform-mysql
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: DB_HOST
            value: platform-mysql
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: platform-mysql-auth
                key: mysql-user-password

  - it: should honor MySQL nameOverride
    set:
      mysql.nameOverride: mysql-primary
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_HOST
            value: test-mysql-primary
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: DB_HOST
            value: test-mysql-primary
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-mysql-primary-auth
                key: mysql-user-password

  - it: should use PVC for SQLite data when persistence enabled
    set:
      database.mode: sqlite
      database.sqlite.enabled: true
      mysql.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: database
            persistentVolumeClaim:
              claimName: test-discount-bandit-data

  - it: should use emptyDir when persistence disabled
    set:
      database.mode: sqlite
      database.sqlite.enabled: true
      mysql.enabled: false
      persistence.database.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: database
            emptyDir: {}

  - it: should disable service account token automount
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false

  - it: should use TCP probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: http
