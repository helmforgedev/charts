suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not render when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
