# Gateway API example. Requires Gateway API v1 CRDs and a Gateway controller.

gatewayAPI:
  enabled: true
  parentRefs:
    - name: public-gateway
      namespace: gateway-system
  hostnames:
    - deals.example.com

discountBandit:
  appUrl: https://deals.example.com

service:
  type: ClusterIP
  port: 80

