# =============================================================================
# Discount Bandit Helm Chart — Default Values
# =============================================================================
# Focus: deal aggregator and price tracker for self-hosted deal hunting

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Discount Bandit container image
  repository: docker.io/cybrarist/discount-bandit
  # -- Image tag (defaults to appVersion with v prefix)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Discount Bandit Configuration
# =============================================================================

discountBandit:
  # -- Public URL of the instance (e.g. https://deals.example.com)
  appUrl: ""
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for SQLite database
  enabled: true
  # -- Storage size
  size: 5Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Discount Bandit
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: deals.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - deals.example.com
    #   secretName: discount-bandit-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
