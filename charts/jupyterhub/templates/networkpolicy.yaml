{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jupyterhub.fullname" . }}-proxy
  labels:
    {{- include "jupyterhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  podSelector:
    matchLabels:
      {{- include "jupyterhub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: proxy
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: http
    - from:
        - podSelector:
            matchLabels:
              {{- include "jupyterhub.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: hub
      ports:
        - protocol: TCP
          port: api
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              {{- include "jupyterhub.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: hub
      ports:
        - protocol: TCP
          port: hub
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jupyterhub.fullname" . }}-hub
  labels:
    {{- include "jupyterhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: hub
spec:
  podSelector:
    matchLabels:
      {{- include "jupyterhub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hub
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "jupyterhub.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: proxy
      ports:
        - protocol: TCP
          port: hub
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
    - to:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "jupyterhub.fullname" . }}-singleuser
  labels:
    {{- include "jupyterhub.labels" . | nindent 4 }}
    app.kubernetes.io/component: singleuser
spec:
  podSelector:
    matchLabels:
      {{- include "jupyterhub.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: singleuser
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "jupyterhub.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: proxy
{{- end }}
