{{- if not .Values.proxy.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jupyterhub.secretName" . }}
  labels:
    {{- include "jupyterhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.proxy.existingSecretTokenKey }}: {{ include "jupyterhub.proxyToken" . | quote }}
{{- end }}
