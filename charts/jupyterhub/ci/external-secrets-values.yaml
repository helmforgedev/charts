# SPDX-License-Identifier: Apache-2.0
proxy:
  existingSecret: jupyterhub-proxy-managed
externalSecrets:
  enabled: true
  secretStoreRef:
    name: cluster-secrets
    kind: ClusterSecretStore
  data:
    - secretKey: proxy-token
      remoteRef:
        key: jupyterhub/proxy
        property: token
