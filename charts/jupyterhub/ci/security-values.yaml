pdb:
  enabled: true
singleuser:
  storage:
    enabled: true
    capacity: 1Gi
networkPolicy:
  enabled: true
proxy:
  existingSecret: jupyterhub-proxy-token
auth:
  type: custom
hub:
  extraConfig: |
    c.JupyterHub.authenticator_class = "nativeauthenticator.NativeAuthenticator"
