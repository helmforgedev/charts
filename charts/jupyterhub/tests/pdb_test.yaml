# SPDX-License-Identifier: Apache-2.0
suite: PDB
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should scope disruption budget to hub component
    set:
      pdb.enabled: true
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: hub
