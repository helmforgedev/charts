# SPDX-License-Identifier: Apache-2.0
suite: Config
templates:
  - configmap.yaml
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render JupyterHub config
    template: configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["jupyterhub_config.py"]
          pattern: "KubeSpawner"

  - it: should render proxy token secret
    template: secret.yaml
    asserts:
      - isKind:
          of: Secret
