# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should restrict hub and proxy traffic when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: test-jupyterhub-proxy
        documentIndex: 0
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy
        documentIndex: 0
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
        documentIndex: 0
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 0
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
        documentIndex: 0
      - equal:
          path: spec.egress[1].to[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-jupyterhub-hub
        documentIndex: 1
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 1
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy
        documentIndex: 1
      - equal:
          path: spec.ingress[0].from[1].podSelector.matchLabels["app.kubernetes.io/component"]
          value: singleuser
        documentIndex: 1
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: hub
        documentIndex: 1
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
        documentIndex: 1
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: TCP
            port: 443
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-jupyterhub-singleuser
        documentIndex: 2
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: singleuser
        documentIndex: 2
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy
        documentIndex: 2
      - equal:
          path: spec.ingress[0].from[1].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 2

  - it: should keep derived network policy names within DNS label length
    set:
      networkPolicy.enabled: true
      fullnameOverride: jupyterhub-with-a-very-long-name-that-fills-the-dns-label-limit
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: "-proxy$"
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"
        documentIndex: 1
      - matchRegex:
          path: metadata.name
          pattern: "-hub$"
        documentIndex: 1
      - matchRegex:
          path: metadata.name
          pattern: "^.{1,63}$"
        documentIndex: 2
      - matchRegex:
          path: metadata.name
          pattern: "-singleuser$"
        documentIndex: 2
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
        documentIndex: 2
      - equal:
          path: spec.egress[1].to[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 2
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: TCP
            port: hub
        documentIndex: 2

  - it: should append configured Hub egress rules for external databases
    set:
      networkPolicy.enabled: true
      networkPolicy.hub.egress:
        - to:
            - ipBlock:
                cidr: 10.50.0.0/16
          ports:
            - protocol: TCP
              port: 5432
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.50.0.0/16
            ports:
              - protocol: TCP
                port: 5432
        documentIndex: 1

  - it: should append extra Hub egress rules
    values:
      - networkpolicy-extra-egress-values.yaml
    asserts:
      - contains:
          path: spec.egress
          content:
            to:
              - ipBlock:
                  cidr: 10.60.0.0/16
            ports:
              - protocol: TCP
                port: 443
        documentIndex: 1
