# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: default
tests:
  - it: should restrict hub and proxy traffic when enabled
    set:
      networkPolicy.enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-jupyterhub-proxy
        documentIndex: 0
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy
        documentIndex: 0
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http
        documentIndex: 0
      - equal:
          path: spec.ingress[1].from[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 0
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
        documentIndex: 0
      - equal:
          path: spec.egress[1].to[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-jupyterhub-hub
        documentIndex: 1
      - equal:
          path: spec.podSelector.matchLabels["app.kubernetes.io/component"]
          value: hub
        documentIndex: 1
      - equal:
          path: spec.ingress[0].from[0].podSelector.matchLabels["app.kubernetes.io/component"]
          value: proxy
        documentIndex: 1
      - contains:
          path: spec.egress[0].ports
          content:
            protocol: UDP
            port: 53
        documentIndex: 1
      - contains:
          path: spec.egress[1].ports
          content:
            protocol: TCP
            port: 443
        documentIndex: 1
