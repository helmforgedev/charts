# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render proxy and hub services
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: test-jupyterhub
        documentIndex: 0
      - notContains:
          path: spec.ports
          content:
            name: proxy-api
            port: 8001
            targetPort: api
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-jupyterhub-proxy-api
        documentIndex: 1
      - equal:
          path: spec.type
          value: ClusterIP
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-jupyterhub-hub
        documentIndex: 2

  - it: should render dual-stack fields
    documentIndex: 0
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack

  - it: should render proxy service annotations
    documentIndex: 0
    set:
      service.annotations:
        service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    asserts:
      - equal:
          path: metadata.annotations["service.beta.kubernetes.io/aws-load-balancer-scheme"]
          value: internet-facing

  - it: should render common labels on a separate YAML line
    documentIndex: 0
    set:
      commonLabels.foo: bar
    asserts:
      - equal:
          path: metadata.labels.foo
          value: bar
