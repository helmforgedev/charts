apiVersion: v2
name: alfio
description: Open-source event management and ticketing platform with PostgreSQL backend
type: application
version: 1.0.1
appVersion: "2.0-M5-2509-1"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - events
  - ticketing
  - conference
  - alfio
  - self-hosted
home: https://alf.io
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/alfio-event/alf.io
icon: https://alf.io/img/alfio-logo.svg
annotations:
  helmforge.dev/maturity: alpha
  helmforge.dev/signed: cosign
  artifacthub.io/license: MIT
  artifacthub.io/category: skip-prediction
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/alfio
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/alfio
dependencies:
  - name: postgresql
    version: 1.8.4
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
