{{- if .Values.config }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongodb.configConfigMap" . }}
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
data:
  mongod.conf: |
    {{- toYaml .Values.config | nindent 4 }}
{{- end }}
---
{{- if and .Values.initdbScripts (not .Values.initdbScriptsConfigMap) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongodb.initdbScriptsConfigMap" . }}
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
data:
  {{- range $key, $val := .Values.initdbScripts }}
  {{ $key }}: |
    {{- $val | nindent 4 }}
  {{- end }}
{{- end }}
