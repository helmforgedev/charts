{{- if include "mongodb.backupEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongodb.fullname" . }}-backup-scripts
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
data:
  mongodb-backup.sh: |
    #!/bin/sh
    set -eu
    timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
    archive="/backup/out/${BACKUP_ARCHIVE_PREFIX}-mongodb-${timestamp}.archive.gz"
    mkdir -p /backup/out
    if [ -n "${DB_USERNAME:-}" ] && [ -n "${DB_PASSWORD:-}" ]; then
      mongodump ${MONGODUMP_EXTRA_ARGS:-} \
        --host="${DB_HOST}" \
        --port="${DB_PORT}" \
        --username="${DB_USERNAME}" \
        --password="${DB_PASSWORD}" \
        --authenticationDatabase=admin \
        --archive="${archive}" \
        --gzip
    else
      mongodump ${MONGODUMP_EXTRA_ARGS:-} \
        --host="${DB_HOST}" \
        --port="${DB_PORT}" \
        --archive="${archive}" \
        --gzip
    fi
    printf "%s" "${archive}" > /backup/out/backup-file
  upload-backup.sh: |
    #!/bin/sh
    set -eu
    archive="$(cat /backup/out/backup-file)"
    target="backup/${S3_BUCKET}"
    if [ -n "${S3_PREFIX:-}" ]; then
      target="${target}/${S3_PREFIX}"
    fi
    mc alias set backup "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    if [ "${S3_CREATE_BUCKET_IF_NOT_EXISTS}" = "true" ]; then
      mc mb --ignore-existing "backup/${S3_BUCKET}"
    fi
    mc cp "${archive}" "${target}/"
{{- end }}
