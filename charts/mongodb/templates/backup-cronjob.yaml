{{- if include "mongodb.backupEnabled" . }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "mongodb.fullname" . }}-backup
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  suspend: {{ .Values.backup.suspend }}
  concurrencyPolicy: {{ .Values.backup.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.backup.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.backup.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.backup.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "mongodb.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "mongodb.serviceAccountName" . }}
          terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            - name: mongodb-backup
              image: "{{ .Values.backup.images.mongodb.repository }}:{{ .Values.backup.images.mongodb.tag }}"
              imagePullPolicy: {{ .Values.backup.images.mongodb.pullPolicy }}
              command: ["/bin/sh", "/scripts/mongodb-backup.sh"]
              env:
                - name: BACKUP_ARCHIVE_PREFIX
                  value: {{ .Values.backup.archivePrefix | quote }}
                - name: MONGODUMP_EXTRA_ARGS
                  value: {{ .Values.backup.database.mongoDumpArgs | quote }}
                - name: DB_HOST
                  value: {{ include "mongodb.backupHost" . | quote }}
                - name: DB_PORT
                  value: {{ include "mongodb.backupPort" . | quote }}
                {{- if .Values.auth.enabled }}
                - name: DB_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mongodb.secretName" . }}
                      key: mongodb-root-username
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mongodb.secretName" . }}
                      key: mongodb-root-password
                {{- end }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
          containers:
            - name: upload
              image: "{{ .Values.backup.images.uploader.repository }}:{{ .Values.backup.images.uploader.tag }}"
              imagePullPolicy: {{ .Values.backup.images.uploader.pullPolicy }}
              command: ["/bin/sh", "/scripts/upload-backup.sh"]
              env:
                - name: S3_ENDPOINT
                  value: {{ .Values.backup.s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ .Values.backup.s3.bucket | quote }}
                - name: S3_PREFIX
                  value: {{ .Values.backup.s3.prefix | quote }}
                - name: S3_CREATE_BUCKET_IF_NOT_EXISTS
                  value: {{ ternary "true" "false" .Values.backup.s3.createBucketIfNotExists | quote }}
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mongodb.backupSecretName" . }}
                      key: {{ .Values.backup.s3.existingSecretAccessKeyKey }}
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "mongodb.backupSecretName" . }}
                      key: {{ .Values.backup.s3.existingSecretSecretKeyKey }}
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: backup-workdir
                  mountPath: /backup/out
          volumes:
            - name: scripts
              configMap:
                name: {{ include "mongodb.fullname" . }}-backup-scripts
                defaultMode: 0755
            - name: backup-workdir
              emptyDir: {}
{{- end }}
