# SPDX-License-Identifier: Apache-2.0
suite: Backup
templates:
  - templates/backup-configmap.yaml
  - templates/backup-cronjob.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render backup resources by default
    template: templates/backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render backup cronjob by default
    template: templates/backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup configmap
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/backup-configmap.yaml
    asserts:
      - isKind:
          of: ConfigMap

  - it: should render backup cronjob for standalone
    set:
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/backup-cronjob.yaml
    asserts:
      - isKind:
          of: CronJob
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].env
          content:
            name: DB_HOST
            value: test-mongodb

  - it: should use mongos for sharded backup
    set:
      architecture: sharded
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: access
      backup.s3.secretKey: secret
    template: templates/backup-cronjob.yaml
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].env
          content:
            name: DB_HOST
            value: test-mongodb-mongos
