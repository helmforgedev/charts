architecture: replicaset

auth:
  enabled: true
  rootUser: root
  rootPassword: testpassword123

replicaSet:
  name: rs0
  members: 3

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
