# CI scenario: External Secrets Operator integration (GR-061)
externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: mongodb-root-password
      remoteRef:
        key: mongodb/credentials
        property: root-password
