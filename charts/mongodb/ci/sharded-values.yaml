architecture: sharded

auth:
  enabled: true
  rootUser: root
  rootPassword: testpassword123

sharded:
  mongos:
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  configServer:
    replicaCount: 3
    persistence:
      size: 2Gi
  shards:
    count: 2
    membersPerShard: 3
    persistence:
      size: 4Gi

persistence:
  enabled: true
  size: 4Gi
