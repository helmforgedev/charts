# CI: Test auth.users auto-creation
architecture: standalone

auth:
  enabled: true
  rootUser: root
  rootPassword: testpassword
  users:
    - username: appuser
      password: apppass
      database: mydb
    - username: readonly
      password: readpass
      database: mydb
      roles:
        - { role: read, db: mydb }

persistence:
  enabled: false
