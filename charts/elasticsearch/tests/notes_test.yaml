# SPDX-License-Identifier: Apache-2.0
suite: elasticsearch - notes
templates:
  - templates/NOTES.txt
release:
  name: elasticsearch
  namespace: release-system
tests:
  - it: keeps Helm release commands in the release namespace when namespaceOverride is set
    set:
      namespaceOverride: elastic-system
    asserts:
      - matchRegexRaw:
          pattern: "HOST: elasticsearch\\.elastic-system\\.svc\\.cluster\\.local"
      - matchRegexRaw:
          pattern: "helm get values elasticsearch -n release-system"
      - matchRegexRaw:
          pattern: "-n release-system -f values\\.yaml"
      - not: true
        matchRegexRaw:
          pattern: "helm get values elasticsearch -n elastic-system"
