# CI: data tiers (hot + warm) with staging profile
clusterProfile: staging

dataTiers:
  hot:
    enabled: true
    replicas: 1
    storage: 1Gi
    storageClass: ""
  warm:
    enabled: true
    replicas: 1
    storage: 1Gi
    storageClass: ""

master:
  persistence:
    size: 1Gi
data:
  persistence:
    size: 1Gi

sysctlInit:
  enabled: false
