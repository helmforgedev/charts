# CI: data tiers (hot + warm) with k3d-sized resources
clusterProfile: staging

extraEnv:
  - name: logger.io.opentelemetry.usage
    value: error

master:
  replicaCount: 1
  heapSize: 512m
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 2Gi
  persistence:
    size: 1Gi

data:
  replicaCount: 0
  persistence:
    size: 1Gi

dataTiers:
  hot:
    enabled: true
    replicas: 1
    storage: 1Gi
    storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi
  warm:
    enabled: true
    replicas: 1
    storage: 1Gi
    storageClass: ""
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi

sysctlInit:
  enabled: false
