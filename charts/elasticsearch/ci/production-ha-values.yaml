# SPDX-License-Identifier: Apache-2.0
# CI: production-ha profile with security, backup, ILM and monitoring
clusterProfile: production-ha

clusterName: ci-test-cluster

extraEnv:
  - name: logger.io.opentelemetry.usage
    value: error

master:
  heapSize: 512m
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

data:
  replicaCount: 1
  heapSize: 512m
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

coordinating:
  replicaCount: 1
  heapSize: 512m
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

security:
  enabled: true
  # No certManager in CI - use auto-generated self-signed
  existingTlsSecret: ""
  generatePasswords: true
  tls:
    selfSignedInit:
      enabled: true  # Satisfies Camada 1 validator in CI (no cert-manager available)

backup:
  enabled: true
  schedule: "0 2 * * *"
  s3:
    bucket: ci-test-bucket
    region: us-east-1
    accessKey: ci-access-key
    secretKey: ci-secret-key
  retention:
    days: 7

ilm:
  logs:
    enabled: true
    hotDays: 1
    warmDays: 2
    coldDays: 3
    deleteDays: 7
  metrics:
    enabled: true
  traces:
    enabled: true

monitoring:
  enabled: true
  image:
    repository: docker.io/prometheuscommunity/elasticsearch-exporter
    tag: "v1.8.0"
    pullPolicy: IfNotPresent
  serviceMonitor:
    enabled: true
  prometheusRule:
    enabled: true
  grafana:
    dashboards: true

kibana:
  enabled: false

sysctlInit:
  enabled: false
