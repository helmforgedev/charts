# CI: staging profile - 1 master + 2 data nodes
clusterProfile: staging

extraEnv:
  - name: logger.io.opentelemetry.usage
    value: error

master:
  heapSize: 512m
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

data:
  heapSize: 512m
  persistence:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

sysctlInit:
  enabled: false
