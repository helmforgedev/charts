{{- end }}

{{/* Warm tier PDB */}}
{{- if and .Values.dataTiers.warm.enabled (gt (int .Values.dataTiers.warm.replicas) 1) }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
