{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.gateway.enabled }}
{{- if not .Values.gateway.parentRefs }}
  {{- fail "gateway.parentRefs is required when gateway.enabled=true" }}
{{- end }}
{{- $tlsEnabled := or .Values.security.tls.certManager.enabled .Values.security.tls.selfSignedInit.enabled (ne .Values.security.existingTlsSecret "") }}
{{- if and .Values.security.enabled $tlsEnabled }}
  {{- fail "gateway.enabled=true with TLS-enabled security requires a BackendTLSPolicy to configure backend HTTPS. Configure backend TLS separately or disable security TLS." }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "elasticsearch.fullname" . }}
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "elasticsearch.fullname" . }}
          port: {{ .Values.service.httpPort }}
{{- end }}
