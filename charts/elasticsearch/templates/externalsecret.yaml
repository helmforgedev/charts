{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed auth Secret is drift-protected
  by requiring security.existingCredentialsSecret explicitly.
*/}}
{{- if not .Values.security.existingCredentialsSecret }}
  {{- fail "externalSecrets.enabled requires security.existingCredentialsSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- if not .Values.externalSecrets.data }}
  {{- fail "externalSecrets.data must not be empty when externalSecrets.enabled=true" }}
{{- end }}
{{- $hasElasticPass := false -}}
{{- range .Values.externalSecrets.data -}}
  {{- if eq .secretKey "elastic-password" }}{{ $hasElasticPass = true }}{{ end -}}
{{- end -}}
{{- if not $hasElasticPass -}}
  {{- fail "externalSecrets.data must include a mapping for key 'elastic-password'" -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "elasticsearch.fullname" . }}-credentials
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.security.existingCredentialsSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
