architecture: replication

auth:
  rootPassword: "change-me"
  database: myapp
  username: myapp
  password: "change-me"
  replicationPassword: "change-me"

config:
  preset: oltp

replication:
  source:
    resourcesPreset: large
    persistence:
      enabled: true
      size: 100Gi
  readReplicas:
    replicaCount: 3
    resourcesPreset: medium
    persistence:
      enabled: true
      size: 100Gi

metrics:
  enabled: true
  resourcesPreset: small
  serviceMonitor:
    enabled: true

backup:
  enabled: true
  schedule: "0 2 * * *"
  s3:
    endpoint: https://s3.amazonaws.com
    bucket: my-backups
    prefix: mariadb
    existingSecret: mariadb-backup-creds
