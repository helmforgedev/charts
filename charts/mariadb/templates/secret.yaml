{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mariadb.secretName" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.existingSecretRootPasswordKey }}: {{ include "mariadb.rootPassword" . | b64enc | quote }}
  {{ .Values.auth.existingSecretUserPasswordKey }}: {{ include "mariadb.userPassword" . | b64enc | quote }}
  {{ .Values.auth.existingSecretReplicationPasswordKey }}: {{ include "mariadb.replicationPassword" . | b64enc | quote }}
{{- end }}
{{- if and (include "mariadb.backupEnabled" .) (not .Values.backup.s3.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mariadb.backupSecretName" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.backup.s3.existingSecretAccessKeyKey }}: {{ .Values.backup.s3.accessKey | quote }}
  {{ .Values.backup.s3.existingSecretSecretKeyKey }}: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
