{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if and (eq .Values.architecture "replication") (gt (int .Values.replication.readReplicas.replicaCount) 0) }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mariadb.replicaStatefulSetName" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "mariadb.replicasHeadlessServiceName" . }}
  replicas: {{ .Values.replication.readReplicas.replicaCount }}
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      {{- include "mariadb.componentLabels" (dict "root" . "role" "replica") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mariadb.componentLabels" (dict "root" . "role" "replica") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "mariadb.podSpecCommon" . | nindent 6 }}
      initContainers:
        {{- include "mariadb.prepareDataSubPathInitContainer" . | nindent 8 }}
        - name: clone-source
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              DATA_DIR="/var/lib/mysql"
              CLONE_MARKER="${DATA_DIR}/.helmforge-cloned"
              if [ -f "${CLONE_MARKER}" ]; then
                exit 0
              fi
              LOCAL_SERVER_STARTED=false
              LOCAL_ROOT_PASSWORD_REQUIRED=false
              local_mariadb() {
                if [ "${LOCAL_ROOT_PASSWORD_REQUIRED}" = "true" ]; then
                  mariadb --socket=/tmp/mysql.sock -uroot --password="${MARIADB_ROOT_PASSWORD}" "$@"
                else
                  mariadb --socket=/tmp/mysql.sock -uroot "$@"
                fi
              }
              local_admin_shutdown() {
                if [ "${LOCAL_ROOT_PASSWORD_REQUIRED}" = "true" ]; then
                  mariadb-admin --socket=/tmp/mysql.sock -uroot -p"${MARIADB_ROOT_PASSWORD}" shutdown
                else
                  mariadb-admin --socket=/tmp/mysql.sock -uroot shutdown
                fi
              }
              wait_local_socket() {
                until [ -S /tmp/mysql.sock ]; do
                  sleep 2
                done
                if [ "${LOCAL_ROOT_PASSWORD_REQUIRED}" = "true" ]; then
                  until mariadb-admin --socket=/tmp/mysql.sock -uroot -p"${MARIADB_ROOT_PASSWORD}" ping --silent >/dev/null 2>&1; do
                    sleep 2
                  done
                else
                  until mariadb-admin --socket=/tmp/mysql.sock -uroot ping --silent >/dev/null 2>&1; do
                    sleep 2
                  done
                fi
              }
              if [ -d "${DATA_DIR}/mysql" ]; then
                mariadbd --datadir="${DATA_DIR}" --socket=/tmp/mysql.sock --pid-file=/tmp/mariadb.pid --skip-networking --read-only=OFF &
                LOCAL_SERVER_STARTED=true

                wait_local_socket

                if mariadb --socket=/tmp/mysql.sock -uroot --password="${MARIADB_ROOT_PASSWORD}" -Nse "SELECT 1" >/dev/null 2>&1; then
                  LOCAL_ROOT_PASSWORD_REQUIRED=true
                fi

                status="$(local_mariadb -Nse "SHOW SLAVE STATUS\\G" 2>/dev/null || true)"
                if printf "%s\n" "${status}" | grep -Eq "Master_Host: .+"; then
                  touch "${CLONE_MARKER}"
                  local_admin_shutdown
                  exit 0
                fi
              fi

              ordinal="${HOSTNAME##*-}"
              server_id=$(( {{ .Values.replication.readReplicas.serverIdBase }} + ordinal + 1 ))

              cat /config/my.cnf > /etc/mysql/conf.d/zz-chart.cnf
              cat > /etc/mysql/conf.d/zz-role.cnf <<EOF
              [mysqld]
              server_id = ${server_id}
              read_only = ON
              relay_log = mariadb-relay-bin
              log_slave_updates = ON
              skip_slave_start = ON
              slave_parallel_workers = {{ .Values.replication.replicaTuning.parallelWorkers }}
              EOF

              until mariadb-admin ping -h {{ include "mariadb.sourceServiceName" . }} -P {{ .Values.service.port }} -uroot --password="${MARIADB_ROOT_PASSWORD}" {{ include "mariadb.cliTlsArgs" . }} --silent; do
                sleep 5
              done

              until mariadb -h {{ include "mariadb.sourceServiceName" . }} -P {{ .Values.service.port }} -uroot --password="${MARIADB_ROOT_PASSWORD}" {{ include "mariadb.cliTlsArgs" . }} -Nse "SHOW DATABASES LIKE '${MARIADB_DATABASE}'" | grep -qx "${MARIADB_DATABASE}"; do
                sleep 5
              done
              until mariadb -h {{ include "mariadb.sourceServiceName" . }} -P {{ .Values.service.port }} -uroot --password="${MARIADB_ROOT_PASSWORD}" {{ include "mariadb.cliTlsArgs" . }} -Nse "SHOW MASTER STATUS" | grep -q .; do
                sleep 5
              done

              if [ ! -d "${DATA_DIR}/mysql" ]; then
                mariadb-install-db --datadir="${DATA_DIR}" --auth-root-authentication-method=normal
              fi

              if [ "${LOCAL_SERVER_STARTED}" = "false" ]; then
                mariadbd --datadir="${DATA_DIR}" --socket=/tmp/mysql.sock --pid-file=/tmp/mariadb.pid --skip-networking --read-only=OFF &

                wait_local_socket
              fi

              local_mariadb <<EOSQL
              SET GLOBAL read_only = OFF;
              ALTER USER 'root'@'localhost' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              DROP USER IF EXISTS ''@'localhost';
              DROP USER IF EXISTS ''@'${HOSTNAME}';
              DROP USER IF EXISTS ''@'%';
              DELETE FROM mysql.global_priv WHERE User = '';
              DELETE FROM mysql.proxies_priv WHERE User = '' OR Proxied_user = '';
              DROP USER IF EXISTS 'root'@'${HOSTNAME}';
              CREATE OR REPLACE USER 'root'@'%' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
              CREATE OR REPLACE USER 'root'@'127.0.0.1' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION;
              FLUSH PRIVILEGES;
              EOSQL
              LOCAL_ROOT_PASSWORD_REQUIRED=true

              GTID_SQL=""

              dump_attempt=1
              until mariadb-dump \
                -h {{ include "mariadb.sourceServiceName" . }} \
                -P {{ .Values.service.port }} \
                -uroot \
                --password="${MARIADB_ROOT_PASSWORD}" \
                {{ include "mariadb.cliTlsArgs" . }} \
                --single-transaction \
                --gtid \
                --master-data=2 \
                --all-databases \
                --triggers \
                --routines \
                --events \
                > /tmp/source.sql; do
                if [ "${dump_attempt}" -ge 12 ]; then
                  exit 1
                fi
                dump_attempt=$((dump_attempt + 1))
                rm -f /tmp/source.sql
                sleep 5
              done

              SOURCE_GTID="$(sed -n "s/^-- SET GLOBAL gtid_slave_pos='\([^']*\)'.*/\1/p; s/^SET GLOBAL gtid_slave_pos='\([^']*\)'.*/\1/p" /tmp/source.sql | tail -n 1)"
              if [ -n "${SOURCE_GTID}" ]; then
                GTID_SQL="SET GLOBAL gtid_slave_pos='${SOURCE_GTID}';"
              fi

              local_mariadb < /tmp/source.sql
              local_admin_shutdown
              mariadbd --datadir="${DATA_DIR}" --socket=/tmp/mysql.sock --pid-file=/tmp/mariadb.pid --skip-networking --read-only=OFF &
              LOCAL_ROOT_PASSWORD_REQUIRED=true
              wait_local_socket

              cat > /tmp/configure-replication.sql <<EOSQL
              SET GLOBAL read_only = OFF;
              ALTER USER 'root'@'localhost' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              DROP USER IF EXISTS ''@'localhost';
              DROP USER IF EXISTS ''@'${HOSTNAME}';
              DROP USER IF EXISTS ''@'%';
              DELETE FROM mysql.global_priv WHERE User = '';
              DELETE FROM mysql.proxies_priv WHERE User = '' OR Proxied_user = '';
              DROP USER IF EXISTS 'root'@'${HOSTNAME}';
              CREATE OR REPLACE USER 'root'@'%' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;
              CREATE OR REPLACE USER 'root'@'127.0.0.1' IDENTIFIED BY '${MARIADB_ROOT_PASSWORD}';
              GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION;
              CREATE DATABASE IF NOT EXISTS \`${MARIADB_DATABASE}\`;
              CREATE USER IF NOT EXISTS '${MARIADB_USER}'@'%' IDENTIFIED BY '${MARIADB_PASSWORD}';
              ALTER USER '${MARIADB_USER}'@'%' IDENTIFIED BY '${MARIADB_PASSWORD}';
              GRANT ALL PRIVILEGES ON \`${MARIADB_DATABASE}\`.* TO '${MARIADB_USER}'@'%';
              ${GTID_SQL}
              CHANGE MASTER TO
                MASTER_HOST='{{ include "mariadb.sourceServiceName" . }}',
                MASTER_PORT={{ .Values.service.port }},
                MASTER_USER='{{ .Values.auth.replicationUsername }}',
                MASTER_PASSWORD='${REPLICATION_PASSWORD}',
                {{ include "mariadb.replicationTlsClause" . | nindent 16 }}
                MASTER_USE_GTID=slave_pos;
              EOSQL
              configure_attempt=1
              until local_mariadb < /tmp/configure-replication.sql >/tmp/configure-replication.out 2>/tmp/configure-replication.err; do
                if [ "${configure_attempt}" -ge 6 ]; then
                  cat /tmp/configure-replication.err >&2
                  exit 1
                fi
                configure_attempt=$((configure_attempt + 1))
                sleep 3
              done

              touch "${CLONE_MARKER}"
              local_admin_shutdown
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.secretName" . }}
                  key: {{ .Values.auth.existingSecretRootPasswordKey }}
            - name: REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.secretName" . }}
                  key: {{ .Values.auth.existingSecretReplicationPasswordKey }}
            - name: MARIADB_DATABASE
              value: {{ .Values.auth.database | quote }}
            - name: MARIADB_USER
              value: {{ .Values.auth.username | quote }}
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.secretName" . }}
                  key: {{ .Values.auth.existingSecretUserPasswordKey }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            {{- include "mariadb.dataVolumeMount" . | nindent 12 }}
            - name: config
              mountPath: /config
            - name: mariadb-conf
              mountPath: /etc/mysql/conf.d
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
        {{- if .Values.metrics.enabled }}
        {{- include "mariadb.metricsConfigInitContainer" . | nindent 8 }}
        {{- end }}
      containers:
        - name: mariadb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              REPLICATION_READY_MARKER="/tmp/helmforge-replication-started"
              rm -f "${REPLICATION_READY_MARKER}"
              ordinal="${HOSTNAME##*-}"
              server_id=$(( {{ .Values.replication.readReplicas.serverIdBase }} + ordinal + 1 ))
              cat /config/my.cnf > /etc/mysql/conf.d/zz-chart.cnf
              cat > /etc/mysql/conf.d/zz-role.cnf <<EOF
              [mysqld]
              server_id = ${server_id}
              read_only = ON
              relay_log = mariadb-relay-bin
              log_slave_updates = ON
              skip_slave_start = ON
              slave_parallel_workers = {{ .Values.replication.replicaTuning.parallelWorkers }}
              EOF
              docker-entrypoint.sh mariadbd &
              pid="$!"
              trap 'kill -TERM "${pid}"; wait "${pid}"' TERM INT

              until mariadb-admin ping --socket=/run/mysqld/mysqld.sock -uroot --password="${MARIADB_ROOT_PASSWORD}" --silent; do
                sleep 2
              done

              until mariadb-admin ping -h {{ include "mariadb.sourceServiceName" . }} -P {{ .Values.service.port }} -uroot --password="${MARIADB_ROOT_PASSWORD}" {{ include "mariadb.cliTlsArgs" . }} --silent; do
                sleep 5
              done

              status="$(mariadb --socket=/run/mysqld/mysqld.sock -uroot --password="${MARIADB_ROOT_PASSWORD}" -Nse "SHOW SLAVE STATUS\\G" 2>/dev/null || true)"
              if ! printf "%s\n" "${status}" | grep -q "Slave_SQL_Running: Yes"; then
                mariadb --socket=/run/mysqld/mysqld.sock -uroot --password="${MARIADB_ROOT_PASSWORD}" -e "START SLAVE;"
              fi
              touch "${REPLICATION_READY_MARKER}"
              wait "${pid}"
          ports:
            - name: mariadb
              containerPort: {{ .Values.service.port }}
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.secretName" . }}
                  key: {{ .Values.auth.existingSecretRootPasswordKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "mariadb.replicaProbeCommandString" . | quote }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "mariadb.replicaReadinessCommandString" . | quote }}
            initialDelaySeconds: {{ max 60 (int .Values.readinessProbe.initialDelaySeconds) }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "mariadb.replicaProbeCommandString" . | quote }}
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- if .Values.replication.readReplicas.resources }}
            {{- toYaml .Values.replication.readReplicas.resources | nindent 12 }}
            {{- else }}
            {{- include "mariadb.resourcesPreset" (dict "preset" .Values.replication.readReplicas.resourcesPreset) | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "mariadb.dataVolumeMount" . | nindent 12 }}
            - name: config
              mountPath: /config
            - name: mariadb-conf
              mountPath: /etc/mysql/conf.d
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: mysqld-exporter
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          args:
            - --web.listen-address=:{{ .Values.service.metricsPort }}
            - --config.my-cnf=/etc/mysqld-exporter/.my.cnf
          ports:
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- if .Values.metrics.resources }}
            {{- toYaml .Values.metrics.resources | nindent 12 }}
            {{- else }}
            {{- include "mariadb.metricsResourcesPreset" . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "mariadb.metricsVolumeMounts" . | nindent 12 }}
        {{- end }}
      volumes:
        - name: mariadb-conf
          emptyDir: {}
        {{- if .Values.metrics.enabled }}
        - name: mysqld-exporter-config
          emptyDir: {}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "mariadb.configMapName" . }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "mariadb.tlsSecretName" . }}
        {{- end }}
        {{- if not .Values.replication.readReplicas.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.replication.readReplicas.persistence.enabled }}
  volumeClaimTemplates:
    {{- include "mariadb.volumeClaimTemplate" (dict "root" . "persistence" .Values.replication.readReplicas.persistence) | nindent 4 }}
  {{- end }}
{{- end }}
