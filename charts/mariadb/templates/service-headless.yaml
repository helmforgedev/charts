{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mariadb.sourceHeadlessServiceName" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mariadb
      port: {{ .Values.service.port }}
      targetPort: mariadb
  selector:
    {{- include "mariadb.componentLabels" (dict "root" . "role" (ternary "source" "standalone" (eq .Values.architecture "replication"))) | nindent 4 }}
{{- if eq .Values.architecture "replication" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mariadb.replicasHeadlessServiceName" . }}
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: mariadb
      port: {{ .Values.service.port }}
      targetPort: mariadb
  selector:
    {{- include "mariadb.componentLabels" (dict "root" . "role" "replica") | nindent 4 }}
{{- end }}
