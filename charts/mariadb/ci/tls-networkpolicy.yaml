# SPDX-License-Identifier: Apache-2.0
architecture: replication
auth:
  rootPassword: testrootpw
  password: testuserpw
  replicationPassword: testreplpw
tls:
  enabled: true
  existingSecret: mariadb-tls
  client:
    enabled: true
networkPolicy:
  enabled: true
  metrics:
    enabled: true
metrics:
  enabled: true
replication:
  readReplicas:
    replicaCount: 1
extraObjects:
  - |
    {{- $ca := genCA "mariadb-ca" 3650 -}}
    {{- $cert := genSignedCert "mariadb" nil (list (include "mariadb.clientServiceName" .) (include "mariadb.sourceServiceName" .) (include "mariadb.replicasServiceName" .) "mariadb" "localhost") 3650 $ca -}}
    apiVersion: v1
    kind: Secret
    metadata:
      name: mariadb-tls
    type: Opaque
    data:
      ca.crt: {{ $ca.Cert | b64enc | quote }}
      tls.crt: {{ $cert.Cert | b64enc | quote }}
      tls.key: {{ $cert.Key | b64enc | quote }}
