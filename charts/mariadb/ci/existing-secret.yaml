auth:
  existingSecret: my-mariadb-secret

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  data:
    - secretKey: mariadb-root-password
      remoteRef:
        key: test/password
    - secretKey: mariadb-user-password
      remoteRef:
        key: test/password
    - secretKey: mariadb-replication-password
      remoteRef:
        key: test/password
