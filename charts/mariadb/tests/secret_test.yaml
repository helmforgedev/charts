# SPDX-License-Identifier: Apache-2.0
suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should render auth secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb-auth

  - it: should be Opaque type
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain password keys
    asserts:
      - isNotNull:
          path: data["mariadb-root-password"]
      - isNotNull:
          path: data["mariadb-user-password"]
      - isNotNull:
          path: data["mariadb-replication-password"]

  - it: should not render when existingSecret is set
    set:
      auth:
        existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
