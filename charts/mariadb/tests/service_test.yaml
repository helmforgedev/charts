# SPDX-License-Identifier: Apache-2.0
suite: service
templates:
  - templates/service.yaml
tests:
  - it: should render ClusterIP service by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-mariadb
        equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 3306
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-mariadb
        equal:
          path: spec.ports[0]
          value:
            name: mariadb
            port: 3306
            targetPort: mariadb
