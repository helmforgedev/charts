suite: pdb
templates:
  - templates/pdb.yaml
tests:
  - it: should not render PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render PDB when enabled
    set:
      pdb:
        enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1
