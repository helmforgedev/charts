suite: networkpolicy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: should not render NetworkPolicy by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render NetworkPolicy when enabled
    set:
      networkPolicy:
        enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 3306
      - equal:
          path: spec.ingress[0].ports[0].protocol
          value: TCP
