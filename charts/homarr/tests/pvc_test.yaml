suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should not render when disabled
    set:
      persistence:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence:
        existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0
