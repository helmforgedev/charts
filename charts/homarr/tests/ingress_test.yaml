suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - host: dash.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.ingressClassName
          value: traefik
