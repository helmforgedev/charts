suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should render encryption secret by default
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-homarr-encryption
        isKind:
          of: Secret

  - it: should render database secret for PostgreSQL
    set:
      postgresql:
        enabled: true
        auth:
          database: homarr
          username: homarr
          password: pgpass
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-homarr-database
        isKind:
          of: Secret

  - it: should render backup S3 secret when enabled
    set:
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: key
          secretKey: secret
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-homarr-backup-s3
        isKind:
          of: Secret
