suite: backup-cronjob
templates:
  - templates/backup-cronjob.yaml
  - templates/backup-configmap.yaml
tests:
  - it: should not render when backup is disabled
    template: templates/backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render CronJob when enabled
    template: templates/backup-cronjob.yaml
    set:
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: key
          secretKey: secret
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 3 * * *"

  - it: should use sqlite backup for default
    template: templates/backup-cronjob.yaml
    set:
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: key
          secretKey: secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: sqlite-backup

  - it: should use postgres backup for PostgreSQL
    template: templates/backup-cronjob.yaml
    set:
      postgresql:
        enabled: true
        auth:
          database: homarr
          username: homarr
          password: test
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: key
          secretKey: secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: postgres-backup

  - it: should use mysql backup for MySQL
    template: templates/backup-cronjob.yaml
    set:
      mysql:
        enabled: true
        auth:
          database: homarr
          username: homarr
          password: test
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: key
          secretKey: secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: mysql-backup
