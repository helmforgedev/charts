{{- if not .Values.encryption.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homarr.fullname" . }}-encryption
  labels:
    {{- include "homarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $encSecretName := printf "%s-encryption" (include "homarr.fullname" .) }}
  {{- $existingEncSecret := lookup "v1" "Secret" .Release.Namespace $encSecretName }}
  {{- if and $existingEncSecret (not .Values.encryption.key) }}
  secret-encryption-key: {{ index $existingEncSecret.data "secret-encryption-key" }}
  {{- else if .Values.encryption.key }}
  secret-encryption-key: {{ .Values.encryption.key | b64enc | quote }}
  {{- else }}
  secret-encryption-key: {{ randAlphaNum 64 | sha256sum | trunc 64 | b64enc | quote }}
  {{- end }}
  {{- if and $existingEncSecret (index $existingEncSecret.data "auth-secret") }}
  auth-secret: {{ index $existingEncSecret.data "auth-secret" }}
  {{- else }}
  auth-secret: {{ randAlphaNum 64 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- $mode := include "homarr.databaseMode" . }}
{{- if and (ne $mode "sqlite") (not (and (eq $mode "external") .Values.database.external.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homarr.fullname" . }}-database
  labels:
    {{- include "homarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $dbSecretName := printf "%s-database" (include "homarr.fullname" .) }}
  {{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
  {{- $dbPassword := include "homarr.databasePasswordValue" . }}
  {{- if and $existingDbSecret (not $dbPassword) }}
  database-password: {{ index $existingDbSecret.data "database-password" }}
  {{- else if $dbPassword }}
  database-password: {{ $dbPassword | b64enc | quote }}
  {{- else }}
  database-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.redis.external .Values.redis.password (not .Values.redis.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homarr.fullname" . }}-redis
  labels:
    {{- include "homarr.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ .Values.redis.password | b64enc | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homarr.fullname" . }}-backup-s3
  labels:
    {{- include "homarr.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.backup.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | b64enc | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled .Values.backup.database.password (not .Values.backup.database.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "homarr.fullname" . }}-backup-db
  labels:
    {{- include "homarr.labels" . | nindent 4 }}
type: Opaque
data:
  database-password: {{ .Values.backup.database.password | b64enc | quote }}
{{- end }}
