apiVersion: v2
name: homarr
description: Homarr — modern application dashboard with SQLite, PostgreSQL, or MySQL, Kubernetes integration, and S3 backup.
type: application
version: 0.1.0
appVersion: "1.57.1"
home: https://helmforge.dev/docs/charts/homarr
icon: https://homarr.dev/img/logo.png
keywords:
  - homarr
  - dashboard
  - self-hosted
  - homepage
  - kubernetes
maintainers:
  - name: HelmForge
    url: https://github.com/helmforgedev
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/homarr
  - https://github.com/homarr-labs/homarr
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: skip-prediction
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/homarr
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/homarr
  helmforge.dev/maturity: alpha
dependencies:
  - name: postgresql
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
