{{- if and .Values.pdb.enabled (eq .Values.architecture "cluster") }}
{{- if gt (.Values.cluster.controllers.replicaCount | int) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kafka.controllerStatefulSetName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "kafka.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
{{- end }}
{{- if and (gt (.Values.cluster.controllers.replicaCount | int) 1) (gt (.Values.cluster.brokers.replicaCount | int) 1) }}
---
{{- end }}
{{- if gt (.Values.cluster.brokers.replicaCount | int) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "kafka.brokerStatefulSetName" . }}
  labels:
    {{- include "kafka.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "kafka.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: broker
{{- end }}
{{- end }}
