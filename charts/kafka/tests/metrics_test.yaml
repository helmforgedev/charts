suite: metrics
templates:
  - templates/configmap-metrics.yaml
  - templates/service-metrics.yaml
  - templates/servicemonitor.yaml
tests:
  - it: renders the metrics configmap when enabled
    set:
      metrics.enabled: true
    template: templates/configmap-metrics.yaml
    asserts:
      - isKind:
          of: ConfigMap

  - it: renders two metrics services in cluster mode
    set:
      architecture: cluster
      metrics.enabled: true
    template: templates/service-metrics.yaml
    asserts:
      - hasDocuments:
          count: 2
