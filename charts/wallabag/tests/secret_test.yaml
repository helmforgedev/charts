suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render app secret by default
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-wallabag-app
        documentIndex: 0

  - it: should not render app secret when existingSecret is set
    set:
      wallabag.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
