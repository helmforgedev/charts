suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-wallabag-data

  - it: should not render when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0
