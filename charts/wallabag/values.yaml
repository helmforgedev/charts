# =============================================================================
# Wallabag Helm Chart — Default Values
# =============================================================================
# Focus: self-hosted read-it-later with PostgreSQL and optional Redis

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Wallabag container image
  repository: docker.io/wallabag/wallabag
  # -- Image tag
  tag: "2.6.14"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Wallabag Configuration
# =============================================================================

wallabag:
  # -- Application port
  port: 80
  # -- Public domain name (required)
  domainName: "https://wallabag.example.com"
  # -- Symfony secret (auto-generated if empty)
  secret: ""
  # -- Existing secret containing the Symfony secret
  existingSecret: ""
  # -- Key in the existing secret
  existingSecretKey: symfony-secret
  # -- Allow user registration
  registration: false
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Database
# =============================================================================

database:
  # -- External PostgreSQL configuration (used when postgresql subchart is disabled)
  external:
    host: ""
    port: "5432"
    name: wallabag
    username: wallabag
    password: ""
    # -- Existing secret containing the database password
    existingSecret: ""
    # -- Key in the existing secret containing the password
    existingSecretPasswordKey: password

# =============================================================================
# External Redis
# =============================================================================

externalRedis:
  # -- External Redis host (used when redis subchart is disabled)
  host: ""
  port: "6379"

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /var/www/wallabag/data
  enabled: true
  # -- Storage size
  size: 2Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Wallabag
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: wallabag.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - wallabag.example.com
    #   secretName: wallabag-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled PostgreSQL backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: wallabag
  images:
    # -- Image used for PostgreSQL backup (must have pg_dump)
    postgresql: docker.io/library/postgres:18-alpine
    # -- Image used for S3 upload (MinIO client)
    uploader: docker.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: wallabag
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""
  # -- Override database credentials for backup (uses app credentials if empty)
  database:
    host: ""
    port: ""
    name: ""
    username: ""
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: password
    postgresDumpArgs: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# Subcharts
# =============================================================================

postgresql:
  # -- Deploy PostgreSQL as a subchart
  enabled: true
  architecture: standalone
  auth:
    database: wallabag
    username: wallabag
    # -- PostgreSQL password (auto-generated if empty)
    password: ""

redis:
  # -- Deploy Redis as a subchart (optional, for cache and sessions)
  enabled: false
  architecture: standalone
  auth:
    password: ""
