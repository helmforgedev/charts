# Wallabag against a managed PostgreSQL (no bundled subchart).
#
#   kubectl create secret generic wallabag-db --from-literal=password=<pass>
#   helm install wallabag helmforge/wallabag -f external-database.yaml

postgresql:
  enabled: false

database:
  external:
    host: pg.internal.example.com
    port: "5432"
    name: wallabag
    username: wallabag
    existingSecret: wallabag-db
    existingSecretPasswordKey: password

persistence:
  enabled: true
  size: 5Gi
