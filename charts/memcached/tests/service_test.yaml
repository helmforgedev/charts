# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders headless and client services by default
    asserts:
      - hasDocuments:
          count: 2

  - it: configures stable headless service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-memcached-headless
      - equal:
          path: spec.clusterIP
          value: None
      - equal:
          path: spec.ports[0].port
          value: 11211

  - it: configures client service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-memcached
      - equal:
          path: spec.type
          value: ClusterIP
      - contains:
          path: spec.ports
          content:
            name: memcache
            port: 11211
            targetPort: memcache
            protocol: TCP

  - it: renders metrics service when enabled
    set:
      metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: test-memcached-metrics
        documentIndex: 2

  - it: truncates suffixed service names to DNS label length
    release:
      name: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    set:
      metrics.enabled: true
    asserts:
      - matchRegex:
          path: metadata.name
          pattern: "^[a-z0-9-]{1,63}$"
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: "^[a-z0-9-]{1,63}$"
        documentIndex: 1
      - matchRegex:
          path: metadata.name
          pattern: "^[a-z0-9-]{1,63}$"
        documentIndex: 2

  - it: renders dual-stack fields
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    documentIndex: 1
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6

  - it: quotes YAML-like release names in selector labels
    release:
      name: "true"
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: "true"
      - equal:
          path: spec.selector["app.kubernetes.io/instance"]
          value: "true"
