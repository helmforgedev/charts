# SPDX-License-Identifier: Apache-2.0
suite: Gateway API TCPRoute
templates:
  - tcproute.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders no TCPRoute by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders TCPRoute when enabled
    set:
      gateway.tcpRoute.enabled: true
      gateway.tcpRoute.parentRefs:
        - name: internal-tcp-gateway
          namespace: gateway-system
          sectionName: memcached
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: TCPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: test-memcached
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 11211

