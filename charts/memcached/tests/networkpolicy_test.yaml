# SPDX-License-Identifier: Apache-2.0
suite: NetworkPolicy
templates:
  - networkpolicy.yaml
release:
  name: test
  namespace: cache
tests:
  - it: renders no network policy by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ingress and egress policies when enabled
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
      networkPolicy.egress.allowDNS: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress
      - contains:
          path: spec.egress
          content:
            to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: cache
                podSelector: {}

  - it: does not expose metrics when no metrics peers are configured
    set:
      metrics.enabled: true
      networkPolicy.enabled: true
      networkPolicy.metrics.enabled: true
      networkPolicy.metrics.allowSameNamespace: false
    asserts:
      - notContains:
          path: spec.ingress
          content:
            ports:
              - protocol: TCP
                port: 9150

  - it: quotes YAML-like namespace names in namespace selectors
    release:
      namespace: "false"
    set:
      networkPolicy.enabled: true
      networkPolicy.egress.enabled: true
    asserts:
      - equal:
          path: spec.ingress[0].from[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: "false"
      - equal:
          path: spec.egress[0].to[0].namespaceSelector.matchLabels["kubernetes.io/metadata.name"]
          value: "false"
