# SPDX-License-Identifier: Apache-2.0
suite: Monitoring
templates:
  - servicemonitor.yaml
  - prometheusrule.yaml
release:
  name: test
  namespace: default
tests:
  - it: quotes YAML-like ServiceMonitor namespace overrides
    template: servicemonitor.yaml
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.namespace: "false"
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.namespace
          value: "false"

  - it: quotes YAML-like PrometheusRule namespace overrides
    template: prometheusrule.yaml
    set:
      metrics.enabled: true
      metrics.prometheusRule.enabled: true
      metrics.prometheusRule.namespace: "on"
    asserts:
      - isKind:
          of: PrometheusRule
      - equal:
          path: metadata.namespace
          value: "on"
