# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders no secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders auth secret when inline password is provided
    set:
      auth.enabled: true
      auth.username: app
      auth.password: app-password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-memcached-auth
      - exists:
          path: data.authfile

  - it: renders no managed secret when existing secret is used
    set:
      auth.enabled: true
      auth.existingSecret: memcached-auth
    asserts:
      - hasDocuments:
          count: 0

