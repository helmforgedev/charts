# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - externalsecret.yaml
  - secret.yaml
  - statefulset.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders ExternalSecret v1 when enabled
    template: externalsecret.yaml
    set:
      auth.enabled: true
      auth.existingSecret: memcached-auth
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: authfile
          remoteRef:
            key: memcached/auth
            property: authfile
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.target.name
          value: memcached-auth

  - it: fails when ExternalSecret is enabled without Memcached auth
    template: statefulset.yaml
    set:
      auth.enabled: false
      auth.existingSecret: memcached-auth
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: authfile
          remoteRef:
            key: memcached/auth
            property: authfile
    asserts:
      - failedTemplate:
          errorMessage: "auth.enabled=true is required when externalSecrets.enabled=true"
