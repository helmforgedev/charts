# SPDX-License-Identifier: Apache-2.0
{{- include "memcached.validate" . }}
{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memcached.authSecretName" . }}
  labels:
    {{- include "memcached.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.auth.authFileKey }}: {{ include "memcached.authFile" . | b64enc | quote }}
{{- end }}
