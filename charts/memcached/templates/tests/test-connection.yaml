# SPDX-License-Identifier: Apache-2.0
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "memcached.fullname" . }}-test-connection"
  labels:
    {{- include "memcached.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  containers:
    - name: memcached-test
      image: docker.io/library/busybox:1.37.0
      command:
        - sh
        - -ec
      args:
        - |
          {{- if and .Values.auth.enabled .Values.auth.password }}
          printf 'set auth 0 0 {{ len (printf "%s %s" .Values.auth.username .Values.auth.password) }}\r\n{{ .Values.auth.username }} {{ .Values.auth.password }}\r\nversion\r\n' | nc -w 5 {{ include "memcached.fullname" . }} {{ .Values.service.port }} | grep -i '^VERSION'
          {{- else if .Values.auth.enabled }}
          echo "Authentication uses an existing Secret; run a client test with the resolved credentials."
          {{- else if .Values.tls.enabled }}
          echo "TLS is enabled; use a TLS-capable Memcached client for protocol validation."
          {{- else }}
          printf 'version\r\n' | nc -w 5 {{ include "memcached.fullname" . }} {{ .Values.service.port }} | grep -i '^VERSION'
          {{- end }}
