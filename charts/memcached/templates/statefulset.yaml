# SPDX-License-Identifier: Apache-2.0
{{- include "memcached.validate" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memcached.fullname" . }}
  labels:
    {{- include "memcached.labels" . | nindent 4 }}
    app.kubernetes.io/component: memcached
spec:
  serviceName: {{ include "memcached.headlessServiceName" . }}
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "memcached.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: memcached
  template:
    metadata:
      labels:
        {{- include "memcached.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: memcached
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "memcached.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- $podSecurityContext := deepCopy .Values.podSecurityContext }}
      {{- if not $podSecurityContext.runAsUser }}
      {{- $_ := unset $podSecurityContext "runAsUser" }}
      {{- $_ := unset $podSecurityContext "runAsGroup" }}
      {{- $_ := unset $podSecurityContext "runAsNonRoot" }}
      {{- end }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (and .Values.tls.enabled .Values.tls.volumePermissions.enabled) .Values.extraInitContainers }}
      initContainers:
        {{- if and .Values.tls.enabled .Values.tls.volumePermissions.enabled }}
        - name: tls-permissions
          image: "{{ .Values.tls.volumePermissions.image.repository }}:{{ .Values.tls.volumePermissions.image.tag }}"
          imagePullPolicy: {{ .Values.tls.volumePermissions.image.pullPolicy }}
          command:
            - sh
            - -ec
          args:
            - |
              cp -L /tls-secret/* /tls/
              {{- $tlsGroup := default .Values.podSecurityContext.runAsGroup .Values.podSecurityContext.fsGroup }}
              {{- if and .Values.podSecurityContext.runAsUser $tlsGroup }}
              chown -R {{ .Values.podSecurityContext.runAsUser }}:{{ $tlsGroup }} /tls
              {{- else if .Values.podSecurityContext.runAsUser }}
              chown -R {{ .Values.podSecurityContext.runAsUser }} /tls
              {{- else if $tlsGroup }}
              chgrp -R {{ $tlsGroup }} /tls
              {{- end }}
              chmod 0444 /tls/{{ .Values.tls.certKey }}
              chmod 0440 /tls/{{ .Values.tls.keyKey }}
              {{- if .Values.tls.caKey }}
              chmod 0444 /tls/{{ .Values.tls.caKey }} || true
              {{- end }}
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
          {{- with .Values.tls.volumePermissions.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tls-secret
              mountPath: /tls-secret
              readOnly: true
            - name: tls
              mountPath: /tls
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: memcached
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- include "memcached.args" . | nindent 12 }}
          ports:
            - name: memcache
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if not .Values.tls.enabled }}
          livenessProbe:
            tcpSocket:
              port: memcache
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: memcache
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.auth.enabled (eq .Values.auth.mode "sasl") }}
          env:
            - name: SASL_CONF_PATH
              value: {{ .Values.auth.sasl.mountPath | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auth.enabled }}
            - name: auth
              mountPath: {{ ternary .Values.auth.sasl.mountPath "/auth" (eq .Values.auth.mode "sasl") }}
              readOnly: true
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- if .Values.extstore.enabled }}
            - name: extstore
              mountPath: /extstore
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          args:
            - --memcached.address=localhost:{{ .Values.service.port }}
            - --web.listen-address=:{{ .Values.metrics.port }}
            {{- if .Values.metrics.memcachedTLS.enabled }}
            - --memcached.tls.enable
            - --memcached.tls.cert-file=/tls/{{ .Values.tls.certKey }}
            - --memcached.tls.key-file=/tls/{{ .Values.tls.keyKey }}
            {{- if .Values.tls.caKey }}
            - --memcached.tls.ca-file=/tls/{{ .Values.tls.caKey }}
            {{- end }}
            {{- if .Values.metrics.memcachedTLS.insecureSkipVerify }}
            - --memcached.tls.insecure-skip-verify
            {{- end }}
            - --memcached.tls.server-name={{ default (printf "%s.%s.svc" (include "memcached.fullname" .) .Release.Namespace) .Values.metrics.memcachedTLS.serverName }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- with .Values.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          {{- if .Values.metrics.memcachedTLS.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          {{- end }}
        {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.auth.enabled }}
        - name: auth
          secret:
            secretName: {{ include "memcached.authSecretName" . }}
            items:
              {{- if eq .Values.auth.mode "sasl" }}
              - key: {{ .Values.auth.sasl.configKey }}
                path: {{ .Values.auth.sasl.configKey }}
              - key: {{ .Values.auth.sasl.databaseKey }}
                path: {{ .Values.auth.sasl.databaseKey }}
              {{- else }}
              - key: {{ .Values.auth.authFileKey }}
                path: {{ .Values.auth.authFileKey }}
              {{- end }}
        {{- end }}
        {{- if .Values.tls.enabled }}
        {{- if .Values.tls.volumePermissions.enabled }}
        - name: tls-secret
          secret:
            secretName: {{ include "memcached.tlsSecretName" . }}
            defaultMode: 0400
        - name: tls
          emptyDir: {}
        {{- else }}
        - name: tls
          secret:
            secretName: {{ include "memcached.tlsSecretName" . }}
            defaultMode: 0440
        {{- end }}
        {{- end }}
        {{- if and .Values.extstore.enabled (not .Values.extstore.persistence.enabled) }}
        - name: extstore
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if and .Values.extstore.enabled .Values.extstore.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: extstore
        labels:
          {{- include "memcached.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.extstore.persistence.accessModes | nindent 10 }}
        {{- if .Values.extstore.persistence.storageClass }}
        storageClassName: {{ .Values.extstore.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.extstore.persistence.size }}
  {{- end }}
