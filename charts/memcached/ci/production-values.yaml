# SPDX-License-Identifier: Apache-2.0
# CI scenario: production-oriented distributed cache nodes.

architecture: distributed
replicaCount: 3

memcached:
  memoryLimitMB: 256
  maxConnections: 4096
  threads: 4
  maxItemSize: 2m
  disableFlushAll: true
  disableDumping: true

tls:
  enabled: true
  existingSecret: memcached-tls
  verifyMode: "0"
  minVersion: "2"

serviceAccount:
  create: true
  automountServiceAccountToken: false

networkPolicy:
  enabled: true
  metrics:
    enabled: true
    allowSameNamespace: true
  egress:
    enabled: true
    allowDNS: true

metrics:
  enabled: true
  memcachedTLS:
    enabled: true
    insecureSkipVerify: true

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 100m
    memory: 320Mi
  limits:
    memory: 320Mi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: memcached
