serviceAccount:
  create: true
  automountServiceAccountToken: false

networkPolicy:
  enabled: true
  metrics:
    enabled: true
    allowSameNamespace: true
  egress:
    enabled: true
    allowDNS: true

metrics:
  enabled: true
  memcachedTLS:
    enabled: true
    serverName: memcached-ci-production-values-memcached.hf-validate-memcached.svc

pdb:
  enabled: true
  minAvailable: 2

resources:
  requests:
    cpu: 100m
    memory: 320Mi
  limits:
    memory: 320Mi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: memcached
