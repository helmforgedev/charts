# SPDX-License-Identifier: Apache-2.0
# CI scenario: production-oriented distributed cache nodes.

architecture: distributed
replicaCount: 3

memcached:
  memoryLimitMB: 256
  maxConnections: 4096
  threads: 4
  maxItemSize: 2m
  disableFlushAll: true
  disableDumping: true

tls:
  enabled: true
  existingSecret: memcached-tls
  caKey: ca.crt
  verifyMode: "0"
  minVersion: "2"

