# CI scenario: metrics exporter, ServiceMonitor, and PrometheusRule.

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
  prometheusRule:
    enabled: true
    rules:
      - alert: MemcachedDown
        expr: up{job=~".*memcached.*"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Memcached exporter is down

