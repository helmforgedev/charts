# CI scenario: ingress, metrics, and egress NetworkPolicy rules.

networkPolicy:
  enabled: true
  ingress:
    allowSameNamespace: true
  metrics:
    enabled: true
    allowSameNamespace: true
  egress:
    enabled: true
    allowDNS: true
    allowHTTPS: true

metrics:
  enabled: true

