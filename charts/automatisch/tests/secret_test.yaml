suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render app secret by default
    asserts:
      - isKind:
          of: Secret
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-automatisch-app
        documentIndex: 0

  - it: should have encryption-key and app-secret-key in stringData
    asserts:
      - isNotNullOrEmpty:
          path: stringData.encryption-key
        documentIndex: 0
      - isNotNullOrEmpty:
          path: stringData.app-secret-key
        documentIndex: 0

  - it: should render db secret for external db with inline password
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.password: "my-password"
    asserts:
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-automatisch-db
        documentIndex: 1

  - it: should not render db secret when existingSecret is set
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 1
