# CI: ingress enabled
ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: automatisch.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - automatisch.example.com
      secretName: automatisch-tls
