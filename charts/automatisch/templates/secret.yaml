{{- $secretName := include "automatisch.appSecretName" . -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $encryptionKey := "" -}}
{{- $appSecretKey := "" -}}
{{- $webhookSecretKey := "" -}}
{{- if $existingSecret -}}
  {{- $encryptionKey = index $existingSecret.data "encryption-key" | b64dec -}}
  {{- $appSecretKey = index $existingSecret.data "app-secret-key" | b64dec -}}
  {{- $webhookSecretKey = index $existingSecret.data "webhook-secret-key" | b64dec -}}
{{- else -}}
  {{- $encryptionKey = randAlphaNum 32 -}}
  {{- $appSecretKey = randAlphaNum 32 -}}
  {{- $webhookSecretKey = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "automatisch.labels" . | nindent 4 }}
type: Opaque
stringData:
  encryption-key: {{ $encryptionKey | quote }}
  app-secret-key: {{ $appSecretKey | quote }}
  webhook-secret-key: {{ $webhookSecretKey | quote }}
---
{{- if and (not .Values.postgresql.enabled) (not .Values.database.external.existingSecret) .Values.database.external.password }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db" (include "automatisch.fullname" .) }}
  labels:
    {{- include "automatisch.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.database.external.password | quote }}
{{- end }}
