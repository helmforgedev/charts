# Automatisch against managed PostgreSQL and Redis (no bundled subcharts).
#
#   kubectl create secret generic automatisch-db --from-literal=password=<pass>
#   helm install automatisch helmforge/automatisch -f external-datastores.yaml

postgresql:
  enabled: false
externalDatabase:
  host: pg.internal.example.com
  port: 5432
  name: automatisch
  user: automatisch
  existingSecret: automatisch-db
  existingSecretPasswordKey: password

redis:
  enabled: false
externalRedis:
  host: redis.internal.example.com
  port: 6379

# Scale the worker for job throughput.
worker:
  replicaCount: 2
