externalSecrets:
  enabled: true
  items:
    - name: env
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: helmforge-fake-store
        target:
          name: certimate-env
          creationPolicy: Owner
        data:
          - secretKey: CERTIMATE_SMTP_PASSWORD
            remoteRef:
              key: test/password
