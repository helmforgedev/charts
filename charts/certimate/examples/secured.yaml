# SPDX-License-Identifier: Apache-2.0
persistence:
  enabled: true
  size: 20Gi

networkPolicy:
  enabled: true
  extraEgress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi
