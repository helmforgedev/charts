externalSecrets:
  enabled: true
  items:
    - fullnameOverride: literal-certimate-config
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: fake
        data:
          - secretKey: CERTIMATE_SMTP_PASSWORD
            remoteRef:
              key: certimate
              property: smtpPassword
