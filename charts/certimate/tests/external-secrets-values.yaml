# SPDX-License-Identifier: Apache-2.0
externalSecrets:
  enabled: true
  items:
    - name: env
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: fake
        target:
          name: RELEASE-NAME-certimate-env
          creationPolicy: Owner
        data:
          - secretKey: CERTIMATE_SMTP_PASSWORD
            remoteRef:
              key: certimate
              property: smtpPassword
