externalSecrets:
  enabled: true
  items:
    - spec:
        data:
          - secretKey: CERTIMATE_SMTP_PASSWORD
            remoteRef:
              key: certimate-password
            sourceRef:
              storeRef:
                name: fake
          - secretKey: CERTIMATE_TOKEN
            remoteRef:
              key: certimate-token
