# CI scenario: PostgreSQL with S3 backup
postgresql:
  enabled: true
  auth:
    password: "ci-test-password"
  primary:
    persistence:
      size: 1Gi

backup:
  enabled: true
  suspend: true
  schedule: "0 3 * * *"
  archivePrefix: open-webui
  s3:
    endpoint: http://minio.minio.svc:9000
    bucket: open-webui-backups
    prefix: daily
    accessKey: minioadmin
    secretKey: minioadmin
