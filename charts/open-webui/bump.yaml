chart: open-webui

upstream:
  registry: ghcr.io
  repository: open-webui/open-webui
  tagFilter: "^v?\d+\.\d+\.\d+$"
  excludeFilter: "-rc|-beta|-alpha|-dev"

values:
  imageKey: image.tag

helm:
  testArgs: >-
    --set replicaCount=1
    --set persistence.enabled=false
    --set ollama.enabled=false
