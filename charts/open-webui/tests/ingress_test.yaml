suite: Ingress
templates:
  - ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create ingress when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ingress when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: chat.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.rules[0].host
          value: chat.example.com
