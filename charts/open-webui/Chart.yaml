apiVersion: v2
name: open-webui
description: Open WebUI — self-hosted AI chat platform with Ollama and OpenAI support, RAG, multi-model conversations, and extensible plugin system
type: application
version: 1.2.1
appVersion: "0.8.12"
kubeVersion: ">=1.26.0-0"
home: https://helmforge.dev
icon: https://helmforge.dev/icons/charts/open-webui.png
keywords:
  - open-webui
  - ai
  - llm
  - chat
  - ollama
  - openai
  - rag
  - postgresql
maintainers:
  - name: helmforgedev
  - name: mberlofa
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/open-webui/open-webui
  - https://docs.openwebui.com/
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: update signing annotation to gpg+cosign and fix provenance upload
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: helmforgedev@users.noreply.github.com
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  artifacthub.io/license: MIT
  artifacthub.io/category: ai-machine-learning
  artifacthub.io/links: |
    - name: Official Website
      url: https://openwebui.com
    - name: Documentation
      url: https://helmforge.dev/docs/charts/open-webui
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/open-webui
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  artifacthub.io/images: |
    - name: open-webui
      image: ghcr.io/open-webui/open-webui:0.8.12
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
    - url: https://artifacthub.io/packages/helm/helmforge/redis
dependencies:
  - name: postgresql
    version: 1.8.3
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: redis
    version: 1.5.4
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
