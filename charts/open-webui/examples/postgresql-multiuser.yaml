# Open WebUI for multi-user: PostgreSQL (instead of SQLite) + Redis for
# multi-replica coordination, persisted data (model cache), resource limits.
#
#   helm install open-webui helmforge/open-webui -f postgresql-multiuser.yaml

postgresql:
  enabled: true
redis:
  enabled: true

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# First boot downloads the RAG embedding model from HuggingFace — the generous
# startup probe (chart default) covers it. Do not shorten it.
