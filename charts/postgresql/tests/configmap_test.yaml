suite: ConfigMap
templates:
  - configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should initialize app roles through postgres maintenance database
    template: configmap.yaml
    documentIndex: 1
    asserts:
      - matchRegex:
          path: data["01-init-users.sh"]
          pattern: 'psql --username "\$\{POSTGRES_USER\}" --dbname postgres'
