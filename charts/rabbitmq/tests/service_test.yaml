# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Service
    asserts:
      - isKind:
          of: Service

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-rabbitmq

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose AMQP and management ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: amqp
            port: 5672
            targetPort: amqp
      - contains:
          path: spec.ports
          content:
            name: management
            port: 15672
            targetPort: management

  - it: should expose only TLS ports when non-TLS listeners are disabled
    set:
      tls.enabled: true
      tls.disableNonTLSListeners: true
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: amqp
            port: 5672
            targetPort: amqp
      - notContains:
          path: spec.ports
          content:
            name: management
            port: 15672
            targetPort: management
      - contains:
          path: spec.ports
          content:
            name: amqps
            port: 5671
            targetPort: amqps
      - contains:
          path: spec.ports
          content:
            name: management-tls
            port: 15671
            targetPort: management-tls
            appProtocol: https
