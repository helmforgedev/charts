# SPDX-License-Identifier: Apache-2.0
suite: StatefulSet
templates:
  - statefulset.yaml
  - configmap.yaml
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a StatefulSet
    template: statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet

  - it: should have correct name
    template: statefulset.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-rabbitmq

  - it: should use the correct image
    template: statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/library/rabbitmq:4.3.2-alpine"

  - it: should have 1 replica in single-node mode
    template: statefulset.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should have 3 replicas in cluster mode
    template: statefulset.yaml
    set:
      architecture: cluster
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should expose AMQP port
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: amqp
            containerPort: 5672

  - it: should have probes
    template: statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: amqp
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: amqp
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: amqp

  - it: should probe the TLS AMQP listener when non-TLS listeners are disabled
    template: statefulset.yaml
    set:
      tls.enabled: true
      tls.disableNonTLSListeners: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: amqps
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: amqps
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: amqps

  - it: should expose only TLS container ports when non-TLS listeners are disabled
    template: statefulset.yaml
    set:
      tls.enabled: true
      tls.disableNonTLSListeners: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: amqp
            containerPort: 5672
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: management
            containerPort: 15672
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: amqps
            containerPort: 5671
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: management-tls
            containerPort: 15671

  - it: should disable Erlang scheduler busy-wait by default
    template: statefulset.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
            value: "+sbwt none +sbwtdcpu none +sbwtdio none"

  - it: should allow extraEnv to override chart-managed Erlang arguments
    template: statefulset.yaml
    set:
      extraEnv:
        - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
          value: "+S 2"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
            value: "+S 2"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
            value: "+sbwt none +sbwtdcpu none +sbwtdio none"

  - it: should create VolumeClaimTemplate with default 8Gi
    template: statefulset.yaml
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 8Gi
