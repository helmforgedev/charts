{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed auth Secret is drift-protected
  by requiring auth.existingSecret explicitly.
*/}}
{{- if not .Values.auth.existingSecret }}
  {{- fail "externalSecrets.enabled requires auth.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- $userKey := .Values.auth.existingSecretUsernameKey | default "rabbitmq-username" -}}
{{- $passKey := .Values.auth.existingSecretPasswordKey | default "rabbitmq-password" -}}
{{- $erlangKey := .Values.auth.existingSecretErlangCookieKey | default "rabbitmq-erlang-cookie" -}}
{{- $hasUser := false -}}
{{- $hasPass := false -}}
{{- $hasErlang := false -}}
{{- range .Values.externalSecrets.data -}}
  {{- if eq .secretKey $userKey }}{{ $hasUser = true }}{{ end -}}
  {{- if eq .secretKey $passKey }}{{ $hasPass = true }}{{ end -}}
  {{- if eq .secretKey $erlangKey }}{{ $hasErlang = true }}{{ end -}}
{{- end -}}
{{- if not (and $hasUser $hasPass $hasErlang) -}}
  {{- fail (printf "externalSecrets.data must map %s, %s, and %s keys" $userKey $passKey $erlangKey) -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "rabbitmq.fullname" . }}-credentials
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.auth.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
