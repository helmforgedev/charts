{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rabbitmq.secretName" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
type: Opaque
stringData:
  rabbitmq-username: {{ .Values.auth.username | quote }}
  rabbitmq-password: {{ include "rabbitmq.password" . | quote }}
  rabbitmq-erlang-cookie: {{ include "rabbitmq.erlangCookie" . | quote }}
{{- end }}
