{{- if and .Values.gateway.enabled .Values.management.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "rabbitmq.fullname" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "rabbitmq.fullname" . }}
          port: {{ if and .Values.tls.enabled .Values.tls.disableNonTLSListeners }}{{ .Values.service.managementTlsPort }}{{ else }}{{ .Values.service.managementPort }}{{ end }}
{{- end }}
