apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rabbitmq.fullname" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "rabbitmq.headlessServiceName" . }}
  replicas: {{ include "rabbitmq.replicaCount" . }}
  podManagementPolicy: {{ if eq .Values.architecture "cluster" }}{{ .Values.cluster.podManagementPolicy }}{{ else }}OrderedReady{{ end }}
  selector:
    matchLabels:
      {{- include "rabbitmq.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rabbitmq.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.auth.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "rabbitmq.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: rabbitmq
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RABBITMQ_USE_LONGNAME
              value: "true"
            - name: RABBITMQ_NODENAME
              value: "rabbit@$(MY_POD_NAME){{ include "rabbitmq.nodenameSuffix" . }}"
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.secretName" . }}
                  key: {{ .Values.auth.existingSecretUsernameKey }}
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.secretName" . }}
                  key: {{ .Values.auth.existingSecretPasswordKey }}
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: {{ include "rabbitmq.secretName" . }}
                  key: {{ .Values.auth.existingSecretErlangCookieKey }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: amqp
              containerPort: {{ .Values.service.amqpPort }}
            - name: epmd
              containerPort: {{ .Values.service.epmdPort }}
            - name: dist
              containerPort: {{ .Values.service.distPort }}
            {{- if .Values.management.enabled }}
            - name: management
              containerPort: {{ .Values.service.managementPort }}
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: amqps
              containerPort: {{ .Values.service.amqpsPort }}
            {{- if .Values.management.enabled }}
            - name: management-tls
              containerPort: {{ .Values.service.managementTlsPort }}
            {{- end }}
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - rabbitmq-diagnostics -q ping
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 20
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms
            initialDelaySeconds: 20
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - rabbitmq-diagnostics -q ping
            initialDelaySeconds: 10
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 30
          {{- if and (eq .Values.architecture "cluster") .Values.cluster.gracefulShutdown.enabled }}
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -ec
                  - rabbitmq-upgrade await_online_quorum_plus_one && rabbitmq-upgrade drain
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: config
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
            {{- if .Values.config.advancedConfig }}
            - name: config
              mountPath: /etc/rabbitmq/advanced.config
              subPath: advanced.config
            {{- end }}
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /etc/rabbitmq/tls
              readOnly: true
            {{- end }}
            - name: data
              mountPath: /var/lib/rabbitmq
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rabbitmq.configurationName" . }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ include "rabbitmq.tlsSecretName" . }}
        {{- end }}
        {{- if and (eq .Values.architecture "single-node") (not .Values.singleNode.persistence.enabled) }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if and (eq .Values.architecture "cluster") (not .Values.cluster.persistence.enabled) }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if and (eq .Values.architecture "single-node") .Values.singleNode.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.singleNode.persistence.accessMode }}
        {{- if .Values.singleNode.persistence.storageClass }}
        storageClassName: {{ .Values.singleNode.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.singleNode.persistence.size }}
  {{- end }}
  {{- if and (eq .Values.architecture "cluster") .Values.cluster.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.cluster.persistence.accessMode }}
        {{- if .Values.cluster.persistence.storageClass }}
        storageClassName: {{ .Values.cluster.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.cluster.persistence.size }}
  {{- end }}
