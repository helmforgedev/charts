{{- if and .Values.management.enabled .Values.management.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "rabbitmq.fullname" . }}
  labels:
    {{- include "rabbitmq.labels" . | nindent 4 }}
  {{- with .Values.management.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.management.ingress.className }}
  ingressClassName: {{ .Values.management.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.management.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ include "rabbitmq.fullname" $ }}
                port:
                  name: {{ include "rabbitmq.ingressPortName" $ }}
          {{- end }}
    {{- end }}
  {{- with .Values.management.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
