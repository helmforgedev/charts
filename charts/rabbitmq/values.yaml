# =============================================================================
# RabbitMQ Helm Chart — Default Values
# =============================================================================
# Supports: single-node | cluster

architecture: single-node

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

clusterDomain: cluster.local

image:
  repository: rabbitmq
  tag: "4.2.4-management"
  pullPolicy: IfNotPresent

imagePullSecrets: []

auth:
  username: user
  password: ""
  erlangCookie: ""
  vhost: /
  existingSecret: ""
  existingSecretUsernameKey: rabbitmq-username
  existingSecretPasswordKey: rabbitmq-password
  existingSecretErlangCookieKey: rabbitmq-erlang-cookie

queueDefaults:
  type: quorum

management:
  enabled: true
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
    useTlsPort: false

tls:
  enabled: false
  existingSecret: ""
  caFilename: ca.crt
  certFilename: tls.crt
  keyFilename: tls.key
  verify: verify_none
  failIfNoPeerCert: false
  disableNonTLSListeners: false

singleNode:
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi

cluster:
  replicaCount: 3
  podManagementPolicy: OrderedReady
  partitionHandling: pause_minority
  ordinalStart: 0
  seedNode: ""
  gracefulShutdown:
    enabled: true
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi

service:
  type: ClusterIP
  annotations: {}
  amqpPort: 5672
  amqpsPort: 5671
  managementPort: 15672
  managementTlsPort: 15671
  epmdPort: 4369
  distPort: 25672
  metricsPort: 15692
  extraPorts: []

plugins:
  extra: []

config:
  extra: ""
  advancedConfig: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

metrics:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

resources: {}
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 120

podLabels: {}
podAnnotations: {}
annotations: {}

extraEnv: []
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
