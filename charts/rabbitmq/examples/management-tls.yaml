architecture: cluster

auth:
  existingSecret: rabbitmq-auth

tls:
  enabled: true
  existingSecret: rabbitmq-tls
  disableNonTLSListeners: false

management:
  ingress:
    enabled: true
    className: nginx
    useTlsPort: true
    hosts:
      - host: rabbitmq.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - rabbitmq.example.com
        secretName: rabbitmq-ui-tls
