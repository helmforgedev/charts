# CI scenario: ExternalSecrets with drift guard (GR-061)

auth:
  existingSecret: rabbitmq-credentials

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: rabbitmq-username
      remoteRef:
        key: rabbitmq/auth
        property: username
    - secretKey: rabbitmq-password
      remoteRef:
        key: rabbitmq/auth
        property: password
    - secretKey: rabbitmq-erlang-cookie
      remoteRef:
        key: rabbitmq/auth
        property: erlang-cookie
