{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if include "valkey.isReplication" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "valkey.primaryStatefulSetName" . }}
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
  {{- include "valkey.renderAnnotations" (dict "root" .) | nindent 2 }}
spec:
  serviceName: {{ include "valkey.headlessServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "valkey.valkeyLabels" (dict "root" . "role" "primary") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey.valkeyLabels" (dict "root" . "role" "primary") | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.auth.enabled }}
        checksum/auth-secret: {{ include "valkey.authChecksum" . }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "valkey.podSpecCommon" . | nindent 6 }}
      containers:
        - name: valkey
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["valkey-server"]
          args:
            - /etc/valkey/valkey.conf
            {{- if .Values.auth.enabled }}
            - --requirepass
            - $(VALKEY_PASSWORD)
            - --masterauth
            - $(VALKEY_PASSWORD)
            {{- end }}
          ports:
            - name: valkey
              containerPort: {{ .Values.service.ports.valkey }}
          env:
            {{- if .Values.auth.enabled }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valkey.secretName" . }}
                  key: {{ .Values.auth.existingSecretPasswordKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "valkey.probeCommand" . | quote }}
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "valkey.probeCommand" . | quote }}
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            exec:
              command:
                - sh
                - -ec
                - {{ include "valkey.probeCommand" . | quote }}
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.replication.primary.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/valkey/valkey.conf
              subPath: valkey-primary.conf
            - name: data
              mountPath: /data
            {{- if .Values.tls.enabled }}
            - name: tls
              mountPath: /tls
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.metrics.image.repository }}:{{ .Values.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          env:
            {{- include "valkey.exporterEnv" . | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.ports.metrics }}
          {{- include "valkey.metricsVolumeMounts" . | nindent 10 }}
          {{- with .Values.metrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.metrics.securityContext | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "valkey.configMapName" . }}
        {{- if not .Values.replication.primary.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.existingSecret }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.replication.primary.persistence.enabled }}
  volumeClaimTemplates:
    {{- include "valkey.volumeClaimTemplate" (dict "root" . "persistence" .Values.replication.primary.persistence) | nindent 4 }}
  {{- end }}
{{- end }}
