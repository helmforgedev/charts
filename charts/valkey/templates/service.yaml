      targetPort: valkey
    {{- if .Values.metrics.enabled }}
    - name: metrics
      port: {{ .Values.service.ports.metrics }}
      targetPort: metrics
    {{- end }}
  selector:
    {{- include "valkey.valkeyLabels" (dict "root" . "role" "standalone") | nindent 4 }}
{{- end }}

