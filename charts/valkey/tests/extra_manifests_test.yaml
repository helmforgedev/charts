# SPDX-License-Identifier: Apache-2.0
suite: Extra manifests
templates:
  - extra-manifests.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render extra manifests through tpl
    set:
      extraManifests:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ .Release.Name }}-extra"
            namespace: "{{ .Release.Namespace }}"
          data:
            release: "{{ .Release.Name }}"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-extra
      - equal:
          path: metadata.namespace
          value: default
      - equal:
          path: data.release
          value: test
