# SPDX-License-Identifier: Apache-2.0
suite: Sentinel Node StatefulSet
templates:
  - configmap.yaml
  - sentinel-statefulset.yaml
  - sentinel-node-statefulset.yaml
release:
  name: test
  namespace: valkey-ns
tests:
  - it: should render a role-neutral node StatefulSet in sentinel mode
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: test-valkey-node
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.serviceName
          value: test-valkey-headless
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/role"]
          value: node
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].subPath
          value: valkey-node.conf

  - it: should honor node replica count
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      node.replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should fail when sentinel replica count is below three
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      sentinel.replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "sentinel.replicaCount must be at least 3 for a reliable Sentinel quorum in HA configurations"

  - it: should fail when quorum exceeds sentinel replica count
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      sentinel.replicaCount: 3
      sentinel.quorum: 4
    asserts:
      - failedTemplate:
          errorMessage: "sentinel.quorum (4) cannot exceed sentinel.replicaCount (3)"

  - it: should render extra env and volumes in sentinel node pods
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      extraEnv:
        - name: EXTRA_SETTING
          value: enabled
      extraVolumes:
        - name: extra-config
          configMap:
            name: extra-config
      extraVolumeMounts:
        - name: extra-config
          mountPath: /extra
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXTRA_SETTING
            value: enabled
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-config
            mountPath: /extra
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-config
            configMap:
              name: extra-config

  - it: should use emptyDir for data when node persistence is disabled by default
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}
      - notExists:
          path: spec.volumeClaimTemplates

  - it: should render volume claim templates when node persistence is enabled
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      node.persistence.enabled: true
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should probe peer nodes for master discovery
    set:
      architecture: sentinel
    asserts:
      - matchRegex:
          path: data["node-entrypoint.sh"]
          pattern: 'peer_master\(\)'
        template: configmap.yaml
      - matchRegex:
          path: data["node-entrypoint.sh"]
          pattern: 'discover_master\(\)'
        template: configmap.yaml
      - contains:
          path: spec.template.spec.containers[0].command
          content: /scripts/node-entrypoint.sh
        template: sentinel-node-statefulset.yaml
      - contains:
          path: spec.template.spec.initContainers[0].command
          content: /scripts/node-entrypoint.sh
        template: sentinel-node-statefulset.yaml

  - it: should set securityContext on the metrics sidecar
    template: sentinel-node-statefulset.yaml
    set:
      architecture: sentinel
      metrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: metrics
      - isNotNull:
          path: spec.template.spec.containers[1].securityContext

  - it: should enable announce-hostnames in managed sentinel config
    template: configmap.yaml
    set:
      architecture: sentinel
    asserts:
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: "sentinel announce-hostnames yes"

  - it: should render a custom Sentinel master set in sentinel.conf
    template: configmap.yaml
    set:
      architecture: sentinel
      sentinel.masterSet: legacy-master
    asserts:
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: "sentinel monitor legacy-master test-valkey-node-0\\.test-valkey-headless\\.valkey-ns\\.svc\\.cluster\\.local 6379 2"
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: "sentinel down-after-milliseconds legacy-master 60000"
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: "sentinel failover-timeout legacy-master 180000"
      - matchRegex:
          path: data["sentinel.conf"]
          pattern: "sentinel parallel-syncs legacy-master 1"

  - it: should render a sentinel component in StatefulSet sentinel mode
    template: sentinel-statefulset.yaml
    set:
      architecture: sentinel
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: sentinel

  - it: should use the custom Sentinel master set for auth-pass
    template: configmap.yaml
    set:
      architecture: sentinel
      sentinel.masterSet: legacy-master
    asserts:
      - matchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: 'MASTER_SET="legacy-master"'
      - matchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: 'sentinel auth-pass %s'

  - it: injects sentinel requirepass and sentinel-pass when auth.sentinel=true
    set:
      architecture: sentinel
      auth:
        enabled: true
        sentinel: true
    template: configmap.yaml
    asserts:
      - matchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: "printf 'requirepass \"%s\""
      - matchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: "printf 'sentinel sentinel-pass \"%s\""
  - it: omits sentinel auth when auth.sentinel=false but keeps the strip
    set:
      architecture: sentinel
      auth:
        enabled: true
        sentinel: false
    template: configmap.yaml
    asserts:
      - notMatchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: "printf 'requirepass"
      - matchRegex:
          path: data["sentinel-entrypoint.sh"]
          pattern: "sed -i -e '/\\^requirepass /d'"

  - it: both node containers authenticate to Sentinel when auth.sentinel=true
    set:
      architecture: sentinel
      auth:
        enabled: true
        sentinel: true
    asserts:
      - matchRegex:
          path: data["node-entrypoint.sh"]
          pattern: 'scli sentinel get-master-addr-by-name'
        template: configmap.yaml
      - contains:
          path: spec.template.spec.initContainers[0].env
          content:
            name: VALKEYCLI_AUTH
            valueFrom:
              secretKeyRef:
                name: test-valkey-auth
                key: valkey-password
        template: sentinel-node-statefulset.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VALKEYCLI_AUTH
            valueFrom:
              secretKeyRef:
                name: test-valkey-auth
                key: valkey-password
        template: sentinel-node-statefulset.yaml