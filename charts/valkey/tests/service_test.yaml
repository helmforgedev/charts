# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render headless and client services
    asserts:
      - hasDocuments:
          count: 2

  - it: should have headless service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-valkey-headless
      - equal:
          path: spec.clusterIP
          value: None

  - it: should have client service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-valkey-client
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 6379
    documentIndex: 1
    asserts:
      - contains:
          path: spec.ports
          content:
            name: valkey
            port: 6379
            targetPort: valkey

  - it: should apply global and service annotations with per-service overrides
    set:
      annotations:
        argocd.argoproj.io/sync-wave: "1"
        example.com/global: "true"
      service:
        annotations:
          argocd.argoproj.io/sync-wave: "2"
          example.com/service: "true"
        clientAnnotations:
          argocd.argoproj.io/sync-wave: "3"
          example.com/client: "true"
    asserts:
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "2"
        documentIndex: 0
      - equal:
          path: metadata.annotations["example.com/global"]
          value: "true"
        documentIndex: 0
      - equal:
          path: metadata.annotations["example.com/service"]
          value: "true"
        documentIndex: 0
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "3"
        documentIndex: 1
      - equal:
          path: metadata.annotations["example.com/global"]
          value: "true"
        documentIndex: 1
      - equal:
          path: metadata.annotations["example.com/service"]
          value: "true"
        documentIndex: 1
      - equal:
          path: metadata.annotations["example.com/client"]
          value: "true"
        documentIndex: 1

  - it: should render a single dedicated metrics service
    set:
      metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: test-valkey-metrics
        documentIndex: 1
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: metrics
        documentIndex: 1
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 9121
            targetPort: metrics
        documentIndex: 1

  - it: should apply dual-stack settings to headless and client services
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 0
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6
        documentIndex: 0
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
        documentIndex: 1
      - equal:
          path: spec.ipFamilies
          value:
            - IPv4
            - IPv6
        documentIndex: 1
