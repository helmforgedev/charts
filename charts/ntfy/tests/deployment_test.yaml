suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-ntfy

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/binwiederhier/ntfy:v2.21.0"

  - it: should pass serve argument
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: serve

  - it: should expose port 80
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 80
            protocol: TCP

  - it: should mount config and data volumes
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/ntfy
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/cache/ntfy

  - it: should use PVC for data when persistence enabled
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-ntfy-data

  - it: should use emptyDir when persistence disabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should use HTTP health probes
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /v1/health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /v1/health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /v1/health

  - it: should have config checksum annotation
    template: templates/deployment.yaml
    asserts:
      - exists:
          path: spec.template.metadata.annotations["checksum/config"]
