# SPDX-License-Identifier: Apache-2.0
# CI: ingress enabled with metrics
ntfy:
  baseUrl: "https://ntfy.example.com"
  enableMetrics: true

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: ntfy.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - ntfy.example.com
      secretName: ntfy-tls
