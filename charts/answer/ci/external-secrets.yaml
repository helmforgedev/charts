# SPDX-License-Identifier: Apache-2.0
admin:
  existingSecret: answer-admin

database:
  external:
    vendor: postgres
    host: postgresql.example.com
    name: answer
    username: answer
    existingSecret: answer-db

backup:
  s3:
    existingSecret: answer-backup

externalSecrets:
  enabled: true
  secretStoreRef:
    name: vault
    kind: SecretStore
  admin:
    enabled: true
    data:
      - secretKey: admin-password
        remoteRef:
          key: answer/admin
          property: password
  database:
    enabled: true
    data:
      - secretKey: database-password
        remoteRef:
          key: answer/database
          property: password
  backup:
    enabled: true
    data:
      - secretKey: access-key
        remoteRef:
          key: answer/s3
          property: accessKey
      - secretKey: secret-key
        remoteRef:
          key: answer/s3
          property: secretKey
