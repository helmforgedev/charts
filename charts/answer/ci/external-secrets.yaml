# SPDX-License-Identifier: Apache-2.0
admin:
  existingSecret: answer-admin

database:
  external:
    vendor: postgres
    host: postgresql
    port: "5432"
    name: answer
    username: answer
    existingSecret: answer-db

backup:
  s3:
    existingSecret: answer-backup

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  admin:
    enabled: true
    data:
      - secretKey: admin-password
        remoteRef:
          key: test/password
  database:
    enabled: true
    data:
      - secretKey: database-password
        remoteRef:
          key: test/password
  backup:
    enabled: true
    data:
      - secretKey: access-key
        remoteRef:
          key: test/username
      - secretKey: secret-key
        remoteRef:
          key: test/token

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgresql
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
    spec:
      type: ClusterIP
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgresql
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: postgresql
          app.kubernetes.io/component: external-db-ci
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgresql
            app.kubernetes.io/component: external-db-ci
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.4-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTGRES_DB
                  value: answer
                - name: POSTGRES_USER
                  value: answer
                - name: POSTGRES_PASSWORD
                  value: helmforge-test-password
              ports:
                - name: postgresql
                  containerPort: 5432
              readinessProbe:
                exec:
                  command:
                    - pg_isready
                    - -U
                    - answer
                    - -d
                    - answer
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 12
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql
          volumes:
            - name: data
              emptyDir: {}
