# SPDX-License-Identifier: Apache-2.0
# CI: external PostgreSQL database backed by a local disposable PostgreSQL pod
database:
  external:
    vendor: postgres
    host: postgresql
    port: "5432"
    name: answer
    username: answer
    password: external-password

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgresql
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
    spec:
      type: ClusterIP
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgresql
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: external-db-ci
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: postgresql
          app.kubernetes.io/component: external-db-ci
      template:
        metadata:
          labels:
            app.kubernetes.io/name: postgresql
            app.kubernetes.io/component: external-db-ci
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.4-alpine
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTGRES_DB
                  value: answer
                - name: POSTGRES_USER
                  value: answer
                - name: POSTGRES_PASSWORD
                  value: external-password
              ports:
                - name: postgresql
                  containerPort: 5432
              volumeMounts:
                - name: data
                  mountPath: /var/lib/postgresql
          volumes:
            - name: data
              emptyDir: {}
