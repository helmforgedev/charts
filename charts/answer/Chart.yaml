apiVersion: v2
name: answer
description: Apache Answer Q&A platform with SQLite, MySQL, or PostgreSQL support
type: application
version: 1.4.7
appVersion: "2.0.0"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - answer
  - apache-answer
  - qa
  - forum
  - knowledge-base
  - community
home: https://helmforge.dev
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/answer
  - https://github.com/apache/answer
icon: https://helmforge.dev/icons/charts/answer.png
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: update minio mc image to helmforge/mc:1.0.0 (#57)
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: helmforgedev@users.noreply.github.com
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Official Website
      url: https://answer.apache.org
    - name: Documentation
      url: https://helmforge.dev/docs/charts/answer
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/answer
    - name: support
      url: https://github.com/helmforgedev/charts/issues
dependencies:
  - name: postgresql
    version: 1.9.11
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.8.5
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
