# SPDX-License-Identifier: Apache-2.0
suite: clickhouse secret
templates:
  - secret.yaml
tests:
  - it: does not render without inline password
    asserts:
      - hasDocuments:
          count: 0
  - it: renders inline password secret
    set:
      clickhouse:
        password: test-password
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.clickhouse-password
          value: test-password
