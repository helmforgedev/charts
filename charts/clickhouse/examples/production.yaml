# SPDX-License-Identifier: Apache-2.0
# Production standalone deployment. Use ClickHouse Operator for replicated clusters.
clickhouse:
  database: analytics
  user: analytics
  existingSecret: clickhouse-auth
persistence:
  size: 200Gi
logs:
  persistence:
    enabled: true
    size: 20Gi
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
networkPolicy:
  enabled: true
resources:
  requests:
    cpu: "2"
    memory: 8Gi
  limits:
    memory: 16Gi
