# SPDX-License-Identifier: Apache-2.0
suite: Rate Limiting
templates:
  - ratelimit-policies.yaml
  - configmap.yaml
tests:
  # Redis subchart is rendered by Helm, not by helm-unittest.
  # Tests here cover configmap URL generation and rate limit policies.

  - it: should include rateLimit redis url in configmap when subchart redis enabled
    set:
      rateLimiting:
        enabled: true
      redis:
        enabled: true
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "rateLimit"
        template: configmap.yaml
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "redis://RELEASE-NAME-redis\."
        template: configmap.yaml

  - it: should use external redis url when externalRedis host set
    set:
      rateLimiting:
        enabled: true
        externalRedis:
          host: my-redis.infra.svc.cluster.local
          port: 6379
      redis:
        enabled: false
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "redis://my-redis\.infra\.svc\.cluster\.local:6379"
        template: configmap.yaml

  - it: should not have rateLimit section in configmap when rate limiting disabled
    set:
      rateLimiting:
        enabled: false
    asserts:
      - notMatchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "rateLimit"
        template: configmap.yaml

  - it: should create rate limit policies with api preset
    set:
      rateLimiting:
        enabled: true
        presets:
          api: true
      redis:
        enabled: true
    asserts:
      - hasDocuments:
          count: 2
        template: ratelimit-policies.yaml
      - equal:
          path: kind
          value: ConfigMap
        template: ratelimit-policies.yaml
        documentIndex: 0
      - equal:
          path: kind
          value: BackendTrafficPolicy
        template: ratelimit-policies.yaml
        documentIndex: 1
      - equal:
          path: spec.rateLimit.global.rules[0].limit.requests
          value: 100
        template: ratelimit-policies.yaml
        documentIndex: 1
      - equal:
          path: spec.targetRef.kind
          value: Gateway
        template: ratelimit-policies.yaml
        documentIndex: 1

  - it: should create strict rate limit policy
    set:
      rateLimiting:
        enabled: true
        presets:
          strict: true
      redis:
        enabled: true
    asserts:
      - hasDocuments:
          count: 2
        template: ratelimit-policies.yaml
      - equal:
          path: spec.rateLimit.global.rules[0].limit.requests
          value: 10
        template: ratelimit-policies.yaml
        documentIndex: 1

  - it: should create both presets
    set:
      rateLimiting:
        enabled: true
        presets:
          api: true
          strict: true
      redis:
        enabled: true
    asserts:
      - hasDocuments:
          count: 3
        template: ratelimit-policies.yaml
