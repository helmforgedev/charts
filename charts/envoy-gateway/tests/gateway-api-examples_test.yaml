# SPDX-License-Identifier: Apache-2.0
suite: Gateway API Examples
templates:
  - examples/gateway.yaml
  - examples/httproute.yaml
tests:
  - it: should create example Gateway when enabled
    set:
      gatewayAPI:
        examples:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
        template: examples/gateway.yaml
      - equal:
          path: kind
          value: Gateway
        template: examples/gateway.yaml
      - equal:
          path: spec.gatewayClassName
          value: envoy-gateway
        template: examples/gateway.yaml
      - equal:
          path: spec.listeners[0].protocol
          value: HTTP
        template: examples/gateway.yaml

  - it: should not create example Gateway when disabled
    set:
      gatewayAPI:
        examples:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: examples/gateway.yaml
      - hasDocuments:
          count: 0
        template: examples/httproute.yaml

  - it: should create HTTPRoute with example backend
    set:
      gatewayAPI:
        examples:
          enabled: true
    asserts:
      - hasDocuments:
          count: 3
        template: examples/httproute.yaml
      - equal:
          path: kind
          value: HTTPRoute
        template: examples/httproute.yaml
        documentIndex: 0
      - equal:
          path: spec.hostnames[0]
          value: "example.local"
        template: examples/httproute.yaml
        documentIndex: 0
      - equal:
          path: kind
          value: Service
        template: examples/httproute.yaml
        documentIndex: 1
      - equal:
          path: kind
          value: Deployment
        template: examples/httproute.yaml
        documentIndex: 2

  - it: should use custom namespace for examples
    set:
      gatewayAPI:
        examples:
          enabled: true
          namespace: custom-ns
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-ns
        template: examples/gateway.yaml
      - equal:
          path: metadata.namespace
          value: custom-ns
        template: examples/httproute.yaml
        documentIndex: 0
