# SPDX-License-Identifier: Apache-2.0
suite: Monitoring and Observability
templates:
  - servicemonitor.yaml
  - configmap.yaml
  - envoyproxy-config.yaml
tests:
  - it: should create one ServiceMonitor when monitoring enabled
    set:
      monitoring:
        enabled: true
        prometheus:
          serviceMonitor: true
    asserts:
      - hasDocuments:
          count: 1
        template: servicemonitor.yaml
      - equal:
          path: kind
          value: ServiceMonitor
        template: servicemonitor.yaml
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].port
          value: metrics
        template: servicemonitor.yaml
        documentIndex: 0

  - it: should not create ServiceMonitors when monitoring disabled
    set:
      monitoring:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: servicemonitor.yaml

  - it: should not create ServiceMonitors when serviceMonitor disabled
    set:
      monitoring:
        enabled: true
        prometheus:
          serviceMonitor: false
    asserts:
      - hasDocuments:
          count: 0
        template: servicemonitor.yaml

  - it: should configure access logs in configmap
    set:
      monitoring:
        enabled: true
        accessLogs:
          enabled: true
          format: json
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "type: JSON"
        template: configmap.yaml

  - it: should configure JSON access logs in EnvoyProxy
    set:
      monitoring:
        enabled: true
        accessLogs:
          enabled: true
          format: json
    asserts:
      - equal:
          path: spec.telemetry.accessLog.settings[0].format.type
          value: JSON
        template: envoyproxy-config.yaml
      - equal:
          path: spec.telemetry.accessLog.settings[0].format.json.response_code
          value: "%RESPONSE_CODE%"
        template: envoyproxy-config.yaml
      - isNull:
          path: spec.telemetry.accessLog.settings[0].format.text
        template: envoyproxy-config.yaml

  - it: should configure text access logs in EnvoyProxy
    set:
      monitoring:
        enabled: true
        accessLogs:
          enabled: true
          format: text
    asserts:
      - equal:
          path: spec.telemetry.accessLog.settings[0].format.type
          value: Text
        template: envoyproxy-config.yaml
      - matchRegex:
          path: spec.telemetry.accessLog.settings[0].format.text
          pattern: "%RESPONSE_CODE%"
        template: envoyproxy-config.yaml
      - isNull:
          path: spec.telemetry.accessLog.settings[0].format.json
        template: envoyproxy-config.yaml

  - it: should include rateLimit redis url in configmap when rate limiting enabled
    set:
      rateLimiting:
        enabled: true
      redis:
        enabled: true
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "rateLimit"
        template: configmap.yaml
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "redis://"
        template: configmap.yaml

  - it: should not have rateLimit section in configmap when rate limiting disabled
    set:
      rateLimiting:
        enabled: false
    asserts:
      - notMatchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "rateLimit"
        template: configmap.yaml
