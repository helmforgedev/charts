suite: Monitoring and Observability
templates:
  - servicemonitor.yaml
  - configmap.yaml
tests:
  - it: should create ServiceMonitors when monitoring enabled
    set:
      monitoring:
        enabled: true
        prometheus:
          serviceMonitor: true
    asserts:
      - hasDocuments:
          count: 2
        template: servicemonitor.yaml
      - equal:
          path: kind
          value: ServiceMonitor
        template: servicemonitor.yaml
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].port
          value: metrics
        template: servicemonitor.yaml
        documentIndex: 0
      - equal:
          path: spec.endpoints[0].port
          value: admin
        template: servicemonitor.yaml
        documentIndex: 1

  - it: should not create ServiceMonitors when monitoring disabled
    set:
      monitoring:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: servicemonitor.yaml

  - it: should not create ServiceMonitors when serviceMonitor disabled
    set:
      monitoring:
        enabled: true
        prometheus:
          serviceMonitor: false
    asserts:
      - hasDocuments:
          count: 0
        template: servicemonitor.yaml

  - it: should configure access logs in configmap
    set:
      monitoring:
        enabled: true
        accessLogs:
          enabled: true
          format: json
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "type: json"
        template: configmap.yaml

  - it: should disable rate limiting by default
    set:
      rateLimiting:
        enabled: false
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "replicas: 0"
        template: configmap.yaml

  - it: should enable rate limiting when configured
    set:
      rateLimiting:
        enabled: true
        redis:
          enabled: true
    asserts:
      - matchRegex:
          path: data["envoy-gateway.yaml"]
          pattern: "replicas: 1"
        template: configmap.yaml
