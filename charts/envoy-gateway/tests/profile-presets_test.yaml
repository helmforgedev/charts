# SPDX-License-Identifier: Apache-2.0
suite: Profile Presets
templates:
  - deployment-controller.yaml
  - envoyproxy-config.yaml
  - configmap.yaml
tests:
  - it: should apply dev profile correctly to controller
    set:
      profile: dev
    asserts:
      - equal:
          path: spec.replicas
          value: 1
        template: deployment-controller.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "100m"
        template: deployment-controller.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "128Mi"
        template: deployment-controller.yaml

  - it: should apply production-ha profile with 2 controller replicas
    set:
      profile: production-ha
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        template: deployment-controller.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "1000m"
        template: deployment-controller.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "1Gi"
        template: deployment-controller.yaml

  - it: should apply dev profile proxy resources to EnvoyProxy CRD
    set:
      profile: dev
    asserts:
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.requests.cpu
          value: 100m
        template: envoyproxy-config.yaml
      - equal:
          path: spec.provider.kubernetes.envoyDeployment.container.resources.requests.memory
          value: 128Mi
        template: envoyproxy-config.yaml

  - it: should apply production-ha profile proxy resources to EnvoyProxy CRD with DaemonSet
    set:
      profile: production-ha
      proxy:
        kind: DaemonSet
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDaemonSet
        template: envoyproxy-config.yaml
      - equal:
          path: spec.provider.kubernetes.envoyDaemonSet.container.resources.requests.cpu
          value: 1000m
        template: envoyproxy-config.yaml

  - it: should use custom profile values from values.yaml
    set:
      profile: custom
      controller:
        replicaCount: 3
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        template: deployment-controller.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "200m"
        template: deployment-controller.yaml

  - it: should use Deployment kind by default in custom profile
    set:
      profile: custom
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDeployment
        template: envoyproxy-config.yaml

  - it: should use DaemonSet kind when proxy.kind is DaemonSet
    set:
      profile: custom
      proxy:
        kind: DaemonSet
    asserts:
      - isNotEmpty:
          path: spec.provider.kubernetes.envoyDaemonSet
        template: envoyproxy-config.yaml
