# CI: Security hardening
# Tests NetworkPolicies and security contexts
security:
  networkPolicies: true
  podSecurityStandards: true

rateLimiting:
  enabled: true

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  standalone:
    persistence:
      enabled: false

gatewayAPI:
  examples:
    enabled: true
