# SPDX-License-Identifier: Apache-2.0
# CI: Staging-like deployment with 2 replicas and medium resources
# The staging profile was removed - using custom profile instead
profile: custom

controller:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

proxy:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

gateway:
  create: true
  listeners:
    http:
      enabled: true
      port: 80

gatewayAPI:
  examples:
    enabled: true
