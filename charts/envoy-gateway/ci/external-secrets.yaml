# CI scenario: ExternalSecrets with drift guard (GR-061)
redis:
  enabled: false

rateLimiting:
  enabled: true
  externalRedis:
    host: "redis-external"
    auth:
      enabled: true
      secretName: envoy-redis-credentials

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: redis-password
      remoteRef:
        key: envoy/redis
        property: password
