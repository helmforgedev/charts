# CI: Monitoring and observability
# Tests Prometheus ServiceMonitors, PrometheusRule, and Grafana dashboards
monitoring:
  enabled: true
  prometheus:
    serviceMonitor: true
    prometheusRule: true
  grafana:
    dashboards: true
  accessLogs:
    enabled: true
    format: json

gatewayAPI:
  examples:
    enabled: true
