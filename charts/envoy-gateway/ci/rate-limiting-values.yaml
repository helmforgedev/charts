# CI: Rate limiting with Redis
# Tests rate limiting configuration with Redis backend
rateLimiting:
  enabled: true
  redis:
    enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 1Gi
  presets:
    api: true

gatewayAPI:
  examples:
    enabled: true
