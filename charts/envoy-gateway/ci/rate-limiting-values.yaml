# CI: Rate limiting with Redis subchart
# Tests rate limiting configuration using the helmforge/redis subchart
rateLimiting:
  enabled: true
  presets:
    api: true

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  standalone:
    persistence:
      enabled: false

gatewayAPI:
  examples:
    enabled: true
