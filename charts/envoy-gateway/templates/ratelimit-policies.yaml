{{- if .Values.rateLimiting.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-ratelimit-config
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
data:
  ratelimit-config.yaml: |
    domain: envoy-gateway
    descriptors:
    {{- if .Values.rateLimiting.presets.api }}
    - key: remote_address
      rate_limit:
        unit: minute
        requests_per_unit: 100
    {{- end }}
    {{- if .Values.rateLimiting.presets.strict }}
    - key: remote_address
      rate_limit:
        unit: minute
        requests_per_unit: 10
    {{- end }}
{{- if .Values.rateLimiting.presets.api }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-ratelimit-api
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "envoy-gateway.gateway.name" . }}
  rateLimit:
    type: Global
    global:
      rules:
      - clientSelectors:
        - headers:
          - name: x-real-ip
            type: Distinct
        limit:
          requests: 100
          unit: Minute
{{- end }}
{{- if .Values.rateLimiting.presets.strict }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-ratelimit-strict
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "envoy-gateway.gateway.name" . }}
  rateLimit:
    type: Global
    global:
      rules:
      - clientSelectors:
        - headers:
          - name: x-real-ip
            type: Distinct
        limit:
          requests: 10
          unit: Minute
{{- end }}
{{- end }}
