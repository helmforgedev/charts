apiVersion: v1
kind: Service
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-controller
  labels:
    {{- include "envoy-gateway.controller.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: metrics
    protocol: TCP
  selector:
    {{- include "envoy-gateway.controller.selectorLabels" . | nindent 4 }}
