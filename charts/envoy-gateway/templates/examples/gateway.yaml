{{- if .Values.gatewayAPI.examples.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-example
  namespace: {{ include "envoy-gateway.examples.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gatewayClass.name }}
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    {{- $certManagerEnabled := include "envoy-gateway.certManager.enabled" . | trim }}
    {{- if eq $certManagerEnabled "true" }}
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: {{ include "envoy-gateway.fullname" . }}-example-tls
    {{- end }}
    allowedRoutes:
      namespaces:
        from: All
{{- end }}
