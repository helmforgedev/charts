{{- if .Values.gatewayAPI.examples.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-example
  namespace: {{ include "envoy-gateway.examples.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ include "envoy-gateway.fullname" . }}-example
    namespace: {{ include "envoy-gateway.examples.namespace" . }}
  hostnames:
  - "example.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: example-backend
      port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: example-backend
  namespace: {{ include "envoy-gateway.examples.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app: example-backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: example-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-backend
  namespace: {{ include "envoy-gateway.examples.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app: example-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-backend
  template:
    metadata:
      labels:
        app: example-backend
    spec:
      containers:
      - name: backend
        image: docker.io/kennethreitz/httpbin:latest
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
{{- end }}
