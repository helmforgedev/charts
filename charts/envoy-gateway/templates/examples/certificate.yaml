{{- if and .Values.gatewayAPI.examples.enabled (eq (include "envoy-gateway.certManager.enabled" .) "true") -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-example-tls
  namespace: {{ include "envoy-gateway.examples.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
spec:
  secretName: {{ include "envoy-gateway.fullname" . }}-example-tls
  issuerRef:
    name: {{ .Values.certificates.certManager.issuer }}
    kind: {{ .Values.certificates.certManager.issuerKind }}
  dnsNames:
  - example.local
  - "*.example.local"
{{- end }}
