{{- if .Values.security.networkPolicies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-controller
  labels:
    {{- include "envoy-gateway.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "envoy-gateway.controller.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8081
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
{{- if and .Values.rateLimiting.enabled .Values.rateLimiting.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-redis
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      {{- include "envoy-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- include "envoy-gateway.controller.selectorLabels" . | nindent 10 }}
    ports:
    - protocol: TCP
      port: 6379
{{- end }}
{{- if .Values.rateLimiting.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-ratelimit
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: ratelimit
spec:
  podSelector:
    matchLabels:
      {{- include "envoy-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ratelimit
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 6070
  egress:
  {{- if .Values.rateLimiting.redis.enabled }}
  - to:
    - podSelector:
        matchLabels:
          {{- include "envoy-gateway.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: redis
    ports:
    - protocol: TCP
      port: 6379
  {{- end }}
  {{- if .Values.rateLimiting.externalRedis.host }}
  - ports:
    - protocol: TCP
      port: {{ .Values.rateLimiting.externalRedis.port }}
  {{- end }}
{{- end }}
{{- end }}
