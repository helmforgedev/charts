{{- if .Values.security.networkPolicies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-controller
  namespace: {{ include "envoy-gateway.namespace" . }}
  labels:
    {{- include "envoy-gateway.controller.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "envoy-gateway.controller.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8081
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 18000
    - protocol: TCP
      port: 18002
  egress:
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 6443
  - to:
    - namespaceSelector: {}
      podSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  {{- with .Values.security.networkPolicy.extraEgress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- if and .Values.rateLimiting.enabled .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-redis
  namespace: {{ include "envoy-gateway.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ default "redis" .Values.redis.nameOverride | trunc 63 | trimSuffix "-" }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- include "envoy-gateway.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: ratelimit
    ports:
    - protocol: TCP
      port: 6379
{{- end }}
{{- if .Values.rateLimiting.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-ratelimit
  namespace: {{ include "envoy-gateway.namespace" . }}
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: ratelimit
spec:
  podSelector:
    matchLabels:
      {{- include "envoy-gateway.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ratelimit
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 8081
    - protocol: TCP
      port: 6070
  egress:
  {{- if .Values.redis.enabled }}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
      podSelector:
        matchLabels:
          app.kubernetes.io/name: {{ default "redis" .Values.redis.nameOverride | trunc 63 | trimSuffix "-" }}
          app.kubernetes.io/instance: {{ .Release.Name }}
          app.kubernetes.io/component: redis
    ports:
    - protocol: TCP
      port: 6379
  {{- end }}
  {{- if .Values.rateLimiting.externalRedis.host }}
  - ports:
    - protocol: TCP
      port: {{ .Values.rateLimiting.externalRedis.port }}
  {{- end }}
{{- end }}
{{- end }}
