apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-config
  labels:
    {{- include "envoy-gateway.labels" . | nindent 4 }}
data:
  envoy-gateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    gateway:
      controllerName: gateway.envoyproxy.io/gatewayclass-controller
    provider:
      type: Kubernetes
      kubernetes:
        envoyDeploymentSpec: {}
    {{- if .Values.rateLimiting.enabled }}
    rateLimit:
      backend:
        type: Redis
        redis:
          url: {{ include "envoy-gateway.ratelimit.redisUrl" . }}
    {{- end }}
    {{- if .Values.monitoring.enabled }}
    telemetry:
      metrics:
        prometheus:
          disable: false
      {{- if .Values.monitoring.accessLogs.enabled }}
      accessLog:
        format:
          type: {{ .Values.monitoring.accessLogs.format | upper }}
      {{- end }}
    {{- end }}
