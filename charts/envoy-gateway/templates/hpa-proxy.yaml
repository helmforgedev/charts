{{- $mode := include "envoy-gateway.proxy.mode" . }}
{{- if and (eq $mode "Deployment") .Values.proxy.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "envoy-gateway.fullname" . }}-proxy
  labels:
    {{- include "envoy-gateway.proxy.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "envoy-gateway.fullname" . }}-proxy
  minReplicas: {{ .Values.proxy.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.proxy.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.proxy.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
