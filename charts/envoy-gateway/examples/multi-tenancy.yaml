# Multi-tenancy with namespace isolation
# Use case: Platform engineering with namespace-based routing for multiple teams

profile: production-ha

gatewayClass:
  name: platform-gateway

gatewayAPI:
  examples:
    enabled: false

certificates:
  certManager:
    enabled: true
    issuer: platform-issuer
    issuerKind: ClusterIssuer
  autoProvision: true

monitoring:
  enabled: true
  prometheus:
    serviceMonitor: true
    prometheusRule: true
  grafana:
    dashboards: true
  accessLogs:
    enabled: true
    format: json

security:
  networkPolicies: true
  podSecurityStandards: true

highAvailability:
  enabled: true
  podDisruptionBudget:
    minAvailable: 1

proxy:
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-internal: "true"  # Internal ALB for platform
