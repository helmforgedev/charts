# Production Envoy Gateway with full HA, rate limiting, monitoring, and security
# Use case: Production deployment with DaemonSet proxy mode and all features
# Note: For HTTPS, create a TLS Secret externally (e.g., via cert-manager) and
#       reference it in gateway.listeners.https.tls.certificateRef.name

profile: production-ha

gatewayClass:
  name: envoy-gateway

gatewayAPI:
  examples:
    enabled: false  # No examples in production

proxy:
  kind: DaemonSet  # One proxy per node
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"

rateLimiting:
  enabled: true
  redis:
    enabled: true
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 2Gi
      storageClass: fast-ssd
  presets:
    api: true

monitoring:
  enabled: true
  prometheus:
    serviceMonitor: true
    prometheusRule: true
  grafana:
    dashboards: true
  accessLogs:
    enabled: true
    format: json

security:
  networkPolicies: true
  podSecurityStandards: true

highAvailability:
  enabled: true
  podDisruptionBudget:
    minAvailable: 1

gateway:
  create: true
  listeners:
    http:
      enabled: true
      port: 80
    https:
      enabled: true
      port: 443
      tls:
        mode: Terminate
        certificateRef:
          name: my-tls-cert  # Must be created separately (e.g., via cert-manager or manual)

controller:
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

nodeSelector:
  kubernetes.io/os: linux
