# Staging Envoy Gateway deployment with self-signed TLS
# Use case: Pre-production testing with 2 replicas and cert-manager

profile: staging

gatewayAPI:
  examples:
    enabled: true

certificates:
  certManager:
    enabled: true
    issuer: selfsigned
    issuerKind: ClusterIssuer

monitoring:
  enabled: true
  prometheus:
    serviceMonitor: true
  accessLogs:
    enabled: true
    format: json

proxy:
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
