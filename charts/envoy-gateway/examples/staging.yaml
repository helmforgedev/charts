# Staging Envoy Gateway deployment
# Use case: Pre-production testing with 2 replicas and monitoring

profile: custom

controller:
  replicaCount: 2

proxy:
  kind: Deployment
  replicaCount: 2
  service:
    type: LoadBalancer

gateway:
  create: true
  listeners:
    http:
      enabled: true
      port: 80

monitoring:
  enabled: true
  prometheus:
    serviceMonitor: true
  accessLogs:
    enabled: true
    format: json

gatewayAPI:
  examples:
    enabled: true
