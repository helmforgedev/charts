apiVersion: v2
name: authelia
description: Authelia authentication and authorization server with SSO, MFA, and OpenID Connect
type: application
version: 1.3.2
appVersion: "4.39.16"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - authelia
  - authentication
  - authorization
  - sso
  - mfa
  - oidc
  - forward-auth
home: https://helmforge.dev/docs/charts/authelia
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/authelia
  - https://github.com/authelia/authelia
icon: https://www.authelia.com/images/branding/logo-cropped.png
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: MIT
  artifacthub.io/category: security
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/authelia
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/authelia
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.7.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
  - name: redis
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
