# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render config secret
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-authelia-config

  - it: should render credentials secret when no existingSecret
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-authelia-secrets

  - it: should not render credentials secret when existingSecret is set
    set:
      secrets.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 1

  - it: should include db-password in credentials secret for postgres mode
    set:
      database.type: postgres
      postgresql.enabled: true
      postgresql.auth.password: pgpass123
    documentIndex: 1
    asserts:
      - equal:
          path: stringData.db-password
          value: "pgpass123"

  - it: should render modern postgres storage address
    documentIndex: 0
    set:
      database.type: postgres
      postgresql.enabled: true
      postgresql.auth.password: pgpass123
    asserts:
      - matchRegex:
          path: stringData["configuration.yml"]
          pattern: "address: tcp://test-postgresql:5432"
      - notMatchRegex:
          path: stringData["configuration.yml"]
          pattern: "(?m)^\\s+host:"
      - notMatchRegex:
          path: stringData["configuration.yml"]
          pattern: "(?m)^\\s+port:"

  - it: should bracket external IPv6 database hosts in storage address
    documentIndex: 0
    set:
      database.type: postgres
      postgresql.enabled: false
      database.external.host: "2001:db8::10"
      database.external.port: "5432"
      database.external.name: authelia
      database.external.username: authelia
      database.external.password: test123
    asserts:
      - matchRegex:
          path: stringData["configuration.yml"]
          pattern: "address: tcp://\\[2001:db8::10\\]:5432"

  - it: should include redis-password in credentials secret
    set:
      redis.enabled: true
      redis.auth.password: redis123
    documentIndex: 1
    asserts:
      - equal:
          path: stringData.redis-password
          value: "redis123"

  - it: should render backup secret when backup is enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.example.com
      backup.s3.bucket: my-bucket
      backup.s3.accessKey: AKID
      backup.s3.secretKey: SKEY
    asserts:
      - hasDocuments:
          count: 3

  - it: should disable ntp startup check by default
    documentIndex: 0
    asserts:
      - matchRegex:
          path: stringData["configuration.yml"]
          pattern: "disable_startup_check: true"

  - it: should include oidc-hmac-secret when set
    set:
      secrets.oidcHmacSecret: my-oidc-hmac
    documentIndex: 1
    asserts:
      - equal:
          path: stringData.oidc-hmac-secret
          value: "my-oidc-hmac"
