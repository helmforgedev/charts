{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed Authelia credentials Secret
  is still rendered unless secrets.existingSecret is set. Without this guard both resources
  target the same name, creating credential drift between the chart-managed Secret and the
  ExternalSecret. Require secrets.existingSecret explicitly.
*/}}
{{- if not .Values.secrets.existingSecret }}
  {{- fail "externalSecrets.enabled requires secrets.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "authelia.fullname" . }}-secrets
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ printf "%s-secrets" (include "authelia.fullname" .) }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
