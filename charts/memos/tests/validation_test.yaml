suite: memos validation
templates:
  - templates/validate.yaml
tests:
  - it: fails when scaling SQLite
    set:
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 requires database.driver=mysql or database.driver=postgres because SQLite cannot safely share state across Memos pods"
  - it: fails when external database is missing a DSN
    set:
      database.driver: postgres
    asserts:
      - failedTemplate:
          errorMessage: "database.dsn or database.existingSecret is required when database.driver is mysql or postgres"
  - it: fails when external database disables the data volume
    set:
      database.driver: postgres
      database.dsn: postgres://memos:secret@postgresql:5432/memos?sslmode=disable
      persistence.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "persistence.enabled or persistence.existingClaim is required with external databases because Memos still stores local assets in MEMOS_DATA"
  - it: fails when scaling external database mode without shared data storage
    set:
      replicaCount: 2
      database.driver: postgres
      database.dsn: postgres://memos:secret@postgresql:5432/memos?sslmode=disable
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 with mysql or postgres requires persistence.existingClaim backed by shared storage because generated StatefulSet PVCs are per-pod and Memos can store local assets in MEMOS_DATA"
  - it: fails when podLabels override selector labels
    set:
      podLabels:
        app.kubernetes.io/instance: custom
    asserts:
      - failedTemplate:
          errorMessage: "podLabels must not override the selector label app.kubernetes.io/instance"
  - it: fails when podLabels override the name selector label
    set:
      podLabels:
        app.kubernetes.io/name: custom
    asserts:
      - failedTemplate:
          errorMessage: "podLabels must not override the selector label app.kubernetes.io/name"
