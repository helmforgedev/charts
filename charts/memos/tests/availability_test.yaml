# SPDX-License-Identifier: Apache-2.0
suite: memos availability
templates:
  - templates/pdb.yaml
  - templates/statefulset.yaml
tests:
  - it: renders multiple replicas with external database and PDB
    values:
      - scaled-values.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        template: templates/statefulset.yaml
      - isKind:
          of: PodDisruptionBudget
        template: templates/pdb.yaml
      - equal:
          path: spec.minAvailable
          value: 1
        template: templates/pdb.yaml
