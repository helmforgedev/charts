# SPDX-License-Identifier: Apache-2.0

# External PostgreSQL keeps relational state outside the pod, but the PVC is
# still required for local assets and instance data.
database:
  driver: postgres
  existingSecret: memos-postgres
  existingSecretKey: dsn

memos:
  instanceUrl: https://memos.example.com

persistence:
  enabled: true
  size: 20Gi

replicaCount: 2
pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
