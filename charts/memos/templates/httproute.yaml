{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.gateway.enabled }}
{{- if not .Values.gateway.parentRefs }}{{- fail "gateway.parentRefs is required when gateway.enabled=true" }}{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "memos.fullname" . }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  rules:
    - matches:
        - path:
            type: {{ .Values.gateway.pathType }}
            value: {{ .Values.gateway.path }}
      backendRefs:
        - name: {{ include "memos.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
