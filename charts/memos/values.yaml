# SPDX-License-Identifier: Apache-2.0
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
image:
  repository: docker.io/neosmemo/memos
  tag: "0.29.1"
  pullPolicy: IfNotPresent
imagePullSecrets: []
replicaCount: 1
app:
  port: 5230
  command: []
  args: []
  env:
    - name: MEMOS_PORT
      value: "5230"
    - name: MEMOS_DATA
      value: "/var/opt/memos"
    - name: MEMOS_DRIVER
      value: "sqlite"
    - name: MEMOS_LOG_LEVEL
      value: "info"
  extraEnv: []
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /var/opt/memos
serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false
service:
  type: ClusterIP
  port: 5230
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}
  hosts: []
  tls: []
gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix
probes:
  startup: { enabled: true, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 60 }
  liveness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 3 }
  readiness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 6 }
resources: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30
podLabels: {}
podAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
