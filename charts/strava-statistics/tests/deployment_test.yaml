# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-strava-statistics

  - it: should use Recreate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/robiningelbrecht/strava-statistics:v4.8.8"

  - it: should allow custom image tag
    set:
      image.tag: "v4.0.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/robiningelbrecht/strava-statistics:v4.0.0"

  - it: should set Strava env vars from secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: STRAVA_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: test-strava-statistics-strava
                key: client-id
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: STRAVA_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: test-strava-statistics-strava
                key: client-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: STRAVA_REFRESH_TOKEN
            valueFrom:
              secretKeyRef:
                name: test-strava-statistics-strava
                key: refresh-token

  - it: should use existing secret when configured
    set:
      strava.existingSecret: my-strava-secret
      strava.existingSecretClientIdKey: my-id
      strava.existingSecretClientSecretKey: my-secret
      strava.existingSecretRefreshTokenKey: my-token
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: STRAVA_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: my-strava-secret
                key: my-id
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: STRAVA_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-strava-secret
                key: my-secret

  - it: should set timezone
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: "UTC"

  - it: should mount data volume
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /var/www/config/app/config.yaml
            subPath: config.yaml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/www/storage

  - it: should roll pods when config changes
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/config"]

  - it: should preserve custom pod annotations
    set:
      podAnnotations:
        example.com/custom: "true"
    asserts:
      - isNotNull:
          path: spec.template.metadata.annotations["checksum/config"]
      - equal:
          path: spec.template.metadata.annotations["example.com/custom"]
          value: "true"

  - it: should use PVC for data when persistence enabled
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].persistentVolumeClaim.claimName
          value: test-strava-statistics-data

  - it: should use emptyDir when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - equal:
          path: spec.template.spec.volumes[1].emptyDir
          value: {}

  - it: should use TCP probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: http

  - it: should set container port
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
            protocol: TCP

  - it: should bootstrap the upstream storage layout when persistence is enabled
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: storage-bootstrap
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: "docker.io/library/busybox:1.37"
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: data
            mountPath: /work

  - it: should not bootstrap storage when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.initContainers
