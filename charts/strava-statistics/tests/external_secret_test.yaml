# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/external-secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render ExternalSecret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret with required secret store reference
    set:
      externalSecrets.enabled: true
      externalSecrets.items:
        - name: strava
          storeRef:
            name: test-store
            kind: ClusterSecretStore
          data:
            - secretKey: client-id
              remoteRef:
                key: strava/client-id
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: metadata.name
          value: test-strava-statistics-strava
      - equal:
          path: spec.secretStoreRef.name
          value: test-store
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore
