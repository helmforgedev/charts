# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Statistics for Strava Helm Chart - Default Values
# =============================================================================
# Focus: self-hosted Strava fitness dashboard with SQLite and OAuth

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Statistics for Strava container image
  repository: docker.io/robiningelbrecht/strava-statistics
  # -- Image tag
  tag: "v4.8.7"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Strava Configuration
# =============================================================================

strava:
  # -- Application port
  port: 8080
  # -- Strava OAuth Client ID (required)
  clientId: ""
  # -- Strava OAuth Client Secret (required)
  clientSecret: ""
  # -- Strava Refresh Token (required)
  refreshToken: ""
  # -- Existing secret containing Strava credentials
  existingSecret: ""
  # -- Key in existing secret for client ID
  existingSecretClientIdKey: client-id
  # -- Key in existing secret for client secret
  existingSecretClientSecretKey: client-secret
  # -- Key in existing secret for refresh token
  existingSecretRefreshTokenKey: refresh-token
  # -- Timezone
  timezone: UTC
  # -- Application config mounted at /var/www/config/app/config.yaml
  config: |
    general:
      appUrl: "http://localhost:8080/"
      appSubTitle: null
      profilePictureUrl: null
      athlete:
        birthday: "1990-01-01"
        maxHeartRateFormula: fox
        restingHeartRateFormula: heuristicAgeBased
        heartRateZones:
          mode: relative
          default:
            zone1:
              from: 50
              to: 60
            zone2:
              from: 61
              to: 70
            zone3:
              from: 71
              to: 80
            zone4:
              from: 81
              to: 90
            zone5:
              from: 91
              to: null
        weightHistory:
          "2024-01-01": 75
        ftpHistory:
          cycling: []
          running: []
    appearance:
      locale: "en_US"
      unitSystem: metric
      timeFormat: 24
      dateFormat:
        short: "d-m-y"
        normal: "d-m-Y"
      dashboard:
        layout: null
      maps:
        polylineColor: "#fc6719"
        tileLayerUrl: "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
        enableGreyScale: true
        heatmap:
          initialCenter: null
          initialZoom: null
      photos:
        hidePhotosForSportTypes: []
        defaultEnabledFilters:
          sportTypes: []
          countryCode: null
      sportTypesSortingOrder: []
    import:
      numberOfNewActivitiesToProcessPerImport: 250
      sportTypesToImport: []
      activityVisibilitiesToImport: []
      skipActivitiesRecordedBefore: null
      activitiesToSkipDuringImport: []
      optInToSegmentDetailImport: false
    metrics:
      excludeActivitiesFromPeakPowerOutputs: []
      eddington:
        - label: Ride
          showInNavBar: true
          showInDashboardWidget: true
          sportTypesToInclude:
            - Ride
            - MountainBikeRide
            - GravelRide
            - VirtualRide
        - label: Run
          showInNavBar: true
          showInDashboardWidget: true
          sportTypesToInclude:
            - Run
            - TrailRun
            - VirtualRun
        - label: Walk
          showInNavBar: false
          showInDashboardWidget: false
          sportTypesToInclude:
            - Walk
            - Hike
    gear:
      stravaGear: []
      recordingDevices: []
      customGear: []
    zwift:
      level: null
      racingScore: null
    integrations:
      notifications:
        services: []
      ai:
        enabled: false
        enableUI: false
        provider: openAI
        configuration:
          key: ""
          model: ""
    daemon:
      cron:
        - action: importDataAndBuildApp
          expression: "0 14 * * *"
          enabled: false
        - action: gearMaintenanceNotification
          expression: "0 14 * * *"
          enabled: false
        - action: appUpdateAvailableNotification
          expression: "0 14 * * *"
          enabled: false
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /data (SQLite DB + files)
  enabled: true
  # -- Storage size
  size: 2Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}
  # -- IP family policy. One of: SingleStack | PreferDualStack | RequireDualStack. Omit for cluster default.
  # @default -- omitted
  # ipFamilyPolicy: PreferDualStack
  # -- Ordered list of IP families for the Service. Each entry: IPv4 | IPv6. Omit for cluster default.
  # @default -- omitted
  # ipFamilies:
  #   - IPv4
  #   - IPv6

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Statistics for Strava
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: strava.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - strava.example.com
    #   secretName: strava-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

gatewayAPI:
  # -- Render Gateway API HTTPRoute resources
  enabled: false
  # -- HTTPRoute definitions routed to the Strava Statistics Service by default
  # @default -- `[]`
  httpRoutes: []

# Deprecated compatibility alias for gatewayAPI. Prefer gatewayAPI for new values.
gatewayApi:
  # -- Deprecated. Use gatewayAPI.enabled.
  enabled: false
  # -- Deprecated. Use gatewayAPI.httpRoutes.
  httpRoutes: []

externalSecrets:
  # -- Render ExternalSecret resources for Strava credentials
  enabled: false
  # -- ExternalSecret API version
  apiVersion: external-secrets.io/v1
  # -- ExternalSecret definitions for Strava credentials or integration tokens
  # @default -- `[]`
  items: []
