# =============================================================================
# Statistics for Strava Helm Chart — Default Values
# =============================================================================
# Focus: self-hosted Strava fitness dashboard with SQLite and OAuth

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Statistics for Strava container image
  repository: robiningelbrecht/strava-statistics
  # -- Image tag (defaults to v{appVersion})
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Strava Configuration
# =============================================================================

strava:
  # -- Application port
  port: 8080
  # -- Strava OAuth Client ID (required)
  clientId: ""
  # -- Strava OAuth Client Secret (required)
  clientSecret: ""
  # -- Strava Refresh Token (required)
  refreshToken: ""
  # -- Existing secret containing Strava credentials
  existingSecret: ""
  # -- Key in existing secret for client ID
  existingSecretClientIdKey: client-id
  # -- Key in existing secret for client secret
  existingSecretClientSecretKey: client-secret
  # -- Key in existing secret for refresh token
  existingSecretRefreshTokenKey: refresh-token
  # -- Timezone
  timezone: UTC
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /data (SQLite DB + files)
  enabled: true
  # -- Storage size
  size: 2Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Statistics for Strava
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: strava.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - strava.example.com
    #   secretName: strava-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# S3 Backup
# =============================================================================

backup:
  # -- Enable scheduled data backups to S3-compatible storage
  enabled: false
  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"
  # -- Suspend the CronJob without deleting it
  suspend: false
  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid
  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3
  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3
  # -- Maximum retries per backup job
  backoffLimit: 1
  # -- Prefix for backup archive filenames
  archivePrefix: strava-statistics
  images:
    # -- Image used for data volume backup (must have tar)
    tar: alpine:3.22
    # -- Image used for S3 upload (MinIO client)
    uploader: minio/mc:RELEASE.2025-04-08T15-18-23Z
  # -- Resources for backup containers
  resources: {}
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Key prefix within the bucket
    prefix: strava-statistics
    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials
    existingSecret: ""
    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key
    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""
    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []
