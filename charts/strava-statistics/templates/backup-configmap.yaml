{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "strava-statistics.fullname" . }}-backup-scripts
  labels:
    {{- include "strava-statistics.labels" . | nindent 4 }}
data:
  data-backup.sh: |
    #!/bin/sh
    set -eu
    timestamp="$(date -u +%Y%m%dT%H%M%SZ)"
    archive="/backup/out/${BACKUP_ARCHIVE_PREFIX}-data-${timestamp}.tar.gz"
    mkdir -p /backup/out
    tar -C /data -czf "${archive}" .
    printf "%s" "${archive}" > /backup/out/backup-file
  upload-backup.sh: |
    #!/bin/sh
    set -eu
    archive="$(cat /backup/out/backup-file)"
    target="backup/${S3_BUCKET}"
    if [ -n "${S3_PREFIX:-}" ]; then
      target="${target}/${S3_PREFIX}"
    fi
    mc alias set backup "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    if [ "${S3_CREATE_BUCKET_IF_NOT_EXISTS}" = "true" ]; then
      mc mb --ignore-existing "backup/${S3_BUCKET}"
    fi
    mc cp "${archive}" "${target}/"
{{- end }}
