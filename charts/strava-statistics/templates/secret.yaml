{{- if not .Values.strava.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-strava" (include "strava-statistics.fullname" .) }}
  labels:
    {{- include "strava-statistics.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-id: {{ .Values.strava.clientId | quote }}
  client-secret: {{ .Values.strava.clientSecret | quote }}
  refresh-token: {{ .Values.strava.refreshToken | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-backup" (include "strava-statistics.fullname" .) }}
  labels:
    {{- include "strava-statistics.labels" . | nindent 4 }}
type: Opaque
stringData:
  access-key: {{ .Values.backup.s3.accessKey | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
