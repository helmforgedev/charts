{{- if .Values.externalSecrets.enabled }}
{{- range .Values.externalSecrets.items | default list }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ trunc 63 (printf "%s-%s" (include "strava-statistics.fullname" $) (.name | default "")) | trimSuffix "-" }}
  labels:
    {{- include "strava-statistics.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ .refreshInterval | default "1h" }}
  secretStoreRef:
    {{- toYaml .storeRef | nindent 4 }}
  target:
    name: {{ .targetName | default (trunc 63 (printf "%s-%s" (include "strava-statistics.fullname" $) (.name | default "")) | trimSuffix "-") }}
  data:
    {{- toYaml .data | nindent 4 }}
{{- end }}
{{- end }}
