{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "strava-statistics.fullname" . }}
  labels:
    {{- include "strava-statistics.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "strava-statistics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "strava-statistics.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include "strava-statistics.configData" . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "strava-statistics.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.persistence.bootstrap.enabled }}
      initContainers:
        - name: storage-bootstrap
          image: "{{ .Values.persistence.bootstrap.image.repository }}:{{ .Values.persistence.bootstrap.image.tag }}"
          imagePullPolicy: {{ .Values.persistence.bootstrap.image.pullPolicy }}
          command:
            - sh
            - -ec
            - |
              mkdir -p /work/database /work/files /work/gear-maintenance /work/watch
              if [ -f /work/dreeve.db ] && [ ! -e /work/database/dreeve.db ]; then
                ln -sf ../dreeve.db /work/database/dreeve.db
              fi
              if [ -f /work/strava.db ] && [ ! -e /work/database/strava.db ] && [ ! -e /work/database/dreeve.db ]; then
                ln -sf ../strava.db /work/database/strava.db
              fi
          volumeMounts:
            - name: data
              mountPath: /work
      {{- end }}
      containers:
        - name: strava-statistics
          image: {{ include "strava-statistics.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.strava.port }}
              protocol: TCP
          env:
            - name: STRAVA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "strava-statistics.secretName" . }}
                  key: {{ include "strava-statistics.clientIdKey" . }}
            - name: STRAVA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "strava-statistics.secretName" . }}
                  key: {{ include "strava-statistics.clientSecretKey" . }}
            - name: STRAVA_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "strava-statistics.secretName" . }}
                  key: {{ include "strava-statistics.refreshTokenKey" . }}
            - name: TZ
              value: {{ .Values.strava.timezone | quote }}
            {{- with .Values.strava.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /var/www/config/app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: data
              mountPath: /data
            - name: data
              mountPath: /var/www/storage
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "strava-statistics.fullname" . }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "strava-statistics.dataClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
