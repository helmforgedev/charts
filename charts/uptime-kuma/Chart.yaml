apiVersion: v2
name: uptime-kuma
description: Uptime Kuma self-hosted monitoring with HTTP/TCP/DNS/Ping checks, notifications, status pages, and optional MariaDB
type: application
version: 1.3.0
appVersion: "2.2.1"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - uptime
  - monitoring
  - status-page
  - health-check
  - self-hosted
home: https://uptime.kuma.pet
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/louislam/uptime-kuma
icon: https://uptime.kuma.pet/img/icon.svg
annotations:
  helmforge.dev/maturity: alpha
  artifacthub.io/prerelease: "true"
  artifacthub.io/license: MIT
  artifacthub.io/category: monitoring-logging
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/uptime-kuma
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/uptime-kuma
dependencies:
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
