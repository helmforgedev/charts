# SPDX-License-Identifier: Apache-2.0
database:
  type: mariadb
  external:
    host: mariadb.example.com
    existingSecret: uptime-kuma-db

externalSecrets:
  enabled: true
  items:
    - name: database
      spec:
        secretStoreRef:
          name: platform-secrets
          kind: ClusterSecretStore
        target:
          name: uptime-kuma-db
          creationPolicy: Owner
        data:
          - secretKey: password
            remoteRef:
              key: uptime-kuma/database
              property: password
