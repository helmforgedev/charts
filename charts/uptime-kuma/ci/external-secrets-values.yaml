# SPDX-License-Identifier: Apache-2.0
database:
  type: mariadb
  external:
    host: uptime-kuma-external-mysql
    existingSecret: uptime-kuma-db

externalSecrets:
  enabled: true
  items:
    - name: database
      spec:
        secretStoreRef:
          name: helmforge-fake-store
          kind: ClusterSecretStore
        target:
          name: uptime-kuma-db
          creationPolicy: Owner
        data:
          - secretKey: password
            remoteRef:
              key: test/password

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: uptime-kuma-external-mysql
    spec:
      ports:
        - name: mysql
          port: 3306
          targetPort: mysql
      selector:
        app.kubernetes.io/name: uptime-kuma-external-mysql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: uptime-kuma-external-mysql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: uptime-kuma-external-mysql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: uptime-kuma-external-mysql
        spec:
          containers:
            - name: mysql
              image: docker.io/library/mysql:8.4
              imagePullPolicy: IfNotPresent
              ports:
                - name: mysql
                  containerPort: 3306
              env:
                - name: MYSQL_DATABASE
                  value: uptime_kuma
                - name: MYSQL_USER
                  value: uptime_kuma
                - name: MYSQL_PASSWORD
                  value: helmforge-test-password
                - name: MYSQL_ROOT_PASSWORD
                  value: ci-root-password
