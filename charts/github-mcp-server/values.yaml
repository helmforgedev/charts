# SPDX-License-Identifier: Apache-2.0
nameOverride: ""
fullnameOverride: ""
commonLabels: {}
image:
  repository: ghcr.io/github/github-mcp-server
  tag: "v1.2.0"
  pullPolicy: IfNotPresent
imagePullSecrets: []
replicaCount: 1
app:
  port: 8082
  command: []
  args: []
  env:
    - name: GITHUB_TOOLSETS
      value: "default"
  extraEnv: []
github:
  personalAccessToken: ""
  existingSecret: ""
  existingSecretKey: token
  host: ""
  readOnly: true
  toolsets: default
  tools: ""
  excludeTools: ""
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /data
serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false
service:
  type: ClusterIP
  port: 8082
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}
  hosts: []
  tls: []
gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix
probes:
  startup: { enabled: true, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 60 }
  liveness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 3 }
  readiness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 6 }
resources: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30
podLabels: {}
podAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
