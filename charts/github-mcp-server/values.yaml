# SPDX-License-Identifier: Apache-2.0
# -- Override the chart name used in Kubernetes resource names.
nameOverride: ""

# -- Override the full release name used in Kubernetes resource names.
fullnameOverride: ""

# -- Labels added to every rendered resource.
commonLabels: {}

image:
  # -- Official GitHub MCP Server image repository.
  repository: ghcr.io/github/github-mcp-server
  # -- Official GitHub MCP Server image tag. Do not use a floating tag.
  tag: "v1.2.0"
  # -- Kubernetes image pull policy.
  pullPolicy: IfNotPresent

# -- Optional image pull secrets.
imagePullSecrets: []

# -- Number of HTTP MCP server replicas.
replicaCount: 1

app:
  # -- Streamable HTTP listen port.
  port: 8082
  # -- Optional container command override.
  command: []
  # -- Complete argument override. Leave empty to generate args from github.* values.
  args: []
  # -- Additional environment variables.
  env: []
  # -- envFrom entries for Secrets or ConfigMaps.
  envFrom: []
  # -- Extra raw env entries appended after chart-managed variables.
  extraEnv: []

github:
  # -- Inline GitHub token. Prefer existingSecret for production.
  personalAccessToken: ""
  # -- Existing Secret containing the GitHub token.
  existingSecret: ""
  # -- Secret key containing GITHUB_PERSONAL_ACCESS_TOKEN.
  existingSecretKey: token
  # -- Fail rendering when no token is configured.
  requireToken: false
  # -- GitHub Enterprise hostname without scheme, for example ghe.example.com. The chart passes it to upstream as an HTTPS API host. Empty uses github.com.
  host: ""
  # -- Enable read-only mode to filter write tools.
  readOnly: true
  # -- Enabled toolsets, for example default or repos,issues,pull_requests.
  toolsets: default
  # -- Explicit tool allow-list.
  tools: ""
  # -- Explicit tool deny-list.
  excludeTools: ""

persistence:
  # -- Optional data volume for future cache/state use. The server is stateless by default.
  enabled: false
  size: 1Gi
  storageClass: ""
  # -- Include ReadWriteMany before scaling replicas with persistence enabled.
  accessModes:
    - ReadWriteOnce
  existingClaim: ""
  mountPath: /data
serviceAccount:
  create: false
  name: ""
  annotations: {}
  automountServiceAccountToken: false
service:
  type: ClusterIP
  port: 8082
  annotations: {}
  ipFamilyPolicy: ""
  ipFamilies: []
ingress:
  enabled: false
  ingressClassName: traefik
  annotations: {}
  hosts: []
  tls: []
gateway:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  path: /
  pathType: PathPrefix
pdb:
  # -- Create a PodDisruptionBudget.
  enabled: false
  # -- Minimum pods available during voluntary disruptions.
  minAvailable: 1

networkPolicy:
  # -- Create a NetworkPolicy limiting inbound MCP traffic.
  enabled: false
  # -- Ingress peers allowed to reach the MCP server. Empty allows all namespaces when policy is enabled.
  ingressFrom: []

probes:
  startup: { enabled: true, initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 60 }
  liveness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 20, timeoutSeconds: 5, failureThreshold: 3 }
  readiness: { enabled: true, initialDelaySeconds: 0, periodSeconds: 10, timeoutSeconds: 5, failureThreshold: 6 }
resources: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30
podLabels: {}
podAnnotations: {}
extraVolumes: []
extraVolumeMounts: []
extraManifests: []
