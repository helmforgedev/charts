# SPDX-License-Identifier: Apache-2.0
replicaCount: 2
github:
  existingSecret: github-mcp-token
  requireToken: true
  readOnly: true
  toolsets: repos,issues,pull_requests
pdb:
  enabled: true
networkPolicy:
  enabled: true
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi
