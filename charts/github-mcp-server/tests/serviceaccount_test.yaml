# SPDX-License-Identifier: Apache-2.0
suite: github-mcp-server service account
templates:
  - templates/serviceaccount.yaml
tests:
  - it: renders service account annotations
    set:
      serviceAccount.create: true
      serviceAccount.annotations.workload: identity
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.annotations.workload
          value: identity
