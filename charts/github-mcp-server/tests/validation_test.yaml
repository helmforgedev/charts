# SPDX-License-Identifier: Apache-2.0
suite: github-mcp-server validation
templates:
  - templates/validate.yaml
tests:
  - it: fails when token is required but missing
    set:
      github.requireToken: true
    asserts:
      - failedTemplate:
          errorMessage: "github.requireToken=true requires github.personalAccessToken or github.existingSecret"
  - it: fails when scaling with a shared RWO PVC
    set:
      replicaCount: 2
      persistence.enabled: true
      persistence.accessModes[0]: ReadWriteOnce
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 with persistence.enabled requires persistence.accessModes to include ReadWriteMany or persistence.enabled=false"
