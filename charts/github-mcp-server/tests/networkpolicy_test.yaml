# SPDX-License-Identifier: Apache-2.0
suite: github-mcp-server network policy
templates:
  - templates/networkpolicy.yaml
tests:
  - it: limits inbound MCP HTTP traffic
    values:
      - networkpolicy-values.yaml
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.ingress[0].ports
          content:
            protocol: TCP
            port: http

  - it: appends extra egress rules
    set:
      networkPolicy:
        enabled: true
        extraEgress:
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
            ports:
              - protocol: UDP
                port: 53
    asserts:
      - contains:
          path: spec.policyTypes
          content: Egress
      - equal:
          path: spec.egress[0].ports[0].port
          value: 53
