# SPDX-License-Identifier: Apache-2.0
ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: github-mcp-server.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: github-mcp-server-tls
      hosts:
        - github-mcp-server.example.com
