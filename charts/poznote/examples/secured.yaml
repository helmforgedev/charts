# SPDX-License-Identifier: Apache-2.0
# Secured deployment with OIDC and NetworkPolicy
secrets:
  existingSecret: poznote-oidc-credentials
  oidcClientIdKey: client-id
  oidcClientSecretKey: client-secret

poznote:
  oidc:
    disableNormalLogin: true

networkPolicy:
  enabled: true
  egress:
    enabled: true
    allowDNS: true
    # Allow HTTPS egress for OIDC token/JWKS/userinfo calls to the IdP.
    # Replace with your IdP CIDR in extraTo or remove the CIDR restriction.
    extraEgress:
      - ports:
          - port: 443
            protocol: TCP

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: notes.example.com
  tls:
    - secretName: notes-tls
      hosts:
        - notes.example.com
