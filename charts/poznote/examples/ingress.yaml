# Expose Poznote via Kubernetes Ingress
ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: notes.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: notes-tls
      hosts:
        - notes.example.com
