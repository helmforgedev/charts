# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render secret when no OIDC values are set
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render secret when existingSecret is set
    set:
      secrets.existingSecret: my-oidc-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render secret when oidcClientId is set
    set:
      secrets.oidcClientId: test-client-id
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-poznote-app
      - equal:
          path: stringData.oidc-client-id
          value: test-client-id

  - it: should render secret when oidcClientSecret is set
    set:
      secrets.oidcClientSecret: test-secret
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.oidc-client-secret
          value: test-secret
