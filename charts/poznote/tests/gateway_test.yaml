# SPDX-License-Identifier: Apache-2.0
suite: Gateway API
templates:
  - templates/gateway-httproute.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render HTTPRoute when enabled
    set:
      gatewayAPI.enabled: true
      gatewayAPI.httpRoutes:
        - parentRefs:
            - name: main-gateway
              namespace: gateway-system
          hostnames:
            - notes.example.com
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: spec.parentRefs[0].name
          value: main-gateway
      - equal:
          path: spec.hostnames[0]
          value: notes.example.com
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: test-poznote
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should reserve suffix room for multiple unnamed routes with a long fullname
    values:
      - gateway-long-name-values.yaml
    asserts:
      - hasDocuments:
          count: 2

  - it: should reserve suffix room for named routes with a long fullname
    values:
      - gateway-long-name-named-values.yaml
    asserts:
      - hasDocuments:
          count: 2

  - it: should fail when a named route collides with an indexed unnamed fallback
    values:
      - gateway-colliding-index-name-values.yaml
    asserts:
      - failedTemplate:
          errorMessage: "gatewayAPI.httpRoutes render duplicate HTTPRoute name \"test-poznote-1\"; set name to a unique value"
