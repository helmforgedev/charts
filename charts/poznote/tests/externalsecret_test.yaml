# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - templates/externalsecret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret when enabled
    set:
      externalSecrets.enabled: true
      externalSecrets.refreshInterval: 1h
      externalSecrets.items:
        - name: oidc
          spec:
            secretStoreRef:
              name: vault-backend
              kind: ClusterSecretStore
            data:
              - secretKey: oidc-client-id
                remoteRef:
                  key: secret/data/poznote
                  property: oidc_client_id
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1

  - it: should render multiple ExternalSecrets
    set:
      externalSecrets.enabled: true
      externalSecrets.items:
        - spec:
            secretStoreRef:
              name: vault
              kind: ClusterSecretStore
            data:
              - secretKey: oidc-client-id
                remoteRef:
                  key: poznote/oidc
                  property: client_id
        - spec:
            secretStoreRef:
              name: vault
              kind: ClusterSecretStore
            data:
              - secretKey: oidc-client-secret
                remoteRef:
                  key: poznote/oidc
                  property: client_secret
    asserts:
      - hasDocuments:
          count: 2
