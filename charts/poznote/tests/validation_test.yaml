# SPDX-License-Identifier: Apache-2.0
suite: Validations
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should fail when replicaCount is greater than one
    set:
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "replicaCount > 1 is not supported because Poznote uses SQLite for persistence"

  - it: should fail when externalSecrets is enabled without items
    set:
      externalSecrets.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.items must contain at least one item when externalSecrets.enabled=true"
