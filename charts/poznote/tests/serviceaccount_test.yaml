# SPDX-License-Identifier: Apache-2.0
suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-poznote
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should not render ServiceAccount when disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom service account name
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa
