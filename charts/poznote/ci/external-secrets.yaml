# SPDX-License-Identifier: Apache-2.0
externalSecrets:
  enabled: true
  refreshInterval: 1h
  items:
    - name: oidc
      spec:
        secretStoreRef:
          name: helmforge-fake-store
          kind: ClusterSecretStore
        target:
          name: poznote-oidc
          creationPolicy: Owner
        data:
          - secretKey: oidc-client-id
            remoteRef:
              key: test/username
          - secretKey: oidc-client-secret
            remoteRef:
              key: test/password
