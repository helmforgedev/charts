# SPDX-License-Identifier: Apache-2.0
{{- include "umami.validateExternalDbInit" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "umami.fullname" . }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "umami.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "umami.componentLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "umami.serviceAccountName" . }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      initContainers:
        - name: wait-for-db
          image: docker.io/library/busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at {{ include "umami.dbHost" . }}:{{ include "umami.dbPort" . }}..."
              until nc -z -w2 {{ include "umami.dbHost" . }} {{ include "umami.dbPort" . }}; do
                echo "Database not ready, retrying in 2s..."
                sleep 2
              done
              echo "Database is ready."
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.database.external.init.enabled }}
        - name: prepare-external-db
          image: {{ .Values.database.external.init.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.external.init.adminExistingSecret }}
                  key: {{ .Values.database.external.init.adminExistingSecretPasswordKey }}
            - name: DATABASE_INIT_SQL
              value: |
{{ .Values.database.external.init.sql | indent 16 }}
          command:
            - sh
            - -ec
          args:
            - |
              echo "Preparing external PostgreSQL database {{ include "umami.dbName" . }} at {{ include "umami.dbHost" . }}:{{ include "umami.dbPort" . }}..."
              for attempt in $(seq 1 60); do
                if printf '%s\n' "${DATABASE_INIT_SQL}" | PGPASSWORD="${DATABASE_ADMIN_PASSWORD}" psql \
                  -h {{ include "umami.dbHost" . | quote }} \
                  -p {{ include "umami.dbPort" . | quote }} \
                  -U {{ .Values.database.external.init.adminUsername | quote }} \
                  -d {{ include "umami.dbName" . | quote }} \
                  -v ON_ERROR_STOP=1; then
                  echo "External PostgreSQL database is prepared."
                  exit 0
                fi
                echo "External PostgreSQL database is not ready for SQL yet, retrying in 2s (${attempt}/60)..."
                sleep 2
              done
              echo "External PostgreSQL database preparation did not complete in time."
              exit 1
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: umami
          image: {{ include "umami.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.umami.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.umami.port | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "umami.dbSecretName" . }}
                  key: {{ include "umami.dbSecretPasswordKey" . }}
            - name: DATABASE_URL
              value: {{ include "umami.databaseUrl" . | quote }}
            - name: APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "umami.appSecretName" . }}
                  key: {{ include "umami.appSecretKey" . }}
            {{- if .Values.umami.disableTelemetry }}
            - name: DISABLE_TELEMETRY
              value: "1"
            {{- end }}
            {{- if .Values.umami.disableUpdates }}
            - name: DISABLE_UPDATES
              value: "1"
            {{- end }}
            {{- if .Values.umami.disableBotCheck }}
            - name: DISABLE_BOT_CHECK
              value: "1"
            {{- end }}
            {{- if .Values.umami.cloudMode }}
            - name: CLOUD_MODE
              value: "1"
            {{- end }}
            {{- if .Values.umami.forceSSL }}
            - name: FORCE_SSL
              value: "1"
            {{- end }}
            {{- with .Values.umami.clientIpHeader }}
            - name: CLIENT_IP_HEADER
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.collectApiEndpoint }}
            - name: COLLECT_API_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.corsMaxAge }}
            - name: CORS_MAX_AGE
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.allowedFrameUrls }}
            - name: ALLOWED_FRAME_URLS
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.debug }}
            - name: DEBUG
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.trackerScriptName }}
            - name: TRACKER_SCRIPT_NAME
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.umami.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
