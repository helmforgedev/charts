# SPDX-License-Identifier: Apache-2.0
replicaCount: 2

umami:
  existingSecret: umami-app
  clientIpHeader: X-Forwarded-For
  collectApiEndpoint: /collect
  trackerScriptName: metrics.js
  forceSSL: true

postgresql:
  enabled: false

database:
  external:
    host: umami-external-postgresql
    name: umami
    username: umami
    existingSecret: umami-db
    existingSecretPasswordKey: database-password
    init:
      enabled: true
      adminUsername: umami
      adminExistingSecret: postgres-admin

gatewayAPI:
  enabled: true
  parentRefs:
    - name: public-gateway
      namespace: gateway-system
  hostnames:
    - analytics.example.com

networkPolicy:
  enabled: true
  ingress:
    extraFrom:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: gateway-system
  egress:
    enabled: true
    allowDNS: true
    allowSameNamespaceDatabase: false
    allowHTTPS: true
    extraTo:
      - ipBlock:
          cidr: 10.42.0.0/16

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    memory: 1Gi

extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: umami-app
    type: Opaque
    stringData:
      app-secret: ci-app-secret
  - apiVersion: v1
    kind: Secret
    metadata:
      name: umami-db
    type: Opaque
    stringData:
      database-password: ci-password
  - apiVersion: v1
    kind: Secret
    metadata:
      name: postgres-admin
    type: Opaque
    stringData:
      postgres-password: ci-password
  - apiVersion: v1
    kind: Service
    metadata:
      name: umami-external-postgresql
    spec:
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: umami-external-postgresql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: umami-external-postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: umami-external-postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: umami-external-postgresql
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.4-trixie
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgresql
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: umami
                - name: POSTGRES_USER
                  value: umami
                - name: POSTGRES_PASSWORD
                  value: ci-password
