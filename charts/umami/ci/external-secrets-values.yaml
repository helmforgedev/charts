# SPDX-License-Identifier: Apache-2.0
postgresql:
  enabled: false

database:
  external:
    host: umami-external-postgresql
    name: umami
    username: umami

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  app:
    enabled: true
    appSecretRemoteRef:
      key: test/token
  database:
    enabled: true
    passwordRemoteRef:
      key: test/password
  backup:
    enabled: true
    accessKeyRemoteRef:
      key: test/username
    secretKeyRemoteRef:
      key: test/token

backup:
  enabled: true
  s3:
    endpoint: https://s3.example.com
    bucket: umami-backups

extraManifests:
  - apiVersion: v1
    kind: Service
    metadata:
      name: umami-external-postgresql
    spec:
      ports:
        - name: postgresql
          port: 5432
          targetPort: postgresql
      selector:
        app.kubernetes.io/name: umami-external-postgresql
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: umami-external-postgresql
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: umami-external-postgresql
      template:
        metadata:
          labels:
            app.kubernetes.io/name: umami-external-postgresql
        spec:
          containers:
            - name: postgresql
              image: docker.io/library/postgres:18.4-trixie
              imagePullPolicy: IfNotPresent
              ports:
                - name: postgresql
                  containerPort: 5432
              env:
                - name: POSTGRES_DB
                  value: umami
                - name: POSTGRES_USER
                  value: umami
                - name: POSTGRES_PASSWORD
                  value: helmforge-test-password
