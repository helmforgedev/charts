# SPDX-License-Identifier: Apache-2.0
postgresql:
  enabled: false

database:
  external:
    host: postgres.example.internal
    name: umami
    username: umami

externalSecrets:
  enabled: true
  secretStoreRef:
    name: platform-secrets
    kind: ClusterSecretStore
  app:
    enabled: true
    appSecretRemoteRef:
      key: prod/umami
      property: app-secret
  database:
    enabled: true
    passwordRemoteRef:
      key: prod/umami
      property: database-password
  backup:
    enabled: true
    accessKeyRemoteRef:
      key: prod/umami/s3
      property: access-key
    secretKeyRemoteRef:
      key: prod/umami/s3
      property: secret-key

backup:
  enabled: true
  s3:
    endpoint: https://s3.example.com
    bucket: umami-backups
