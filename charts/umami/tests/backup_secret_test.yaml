suite: Backup Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should create backup secret with inline credentials
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: myaccesskey
      backup.s3.secretKey: mysecretkey
    documentSelector:
      path: metadata.name
      value: test-umami-backup
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.access-key
          value: myaccesskey
      - equal:
          path: stringData.secret-key
          value: mysecretkey
