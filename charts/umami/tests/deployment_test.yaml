# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment by default
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-umami

  - it: should use RollingUpdate strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: should use 1 replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should set custom replica count
    set:
      replicaCount: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should set the correct image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/umami-software/umami:3.0.3"

  - it: should set custom image tag
    set:
      image.tag: "postgresql-v2.16.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/umami-software/umami:postgresql-v2.16.0"

  - it: should set default env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PORT
            value: "3000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISABLE_TELEMETRY
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISABLE_UPDATES
            value: "1"

  - it: should set DATABASE_URL with subchart host
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            value: "postgresql://umami:$(DATABASE_PASSWORD)@test-postgresql:5432/umami"

  - it: should reference postgresql subchart secret for DATABASE_PASSWORD
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-postgresql-auth
                key: user-password

  - it: should reference app secret for APP_SECRET
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_SECRET
            valueFrom:
              secretKeyRef:
                name: test-umami-app
                key: app-secret

  - it: should have wait-for-db init container
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should append extra init containers after internal init containers
    set:
      extraVolumes:
        - name: geoip
          emptyDir: {}
      extraVolumeMounts:
        - name: geoip
          mountPath: /app/geoip
      extraInitContainers:
        - name: download-geoip
          image: docker.io/library/busybox:1.37
          command:
            - sh
            - -ec
          args:
            - echo geoip > /geoip/GeoLite2-City.mmdb
          volumeMounts:
            - name: geoip
              mountPath: /geoip
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: download-geoip
      - equal:
          path: spec.template.spec.initContainers[1].volumeMounts[0].name
          value: geoip
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /app/geoip
      - equal:
          path: spec.template.spec.volumes[0].name
          value: geoip

  - it: should prepare external database when enabled
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.init.enabled: true
      database.external.init.adminExistingSecret: postgres-admin
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: prepare-external-db
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: docker.io/library/postgres:18-alpine
      - contains:
          path: spec.template.spec.initContainers[1].env
          content:
            name: DATABASE_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-admin
                key: postgres-password

  - it: should set external database host when subchart is disabled
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.port: "5433"
      database.external.name: my_umami
      database.external.username: umami_user
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            value: "postgresql://umami_user:$(DATABASE_PASSWORD)@db.example.com:5433/my_umami"

  - it: should use existing secret for external db password
    set:
      postgresql.enabled: false
      database.external.host: db.example.com
      database.external.existingSecret: my-db-secret
      database.external.existingSecretPasswordKey: db-pass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-db-secret
                key: db-pass

  - it: should use configured PostgreSQL existingSecret
    set:
      postgresql.auth.existingSecret: umami-postgres
      postgresql.auth.existingSecretUserPasswordKey: app-password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: umami-postgres
                key: app-password

  - it: should set probes on heartbeat path
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /api/heartbeat
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/heartbeat
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/heartbeat

  - it: should set extra env vars
    set:
      umami.extraEnv:
        - name: ALLOWED_FRAME_URLS
          value: "https://example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ALLOWED_FRAME_URLS
            value: "https://example.com"

  - it: should set tracker script name
    set:
      umami.trackerScriptName: "custom.js"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TRACKER_SCRIPT_NAME
            value: "custom.js"

  - it: should set structured Umami runtime options
    set:
      umami.clientIpHeader: X-Forwarded-For
      umami.collectApiEndpoint: /collect
      umami.corsMaxAge: "3600"
      umami.allowedFrameUrls: "https://portal.example.com"
      umami.debug: "umami:prisma"
      umami.forceSSL: true
      umami.disableBotCheck: true
      umami.cloudMode: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLIENT_IP_HEADER
            value: X-Forwarded-For
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: COLLECT_API_ENDPOINT
            value: /collect
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CORS_MAX_AGE
            value: "3600"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ALLOWED_FRAME_URLS
            value: "https://portal.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEBUG
            value: "umami:prisma"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FORCE_SSL
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISABLE_BOT_CHECK
            value: "1"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CLOUD_MODE
            value: "1"

  - it: should not set telemetry env when disabled
    set:
      umami.disableTelemetry: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: DISABLE_TELEMETRY
            value: "1"

  - it: should set resources
    set:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  - it: should disable service account token automount by default
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
