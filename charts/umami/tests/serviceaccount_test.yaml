# SPDX-License-Identifier: Apache-2.0
suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render when disabled
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-umami
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should set custom name
    set:
      serviceAccount.create: true
      serviceAccount.name: my-sa
    asserts:
      - equal:
          path: metadata.name
          value: my-sa

  - it: should set annotations
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        iam.gke.io/gcp-service-account: test@project.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: test@project.iam.gserviceaccount.com

  - it: should set automountServiceAccountToken when enabled
    set:
      serviceAccount.create: true
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
