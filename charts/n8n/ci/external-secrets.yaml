# CI scenario: External Secrets Operator (GR-061).
# encryptionKey.existingSecret is required when externalSecrets.enabled=true.
persistence:
  enabled: false

encryptionKey:
  existingSecret: my-n8n-encryption-secret

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: encryption-key
      remoteRef:
        key: n8n/credentials
        property: encryption-key