{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed encryption key Secret
  is still rendered unless encryptionKey.existingSecret is set. Without this guard
  both resources target the same name, creating two writers for the encryption key
  and causing credential drift. Require encryptionKey.existingSecret explicitly.
*/}}
{{- if not .Values.encryptionKey.existingSecret }}
  {{- fail "externalSecrets.enabled requires encryptionKey.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- $hasEncryptionKey := false }}
{{- range .Values.externalSecrets.data }}
  {{- if eq .secretKey $.Values.encryptionKey.existingSecretKey }}
    {{- $hasEncryptionKey = true }}
  {{- end }}
{{- end }}
{{- if not $hasEncryptionKey }}
  {{- fail (printf "externalSecrets.data must contain an entry with secretKey '%s' when externalSecrets.enabled=true to populate the n8n encryption key." .Values.encryptionKey.existingSecretKey) }}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.encryptionKey.existingSecret }}
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.encryptionKey.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
