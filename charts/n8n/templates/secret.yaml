{{- if not .Values.encryptionKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-encryption
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $encSecretName := printf "%s-encryption" (include "n8n.fullname" .) }}
  {{- $existingEncSecret := lookup "v1" "Secret" .Release.Namespace $encSecretName }}
  {{- if and $existingEncSecret (not .Values.n8n.encryptionKey) }}
  encryption-key: {{ index $existingEncSecret.data "encryption-key" }}
  {{- else if .Values.n8n.encryptionKey }}
  encryption-key: {{ .Values.n8n.encryptionKey | b64enc | quote }}
  {{- else }}
  encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- $mode := include "n8n.databaseMode" . }}
{{- if and (ne $mode "sqlite") (not (and (eq $mode "external") .Values.database.external.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-database
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $dbSecretName := printf "%s-database" (include "n8n.fullname" .) }}
  {{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
  {{- $dbPassword := include "n8n.databasePasswordValue" . }}
  {{- if and $existingDbSecret (not $dbPassword) }}
  database-password: {{ index $existingDbSecret.data "database-password" }}
  {{- else if $dbPassword }}
  database-password: {{ $dbPassword | b64enc | quote }}
  {{- else }}
  database-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.queue.enabled (not .Values.queue.external.existingSecret) (or .Values.queue.external.host (and .Values.redis.enabled .Values.redis.auth.password)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-redis-queue
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  redis-password: {{ include "n8n.redisPasswordValue" . | b64enc | quote }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "n8n.fullname" . }}-backup
  labels:
    {{- include "n8n.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.backup.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | b64enc | quote }}
{{- end }}
