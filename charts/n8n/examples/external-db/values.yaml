# External database — connect to existing PostgreSQL
database:
  external:
    vendor: postgres
    host: postgresql-rw.default.svc
    name: n8n
    username: n8n
    existingSecret: n8n-db-credentials

persistence:
  enabled: true
  size: 5Gi

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: n8n.example.com
      paths:
        - path: /
          pathType: Prefix
