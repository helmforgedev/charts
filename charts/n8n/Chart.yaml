apiVersion: v2
name: n8n
description: n8n workflow automation platform with SQLite, PostgreSQL, or MySQL and optional Redis queue mode
type: application
version: 1.3.2
appVersion: "2.12.3"
kubeVersion: ">=1.26.0-0"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - n8n
  - workflow
  - automation
  - integration
  - low-code
home: https://helmforge.dev/docs/charts/n8n
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/n8n
  - https://github.com/n8n-io/n8n
icon: https://raw.githubusercontent.com/n8n-io/n8n/master/assets/n8n-logo.png
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/n8n
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/n8n
dependencies:
  - name: postgresql
    version: 1.8.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 1.7.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
  - name: redis
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
