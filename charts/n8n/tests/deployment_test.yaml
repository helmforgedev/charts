# SPDX-License-Identifier: Apache-2.0
suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-n8n

  - it: should use default image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/n8nio/n8n:2.26.4"

  - it: should set container port to 5678
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 5678
            protocol: TCP

  - it: should render hardened pod and container security defaults
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop[0]
          value: ALL

  - it: should render resource defaults
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 1Gi

  - it: should mount data volume at /home/node/.n8n
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /home/node/.n8n

  - it: should set SQLite env vars by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_TYPE
            value: sqlite
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_SQLITE_PATH
            value: /home/node/.n8n/database.sqlite

  - it: should not have init containers in sqlite mode
    template: templates/deployment.yaml
    asserts:
      - notExists:
          path: spec.template.spec.initContainers

  - it: should add wait-for-db for postgresql
    template: templates/deployment.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: test
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should set postgres env vars
    template: templates/deployment.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_TYPE
            value: postgresdb
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_POSTGRESDB_HOST
            value: test-postgresql
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_POSTGRESDB_PORT
            value: "5432"

  - it: should set mysql env vars
    template: templates/deployment.yaml
    set:
      mysql.enabled: true
      mysql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_TYPE
            value: mysqldb
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_MYSQLDB_HOST
            value: test-mysql

  - it: should set encryption key from secret
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: test-n8n-encryption
                key: encryption-key

  - it: should auto-detect webhook URL from ingress
    template: templates/deployment.yaml
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: n8n.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WEBHOOK_URL
            value: "https://n8n.example.com/"

  - it: should set queue mode env vars when enabled
    template: templates/deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
      redis.auth.password: redispass
      postgresql.enabled: true
      postgresql.auth.password: pgpass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXECUTIONS_MODE
            value: queue
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: QUEUE_BULL_REDIS_HOST
            value: test-redis-client

  - it: should add wait-for-redis when queue enabled
    template: templates/deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
      postgresql.enabled: true
      postgresql.auth.password: pgpass
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: wait-for-redis
          any: true

  - it: should set N8N_PORT
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_PORT
            value: "5678"

  - it: should set log level
    template: templates/deployment.yaml
    set:
      n8n.logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_LOG_LEVEL
            value: debug

  - it: should disable diagnostics by default
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_DIAGNOSTICS_ENABLED
            value: "false"

  - it: should configure external task runner sidecar by default
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: task-runners
      - equal:
          path: spec.template.spec.containers[1].image
          value: "docker.io/n8nio/runners:2.26.4"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: N8N_RUNNERS_TASK_BROKER_URI
            value: "http://127.0.0.1:5679"
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: test-n8n-task-runners
                key: auth-token
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_RUNNERS_MODE
            value: external
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_RUNNERS_BROKER_LISTEN_ADDRESS
            value: "0.0.0.0"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_RUNNERS_AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: test-n8n-task-runners
                key: auth-token
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_NATIVE_PYTHON_RUNNER
            value: "false"

  - it: should disable external task runner sidecar in internal mode
    template: templates/deployment.yaml
    set:
      taskRunners.mode: internal
    asserts:
      - hasDocuments:
          count: 1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_RUNNERS_MODE
            value: internal
      - notExists:
          path: spec.template.spec.containers[1]

  - it: should reject native Python runner outside external mode
    template: templates/deployment.yaml
    set:
      taskRunners.mode: internal
      taskRunners.nativePython.enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "taskRunners.nativePython.enabled=true requires taskRunners.mode=external"

  - it: should offload manual executions to workers in queue mode
    template: templates/deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
      postgresql.enabled: true
      postgresql.auth.password: pgpass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS
            value: "true"

  - it: should use PVC when persistence enabled
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-n8n-data

  - it: should use emptyDir when persistence disabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should render startup probe by default
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /healthz

  - it: should delay readiness while n8n finishes database bootstrap
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 30

  - it: should allow graceful shutdown during upgrades
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 75
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: N8N_GRACEFUL_SHUTDOWN_TIMEOUT
            value: "60"

  - it: should add extra env vars
    template: templates/deployment.yaml
    set:
      n8n.extraEnv:
        - name: GENERIC_TIMEZONE
          value: "UTC"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GENERIC_TIMEZONE
            value: "UTC"
