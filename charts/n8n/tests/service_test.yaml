# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-n8n

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose HTTP port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should use selector labels
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/name"]
          value: n8n
