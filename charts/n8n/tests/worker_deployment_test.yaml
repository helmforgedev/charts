suite: Worker Deployment
templates:
  - templates/worker-deployment.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    template: templates/worker-deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when queue enabled
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-n8n-worker

  - it: should set worker replicas
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      queue.workers: 3
      redis.enabled: true
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use worker command
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["n8n", "worker", "--concurrency=10"]

  - it: should set queue env vars
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
      redis.auth.password: pass
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXECUTIONS_MODE
            value: queue
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: QUEUE_BULL_REDIS_HOST
            value: test-redis

  - it: should have wait-for-redis init container
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: wait-for-redis
          any: true

  - it: should use worker-specific labels
    template: templates/worker-deployment.yaml
    set:
      queue.enabled: true
      redis.enabled: true
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: worker
