suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render encryption secret by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-n8n-encryption
      - exists:
          path: data["encryption-key"]

  - it: should set explicit encryption key
    set:
      n8n.encryptionKey: my-secret-key
    documentIndex: 0
    asserts:
      - equal:
          path: data["encryption-key"]
          value: bXktc2VjcmV0LWtleQ==

  - it: should not render encryption secret when existingSecret set
    set:
      encryptionKey.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render database secret in sqlite mode
    asserts:
      - hasDocuments:
          count: 1

  - it: should render database secret for postgresql
    set:
      postgresql.enabled: true
      postgresql.auth.password: dbpass
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-n8n-database
