suite: CKAN Deployment
templates:
  - templates/deployment.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-ckan

  - it: should have ckan component label
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/component"]
          value: ckan

  - it: should use the correct image
    template: templates/deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "ckan/ckan-base:2\\.11\\.4"

  - it: should expose port 5000
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 5000
            protocol: TCP

  - it: should mount ckan-storage volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: ckan-storage
            mountPath: /var/lib/ckan

  - it: should have init containers
    template: templates/deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers

  - it: should have health probes
    template: templates/deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe
