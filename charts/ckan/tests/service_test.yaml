suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render CKAN service
    documentSelector:
      path: metadata.name
      value: test-ckan
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should render DataPusher service
    documentSelector:
      path: metadata.name
      value: test-ckan-datapusher
    asserts:
      - isKind:
          of: Service

  - it: should render Solr service
    documentSelector:
      path: metadata.name
      value: test-ckan-solr
    asserts:
      - isKind:
          of: Service

  - it: should select ckan component
    documentSelector:
      path: metadata.name
      value: test-ckan
    asserts:
      - equal:
          path: spec.selector["app.kubernetes.io/component"]
          value: ckan
