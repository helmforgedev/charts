# CKAN with a managed PostgreSQL (catalog + DataStore) instead of the bundled
# subchart. Redis and Solr stay bundled.
#
#   kubectl create secret generic ckan-db --from-literal=password=<pass>
#   helm install ckan helmforge/ckan -f external-datastores.yaml

postgresql:
  enabled: false
externalDatabase:
  host: pg.internal.example.com
  port: 5432
  name: ckan
  user: ckan
  existingSecret: ckan-db
  existingSecretPasswordKey: password

# Redis and Solr remain bundled (Solr index is required for dataset search).
redis:
  enabled: true

persistence:
  enabled: true
  size: 10Gi
