# CI scenario — external database and Redis, no Solr
postgresql:
  enabled: false

redis:
  enabled: false

solr:
  enabled: false

database:
  mode: external
  external:
    host: postgres.example.com
    port: 5432
    ckanDatabase: ckan
    datastoreDatabase: datastore
    username: ckan
    password: external-password

redisConfig:
  mode: external
  external:
    url: "redis://:redis-password@redis.example.com:6379/0"

datapusher:
  enabled: false
