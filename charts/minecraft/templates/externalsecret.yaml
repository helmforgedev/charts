{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when rcon.enabled=true and externalSecrets.enabled=true, the chart-managed
  Secret (secret.yaml) is rendered unless rcon.existingSecret is set. Without this
  guard both resources target the same name, creating two writers for the RCON password.
  When rcon.enabled=false, secret.yaml does not render, so no drift risk.
*/}}
{{- if and .Values.rcon.enabled (not .Values.rcon.existingSecret) }}
  {{- fail "externalSecrets.enabled with rcon.enabled=true requires rcon.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- $hasRconKey := false }}
{{- range .Values.externalSecrets.data }}
  {{- if eq .secretKey $.Values.rcon.existingSecretKey }}
    {{- $hasRconKey = true }}
  {{- end }}
{{- end }}
{{- if not $hasRconKey }}
  {{- fail (printf "externalSecrets.data must contain an entry with secretKey '%s' when externalSecrets.enabled=true to populate the RCON password." .Values.rcon.existingSecretKey) }}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ default (include "minecraft.fullname" .) .Values.rcon.existingSecret }}
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ default (include "minecraft.fullname" .) .Values.rcon.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
