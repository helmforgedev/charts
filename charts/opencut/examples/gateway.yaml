# SPDX-License-Identifier: Apache-2.0
# OpenCut exposed with Gateway API

opencut:
  siteUrl: https://opencut.example.com
  betterAuthSecret: replace-with-a-stable-secret

gateway:
  enabled: true
  parentRefs:
    - name: public
      namespace: gateway-system
  hostnames:
    - opencut.example.com
  path: /
  pathType: PathPrefix

networkPolicy:
  enabled: true
