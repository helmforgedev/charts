# SPDX-License-Identifier: Apache-2.0
suite: Gateway
templates:
  - templates/httproute.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render HTTPRoute when enabled
    set:
      gateway.enabled: true
      gateway.parentRefs:
        - name: public
      gateway.hostnames:
        - opencut.example.test
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.parentRefs[0].name
          value: public
