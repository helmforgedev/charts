# SPDX-License-Identifier: Apache-2.0
opencut:
  siteUrl: https://opencut.example.test
  betterAuthSecret: ci-better-auth-secret-ci-better-auth-secret
  marbleWorkspaceKey: ci-workspace
  freesoundClientId: ci-client
  freesoundApiKey: ci-api-key

service:
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: opencut.example.test
      paths:
        - path: /
          pathType: Prefix

gateway:
  enabled: true
  parentRefs:
    - name: public
  hostnames:
    - opencut.example.test

networkPolicy:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3

postgresql:
  standalone:
    persistence:
      enabled: false

redis:
  standalone:
    persistence:
      enabled: false
