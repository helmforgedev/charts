apiVersion: v2
name: appwrite
description: Appwrite self-hosted backend-as-a-service platform with MariaDB and Redis
type: application
version: 1.0.5
appVersion: "1.8.1"
kubeVersion: ">=1.26.0-0"
icon: https://raw.githubusercontent.com/appwrite/appwrite/main/public/images/github-logo.png
home: https://appwrite.io
keywords:
  - appwrite
  - baas
  - backend
  - api
  - database
  - authentication
  - storage
  - functions
maintainers:
  - name: helmforgedev
  - name: mberlofa
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/appwrite/appwrite
  - https://hub.docker.com/r/appwrite/appwrite
annotations:
  helmforge.dev/maturity: stable
  helmforge.dev/signed: cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/appwrite
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/appwrite
dependencies:
  - name: mariadb
    version: 1.0.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mariadb.enabled
  - name: redis
    version: 1.5.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: redis.enabled
