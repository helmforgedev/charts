{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appwrite.fullname" . }}
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.ingressClassName }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /v1/realtime
            pathType: Prefix
            backend:
              service:
                name: {{ include "appwrite.fullname" $ }}-realtime
                port:
                  name: http
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "appwrite.fullname" $ }}-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "appwrite.fullname" $ }}-console
                port:
                  name: http
    {{- end }}
{{- end }}
