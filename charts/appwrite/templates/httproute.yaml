{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.gateway.enabled }}
{{- if not .Values.gateway.parentRefs }}
  {{- fail "gateway.enabled requires gateway.parentRefs to be populated to create a valid HTTPRoute." }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "appwrite.fullname" . }}
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/realtime
      backendRefs:
        - name: {{ include "appwrite.fullname" . }}-realtime
          port: {{ .Values.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: {{ include "appwrite.fullname" . }}-api
          port: {{ .Values.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "appwrite.fullname" . }}-console
          port: {{ .Values.service.port }}
{{- end }}
