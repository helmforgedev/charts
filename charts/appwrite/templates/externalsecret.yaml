{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed auth Secret is drift-protected
  by requiring appwrite.existingSecret explicitly.
*/}}
{{- if not .Values.appwrite.existingSecret }}
  {{- fail "externalSecrets.enabled requires appwrite.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- if not .Values.externalSecrets.data }}
  {{- fail "externalSecrets.data must not be empty when externalSecrets.enabled=true" }}
{{- end }}
{{- $opensslKey := .Values.appwrite.existingSecretOpenSslKey | default "appwrite-openssl-key" -}}
{{- $hasOpenssl := false -}}
{{- range .Values.externalSecrets.data -}}
  {{- if eq .secretKey $opensslKey }}{{ $hasOpenssl = true }}{{ end -}}
{{- end -}}
{{- if not $hasOpenssl -}}
  {{- fail (printf "externalSecrets.data must include a mapping for key '%s' (_APP_OPENSSL_KEY_V1)" $opensslKey) -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ include "appwrite.fullname" . }}-credentials
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.appwrite.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
