apiVersion: v1
kind: Service
metadata:
  name: {{ include "appwrite.fullname" . }}-api
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.ipFamilyPolicy }}
  ipFamilyPolicy: {{ . }}
  {{- end }}
  {{- with .Values.service.ipFamilies }}
  ipFamilies:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "appwrite.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "appwrite.fullname" . }}-console
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "appwrite.componentLabels" (dict "root" . "component" "console") | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "appwrite.fullname" . }}-realtime
  labels:
    {{- include "appwrite.labels" . | nindent 4 }}
    app.kubernetes.io/component: realtime
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "appwrite.componentLabels" (dict "root" . "component" "realtime") | nindent 4 }}
