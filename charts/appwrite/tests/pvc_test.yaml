# SPDX-License-Identifier: Apache-2.0
suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: should render 6 PVCs by default
    asserts:
      - hasDocuments:
          count: 6

  - it: should not render PVCs when disabled
    set:
      persistence:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
