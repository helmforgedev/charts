suite: service
templates:
  - templates/service.yaml
tests:
  - it: should render three services
    asserts:
      - hasDocuments:
          count: 3

  - it: should render API service as ClusterIP
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-appwrite-api
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose API on port 80
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-appwrite-api
    asserts:
      - equal:
          path: spec.ports[0]
          value:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should render console service
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-appwrite-console
    asserts:
      - isKind:
          of: Service

  - it: should render realtime service
    documentSelector:
      path: metadata.name
      value: RELEASE-NAME-appwrite-realtime
    asserts:
      - isKind:
          of: Service
