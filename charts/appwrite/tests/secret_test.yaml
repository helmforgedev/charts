suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should render secret by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-appwrite-secret

  - it: should contain openssl key
    asserts:
      - isNotNull:
          path: data.appwrite-openssl-key

  - it: should contain jwt secret
    asserts:
      - isNotNull:
          path: data.appwrite-jwt-secret

  - it: should not render when existingSecret is set
    set:
      appwrite:
        existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0
