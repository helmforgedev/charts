# SPDX-License-Identifier: Apache-2.0
suite: workers
templates:
  - templates/deployment-workers.yaml
  - templates/secret.yaml
tests:
  - it: should render 12 worker deployments by default
    template: templates/deployment-workers.yaml
    asserts:
      - hasDocuments:
          count: 12

  - it: should wait for database and redis before starting workers
    template: templates/deployment-workers.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db
      - equal:
          path: spec.template.spec.initContainers[1].name
          value: wait-for-redis

  - it: should not render disabled worker
    template: templates/deployment-workers.yaml
    set:
      workers:
        audits:
          enabled: false
    asserts:
      - hasDocuments:
          count: 11
