suite: workers
templates:
  - templates/deployment-workers.yaml
  - templates/secret.yaml
tests:
  - it: should render 12 worker deployments by default
    template: templates/deployment-workers.yaml
    asserts:
      - hasDocuments:
          count: 12

  - it: should not render disabled worker
    template: templates/deployment-workers.yaml
    set:
      workers:
        audits:
          enabled: false
    asserts:
      - hasDocuments:
          count: 11
