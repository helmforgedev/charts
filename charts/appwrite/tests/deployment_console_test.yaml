suite: deployment-console
templates:
  - templates/deployment-console.yaml
tests:
  - it: should render console Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-appwrite-console

  - it: should use console image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "docker.io/appwrite/console:7.5.7"

  - it: should have component label
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/component: console

  - it: should always have 1 replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1
