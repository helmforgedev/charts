# SPDX-License-Identifier: Apache-2.0
suite: ingress
templates:
  - templates/ingress.yaml
tests:
  - it: should not render ingress by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress when enabled
    set:
      ingress:
        enabled: true
        hosts:
          - host: appwrite.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: RELEASE-NAME-appwrite

  - it: should route /v1/realtime to realtime service
    set:
      ingress:
        enabled: true
        hosts:
          - host: appwrite.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /v1/realtime
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: RELEASE-NAME-appwrite-realtime

  - it: should route /v1 to api service
    set:
      ingress:
        enabled: true
        hosts:
          - host: appwrite.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[1].backend.service.name
          value: RELEASE-NAME-appwrite-api

  - it: should route / to console service
    set:
      ingress:
        enabled: true
        hosts:
          - host: appwrite.example.com
            paths:
              - path: /
                pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[2].backend.service.name
          value: RELEASE-NAME-appwrite-console
