# CI scenario: ExternalSecrets with drift guard (GR-061)
mariadb:
  enabled: false
redis:
  enabled: false

database:
  mode: external
  external:
    host: mariadb.external.svc.cluster.local
    database: appwrite

cache:
  mode: external
  external:
    host: redis.external.svc.cluster.local

appwrite:
  existingSecret: appwrite-credentials
  existingSecretOpenSslKey: appwrite-openssl-key
  existingSecretJwtKey: appwrite-jwt-secret

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: appwrite-openssl-key
      remoteRef:
        key: appwrite/auth
        property: openssl-key
    - secretKey: appwrite-jwt-secret
      remoteRef:
        key: appwrite/auth
        property: jwt-secret
