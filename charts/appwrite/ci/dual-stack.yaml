# SPDX-License-Identifier: Apache-2.0
# CI scenario: dual-stack for HTTP service (GR-058)
mariadb:
  enabled: false
redis:
  enabled: false

database:
  mode: external
  external:
    host: mariadb.external.svc.cluster.local
    database: appwrite

cache:
  mode: external
  external:
    host: redis.external.svc.cluster.local

service:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
