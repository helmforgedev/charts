# CI scenario: Gateway API (GR-060)
mariadb:
  enabled: false
redis:
  enabled: false

database:
  mode: external
  external:
    host: mariadb.external.svc.cluster.local
    database: appwrite

cache:
  mode: external
  external:
    host: redis.external.svc.cluster.local

gateway:
  enabled: true
  hostnames:
    - appwrite.local
  parentRefs:
    - name: my-gateway
      namespace: default
