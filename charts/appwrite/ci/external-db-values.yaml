# CI: external database and cache
mariadb:
  enabled: false
database:
  mode: external
  external:
    host: mariadb.example.com
    port: 3306
    rootUser: root
    rootPassword: "test-password"
    name: appwrite

redis:
  enabled: false
cache:
  mode: external
  external:
    host: redis.example.com
    port: 6379
    password: "test-redis-password"
