# SPDX-License-Identifier: Apache-2.0
server:
  publicUrl: https://netbird.example.com
  auth:
    issuer: https://netbird.example.com/oauth2
ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: netbird.example.com
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
        - path: /api
          pathType: Prefix
          service: server
  tls:
    - secretName: netbird-tls
      hosts:
        - netbird.example.com
