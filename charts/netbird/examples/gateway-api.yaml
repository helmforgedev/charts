# SPDX-License-Identifier: Apache-2.0
server:
  publicUrl: https://netbird.example.com
  auth:
    issuer: https://netbird.example.com/oauth2
gatewayAPI:
  enabled: true
  httpRoutes:
    - name: dashboard
      hostnames:
        - netbird.example.com
      parentRefs:
        - name: public
          namespace: gateway-system
      service: dashboard
    - name: server
      hostnames:
        - netbird.example.com
      parentRefs:
        - name: public
          namespace: gateway-system
      service: server
      path: /api
