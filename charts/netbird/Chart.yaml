# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: netbird
description: Self-hosted NetBird control plane for WireGuard overlay networks, identity-aware access, and device management
type: application
version: 1.0.0
appVersion: "0.74.4"
home: https://helmforge.dev/docs/charts/netbird
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/netbird
  - https://github.com/netbirdio/netbird
  - https://docs.netbird.io
keywords:
  - wireguard
  - vpn
  - zero-trust
  - mesh
  - networking
  - postgresql
  - self-hosted
  - kubernetes
maintainers:
  - name: HelmForge Team
    url: https://helmforge.dev
icon: https://helmforge.dev/icons/charts/netbird.png
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "BREAKING: add PostgreSQL production store"
  artifacthub.io/category: networking
  artifacthub.io/license: Apache-2.0
  artifacthub.io/prerelease: "false"
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
  helmforge.dev/maturity: stable
dependencies:
  - name: postgresql
    version: 2.0.4
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
