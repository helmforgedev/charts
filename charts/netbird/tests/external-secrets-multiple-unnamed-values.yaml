externalSecrets:
  enabled: true
  items:
    - spec:
        secretStoreRef:
          name: fake
        data:
          - secretKey: netbird_SMTP_PASSWORD
            remoteRef:
              key: netbird/smtp
    - spec:
        secretStoreRef:
          name: fake
        data:
          - secretKey: token
            remoteRef:
              key: netbird/token
