# SPDX-License-Identifier: Apache-2.0
externalSecrets:
  enabled: true
  items:
    - name: env
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: fake
        target:
          name: RELEASE-NAME-netbird-env
          creationPolicy: Owner
        data:
          - secretKey: netbird_SMTP_PASSWORD
            remoteRef:
              key: netbird
              property: smtpPassword
