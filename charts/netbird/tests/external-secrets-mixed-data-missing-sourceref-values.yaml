externalSecrets:
  enabled: true
  items:
    - spec:
        data:
          - secretKey: netbird_SMTP_PASSWORD
            remoteRef:
              key: netbird-password
            sourceRef:
              storeRef:
                name: fake
          - secretKey: netbird_TOKEN
            remoteRef:
              key: netbird-token
