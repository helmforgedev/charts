externalSecrets:
  enabled: true
  items:
    - fullnameOverride: literal-netbird-config
      spec:
        secretStoreRef:
          kind: ClusterSecretStore
          name: fake
        data:
          - secretKey: netbird_SMTP_PASSWORD
            remoteRef:
              key: netbird
              property: smtpPassword
