# SPDX-License-Identifier: Apache-2.0
# CI scenario: ExternalSecrets with drift guard (GR-061).
# admin.existingSecret is required when externalSecrets.enabled=true.
persistence:
  enabled: false

admin:
  existingSecret: my-gitea-admin

externalSecrets:
  enabled: true
  secretStoreRef:
    name: gitea-ci-fake-store
    kind: SecretStore
  data:
    - secretKey: admin-username
      remoteRef:
        key: gitea/admin
        property: username
    - secretKey: admin-password
      remoteRef:
        key: gitea/admin
        property: password
    - secretKey: admin-email
      remoteRef:
        key: gitea/admin
        property: email

extraManifests:
  - apiVersion: external-secrets.io/v1
    kind: SecretStore
    metadata:
      name: gitea-ci-fake-store
    spec:
      provider:
        fake:
          data:
            - key: gitea/admin
              value: '{"username":"gitea-admin","password":"external-password","email":"admin@example.com"}'
