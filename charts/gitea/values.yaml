# =============================================================================
# Gitea Configuration
# =============================================================================

# -- Gitea image
image:
  repository: docker.io/gitea/gitea
  tag: "1.25.5-rootless"
  pullPolicy: IfNotPresent

# -- Image pull secrets
imagePullSecrets: []

# -- Override the release name
nameOverride: ""

# -- Override the full release name
fullnameOverride: ""

# -- Number of replicas (Gitea only supports 1 with SQLite)
replicaCount: 1

gitea:
  # -- Application display name
  appName: "Gitea: Git with a cup of tea"

  # -- Run mode: dev, prod, test
  runMode: prod

  # -- Root URL for Gitea (used in links, clone URLs, etc.)
  # Example: https://git.example.com/
  rootUrl: ""

  # -- SSH domain shown in clone URLs (defaults to ingress host or service name)
  sshDomain: ""

  # -- SSH listen port inside the container (rootless image uses 2222)
  sshPort: 2222

  # -- Enable Git LFS
  lfsEnabled: true

  # -- Disable user self-registration
  disableRegistration: false

  # -- Require sign-in to view any page
  requireSignIn: false

  # -- Extra environment variables in GITEA__SECTION__KEY format
  # Example:
  #   - name: GITEA__mailer__ENABLED
  #     value: "true"
  extraEnv: []

# =============================================================================
# Admin User
# =============================================================================

admin:
  # -- Admin username (created on first run if set)
  username: ""

  # -- Admin password (ignored when existingSecret is set)
  password: ""

  # -- Admin email
  email: ""

  # -- Existing secret with admin credentials
  # Keys: admin-username, admin-password, admin-email
  existingSecret: ""

# =============================================================================
# Database
# =============================================================================
# Gitea supports SQLite3 (default, zero config), PostgreSQL, and MySQL.
# Use `database.mode` to select explicitly, or leave as `auto` to auto-detect
# based on which database section is configured.
#
# Auto-detection priority: external → postgresql → mysql → sqlite
# =============================================================================

database:
  # -- Database mode: auto | sqlite | external | postgresql | mysql
  mode: auto

  sqlite:
    # -- SQLite database file path inside the data volume
    file: /var/lib/gitea/data/gitea.db

  external:
    # -- Database vendor: postgres | mysql
    vendor: postgres
    # -- External database hostname
    host: ""
    # -- External database port (auto-detected from vendor if empty)
    port: ""
    # -- Database name
    name: gitea
    # -- Database username
    username: gitea
    # -- Database password (ignored when existingSecret is set)
    password: ""
    # -- Existing secret for the database password
    existingSecret: ""
    # -- Key in the existing secret for the database password
    existingSecretPasswordKey: database-password

# -- Deploy PostgreSQL as a subchart
postgresql:
  enabled: false
  # -- PostgreSQL architecture (standalone or replication)
  architecture: standalone
  auth:
    # -- Database name created on first run
    database: gitea
    # -- Database username created on first run
    username: gitea
    # -- Database password (auto-generated if empty)
    password: ""
  primary:
    persistence:
      # -- Enable persistence for PostgreSQL data
      enabled: true
      # -- PVC size for PostgreSQL
      size: 8Gi

# -- Deploy MySQL as a subchart
mysql:
  enabled: false
  # -- MySQL architecture (standalone or replication)
  architecture: standalone
  auth:
    # -- Database name created on first run
    database: gitea
    # -- Database username created on first run
    username: gitea
    # -- Database password (auto-generated if empty)
    password: ""
    # -- Root password (auto-generated if empty)
    rootPassword: ""
  primary:
    persistence:
      # -- Enable persistence for MySQL data
      enabled: true
      # -- PVC size for MySQL
      size: 8Gi

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistent storage for /var/lib/gitea (repos, LFS, config, SQLite)
  enabled: true

  # -- Storage class (leave empty for cluster default)
  storageClass: ""

  # -- Access mode for the PVC
  accessMode: ReadWriteOnce

  # -- Size of the persistent volume
  size: 10Gi

  # -- Use an existing PVC instead of creating one
  existingClaim: ""

  # -- Annotations for the PVC
  annotations: {}

# =============================================================================
# Resources
# =============================================================================

# -- CPU and memory requests/limits for the Gitea container
resources: {}
  # requests:
  #   cpu: 250m
  #   memory: 256Mi
  # limits:
  #   cpu: "1"
  #   memory: 1Gi

# =============================================================================
# Security Context
# =============================================================================

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Probes
# =============================================================================

startupProbe:
  # -- Enable startup probe
  enabled: true
  # -- Path for HTTP GET probe
  path: /api/healthz
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

livenessProbe:
  # -- Enable liveness probe
  enabled: true
  # -- Path for HTTP GET probe
  path: /api/healthz
  initialDelaySeconds: 0
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  # -- Enable readiness probe
  enabled: true
  # -- Path for HTTP GET probe
  path: /api/healthz
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# =============================================================================
# Service
# =============================================================================

service:
  http:
    # -- Service type for HTTP
    type: ClusterIP
    # -- HTTP service port
    port: 3000
    # -- Annotations for the HTTP service
    annotations: {}

  ssh:
    # -- Enable SSH service
    enabled: true
    # -- Service type for SSH (ClusterIP or NodePort)
    type: ClusterIP
    # -- SSH service port
    port: 2222
    # -- NodePort for SSH (only used when type is NodePort)
    nodePort: ""
    # -- Annotations for the SSH service
    annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Gitea HTTP
  enabled: false

  # -- Ingress class name
  # ingressClassName: traefik
  ingressClassName: ""

  # -- Ingress annotations
  # annotations:
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  annotations: {}

  # -- Ingress hosts
  # hosts:
  #   - host: git.example.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  hosts: []

  # -- Ingress TLS configuration
  # tls:
  #   - secretName: gitea-tls
  #     hosts:
  #       - git.example.com
  tls: []

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a dedicated ServiceAccount
  create: false

  # -- Name override (auto-generated if empty)
  name: ""

  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Backup (CronJob + S3)
# =============================================================================
# Database-aware backup: SQLite archives the full data directory,
# PostgreSQL uses pg_dump, MySQL uses mysqldump. All upload to S3.
# =============================================================================

backup:
  # -- Enable scheduled backups to S3-compatible storage
  enabled: false

  # -- Cron schedule for backups (default: daily at 03:00 UTC)
  schedule: "0 3 * * *"

  # -- Suspend the CronJob without deleting it
  suspend: false

  # -- Concurrency policy: Forbid, Replace, Allow
  concurrencyPolicy: Forbid

  # -- Number of successful job records to keep
  successfulJobsHistoryLimit: 3

  # -- Number of failed job records to keep
  failedJobsHistoryLimit: 3

  # -- Maximum retries per backup job
  backoffLimit: 1

  # -- Prefix for backup archive filenames
  archivePrefix: gitea

  images:
    # -- Image used for SQLite backup (must have tar)
    sqlite: docker.io/library/alpine:3.22
    # -- Image used for PostgreSQL backup (must have pg_dump)
    postgresql: docker.io/library/postgres:18.3-alpine
    # -- Image used for MySQL backup (must have mysqldump)
    mysql: docker.io/library/mysql:8.4
    # -- Image used for S3 upload (MinIO client)
    uploader: docker.io/helmforge/mc:1.0.0

  # -- Resources for backup containers
  resources: {}

  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""

    # -- Target bucket name
    bucket: ""

    # -- Key prefix within the bucket
    prefix: gitea

    # -- Auto-create the bucket if it does not exist
    createBucketIfNotExists: true

    # -- Use an existing secret for S3 credentials
    existingSecret: ""

    # -- Key in the existing secret for the access key
    existingSecretAccessKeyKey: access-key

    # -- Key in the existing secret for the secret key
    existingSecretSecretKeyKey: secret-key

    # -- Inline S3 access key (ignored when existingSecret is set)
    accessKey: ""

    # -- Inline S3 secret key (ignored when existingSecret is set)
    secretKey: ""

  # -- Override database credentials for backup (uses app credentials if empty)
  database:
    # -- Override database host for backup
    host: ""
    # -- Override database port for backup
    port: ""
    # -- Override database name for backup
    name: ""
    # -- Override database username for backup
    username: ""
    # -- Override database password for backup
    password: ""
    # -- Existing secret for backup database credentials
    existingSecret: ""
    # -- Key in existing secret for the backup database password
    existingSecretPasswordKey: database-password
    # -- Extra arguments for pg_dump
    postgresDumpArgs: ""
    # -- Extra arguments for mysqldump
    mysqlDumpArgs: "--single-transaction --quick --skip-lock-tables --no-tablespaces"

# =============================================================================
# Scheduling
# =============================================================================

# -- Node selector for pod scheduling
nodeSelector: {}

# -- Tolerations for pod scheduling
tolerations: []

# -- Affinity rules for pod scheduling
affinity: {}

# =============================================================================
# Extra Manifests
# =============================================================================

# -- List of extra Kubernetes manifests to deploy
extraManifests: []
  # - apiVersion: v1
  #   kind: ConfigMap
  #   metadata:
  #     name: extra-config
  #   data:
  #     key: value
