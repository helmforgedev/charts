# SPDX-License-Identifier: Apache-2.0
suite: pvc
templates:
  - templates/pvc.yaml
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gitea-data
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: should not render when persistence is disabled
    set:
      persistence:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence:
        existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom storage class
    set:
      persistence:
        storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd
