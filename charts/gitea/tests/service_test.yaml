# SPDX-License-Identifier: Apache-2.0
suite: service
templates:
  - templates/service.yaml
tests:
  - it: should render HTTP service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gitea-http
      - equal:
          path: spec.ports[0].port
          value: 3000

  - it: should render SSH service when enabled
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gitea-ssh
      - equal:
          path: spec.ports[0].port
          value: 2222
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: should not render SSH service when disabled
    set:
      service:
        ssh:
          enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should set SSH NodePort when configured
    documentIndex: 1
    set:
      service:
        ssh:
          enabled: true
          type: NodePort
          nodePort: 30022
    asserts:
      - equal:
          path: spec.type
          value: NodePort
      - equal:
          path: spec.ports[0].nodePort
          value: 30022
