suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: should not render database secret for SQLite
    asserts:
      - hasDocuments:
          count: 0

  - it: should render database secret for external database
    set:
      database:
        external:
          vendor: postgres
          host: pg.example.com
          name: gitea
          username: gitea
          password: mypassword
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-gitea-database
        isKind:
          of: Secret

  - it: should render database secret for PostgreSQL subchart
    set:
      postgresql:
        enabled: true
        auth:
          database: gitea
          username: gitea
          password: pgpassword
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-gitea-database
        isKind:
          of: Secret

  - it: should render admin secret when admin is configured
    set:
      admin:
        username: admin
        password: adminpass
        email: admin@test.com
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-gitea-admin
        isKind:
          of: Secret

  - it: should render backup S3 secret when backup is enabled
    set:
      backup:
        enabled: true
        s3:
          endpoint: https://s3.example.com
          bucket: test
          accessKey: testkey
          secretKey: testsecret
    asserts:
      - documentSelector:
          path: metadata.name
          value: RELEASE-NAME-gitea-backup-s3
        isKind:
          of: Secret
