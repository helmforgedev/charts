# SPDX-License-Identifier: Apache-2.0
apiVersion: v2
name: gitea
description: Gitea self-hosted Git service with SQLite, PostgreSQL, or MySQL, rootless image, SSH access, and S3 backup.
type: application
version: 1.1.13
appVersion: "1.26.4"
home: https://helmforge.dev
icon: https://helmforge.dev/icons/charts/gitea.png
keywords:
  - gitea
  - git
  - scm
  - version-control
  - devops
  - self-hosted
maintainers:
  - name: HelmForge
    url: https://github.com/helmforgedev
sources:
  - https://github.com/helmforgedev/charts/tree/main/charts/gitea
  - https://github.com/go-gitea/gitea
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: "bump gitea to 1.26.4 (#580)"
  artifacthub.io/maintainers: |
    - name: HelmForge
      email: berlofa@helmforge.dev
    - name: Maicon Berlofa
      email: maicon.berloffa@gmail.com
  artifacthub.io/license: Apache-2.0
  artifacthub.io/category: integration-delivery
  artifacthub.io/links: |
    - name: Official Website
      url: https://gitea.com
    - name: Documentation
      url: https://helmforge.dev/docs/charts/gitea
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/gitea
    - name: support
      url: https://github.com/helmforgedev/charts/issues
  helmforge.dev/maturity: stable
  helmforge.dev/signed: gpg+cosign
  artifacthub.io/signKey: |
    fingerprint: 6748042FBAD8C2E11C65E564170D55148EB88A9D
    url: https://repo.helmforge.dev/pgp-public-key.asc
  helmforge.dev/repository: https://repo.helmforge.dev
  artifacthub.io/recommendations: |
    - url: https://artifacthub.io/packages/helm/helmforge/postgresql
dependencies:
  - name: postgresql
    version: 2.0.4
    repository: oci://ghcr.io/helmforgedev/helm
    condition: postgresql.enabled
  - name: mysql
    version: 2.0.2
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
