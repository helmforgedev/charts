{{- if .Values.unbound.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pihole.unboundConfigMapName" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
    app.kubernetes.io/component: unbound
data:
  unbound.conf: |
{{ include "pihole.unboundConfig" . | indent 4 }}
{{- end }}
