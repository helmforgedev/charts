# Pi-hole with custom local DNS records and conditional forwarding

pihole:
  timezone: UTC
  upstreamDns: "1.1.1.1;1.0.0.1"

dns:
  customRecords:
    - "192.168.1.1 router.local"
    - "192.168.1.10 nas.local"
    - "192.168.1.20 printer.local"
    - "192.168.1.30 camera.local"
  cnameRecords:
    - "cname=media.local,nas.local"
    - "cname=files.local,nas.local"
  customDnsmasq:
    - "server=/corp.example.com/10.0.0.1"
    - "rev-server=192.168.1.0/24,192.168.1.1"

serviceDns:
  type: LoadBalancer
  loadBalancerIP: "192.168.1.53"
