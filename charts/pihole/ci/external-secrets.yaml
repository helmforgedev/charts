# CI scenario: External Secrets Operator (GR-061).
# admin.existingSecret is required when externalSecrets.enabled=true.
persistence:
  enabled: false

serviceDns:
  type: ClusterIP

admin:
  existingSecret: my-pihole-admin

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: password
      remoteRef:
        key: pihole/admin
        property: password
