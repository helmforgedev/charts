# CI: Unbound sidecar with extraConfig appended to the default server: section
unbound:
  enabled: true
  extraConfig: |
    cache-min-ttl: 300
    cache-max-ttl: 86400
    forward-zone:
        name: "."
        forward-tls-upstream: yes
        forward-addr: 1.1.1.1@853
