# SPDX-License-Identifier: Apache-2.0
# CI: Unbound sidecar with a fully overridden unbound.conf via unbound.config.
# Paths must match the mvance/unbound image layout (trust anchor lives under
# var/root.key; no root.hints ships in the image).
unbound:
  enabled: true
  config: |
    server:
        verbosity: 0
        interface: 127.0.0.1
        port: 5335
        do-ip4: yes
        do-udp: yes
        do-tcp: yes
        do-ip6: no
        auto-trust-anchor-file: "/opt/unbound/etc/unbound/var/root.key"
        access-control: 127.0.0.1/32 allow
        harden-glue: yes
        harden-dnssec-stripped: yes
        hide-identity: yes
        hide-version: yes
