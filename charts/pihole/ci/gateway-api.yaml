# CI scenario: Gateway API HTTPRoute for Pi-hole web UI (GR-060)
persistence:
  enabled: false

serviceDns:
  type: ClusterIP

gateway:
  enabled: true
  parentRefs:
    - name: my-gateway
      namespace: default
  hostnames:
    - pihole.example.com
  path: /
  pathType: PathPrefix
