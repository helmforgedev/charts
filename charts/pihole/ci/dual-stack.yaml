# SPDX-License-Identifier: Apache-2.0
# CI scenario: dual-stack IPv6 for both DNS and web services (GR-058)
persistence:
  enabled: false

serviceDns:
  type: ClusterIP
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6

serviceWeb:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
    - IPv4
    - IPv6
