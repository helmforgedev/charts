# CI: Custom DNS records, CNAME records, and custom dnsmasq config
dns:
  customRecords:
    - "192.168.1.10 nas.local"
    - "192.168.1.20 printer.local"
  cnameRecords:
    - "cname=media.local,nas.local"
  customDnsmasq:
    - "server=/corp.example.com/10.0.0.1"

pihole:
  timezone: America/Sao_Paulo
  upstreamDns: "1.1.1.1;1.0.0.1"
  dnssec: true
