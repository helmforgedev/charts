# SPDX-License-Identifier: Apache-2.0
suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render service account by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render service account when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-pihole
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should use custom name when provided
    set:
      serviceAccount.create: true
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set annotations when configured
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/pihole
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::role/pihole

  - it: should allow token automount when explicitly enabled
    set:
      serviceAccount.create: true
      serviceAccount.automountServiceAccountToken: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true
