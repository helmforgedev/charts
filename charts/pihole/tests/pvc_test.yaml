# SPDX-License-Identifier: Apache-2.0
suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-pihole

  - it: should not render PVC when persistence is disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render PVC when existingClaim is set
    set:
      persistence.existingClaim: my-existing-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set access mode from values
    asserts:
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce

  - it: should set storage size from values
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should set custom storage class
    set:
      persistence.storageClass: local-path
    asserts:
      - equal:
          path: spec.storageClassName
          value: local-path

  - it: should not set storageClassName when empty
    asserts:
      - isNull:
          path: spec.storageClassName

  - it: should set annotations when configured
    set:
      persistence.annotations:
        helm.sh/resource-policy: keep
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
