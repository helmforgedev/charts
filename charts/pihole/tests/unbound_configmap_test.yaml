# SPDX-License-Identifier: Apache-2.0
suite: Unbound ConfigMap
templates:
  - templates/unbound-configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render the unbound configmap by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the unbound configmap when unbound is enabled
    set:
      unbound.enabled: true
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-pihole-unbound
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: unbound

  - it: should bind unbound to loopback at the configured port by default
    set:
      unbound.enabled: true
    asserts:
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "interface: 127\\.0\\.0\\.1"
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "port: 5335"
      - notMatchRegex:
          path: data["unbound.conf"]
          pattern: "interface: 0\\.0\\.0\\.0"

  - it: should reflect a custom unbound.port in the rendered config
    set:
      unbound.enabled: true
      unbound.port: 5353
    asserts:
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "port: 5353"

  - it: should use the trust anchor generated by the unbound image entrypoint
    set:
      unbound.enabled: true
    asserts:
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "auto-trust-anchor-file: \"/opt/unbound/etc/unbound/var/root\\.key\""
      - notMatchRegex:
          path: data["unbound.conf"]
          pattern: "root-hints:"

  - it: should append unbound.extraConfig inside the server section
    set:
      unbound.enabled: true
      unbound.extraConfig: |
        cache-min-ttl: 300
        cache-max-ttl: 86400
    asserts:
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "cache-min-ttl: 300"
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "cache-max-ttl: 86400"

  - it: should fully override the rendered config when unbound.config is set
    set:
      unbound.enabled: true
      unbound.config: |
        server:
            interface: 127.0.0.1
            port: 9999
            do-ip4: yes
    asserts:
      - matchRegex:
          path: data["unbound.conf"]
          pattern: "port: 9999"
      - notMatchRegex:
          path: data["unbound.conf"]
          pattern: "private-address: 10\\.0\\.0\\.0/8"
