# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render secret by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-pihole

  - it: should not render secret when existingSecret is set
    set:
      admin.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should encode provided password in base64
    set:
      admin.password: my-password
    asserts:
      - equal:
          path: data.password
          value: bXktcGFzc3dvcmQ=

  - it: should generate random password when not provided
    set:
      admin.password: ""
    asserts:
      - isNotNull:
          path: data.password

  - it: should be of type Opaque
    asserts:
      - equal:
          path: type
          value: Opaque
