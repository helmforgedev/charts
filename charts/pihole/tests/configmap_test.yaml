suite: ConfigMap
templates:
  - templates/configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render configmap by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render configmap with custom records
    set:
      dns.customRecords:
        - "192.168.1.10 nas.local"
        - "192.168.1.20 printer.local"
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-pihole-config
      - matchRegex:
          path: data["custom.list"]
          pattern: "192\\.168\\.1\\.10 nas\\.local"

  - it: should render configmap with cname records
    set:
      dns.cnameRecords:
        - "cname=alias.local,target.local"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["05-custom-cname.conf"]
          pattern: "cname=alias\\.local,target\\.local"

  - it: should render configmap with custom dnsmasq
    set:
      dns.customDnsmasq:
        - "server=/corp.example.com/10.0.0.1"
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: data["06-custom.conf"]
          pattern: "server=/corp\\.example\\.com/10\\.0\\.0\\.1"

  - it: should include all config sections when all set
    set:
      dns.customRecords:
        - "192.168.1.10 nas.local"
      dns.cnameRecords:
        - "cname=alias.local,target.local"
      dns.customDnsmasq:
        - "server=/corp.example.com/10.0.0.1"
    asserts:
      - isNotNull:
          path: data["custom.list"]
      - isNotNull:
          path: data["05-custom-cname.conf"]
      - isNotNull:
          path: data["06-custom.conf"]
