# SPDX-License-Identifier: Apache-2.0
suite: Backup
templates:
  - backup-cronjob.yaml
  - backup-configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create backup configmap when disabled
    template: backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create backup cronjob when disabled
    template: backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create backup CronJob when enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    template: backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: CronJob
      - equal:
          path: spec.schedule
          value: "0 3 * * *"

  - it: should create backup ConfigMap with mongodump script
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    template: backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - isNotEmpty:
          path: data["mongodb-backup.sh"]

  - it: should use mongodb subchart URI by default
    set:
      backup.enabled: true
      backup.s3.endpoint: http://minio:9000
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    template: backup-cronjob.yaml
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].env
          content:
            name: MONGODB_URI
            value: "mongodb://root:$(MONGODB_ROOT_PASSWORD)@test-mongodb:27017/countly?authSource=admin"

  - it: should fail without s3 endpoint
    set:
      backup.enabled: true
      backup.s3.bucket: backups
      backup.s3.accessKey: admin
      backup.s3.secretKey: admin123
    template: backup-cronjob.yaml
    asserts:
      - failedTemplate:
          errorMessage: "backup.s3.endpoint is required when backup.enabled is true"
