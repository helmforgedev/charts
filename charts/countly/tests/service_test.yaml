# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-countly

  - it: should expose dashboard and API ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: dashboard
            protocol: TCP
      - contains:
          path: spec.ports
          content:
            name: api
            port: 3001
            targetPort: api
            protocol: TCP
