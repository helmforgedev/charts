# CI scenario: ExternalSecrets with drift guard (GR-061)
mongodb:
  enabled: true
  auth:
    rootPassword: test-password

externalMongodb:
  enabled: true
  existingSecret: countly-mongo-credentials
  existingSecretUriKey: mongodb-uri

externalSecrets:
  enabled: true
  secretStoreRef:
    name: helmforge-fake-store
    kind: ClusterSecretStore
  target:
    creationPolicy: None
  data:
    - secretKey: mongodb-uri
      remoteRef:
        key: test/password

extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: countly-mongo-credentials
    type: Opaque
    stringData:
      mongodb-uri: mongodb://root:test-password@countly-external-mongodb:27017/countly?authSource=admin
  - apiVersion: v1
    kind: Service
    metadata:
      name: countly-external-mongodb
    spec:
      type: ClusterIP
      ports:
        - name: mongodb
          port: 27017
          targetPort: mongodb
      selector:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: mongodb
