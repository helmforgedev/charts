{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- if .Values.externalSecrets.enabled }}
{{- /*
  Guard: when externalSecrets.enabled=true the chart-managed auth Secret is drift-protected
  by requiring externalMongodb.existingSecret explicitly.
*/}}
{{- if not .Values.externalMongodb.enabled }}
  {{- fail "externalSecrets.enabled requires externalMongodb.enabled=true; the Deployment only mounts the MongoDB secret when external MongoDB is active." }}
{{- end }}
{{- if not .Values.externalMongodb.existingSecret }}
  {{- fail "externalSecrets.enabled requires externalMongodb.existingSecret to be set to prevent credential drift between the chart-managed Secret and the ExternalSecret." }}
{{- end }}
{{- if not .Values.externalSecrets.data }}
  {{- fail "externalSecrets.data must not be empty when externalSecrets.enabled=true" }}
{{- end }}
{{- $uriKey := .Values.externalMongodb.existingSecretUriKey | default "mongodb-uri" -}}
{{- $hasUri := false -}}
{{- range .Values.externalSecrets.data -}}
  {{- if eq .secretKey $uriKey }}{{ $hasUri = true }}{{ end -}}
{{- end -}}
{{- if not $hasUri -}}
  {{- fail (printf "externalSecrets.data must include a mapping for key '%s' (MongoDB connection URI)" $uriKey) -}}
{{- end }}
apiVersion: {{ .Values.externalSecrets.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ printf "%s-credentials" (include "countly.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "countly.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ required "externalSecrets.secretStoreRef.name is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | quote }}
  target:
    name: {{ .Values.externalMongodb.existingSecret | quote }}
    creationPolicy: {{ .Values.externalSecrets.target.creationPolicy | quote }}
  data:
    {{- toYaml .Values.externalSecrets.data | nindent 4 }}
{{- end }}
