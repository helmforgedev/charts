# Countly against a managed MongoDB (no bundled subchart). MongoDB holds ALL
# analytics data, so back it up.
#
#   helm install countly helmforge/countly -f external-mongodb.yaml
#
# Provide the managed MongoDB connection/credentials per the chart's mongodb /
# external settings (host, port, database, user, existingSecret).

mongodb:
  enabled: false

# Point Countly at the managed MongoDB. Adjust keys to match your secret.
externalMongodb:
  host: mongodb.internal.example.com
  port: 27017
  database: countly
  username: countly
  existingSecret: countly-mongodb
  existingSecretPasswordKey: mongodb-password
