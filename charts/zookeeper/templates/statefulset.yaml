{{/* SPDX-License-Identifier: Apache-2.0 */}}
{{- include "zookeeper.validate" . }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "zookeeper.fullname" . }}
  namespace: {{ include "zookeeper.namespace" . | quote }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "zookeeper.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "zookeeper.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "zookeeper.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if include "zookeeper.hasChartManagedSensitiveSecret" . }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "zookeeper.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $waitForPeerDns := gt (.Values.replicaCount | int) 1 -}}
      {{- if or $waitForPeerDns .Values.extraInitContainers }}
      initContainers:
        {{- if $waitForPeerDns }}
        - name: wait-for-peer-dns
          image: {{ include "zookeeper.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              for host in {{ include "zookeeper.peerHosts" . }}; do
                until getent hosts "${host}" >/dev/null; do
                  sleep 2
                done
              done
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
        {{- end }}
        {{- with .Values.extraInitContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: zookeeper
          image: {{ include "zookeeper.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - /opt/helmforge/zookeeper/start.sh
          {{- if or .Values.extraEnv .Values.tls.client.enabled }}
          env:
            {{- if .Values.tls.client.enabled }}
            - name: ZK_KEYSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zookeeper.tlsPasswordsSecretName" . }}
                  key: {{ .Values.tls.client.existingKeystorePasswordKey }}
            - name: ZK_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "zookeeper.tlsPasswordsSecretName" . }}
                  key: {{ .Values.tls.client.existingTruststorePasswordKey }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.zookeeper.clientPort }}
              protocol: TCP
            {{- if .Values.tls.client.enabled }}
            - name: tls-client
              containerPort: {{ .Values.tls.client.port }}
              protocol: TCP
            {{- end }}
            - name: follower
              containerPort: {{ .Values.zookeeper.followerPort }}
              protocol: TCP
            - name: election
              containerPort: {{ .Values.zookeeper.electionPort }}
              protocol: TCP
            {{- if .Values.zookeeper.adminServerEnabled }}
            - name: admin
              containerPort: {{ .Values.zookeeper.adminServerPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: client
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - |
                  zkServer.sh status >/dev/null
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            tcpSocket:
              port: client
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: datalog
              mountPath: /datalog
            - name: scripts
              mountPath: /opt/helmforge/zookeeper
              readOnly: true
            {{- if .Values.auth.client.enabled }}
            - name: auth
              mountPath: /etc/zookeeper/auth
              readOnly: true
            {{- end }}
            {{- if .Values.tls.client.enabled }}
            - name: tls
              mountPath: /etc/zookeeper/tls
              readOnly: true
            - name: tls-passwords
              mountPath: /etc/zookeeper/tls-passwords
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: scripts
          configMap:
            name: {{ include "zookeeper.configMapName" . }}
            defaultMode: 0555
        {{- if .Values.auth.client.enabled }}
        - name: auth
          secret:
            secretName: {{ include "zookeeper.authSecretName" . }}
        {{- end }}
        {{- if .Values.tls.client.enabled }}
        - name: tls
          secret:
            secretName: {{ include "zookeeper.tlsSecretName" . }}
        - name: tls-passwords
          secret:
            secretName: {{ include "zookeeper.tlsPasswordsSecretName" . }}
        {{- end }}
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if or (not .Values.persistence.enabled) (not .Values.persistence.dataLogDir.enabled) }}
        - name: datalog
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- with .Values.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
    {{- if .Values.persistence.dataLogDir.enabled }}
    - metadata:
        name: datalog
      spec:
        accessModes:
          {{- toYaml .Values.persistence.dataLogDir.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.dataLogDir.size }}
        {{- with .Values.persistence.dataLogDir.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
