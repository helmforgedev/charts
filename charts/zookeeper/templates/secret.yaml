{{- if and .Values.auth.client.enabled (not .Values.auth.client.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zookeeper.authSecretName" . }}
  namespace: {{ include "zookeeper.namespace" . | quote }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.client.existingSecretJaasKey }}: |
    Server {
      org.apache.zookeeper.server.auth.DigestLoginModule required
      user_{{ .Values.auth.client.username }}="{{ include "zookeeper.authPassword" . }}";
    };
{{- end }}
{{- if and .Values.tls.client.enabled (not .Values.tls.client.existingPasswordsSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zookeeper.tlsPasswordsSecretName" . }}
  namespace: {{ include "zookeeper.namespace" . | quote }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.tls.client.existingKeystorePasswordKey }}: {{ .Values.tls.client.keystorePassword | quote }}
  {{ .Values.tls.client.existingTruststorePasswordKey }}: {{ .Values.tls.client.truststorePassword | quote }}
{{- end }}
