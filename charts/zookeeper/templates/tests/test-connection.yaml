{{/* SPDX-License-Identifier: Apache-2.0 */}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ printf "%s-test-connection" (include "zookeeper.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ include "zookeeper.namespace" . | quote }}
  labels:
    {{- include "zookeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: zk-smoke
      image: {{ include "zookeeper.image" . | quote }}
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      command:
        - /bin/bash
        - -ec
        - |
          {{- if .Values.auth.client.enabled }}
          echo "Skipping unauthenticated zkCli smoke because SASL client authentication is enabled."
          exit 0
          {{- else }}
          zkCli.sh -server {{ include "zookeeper.clientServiceName" . }}:{{ .Values.service.ports.client }} ls /
          {{- end }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
