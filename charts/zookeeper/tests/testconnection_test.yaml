# SPDX-License-Identifier: Apache-2.0
suite: Helm Test
templates:
  - tests/test-connection.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders a smoke test pod
    asserts:
      - isKind:
          of: Pod
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: test
      - matchRegex:
          path: spec.containers[0].command[2]
          pattern: "zkCli.sh -server test-zookeeper:2181 ls /"
