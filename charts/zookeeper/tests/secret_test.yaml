# SPDX-License-Identifier: Apache-2.0
suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: does not render auth secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders generated JAAS config when auth is enabled
    set:
      auth.client.enabled: true
      auth.client.username: client
      auth.client.password: chart-testing-password
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData["jaas.conf"]
          value: |
            Server {
              org.apache.zookeeper.server.auth.DigestLoginModule required
              user_client="chart-testing-password";
            };

  - it: does not render generated secret when existing secret is used
    set:
      auth.client.enabled: true
      auth.client.existingSecret: external-jaas
    asserts:
      - hasDocuments:
          count: 0
