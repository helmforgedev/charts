# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - externalsecret.yaml
release:
  name: test
  namespace: default
tests:
  - it: does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ExternalSecret for JAAS material
    set:
      auth.client.enabled: true
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: jaas.conf
          remoteRef:
            key: zookeeper/jaas
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.target.name
          value: test-zookeeper-auth
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets

  - it: targets TLS password Secret for TLS-only password material
    set:
      tls.client.enabled: true
      tls.client.existingSecret: zk-tls
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: keystore-password
          remoteRef:
            key: zookeeper/tls
            property: keystore-password
        - secretKey: truststore-password
          remoteRef:
            key: zookeeper/tls
            property: truststore-password
    asserts:
      - equal:
          path: spec.target.name
          value: test-zookeeper-tls-passwords

  - it: allows overriding ExternalSecret target name
    set:
      tls.client.enabled: true
      tls.client.existingSecret: zk-tls
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.target.name: custom-zookeeper-secret
      externalSecrets.data:
        - secretKey: keystore-password
          remoteRef:
            key: zookeeper/tls
    asserts:
      - equal:
          path: spec.target.name
          value: custom-zookeeper-secret

  - it: reuses auth target for combined SASL and TLS password material
    set:
      auth.client.enabled: true
      tls.client.enabled: true
      tls.client.existingSecret: zk-tls
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: jaas.conf
          remoteRef:
            key: zookeeper/jaas
        - secretKey: keystore-password
          remoteRef:
            key: zookeeper/tls
            property: keystore-password
        - secretKey: truststore-password
          remoteRef:
            key: zookeeper/tls
            property: truststore-password
    asserts:
      - equal:
          path: spec.target.name
          value: test-zookeeper-auth

  - it: targets TLS password Secret when SASL uses an existing Secret
    set:
      auth.client.enabled: true
      auth.client.existingSecret: external-jaas
      tls.client.enabled: true
      tls.client.existingSecret: zk-tls
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: keystore-password
          remoteRef:
            key: zookeeper/tls
            property: keystore-password
        - secretKey: truststore-password
          remoteRef:
            key: zookeeper/tls
            property: truststore-password
    asserts:
      - equal:
          path: spec.target.name
          value: test-zookeeper-tls-passwords

  - it: requires a secret store name
    set:
      externalSecrets.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.enabled requires externalSecrets.secretStoreRef.name"
