# SPDX-License-Identifier: Apache-2.0
suite: ExternalSecret
templates:
  - externalsecret.yaml
release:
  name: test
  namespace: default
tests:
  - it: does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders ExternalSecret for JAAS material
    set:
      auth.client.enabled: true
      externalSecrets.enabled: true
      externalSecrets.secretStoreRef.name: platform-secrets
      externalSecrets.data:
        - secretKey: jaas.conf
          remoteRef:
            key: zookeeper/jaas
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
      - equal:
          path: spec.target.name
          value: test-zookeeper-auth
      - equal:
          path: spec.secretStoreRef.name
          value: platform-secrets

  - it: requires a secret store name
    set:
      externalSecrets.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "externalSecrets.enabled requires externalSecrets.secretStoreRef.name"
