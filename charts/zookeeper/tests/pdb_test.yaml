# SPDX-License-Identifier: Apache-2.0
suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: renders PDB for replicated ensemble
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: skips PDB for standalone mode
    set:
      replicaCount: 1
    asserts:
      - hasDocuments:
          count: 0
