# =============================================================================
# Dolibarr Helm Chart
# =============================================================================
# Uses the official dolibarr/dolibarr Docker image.
# Supports a bundled MySQL subchart or an external MySQL/MariaDB database.
# Persists documents and custom modules in separate PVCs.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

image:
  repository: dolibarr/dolibarr
  tag: ""
  pullPolicy: IfNotPresent
  # Keep tag empty to default to Chart.appVersion.

imagePullSecrets: []

dolibarr:
  siteUrl: ""
  companyName: "Dolibarr"
  companyCountryCode: "US"
  auth: dolibarr
  enableModules: ""
  installAuto: true
  initDemo: false
  prod: true
  timezone: "UTC"
  extraEnv: []

admin:
  login: admin
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: admin-password

runtime:
  existingSecret: ""
  existingSecretInstanceUniqueIdKey: instance-unique-id
  instanceUniqueId: ""

database:
  mode: auto

  external:
    host: ""
    port: 3306
    name: dolibarr
    username: dolibarr
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: database-password
    ssl: false

mysql:
  enabled: true
  architecture: standalone

  auth:
    database: dolibarr
    username: dolibarr
    password: ""
    rootPassword: ""

  primary:
    persistence:
      enabled: true
      size: 8Gi

persistence:
  documents:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    existingClaim: ""
    annotations: {}

  custom:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    existingClaim: ""
    annotations: {}

php:
  memoryLimit: ""
  uploadMaxFilesize: ""
  postMaxSize: ""
  maxExecutionTime: ""

resources: {}

podSecurityContext: {}
securityContext: {}

startupProbe:
  enabled: true
  path: /
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 0
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: false
  name: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

extraVolumeMounts: []
extraVolumes: []
extraManifests: []
