# SPDX-License-Identifier: Apache-2.0
# =============================================================================
# Dolibarr Helm Chart
# =============================================================================
# Uses the official dolibarr/dolibarr Docker image.
# Supports a bundled MySQL subchart or an external MySQL/MariaDB database.
# Persists documents and custom modules in separate PVCs.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

image:
  repository: docker.io/dolibarr/dolibarr
  tag: "23.0.2"
  pullPolicy: IfNotPresent
  # Keep tag empty to default to Chart.appVersion.

imagePullSecrets: []

dolibarr:
  siteUrl: ""
  companyName: "Dolibarr"
  companyCountryCode: "US"
  auth: dolibarr
  enableModules: ""
  installAuto: true
  initDemo: false
  prod: true
  timezone: "UTC"
  extraEnv: []

admin:
  login: admin
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: admin-password

runtime:
  existingSecret: ""
  existingSecretInstanceUniqueIdKey: instance-unique-id
  instanceUniqueId: ""

database:
  mode: auto

  external:
    host: ""
    port: 3306
    name: dolibarr
    username: dolibarr
    password: ""
    existingSecret: ""
    existingSecretPasswordKey: database-password
    ssl: false

mysql:
  enabled: true
  architecture: standalone

  auth:
    database: dolibarr
    username: dolibarr
    password: ""
    rootPassword: ""

  primary:
    persistence:
      enabled: true
      size: 8Gi

persistence:
  documents:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    existingClaim: ""
    annotations: {}

  custom:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 2Gi
    existingClaim: ""
    annotations: {}

php:
  memoryLimit: ""
  uploadMaxFilesize: ""
  postMaxSize: ""
  maxExecutionTime: ""

resources: {}

podSecurityContext: {}
securityContext: {}

startupProbe:
  enabled: true
  path: /
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 0
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  annotations: {}
  # -- Set the ipFamilyPolicy for dual-stack (GR-058)
  ipFamilyPolicy: ''
  # -- Set the ipFamilies for dual-stack
  ipFamilies: []

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: false
  name: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

extraVolumeMounts: []
extraVolumes: []
extraManifests: []

# -- S3 database backup via mysqldump CronJob.
backup:
  # -- Enable scheduled MySQL backups to S3-compatible storage.
  enabled: false
  # -- Cron schedule for the backup job.
  schedule: "0 3 * * *"
  # -- Suspend the CronJob (useful for CI or temporary disable).
  suspend: false
  # -- CronJob concurrency policy.
  concurrencyPolicy: Forbid
  # -- Number of successful jobs to keep.
  successfulJobsHistoryLimit: 3
  # -- Number of failed jobs to keep.
  failedJobsHistoryLimit: 3
  # -- Number of retries before marking job as failed.
  backoffLimit: 1
  # -- Prefix for the dump filename (e.g. dolibarr-20240101T030000Z.sql.gz).
  archivePrefix: dolibarr
  # -- Container images used by the backup CronJob.
  images:
    # -- MySQL client image for mysqldump.
    mysql: docker.io/library/mysql:8.4
    # -- MinIO client image for S3 upload.
    uploader: "docker.io/helmforge/mc:1.0.0"
  # -- Resource requests/limits for backup containers.
  resources: {}
  # -- Database-specific backup settings.
  database:
    # -- Extra arguments passed to mysqldump.
    mysqldumpArgs: "--single-transaction --routines --triggers"
  # -- S3-compatible storage configuration.
  s3:
    # -- S3 endpoint URL (e.g. https://minio.example.com).
    endpoint: ""
    # -- S3 bucket name.
    bucket: ""
    # -- Object prefix inside the bucket.
    prefix: dolibarr
    # -- Create the bucket if it does not exist.
    createBucketIfNotExists: true
    # -- Use an existing secret for S3 credentials.
    existingSecret: ""
    # -- Key in the existing secret for the access key.
    existingSecretAccessKeyKey: access-key
    # -- Key in the existing secret for the secret key.
    existingSecretSecretKeyKey: secret-key
    # -- S3 access key (ignored when existingSecret is set).
    accessKey: ""
    # -- S3 secret key (ignored when existingSecret is set).
    secretKey: ""


## Gateway API configuration (GR-060)
gateway:
  enabled: false
  hostnames: []
  parentRefs: []
  #   - name: my-gateway
  #     namespace: default

## ExternalSecrets configuration (GR-061)
externalSecrets:
  enabled: false
  apiVersion: external-secrets.io/v1
  refreshInterval: 1h
  secretStoreRef:
    name: ''
    kind: ClusterSecretStore
  target:
    creationPolicy: Owner
  data: []

