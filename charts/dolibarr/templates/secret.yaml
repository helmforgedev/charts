{{- if not .Values.admin.existingSecret }}
{{- $adminSecretName := printf "%s-admin" (include "dolibarr.fullname" .) }}
{{- $existingAdminSecret := lookup "v1" "Secret" .Release.Namespace $adminSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $adminSecretName }}
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingAdminSecret $existingAdminSecret.data }}
  admin-password: {{ index $existingAdminSecret.data "admin-password" }}
  {{- else if .Values.admin.password }}
  admin-password: {{ .Values.admin.password | b64enc }}
  {{- else }}
  admin-password: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
{{- end }}
---
{{- $mode := include "dolibarr.databaseMode" . }}
{{- if and (not (and (eq $mode "external") .Values.database.external.existingSecret)) true }}
{{- $dbSecretName := printf "%s-database" (include "dolibarr.fullname" .) }}
{{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $dbSecretName }}
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingDbSecret $existingDbSecret.data }}
  database-password: {{ index $existingDbSecret.data "database-password" }}
  {{- else }}
  {{- $pw := include "dolibarr.databasePasswordValue" . }}
  {{- if $pw }}
  database-password: {{ $pw | b64enc }}
  {{- else }}
  database-password: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
  {{- end }}
{{- end }}
---
{{- if not .Values.runtime.existingSecret }}
{{- $runtimeSecretName := printf "%s-runtime" (include "dolibarr.fullname" .) }}
{{- $existingRuntimeSecret := lookup "v1" "Secret" .Release.Namespace $runtimeSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $runtimeSecretName }}
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingRuntimeSecret $existingRuntimeSecret.data }}
  instance-unique-id: {{ index $existingRuntimeSecret.data "instance-unique-id" }}
  {{- else }}
  instance-unique-id: {{ default (randAlphaNum 24) .Values.runtime.instanceUniqueId | b64enc }}
  {{- end }}
{{- end }}
---
{{- if and (eq (include "dolibarr.backupEnabled" .) "true") (not .Values.backup.s3.existingSecret) }}
{{- $backupSecretName := printf "%s-backup" (include "dolibarr.fullname" .) }}
{{- $existingBackupSecret := lookup "v1" "Secret" .Release.Namespace $backupSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $backupSecretName }}
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if and $existingBackupSecret $existingBackupSecret.data }}
  access-key: {{ index $existingBackupSecret.data "access-key" }}
  secret-key: {{ index $existingBackupSecret.data "secret-key" }}
  {{- else }}
  access-key: {{ .Values.backup.s3.accessKey | b64enc }}
  secret-key: {{ .Values.backup.s3.secretKey | b64enc }}
  {{- end }}
{{- end }}
