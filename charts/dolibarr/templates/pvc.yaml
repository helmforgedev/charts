{{- if and .Values.persistence.documents.enabled (not .Values.persistence.documents.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dolibarr.fullname" . }}-documents
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
  {{- with .Values.persistence.documents.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.documents.accessMode }}
  {{- if .Values.persistence.documents.storageClass }}
  storageClassName: {{ .Values.persistence.documents.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.documents.size }}
{{- end }}
---
{{- if and .Values.persistence.custom.enabled (not .Values.persistence.custom.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dolibarr.fullname" . }}-custom
  labels:
    {{- include "dolibarr.labels" . | nindent 4 }}
  {{- with .Values.persistence.custom.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.custom.accessMode }}
  {{- if .Values.persistence.custom.storageClass }}
  storageClassName: {{ .Values.persistence.custom.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.custom.size }}
{{- end }}
