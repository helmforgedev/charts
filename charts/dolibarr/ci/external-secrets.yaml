# CI scenario: ExternalSecrets with drift guard (GR-061)
mysql:
  enabled: false

database:
  external:
    host: mysql.external.svc.cluster.local

admin:
  existingSecret: dolibarr-admin-credentials

externalSecrets:
  enabled: true
  secretStoreRef:
    name: my-store
    kind: ClusterSecretStore
  data:
    - secretKey: admin-password
      remoteRef:
        key: dolibarr/auth
        property: password
