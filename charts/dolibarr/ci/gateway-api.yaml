# CI scenario: Gateway API (GR-060)
# Keep the bundled MySQL dependency enabled so this scenario validates the
# HTTPRoute path against a reachable application/database pair in k3d.

gateway:
  enabled: true
  parentRefs:
    - name: my-gateway
      namespace: default
  hostnames:
    - dolibarr.local
  path: /
  pathType: PathPrefix
