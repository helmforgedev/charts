apiVersion: v2
name: dolibarr
type: application
version: 1.1.1
appVersion: "23.0.0"
kubeVersion: ">=1.26.0-0"
description: A Helm chart for deploying Dolibarr ERP/CRM on Kubernetes with MySQL support
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - dolibarr
  - erp
  - crm
  - php
  - mysql
  - mariadb
home: https://www.dolibarr.org
sources:
  - https://github.com/helmforgedev/charts
  - https://hub.docker.com/r/dolibarr/dolibarr
  - https://github.com/Dolibarr/dolibarr
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/category: integration-delivery
  helmforge.dev/maturity: stable
  artifacthub.io/links: |
    - name: Documentation
      url: https://helmforge.dev/docs/charts/dolibarr
    - name: Source
      url: https://github.com/helmforgedev/charts/tree/main/charts/dolibarr
dependencies:
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
