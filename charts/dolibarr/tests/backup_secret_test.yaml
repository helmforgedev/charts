suite: backup secret
templates:
  - templates/secret.yaml
tests:
  - it: should not render backup secret when backup is disabled
    asserts:
      - hasDocuments:
          count: 3

  - it: should render backup secret when backup is enabled with inline credentials
    set:
      mysql:
        enabled: true
        auth:
          database: dolibarr
          username: dolibarr
          password: secret
      backup:
        enabled: true
        schedule: "0 3 * * *"
        archivePrefix: dolibarr
        images:
          mysql: mysql:8.4
          uploader: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
        resources: {}
        database:
          mysqldumpArgs: "--single-transaction --routines --triggers"
        s3:
          endpoint: http://minio:9000
          bucket: dolibarr-backups
          prefix: dolibarr
          createBucketIfNotExists: true
          existingSecret: ""
          accessKey: minioadmin
          secretKey: minioadmin
    asserts:
      - hasDocuments:
          count: 4
      - isKind:
          of: Secret
        documentIndex: 3
      - equal:
          path: metadata.name
          value: RELEASE-NAME-dolibarr-backup
        documentIndex: 3
      - equal:
          path: data["access-key"]
          value: bWluaW9hZG1pbg==
        documentIndex: 3
      - equal:
          path: data["secret-key"]
          value: bWluaW9hZG1pbg==
        documentIndex: 3

  - it: should not render backup secret when existingSecret is set
    set:
      mysql:
        enabled: true
        auth:
          database: dolibarr
          username: dolibarr
          password: secret
      backup:
        enabled: true
        schedule: "0 3 * * *"
        archivePrefix: dolibarr
        images:
          mysql: mysql:8.4
          uploader: "minio/mc:RELEASE.2025-08-13T08-35-41Z"
        resources: {}
        database:
          mysqldumpArgs: "--single-transaction --routines --triggers"
        s3:
          endpoint: http://minio:9000
          bucket: dolibarr-backups
          prefix: dolibarr
          createBucketIfNotExists: true
          existingSecret: my-s3-secret
          existingSecretAccessKeyKey: my-access-key
          existingSecretSecretKeyKey: my-secret-key
    asserts:
      - hasDocuments:
          count: 3
