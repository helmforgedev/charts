# SPDX-License-Identifier: Apache-2.0
suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-dolibarr

  - it: should expose the HTTP port
    asserts:
      - contains:
          path: spec.ports
          content:
            name: http
            port: 80
            targetPort: http
            protocol: TCP

  - it: should render explicit service IP families when configured
    set:
      service.ipFamilyPolicy: PreferDualStack
      service.ipFamilies:
        - IPv4
        - IPv6
    asserts:
      - equal:
          path: spec.ipFamilyPolicy
          value: PreferDualStack
      - equal:
          path: spec.ipFamilies[0]
          value: IPv4
      - equal:
          path: spec.ipFamilies[1]
          value: IPv6
