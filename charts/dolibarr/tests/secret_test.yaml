suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render the generated admin, database, and runtime secrets by default
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: test-dolibarr-admin
        documentIndex: 0
      - equal:
          path: metadata.name
          value: test-dolibarr-database
        documentIndex: 1
      - equal:
          path: metadata.name
          value: test-dolibarr-runtime
        documentIndex: 2

  - it: should not render the admin secret when an existing one is provided
    set:
      admin.existingSecret: dolibarr-admin
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render the database secret when using an external DB secret
    set:
      mysql.enabled: false
      database.mode: external
      database.external.host: mariadb.example.com
      database.external.existingSecret: dolibarr-db
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render the runtime secret when using an existing one
    set:
      runtime.existingSecret: dolibarr-runtime
    asserts:
      - hasDocuments:
          count: 2
