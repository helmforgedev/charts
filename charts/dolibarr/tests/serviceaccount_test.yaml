# SPDX-License-Identifier: Apache-2.0
suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render a ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render a ServiceAccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-dolibarr
