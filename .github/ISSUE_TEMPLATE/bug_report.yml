# SPDX-License-Identifier: Apache-2.0
name: Bug Report
description: Report a bug in a Helm chart
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Before opening, please check:
        - [HelmForge Documentation](https://helmforge.dev/docs)
        - [Existing Issues](https://github.com/helmforgedev/charts/issues)

        Please fill in as much detail as possible.

  - type: dropdown
    id: chart
    attributes:
      label: Chart
      description: Which chart is affected?
      options:
        - adguard-home
        - alfio
        - answer
        - appwrite
        - archivebox
        - authelia
        - automatisch
        - castopod
        - changedetection
        - chiefonboarding
        - ckan
        - cloudflared
        - countly
        - cronicle
        - ddns-updater
        - discount-bandit
        - docmost
        - dolibarr
        - druid
        - drupal
        - elasticsearch
        - envoy-gateway
        - fastmcp-server
        - flowise
        - generic
        - ghost
        - gitea
        - gophish
        - guacamole
        - heimdall
        - homarr
        - kafka
        - karakeep
        - keycloak
        - komga
        - listmonk
        - liwan
        - mariadb
        - metabase
        - middleware
        - minecraft
        - mongodb
        - mosquitto
        - mysql
        - n8n
        - ntfy
        - olivetin
        - openhab
        - open-webui
        - phpmyadmin
        - pihole
        - postgresql
        - rabbitmq
        - redis
        - strapi
        - strava-statistics
        - superset
        - umami
        - uptime-kuma
        - vaultwarden
        - velero
        - wallabag
        - wordpress
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Chart Version
      placeholder: "1.2.0"
    validations:
      required: true

  - type: input
    id: kubernetes-version
    attributes:
      label: Kubernetes Version
      placeholder: "1.31.0"

  - type: input
    id: helm-version
    attributes:
      label: Helm Version
      placeholder: "v4.1.4"

  - type: dropdown
    id: deployment-method
    attributes:
      label: Deployment Method
      options:
        - helm install
        - ArgoCD
        - FluxCD
        - other

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the issue.
      placeholder: |
        1. Install the chart with...
        2. Configure...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: values
    attributes:
      label: Values (relevant snippet)
      description: Paste the relevant values.yaml configuration.
      render: yaml

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste any error messages, logs, or stack traces.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
