# SPDX-License-Identifier: Apache-2.0
name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "type:feature", "triage"]
body:
  - type: dropdown
    id: chart
    attributes:
      label: Chart
      description: Which chart does this apply to?
      options:
        - adguard-home
        - alfio
        - answer
        - appwrite
        - archivebox
        - authelia
        - automatisch
        - castopod
        - changedetection
        - chiefonboarding
        - ckan
        - cloudflared
        - countly
        - cronicle
        - ddns-updater
        - discount-bandit
        - docmost
        - dolibarr
        - druid
        - drupal
        - elasticsearch
        - envoy-gateway
        - fastmcp-server
        - flowise
        - generic
        - ghost
        - gitea
        - gophish
        - guacamole
        - heimdall
        - homarr
        - kafka
        - karakeep
        - keycloak
        - komga
        - listmonk
        - liwan
        - mariadb
        - metabase
        - middleware
        - minecraft
        - mongodb
        - mosquitto
        - mysql
        - n8n
        - ntfy
        - olivetin
        - openhab
        - open-webui
        - phpmyadmin
        - pihole
        - postgresql
        - rabbitmq
        - redis
        - strapi
        - strava-statistics
        - superset
        - umami
        - uptime-kuma
        - vaultwarden
        - velero
        - wallabag
        - wordpress
        - new chart
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to add or change?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this needed? What problem does it solve?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - nice-to-have
        - important
        - critical

  - type: dropdown
    id: contribute
    attributes:
      label: Willing to Contribute?
      options:
        - "yes"
        - need guidance
        - "no"
