# SPDX-License-Identifier: Apache-2.0
name: New Chart Request
description: Request a new application chart for HelmForge
labels: ["enhancement", "type:new-chart", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Want a new application in HelmForge? Fill in the details below.
        Check our [chart catalog](https://helmforge.dev/charts) first to make sure it doesn't already exist.

  - type: input
    id: application
    attributes:
      label: Application Name
      placeholder: "e.g., Grafana"
    validations:
      required: true

  - type: input
    id: website
    attributes:
      label: Official Website
      placeholder: "https://grafana.com"
    validations:
      required: true

  - type: input
    id: image
    attributes:
      label: Docker Image
      description: The official Docker Hub or GHCR image reference.
      placeholder: "docker.io/grafana/grafana:11.0.0"
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why This Chart?
      description: Explain why this application should be part of HelmForge.
    validations:
      required: true

  - type: textarea
    id: existing
    attributes:
      label: Existing Helm Charts
      description: Are there existing Helm charts for this app in other repositories? If so, why not use them?

  - type: dropdown
    id: contribute
    attributes:
      label: Willing to Contribute?
      options:
        - "yes"
        - need guidance
        - "no"
