# SPDX-License-Identifier: Apache-2.0
name: Upstream Watch

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Check upstream images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Scan upstream images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # Don't exit on individual failures

          for CHART_DIR in charts/*/; do
            CHART=$(basename "$CHART_DIR")
            VALUES="$CHART_DIR/values.yaml"

            [ -f "$VALUES" ] || continue

            # Extract image repository and tag — scan common nesting paths
            REPO=""
            TAG=""
            for IMG_PATH in \
              '.image' \
              '.controller.image' \
              '.server.image' \
              '.app.image' \
              '.deployment.image' \
              '.workload.image'; do
              REPO=$(yq "${IMG_PATH}.repository // \"\"" "$VALUES" 2>/dev/null)
              TAG=$(yq "${IMG_PATH}.tag // \"\"" "$VALUES" 2>/dev/null)
              [ -n "$REPO" ] && [ "$REPO" != "null" ] && break
              REPO=""
            done

            [ -z "$REPO" ] && continue
            [ -z "$TAG" ] && continue
            [ "$TAG" = "null" ] && continue

            # Detect tag variant suffix (e.g. "-apache", "-management")
            TAG_VARIANT=$(echo "$TAG" | sed -n 's/^v\?[0-9]\+\.[0-9]\+\(\.[0-9]\+\)\?\(-.\+\)/\2/p')

            echo "::group::$CHART — $REPO:$TAG"

            # Determine registry and fetch tags
            LATEST=""
            if echo "$REPO" | grep -q "ghcr.io"; then
              # GHCR — proper OCI token exchange flow
              IMAGE_PATH="${REPO#ghcr.io/}"
              # Step 1: Exchange GITHUB_TOKEN for a registry-scoped bearer token
              GHCR_TOKEN=$(curl -sf \
                -u "_:${GH_TOKEN}" \
                "https://ghcr.io/token?scope=repository:${IMAGE_PATH}:pull&service=ghcr.io" \
                2>/dev/null | jq -r '.token // empty' 2>/dev/null || echo "")
              if [ -z "$GHCR_TOKEN" ]; then
                echo "⚠️ Failed to obtain GHCR token for $IMAGE_PATH — skipping"
                echo "::endgroup::"
                sleep 2
                continue
              fi
              # Step 2: Use scoped token to list tags
              TAGS_JSON=$(curl -sf -H "Authorization: Bearer $GHCR_TOKEN" \
                "https://ghcr.io/v2/${IMAGE_PATH}/tags/list" 2>/dev/null || echo "{}")
              LATEST=$(echo "$TAGS_JSON" | jq -r '.tags[]? // empty' 2>/dev/null \
                | { if [ -n "$TAG_VARIANT" ]; then grep -E "^v?[0-9]+\.[0-9]+(\.[0-9]+)?${TAG_VARIANT}$"; else grep -E '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$'; fi; } \
                | sed "s/^v//; s/${TAG_VARIANT:-\$}$//" \
                | sort -t. -k1,1n -k2,2n -k3,3n \
                | tail -1)
            elif echo "$REPO" | grep -qE "^(docker\.io/|[^./]+/[^./]+$)"; then
              # Docker Hub
              NAMESPACE=$(echo "$REPO" | sed 's|docker\.io/||' | cut -d'/' -f1)
              IMAGE=$(echo "$REPO" | sed 's|docker\.io/||' | cut -d'/' -f2)
              # Handle library images (single-segment names)
              if [ -z "$IMAGE" ]; then
                IMAGE="$NAMESPACE"
                NAMESPACE="library"
              fi
              TAGS_JSON=$(curl -sf \
                "https://hub.docker.com/v2/repositories/${NAMESPACE}/${IMAGE}/tags/?page_size=100&ordering=last_updated" \
                2>/dev/null || echo "{}")
              LATEST=$(echo "$TAGS_JSON" | jq -r '.results[]?.name // empty' 2>/dev/null \
                | { if [ -n "$TAG_VARIANT" ]; then grep -E "^v?[0-9]+\.[0-9]+(\.[0-9]+)?${TAG_VARIANT}$"; else grep -E '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$'; fi; } \
                | grep -vE '(-rc|-alpha|-beta|-dev|-snapshot|-pre)' \
                | sed "s/^v//; s/${TAG_VARIANT:-\$}$//" \
                | sort -t. -k1,1n -k2,2n -k3,3n \
                | tail -1)
            else
              echo "⚠️ Unknown registry for $REPO — skipping"
              echo "::endgroup::"
              sleep 2
              continue
            fi

            # Compare versions
            CURRENT_CLEAN=$(echo "$TAG" | sed 's/^v//')

            if [ -z "$LATEST" ]; then
              echo "ℹ️ No stable semver tags found for $REPO"
              echo "::endgroup::"
              sleep 2
              continue
            fi

            if [ "$CURRENT_CLEAN" = "$LATEST" ]; then
              echo "✅ $CHART is up to date ($TAG)"
              echo "::endgroup::"
              sleep 2
              continue
            fi

            # Check if newer version is actually greater (not older)
            HIGHER=$(printf '%s\n%s' "$CURRENT_CLEAN" "$LATEST" | sort -t. -k1,1n -k2,2n -k3,3n | tail -1)
            if [ "$HIGHER" = "$CURRENT_CLEAN" ]; then
              echo "ℹ️ $CHART current ($TAG) is newer than latest found ($LATEST) — skipping"
              echo "::endgroup::"
              sleep 2
              continue
            fi

            echo "🔔 Update available: $CHART $TAG → $LATEST"

            # Check for existing open issue to avoid duplicates
            EXISTING=$(gh issue list \
              --label "upstream-update" \
              --label "chart:${CHART}" \
              --state open \
              --limit 1 \
              --json number \
              --jq '.[0].number // empty' 2>/dev/null || echo "")

            if [ -n "$EXISTING" ]; then
              echo "ℹ️ Issue #$EXISTING already open for $CHART — skipping"
              echo "::endgroup::"
              sleep 2
              continue
            fi

            # Create issue
            ISSUE_BODY=$(cat <<'ISSUE_EOF'
          ## Upstream Image Update Available

          | Field | Value |
          |---|---|
          | **Chart** | `CHART_PLACEHOLDER` |
          | **Current image** | `REPO_PLACEHOLDER:TAG_PLACEHOLDER` |
          | **New version** | `LATEST_PLACEHOLDER` |
          | **Registry** | REGISTRY_PLACEHOLDER |

          ### Update Checklist

          - [ ] Verify new tag exists and is stable: `docker pull REPO_PLACEHOLDER:LATEST_PLACEHOLDER`
          - [ ] Review upstream changelog/release notes for breaking changes
          - [ ] Update `values.yaml` image tag
          - [ ] Update `appVersion` in `Chart.yaml`
          - [ ] Run `helm lint charts/CHART_PLACEHOLDER --strict`
          - [ ] Run `helm unittest charts/CHART_PLACEHOLDER`
          - [ ] Test on local k3d cluster
          - [ ] Update site documentation if needed (GR-007)

          ---
          _This issue was automatically created by the [Upstream Watch](https://github.com/helmforgedev/charts/actions/workflows/upstream-watch.yml) workflow._
          ISSUE_EOF
          )

            # Determine registry name for the issue body
            REGISTRY_NAME="Docker Hub"
            echo "$REPO" | grep -q "ghcr.io" && REGISTRY_NAME="GHCR"

            ISSUE_BODY=$(echo "$ISSUE_BODY" \
              | sed "s|CHART_PLACEHOLDER|$CHART|g" \
              | sed "s|REPO_PLACEHOLDER|$REPO|g" \
              | sed "s|TAG_PLACEHOLDER|$TAG|g" \
              | sed "s|LATEST_PLACEHOLDER|$LATEST|g" \
              | sed "s|REGISTRY_PLACEHOLDER|$REGISTRY_NAME|g")

            # Ensure all required labels exist (idempotent)
            gh label create "upstream-update" \
              --description "Upstream image version update available" \
              --color "1D76DB" --force 2>/dev/null || true
            gh label create "chore" \
              --description "Maintenance and housekeeping" \
              --color "C2E0C6" --force 2>/dev/null || true
            gh label create "chart:${CHART}" \
              --description "Issues related to the ${CHART} chart" \
              --color "0e8a16" --force 2>/dev/null || true

            gh issue create \
              --title "chore($CHART): upstream image update available ($TAG → $LATEST)" \
              --body "$ISSUE_BODY" \
              --label "upstream-update,chart:${CHART},chore" \
              || echo "::warning::Failed to create issue for $CHART"

            echo "::endgroup::"

            # Rate limit protection — 2s between API calls
            sleep 2
          done
