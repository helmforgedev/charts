name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '!charts/**/README.md'
      - '!charts/**/examples/**'
      - '!charts/**/docs/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  HELM_VERSION: v4.1.4
  OCI_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/helm
  PAGES_URL: https://repo.helmforge.dev

jobs:
  detect:
    name: Detect changed charts
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.changed.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed charts
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BASE_SHA="${{ github.event.before }}"
          fi

          if [ -n "$BASE_SHA" ]; then
            CHANGED_DIRS=$(git diff --name-only "$BASE_SHA" HEAD -- charts/ \
              | grep -v -E '(README\.md|examples/|docs/)' \
              | cut -d'/' -f2 | sort -u \
              | while read -r dir; do [ -f "charts/$dir/Chart.yaml" ] && echo "$dir"; done \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            # workflow_dispatch: all charts
            CHANGED_DIRS=$(ls -d charts/*/ 2>/dev/null | xargs -I{} basename {} \
              | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "charts=$CHANGED_DIRS" >> "$GITHUB_OUTPUT"
          echo "Changed charts: $CHANGED_DIRS"

  publish:
    name: Publish - ${{ matrix.chart }}
    needs: detect
    if: needs.detect.outputs.charts != '[]' && needs.detect.outputs.charts != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        chart: ${{ fromJson(needs.detect.outputs.charts) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        run: |
          CHART="${{ matrix.chart }}"
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E "^${CHART}-v[0-9]+\.[0-9]+\.[0-9]+$" | head -1)

          if [ -z "$LATEST_TAG" ]; then
            # No tag found — read current version from Chart.yaml as baseline
            CHART_VERSION=$(grep '^version:' "charts/${CHART}/Chart.yaml" | awk '{print $2}')
            if [ -n "$CHART_VERSION" ] && [ "$CHART_VERSION" != "0.1.0" ]; then
              echo "No tag found for $CHART, using Chart.yaml version $CHART_VERSION as baseline"
              MAJOR=$(echo "$CHART_VERSION" | cut -d. -f1)
              MINOR=$(echo "$CHART_VERSION" | cut -d. -f2)
              PATCH=$(echo "$CHART_VERSION" | cut -d. -f3)
              NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              BUMP_TYPE="patch"
            else
              echo "No previous tag found for $CHART, starting at 1.0.0"
              NEXT_VERSION="1.0.0"
              BUMP_TYPE="initial"
            fi
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          else
            CURRENT_VERSION="${LATEST_TAG#${CHART}-v}"
            echo "Latest tag: $LATEST_TAG (version: $CURRENT_VERSION)"

            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" -- "charts/${CHART}/")

            if [ -z "$COMMITS" ]; then
              echo "No commits affecting $CHART since $LATEST_TAG, skipping"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
            MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
            PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

            if echo "$COMMITS" | grep -qE '^[a-z]+(\(.+\))?!:' || \
               git log "${LATEST_TAG}..HEAD" --pretty=format:"%b" -- "charts/${CHART}/" | grep -q 'BREAKING CHANGE'; then
              BUMP_TYPE="major"
              NEXT_VERSION="$((MAJOR + 1)).0.0"
            elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
              BUMP_TYPE="minor"
              NEXT_VERSION="${MAJOR}.$((MINOR + 1)).0"
            else
              BUMP_TYPE="patch"
              NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi

            echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "tag=${CHART}-v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP_TYPE -> $NEXT_VERSION"

      - name: Setup Helm
        if: steps.semver.outputs.skip != 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | DESIRED_VERSION=${{ env.HELM_VERSION }} bash

      - name: Setup Cosign
        if: steps.semver.outputs.skip != 'true'
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        if: steps.semver.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Setup GPG keyring
        if: steps.semver.outputs.skip != 'true'
        run: |
          echo "${{ secrets.GPG_KEYRING }}" | base64 -d > /tmp/secring.gpg
          echo "GPG keyring imported ($(wc -c < /tmp/secring.gpg) bytes)"

      - name: Build Helm dependencies
        if: steps.semver.outputs.skip != 'true'
        run: helm dependency build charts/${{ matrix.chart }}

      - name: Update Chart.yaml version
        if: steps.semver.outputs.skip != 'true'
        run: |
          sed -i "s/^version:.*/version: ${{ steps.semver.outputs.version }}/" charts/${{ matrix.chart }}/Chart.yaml
          echo "Updated Chart.yaml:"
          grep -E '^(version|appVersion):' charts/${{ matrix.chart }}/Chart.yaml

      - name: Generate ArtifactHub changes annotation
        if: steps.semver.outputs.skip != 'true'
        run: |
          CHART="${{ matrix.chart }}"
          PREV_TAG="${{ steps.semver.outputs.previous_tag }}"
          CHART_YAML="charts/${CHART}/Chart.yaml"

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" -- "charts/${CHART}/" | head -50)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"%s" -- "charts/${CHART}/")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits found, skipping changes annotation"
            exit 0
          fi

          CHANGES=""
          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Strip scope: "feat(chart): desc" -> "desc"
            desc=$(echo "$msg" | sed -E 's/^[a-z]+(\([^)]*\))?!?:\s*//')
            # Determine kind from conventional commit type
            if echo "$msg" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
              kind="changed"
              desc="BREAKING: $desc"
            elif echo "$msg" | grep -qE '^feat(\([^)]*\))?:'; then
              kind="added"
            elif echo "$msg" | grep -qE '^fix(\([^)]*\))?:'; then
              kind="fixed"
            elif echo "$msg" | grep -qE '^(refactor|perf)(\([^)]*\))?:'; then
              kind="changed"
            elif echo "$msg" | grep -qE '^docs(\([^)]*\))?:'; then
              kind="changed"
            else
              kind="changed"
            fi
            CHANGES="${CHANGES}    - kind: ${kind}\n      description: ${desc}\n"
          done <<< "$COMMITS"

          if [ -n "$CHANGES" ]; then
            # Remove any existing changes annotation
            sed -i '/artifacthub\.io\/changes:/,/^  [^ ]/{ /^  [^ ]/!d; /artifacthub\.io\/changes:/d }' "$CHART_YAML"
            # Insert changes annotation inside the annotations block (after "annotations:" line)
            ANNOTATIONS_LINE=$(grep -n "^annotations:" "$CHART_YAML" | cut -d: -f1)
            if [ -n "$ANNOTATIONS_LINE" ]; then
              head -n "$ANNOTATIONS_LINE" "$CHART_YAML" > /tmp/chart_tmp.yaml
              printf '  artifacthub.io/changes: |\n%b' "$CHANGES" >> /tmp/chart_tmp.yaml
              tail -n "+$((ANNOTATIONS_LINE + 1))" "$CHART_YAML" >> /tmp/chart_tmp.yaml
              mv /tmp/chart_tmp.yaml "$CHART_YAML"
            fi
            echo "Added changes annotation with $(echo -e "$CHANGES" | grep -c 'kind:') entries"
          fi

      - name: Package and push to OCI
        if: steps.semver.outputs.skip != 'true'
        id: push
        run: |
          helm package charts/${{ matrix.chart }} --destination .dist \
            --sign --key "${{ secrets.GPG_KEY_NAME }}" --keyring /tmp/secring.gpg
          for pkg in .dist/*.tgz; do
            echo "Publishing $pkg to OCI"
            PUSH_OUTPUT=$(helm push "$pkg" "$OCI_REGISTRY" 2>&1)
            echo "$PUSH_OUTPUT"
            DIGEST=$(echo "$PUSH_OUTPUT" | grep -oE 'sha256:[a-f0-9]{64}')
            echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          done

      - name: Make OCI package public
        if: steps.semver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHART="${{ matrix.chart }}"
          ENCODED="helm%2F${CHART}"
          STATUS=$(gh api "orgs/${{ github.repository_owner }}/packages/container/${ENCODED}" --jq '.visibility' 2>/dev/null || echo "unknown")
          echo "Current visibility for ${CHART}: ${STATUS}"
          if [ "$STATUS" != "public" ]; then
            echo "Setting ${CHART} package visibility to public..."
            gh api --method PATCH "orgs/${{ github.repository_owner }}/packages/container/${ENCODED}" \
              --field visibility=public \
              && echo "✓ Package is now public" \
              || echo "⚠ Could not set visibility (may need write:packages scope or manual org setting)"
          else
            echo "✓ Package is already public"
          fi

      - name: Upload provenance file
        if: steps.semver.outputs.skip != 'true'
        id: prov
        run: |
          PROV_DIR="${GITHUB_WORKSPACE}/provenance-upload"
          mkdir -p "$PROV_DIR"
          cp .dist/*.prov "$PROV_DIR/" 2>/dev/null || echo "No .prov files to copy"
          echo "Provenance upload directory:"
          ls -la "$PROV_DIR/"
          echo "prov_dir=$PROV_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload provenance artifact
        if: steps.semver.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: provenance-${{ matrix.chart }}
          path: ${{ steps.prov.outputs.prov_dir }}
          retention-days: 1
          if-no-files-found: warn

      - name: Sign OCI artifact with Cosign
        if: steps.semver.outputs.skip != 'true' && steps.push.outputs.digest != ''
        env:
          COSIGN_YES: "true"
        run: |
          CHART="${{ matrix.chart }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          echo "Signing ghcr.io/${{ github.repository_owner }}/helm/${CHART}@${DIGEST}"
          cosign sign "ghcr.io/${{ github.repository_owner }}/helm/${CHART}@${DIGEST}"

      - name: Commit version bump and tag
        if: steps.semver.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/${{ matrix.chart }}/Chart.yaml
          git diff --cached --quiet && echo "Chart.yaml already at target version, skip commit" || \
            git commit -m "release(${{ matrix.chart }}): ${{ steps.semver.outputs.version }} [skip ci]"

          # Rebase before tagging so the tag points to the final commit
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && break
            echo "Rebase failed (attempt $attempt/5), retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done

          # Tag after rebase so --follow-tags can push it
          git tag -a "${{ steps.semver.outputs.tag }}" -m "Release ${{ matrix.chart }} v${{ steps.semver.outputs.version }}"

          for attempt in 1 2 3 4 5; do
            git push origin main --follow-tags && break
            echo "Push failed (attempt $attempt/5), retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done

      - name: Generate release notes
        if: steps.semver.outputs.skip != 'true'
        run: |
          CHART="${{ matrix.chart }}"
          VERSION="${{ steps.semver.outputs.version }}"
          PREV_TAG="${{ steps.semver.outputs.previous_tag }}"
          BUMP="${{ steps.semver.outputs.bump }}"
          NOTES_FILE="/tmp/release-notes.md"

          {
            echo "## $CHART v$VERSION"
            echo ""

            if [ "$BUMP" = "initial" ]; then
              echo "Initial release of the **$CHART** chart."
              echo ""
              COMMITS=$(git log --pretty=format:"- %s" -- "charts/${CHART}/" | head -50)
            else
              COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" -- "charts/${CHART}/")
            fi

            # Categorize commits
            BREAKING=$(echo "$COMMITS" | grep -E '^\- [a-z]+(\(.+\))?!:' || true)
            FEATURES=$(echo "$COMMITS" | grep -E '^\- feat(\(.+\))?:' | grep -v '!:' || true)
            FIXES=$(echo "$COMMITS" | grep -E '^\- fix(\(.+\))?:' | grep -v '!:' || true)
            OTHER=$(echo "$COMMITS" | grep -vE '^\- (feat|fix)(\(.+\))?\!?:' | grep -vE '^\- [a-z]+(\(.+\))?!:' | grep -v '^\s*$' || true)

            if [ -n "$BREAKING" ]; then
              echo "### Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi

            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""
            echo "### Install"
            echo ""
            echo '```bash'
            echo "# OCI registry"
            echo "helm install $CHART oci://ghcr.io/helmforgedev/helm/$CHART --version $VERSION"
            echo ""
            echo "# Helm repository"
            echo "helm repo add helmforge https://repo.helmforge.dev"
            echo "helm install $CHART helmforge/$CHART --version $VERSION"
            echo '```'
          } > "$NOTES_FILE"

          echo "Generated release notes:"
          cat "$NOTES_FILE"

      - name: Create GitHub Release
        if: steps.semver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.semver.outputs.tag }}" \
            --title "${{ matrix.chart }} v${{ steps.semver.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --verify-tag

  update-index:
    name: Update Helm repo index
    needs: [detect, publish]
    if: always() && needs.publish.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main-src
          fetch-depth: 1

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Setup Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4 | DESIRED_VERSION=${{ env.HELM_VERSION }} bash

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Download provenance files
        uses: actions/download-artifact@v4
        with:
          pattern: provenance-*
          path: provenance
          merge-multiple: true

      - name: Sync chart packages from OCI
        run: |
          cd gh-pages

          for chart_dir in ../main-src/charts/*/; do
            chart=$(basename "$chart_dir")
            version=$(grep '^version:' "$chart_dir/Chart.yaml" | awk '{print $2}')
            tgz="${chart}-${version}.tgz"

            if [ -f "$tgz" ]; then
              echo "✓ $tgz already present"
              continue
            fi

            echo "Pulling $chart v$version from OCI..."
            helm pull "$OCI_REGISTRY/$chart" --version "$version" 2>/dev/null \
              && echo "✓ Pulled $tgz" \
              || echo "⚠ $tgz not available in OCI (skipped)"
          done

          echo "Chart packages:"
          ls -1 *.tgz 2>/dev/null || echo "none"

      - name: Copy provenance files
        run: |
          echo "Provenance directory contents:"
          find provenance/ -type f -name '*.prov' 2>/dev/null || echo "  (no .prov files found)"

          if find provenance/ -type f -name '*.prov' 2>/dev/null | grep -q .; then
            find provenance/ -type f -name '*.prov' -exec cp {} gh-pages/ \;
            echo "Copied provenance files to gh-pages:"
            ls -1 gh-pages/*.prov 2>/dev/null
          else
            echo "WARNING: No provenance files found in provenance/ directory"
            echo "This means chart signatures will not be verifiable via the HTTP repository"
          fi

      - name: Sync artifacthub-repo.yml
        run: |
          if [ -f main-src/artifacthub-repo.yml ]; then
            cp main-src/artifacthub-repo.yml gh-pages/artifacthub-repo.yml
            echo "Synced artifacthub-repo.yml to gh-pages"
          fi

      - name: Rebuild repo index
        run: |
          cd gh-pages
          if ls *.tgz 1>/dev/null 2>&1; then
            if [ -f index.yaml ]; then
              helm repo index . --url "$PAGES_URL" --merge index.yaml
            else
              helm repo index . --url "$PAGES_URL"
            fi
          else
            echo "No chart packages found, skipping index rebuild"
          fi

      - name: Commit and push
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml 2>/dev/null || true
          git add *.tgz 2>/dev/null || true
          git add *.prov 2>/dev/null || true
          git add artifacthub-repo.yml 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to index, skip" || {
            git commit -m "ci: update helm repo index [skip ci]"
            git push origin gh-pages
          }
